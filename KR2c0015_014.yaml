body:
  text: 庚午上諭內閣曰行在大學士九卿會審勒爾謹王亶望王廷贊等揑災冒賑侵蝕監糧通同舞弊營私各欵按律定擬請旨即行正法一摺朕酌核三人情罪即豫駢誅亦所應得但其中稍有别區不得不為明白宣示者甘省收捐監生本欲藉監糧為偹荒賑恤之用乾隆三十九年經勒爾謹奏請開例議準允行原令祗收本色糧米其時王亶望為藩司即公然私收折色銀兩勒爾謹竟如木偶毫無見聞於是王亶望又倚任蘭州府知府蔣全迪將通省各屬災賑歷年揑開分數以為侵冒監糧之地上下勾通一氣甚至將被災分數酌定輕重令州縣分報開銷上侵國帑下屯民膏毫無忌憚嗣後王廷贊接任藩司既知折色之弊雖稟商該督欲請停捐乃仍復因循觀望並不據實陳奏且將私收折色一事議定改歸首府辦理而一切弊竇仍未革除若非朕特降諭旨令阿桂等密行查辦則始終蒙蔽王亶望諸人竟得安然飽其欲壑幸逃法網有是理乎今王亶望勒爾謹王廷贊等拏解行在審勘所有伊等冒賑分肥婪贓舞弊各欵俱一一供認明確俯首無詞夫國家任用總督藩司本欲令糾察屬吏遇有積蠧病民之官隨時舉劾俾民瘼得以上陳而恩膏得以下逮朕臨御四十餘年以來無日不以敬天勤民為心凡各直省偶遇偏災即飭地方大吏加意撫綏降旨賑恤此中外臣民所共知共見者即查辦此案朕早有風聞猶恐各督撫或誤會朕意因噎廢食致將災賑之事靳固不舉是以遲回未發者已二三年矣今諸弊已露若再不辦是朕不能懲貪察吏朕豈肯受此從前恆文方世俊良卿高積錢度等俱以婪贓枉法先後伏誅然尚未至侵蝕災糧冒銷國帑至數十萬金如王亶望之明目張膽肆行無忌者王亶望由知縣經朕加恩用至藩司巡撫乃敢負恩喪心至此自應即正典刑以彰國憲王亶望著即處斬至勒爾謹本一庸懦無能之人因其平日尚屬小心勤慎用為總督從前逆回一事原因勒爾謹養癰貽害所致即收復河州亦係布政司福嵩在彼籌畫幫同辦理勒爾謹失機貽誤本即應正法彼時朕尚從寬改為監候今又于王亶望私收折色冒賑婪贓一案全無覺察且已亦收受屬員代辦物件一任家人等從中影射侵肥種種昏庸貽悮罪更難逭但朕究以用人不當自引為愧未肯即令肆市勒爾謹著加恩賜令自盡至王廷贊以微末之員擢至藩司受恩深重乃于接任王亶望交代時不惟不據實參奏且效尤作弊雖未收受屬員銀兩亦有𣲖買物件並加收心紅紙張銀兩之事其罪亦難末減况從前令留京辦事王大臣及刑部堂官審訊時令其將此案冒賑私收及王亶望婪贓等欵詳悉供吐並殊筆傳諭王廷贊伊之生死總在此畨實供與否令伊自定朕不食言乃竟始終匿飾不吐實情豈非自取其死但究念蘭州守城微勞免其立決王廷贊著加恩改為應絞監候秋後處決交刑部按例入秋審朕辦理庶務一秉大公至正此事既經發覺自不得不徹底查辦嗣後內外大小臣工益當互相砥礪各凜冰淵共矢愛民潔已之誠毋蹈簠簋不飭之戒所有辦理此案前後情節著通行曉諭中外知之臣等謹案甘省封疆大吏不思潔已奉法率屬惠民乃公然侵蝕冒銷蠧國病民為從來所未有浸至積戾召殃致有逆回蘇四十三之事王亶望諸人種種劣迹始各敗露逮拏解行在皇上親鞫於廷復命大學士九卿會勘情真罪當百喙無辭爰明示懲創以申國憲從此吏治肅清恩膏下逮所謂辟以止辟者乎八月辛未上諭內閣曰昨行在大學士九卿等審訊王亶望時據供署中親友常有囑托捐監之事我就令屬員填給實收送進並未發給糧價等語此等夤緣熱中之人王亶望既為囑托屬員捐監自必又有加捐官職銓選地方之人若輩出身既不可問倘任以地方事務必致賄賂公行毫無忌憚於吏治官方大有關係不可不徹底查辦現在阿桂會同李侍堯查辦揑災冒賑之案著即就近查明王亶望及其餘道府任內將子姪親友幕賔令屬員填取監生實收之人現在遞捐官職銓選及分發各省試用者查明一併革職即現係監生並未捐官者亦應追奪監照按名褫革俾知名器不可濫邀以杜鑽營幸獲之弊其餘四庫全書處效力監生內如有經王亶望送給實收濫邀議敘者亦著一體斥革仍加恩俱免其治罪其總裁朕俱加恩不問但以後自當加慎勿謂朕不教也又據程棟供蔣全迪亦冇交首縣捐監不發銀兩之事著一例查辦至甘省收捐監糧自王亶望始收折色王廷贊旋踵其弊歷年所捐監生不下數十萬皆屬濫厠成均本應交部按名禠革始念人數衆多且尚係本生自出已資與填給空名冒稱實收者有間著一體加恩免其斥革將此通諭中外知之甲戌阿桂李侍堯奏言臣等查辦監糧一案將揑報災賑之道府州縣通行查核自乾隆四十年起至四十五年止假揑結報之道府直𨽻州共五十三員各州縣內未捐監辦災者祗有十六員其止捐監而未辦災者四十六員捐監報災者一百十二員其收捐監生自數百名至數千名不等開銷賑恤糧數自數千石至數十萬石不等臣等連日將現在省城各員嚴切訊問據供餽送上司代辦物件往來支應捐修工程日用花銷各欵大概相同伏查各省報災皆由災民呈訴地方官勘報後又經府道等逐層查勘始具報呈災分數甘省則一屆夏秋各屬紛紛具報而其準否輕重則總督與藩司靣為商定厚薄因人而施多寡惟意所欲除首縣供應各上司每年俱準多開外其他或藉口衝途差務之賠墊則浮冒亦多至地居偏僻缺亦不甚清苦如狄道河州等處而多開賑糧者大抵皆善於逢迎及加意餽送之人藩司多給實收非酬其素日之殷勤即兾其將來之答報捐監既多不得不重報災賑以開銷總之通省大小各員聨為一氣冒賑分肥遂至積成弊藪牢不可破在各州縣既藉冒賑為浸漁之地勢不得不稍為給散及冬間捐辦煮粥施衣等事以掩人耳目邊地窮民本無必欲報災之念轉得年年食賑並可邀恩蠲緩亦所樂從是以歷年以來並無出而控告者此皆實在情形也雖現在各員所供尚有不盡之處而其浮冒侵漁情弊業已水落石出無難定案再此等劣員實屬愍不畏法為天理所不容在我皇上所以嚴行窮究止欲剔除官吏積弊使百姓實受賑恤之意原非靳惜監糧為若輩所花銷而國家數百萬帑糧亦不可懸宕無著況此等貪黷之吏即將家産查抄入官亦不足抵其浮冒之數豈可使尚擁厚資是以陸瑋鄭陳善揚德言蔣重熹四員臣等接奉革職拏問諭旨即一面將伊等任所資財查封偹抵並行知前任蘭州府知府蔣全迪原藉任所督撫一併查抄至道員劉光昱任所貨財亦已查封存記以備分賠其離任而尚在甘省之陳鴻文等十一員臣等另行查辦外其原籍並查明移咨辦理至已離甘省各員凡冒銷賑糧者應請旨交吏部查明各該員旗籍及現任處所敕交留京王大臣及各督撫按名查封毋令隱匿寄頓並即轉飭訊問各該員今其逐一供認如已得實即可定擬具奏如或狡飾即𣲖員解甘質審歸案辦理其在省各員因一時乏人委署暫緩參革查封俟㨂發人員到甘亦即分别查辦奏入上諭內閣曰甘省大小各員將災賑監糧侵吞舞弊上下聨為一氣兹阿桂等在甘查辦其積弊始得盡破現在阿桂等屢次查奏俱已得實朕向有句云不為已甚去已甚今甘省積弊竟至已甚不可因罰不及衆仍存姑息朕實無可如何矣所有揑報各道府直𨽻州知州內除按察司福寧首先供出且經手事件較多暫行留任外其現任甘省道員奎明文德王曽翼永齡四員現任甘省各知府及署任知府宗開煌彭永年彭時清鍾賡起汪皋鶴張金城郭煚李本楠又現任甘省直隸州及署任知府侯作吳黎珠趙明旭興德謝桓宋學淳董熙厲學沂俟簡放分發人員到省即著阿桂等傳旨將該員一併革職歸案審辦其已離甘省各員現任鹽運使程國表原任布政使福明安現任道員觀祿前任甘肅知府及現任知府潘時選黃元圯周人傑諾明阿富斌德明郭昌泰觀亮前任甘肅直隸州及署知州知州博赫彥方薑興周竒明朱蘭王汝地各員又在京供認揑災冒賑及饋送王亶望銀兩之前任武威縣知縣朱家慶一員俱革職交留京辦事王大臣及任所原藉各督撫將該員提訊録取確供具奏同日阿桂李侍堯又奏言查王亶望任內假揑結報之歷任各道府直𨽻州現在訊問伊等止稱積習相沿通省如此辦理亦未肯將通同舞弊之處供出即其所屬州縣平日有餽送逢迎之事見道府等尚未去任未必不預留地步安能據實指陳况現在所有道府直𨽻州雖以原銜辦事伊等自知身犯重罪革職審究即在目前一切俱不能得力恐廢弛貽誤於地方大有關係應請旨一併革職並將道府各員無論請旨簡放及部選之缺均請皇上簡員補授準令馳驛迅速來甘其直𨽻州知州敕交留京王大臣于各部保舉奉旨記名人員內㨂選三員分發來甘臣李侍堯酌量奏補則辦事不至乏人而地方亦有専責奏入上諭內閣曰阿桂等奏請簡發道府各員迅速來甘著交都察院堂官於滿漢科道內保舉堪勝道員者五員六部堂官於滿漢司員內保舉堪勝知府者八員此內户刑二部各保二員其餘四部各保一員令其速赴行在帶領引見發往上又諭內閣曰阿桂等奏甘省直𨽻州知州員缺需人補用請㨂選三員分發來甘等語此項直𨽻州知州毋容另行㨂選即著將前次留京辦事王大臣㨂選引見未經發往之顔培天任嘉春吳貽桂三員由京馳驛迅往甘省交李侍堯酌量奏補同日李侍堯奏言據隴西寧夏寧朔平羅等四縣詳報七月初一二等日天降大雨該處附近河湖人户猝遇水勢漲溢所種秋禾被淹間有沖塌房屋淹斃牲畜臣隨飭該道府州親加查勘旋據查得隴西縣屬西渭二河一帶村莊寧夏縣屬逼近黃河之通寧等十堡寧朔縣屬附近十二連湖之玉泉等十三堡平羅縣屬通義等十四堡被災屬實臣一面飛飭各道府督率該縣等將被水各村莊分别成災輕重其被災窮民先行加意撫恤查明照例妥速辦理再金縣靖逺安定會寧伏羌碾伯大通等七縣所被旱雹黃疸之處係在四五分以內雖例不成災但收成均不免減薄可否將該七縣本年額徴銀糧緩徴俾民力益紓出自皇上天恩奏入上諭內閣曰甘肅控災冒賑一案經阿桂等查明厯年積弊俱已水落石出不可不徹底查辦但恐督撫誤會朕意匿災不報則大不可因屢次宣諭嚴切申誡並令李侍堯𣲖委明幹公正大員詳查該省各屬被災輕重奏明辦理兹據李侍堯奏到查明各屬被災情形分别撫恤如此辦理方是所有甘肅猝被黃水漲溢之隴西寧夏寧朔平羅等四縣貧民口食未免拮據著該督即董率所屬先行加意撫恤其房屋牲畜亦有沖倒淹斃之處並著即行查明照例辦理至李侍堯查奏各屬秋禾被旱被雹及被黃疸等處內金縣靖逺安定會寧伏羌碾伯大通等七縣雖據勘明俱在四五分以內例不成災但念該屬今嵗承辦軍需一切挽運糧草民情甚為踴躍並著加恩將該七縣本年額徴銀兩蠲免一半其餘緩征以昭優恤臣等謹按甘省辦理冒賑一案原因官吏肥槖殃民不得不痛加懲創除積弊正所以恤民瘼我皇上保赤為心每遇偏災恩賑寧濫毋遺訓諭屢頒凡有血氣心知無不曉然共見者兹督臣李侍堯奏到被災各屬情形查勘得實即特降諭旨所有黃水漲溢之處加意撫綏其旱雹等災在四五分以內者俱令分别蠲緩無致向隅蓋至是而邊氓得霑實惠倍感浹于皇仁矣乙亥留京辦事王大臣奏言據現任光祿寺署正陳嚴祖投遞呈詞以該員曽署甘肅環縣知縣任內有折捐冒賑情弊具呈自首臣等面加詢問據陳嚴祖供我係湖南祁陽縣人陳輝祖是我胞兄於乾隆四十年十二月署理甘肅慶陽府環縣事務四十一年加捐光祿寺署正四十二年二月離環縣任在任辦過霜災一次散賑銀一萬兩零捐監實收二百張所收監糧俱係折色至霜災實是有的散賑亦係實在發給不過多報分數這散賑銀之內約略冒銷銀二千餘兩我于王亶望生日送金子五十兩又署本府侯作吳曽向我要過實收十五張該銀八百餘兩並未發給餘俱零星花用等語查該員雖自行呈首恐尚有不實不盡之處應請旨將陳嚴祖供詞寄交大學士公阿桂等將所供情節逐一查訊奏入奉上諭阿桂等歸案辦理丁丑江西巡撫郝碩奏言臣於七月十八日欽奉諭旨將現任廣信府知府康基淵飭訊冒賑分肥各欵當即飛檄馳調該員來省查詢及二十日接奉革職拏問諭旨計已起程在途即𣲖因公在省之南安府知府蔡葵迎往摘取印信並𣲖員催押來省去後至二十七日據鉛山縣知縣鄭若玉到省稟稱康基淵于二十一日接到臣初次調檄自郡起程舟行一百餘里至該縣之青山灣地方夜間乘同舟家人等睡熟在床自縊身死臣聞信之下不勝詫異該員心虛畏罪情事顯然臣除飛飭署臬司杜憲馳往驗尸并詢究同舟親屬是否知情有無别故提同尸棺到省臣親加覆驗外至鉛山縣知縣鄭若玉於康基淵在境自盡並不飛行馳報由水路緩程來省回稟又不即時押帶尸身赴省聽候委驗殊屬糊塗玩忽應請旨將鄭若玉革職以示懲警奏入上敕部知之戊寅協辦大學士吏部尚書蔡新等奏言查乾隆三十九四十四十一等年户部捐册內有捐納員外郎王裘捐納主事王棨王焯俱注明係王亶望之子伊等捐納之項皆王亶望在甘肅藩司任內侵吞國帑婪得贓銀為之報捐未便任其銓選應請旨將王裘所捐之員外郎王棨王焯所捐之主事各職銜即行革去奏入上諭內閣曰王亶望之子王裘王棨王焯僅革去職銜不足蔽辜著照勒爾謹之子伊凌阿等之例俱發往伊犁交伊勒圖嚴行管束自備資斧充當苦差己卯阿桂李侍堯奏言臣等接奉上諭將袁守侗等盤查甘省監糧時該地方及人役等如何通同弊混徹底研究實情具奏等因欽此臣等查當日州縣各官之現在省城者止有陸瑋等數員即嚴切訊問據各該員供稱或將應動常平倉糧用銀折給留作監糧以扺盤查之數或將額徴糧內應行撥運兵米暫留抵補其額存監糧有數百石及百餘石者聞盤查之信即趕緊買補是以彼時並未短少各等語伊等既如此供吐則通省可知臣等伏查甘省監糧積弊不在虧短而在冒銷平日既任意開除應存實貯之數有限盤查時自易於彌封掩飾查袁守侗等原摺內稱甘省監糧自開捐起截至四十二年年底止通共收捐監生十七萬六千七百餘名應收各色京斗糧七百八十六萬二千餘石除歷年各項動用外實存糧一百十二萬二千餘石分赴各州縣就册開現存數目逐細盤驗俱係實貯在倉委無虧短等語摺內並未將彼時甘省額貯常平倉糧若干曾否同時盤查有無虧折之處聲明查乾隆四十二年甘省各屬應存常平額徴及社倉糧共三百九十七萬五千餘石以之挪補監糧尚多三倍有餘移東補西業據各員供吐王廷贊所供不特盤查監糧並盤常平倉榖之語顯係虛飾如果同時盤查豈有袁守侗等轉不奏明以見其周到之理至勒爾謹既經奏請盤查自必預飭各州縣早作準備而當日該地方官一聞欽差查倉之信亦必設計彌縫以圖蔽混於一時臣閲袁守侗所奏原單內其各屬所貯監糧開除無存者已有十餘州縣而蘭州府所屬共收糧二百四萬八千餘石至盤查時止存一萬八千三百餘石分貯皋蘭狄道河州金縣靖逺五州縣並紅水縣丞等處多者數千石少者不過數百石即使臨時買補亦易為力况其中或將應發常平倉糧以折色支放扣存本色或以應運兵糧揑稱實貯預備盤驗種種舞弊袁守侗等皆不得知但以册存與實貯相符遂為了事此當日實在情形也再查甘省捐監原為補足常平額貯倉糧起見則監糧與常平本無岐異遇有動支自應先將常平舊貯倉糧儘數動用以新收監糧抵額或動支監糧則常平理應封貯乃甘省各屬每年開除監糧之外又動用常平糧自五六十萬至百餘萬不等此即弊混之源且三十九年通省未開捐以前舊存常平糧尚有三百二十七萬自開捐起至四十二年止轉祗存一百八十八萬石若以盤查時所存監糧一百十二萬之數抵補三十九年常平原額尚屬不敷其為王亶望王廷贊恐盤糧顆粒無多故先動用常平預留地步而屬員即借常平額徴為影射已無疑異臣等伏思袁守侗等奉命盤驗監糧雖係各員通同弊混現無供有賄囑情弊但捐監未及三年何以開銷監糧至六百餘萬之多而舊存常平糧又銷去一百三十餘萬石若以未開捐前每年動用糧數稍為查核比較則疑竇自出弊端自露乃袁守侗等並不計及開除糧數太多轉稱每年節省採買銀百餘萬兩現在倉貯仍有糧百餘萬石為辦理捐監明效其奏報失實上負皇上任使之意諒袁守侗阿揚阿亦不能自引解免應請旨交部嚴加議處至當日彌縫掩飾各州縣即係現在審出藉賑開銷監糧之人應仍歸案從重定擬完結奏入上諭內閣曰甘肅監糧並未實貯在倉朕早有風聞特因監糧為災賑而設恐各省督撫或誤會朕意致將災賑之事靳固不舉轉非朕查辦冒賑使百姓得受實惠之意今諸弊已盡行敗露若再置而不問何以懲貪吏而整法紀至袁守侗阿揚阿係朕特𣲖前往盤查監糧之人豈無耳目乃一任各州縣通同蒙蔽計前此盤查時距開例未及三年而開銷監糧至六百餘萬石之多亦應問其故也至舊存常平倉又銷去一百三十餘萬石其中弊端疑竇何以並未察及阿揚阿人本見小護短不知大體若袁守侗則未必至此阿揚阿前於朕前面奏曽盤驗常平倉榖今據阿桂等查奏情節已屬失實袁守侗阿揚阿查辦此案均難辭咎著交部嚴加議處辛已廣西巡撫姚成烈奏言臣遵奉諭旨傳訊在籍之原任慶揚府知府黃元玘據供乾隆三十三年六月到涼州府知府任己于三十一年停止捐監之後並未收捐監生至三十五三十七年所屬一廳五縣被旱共辦災賑三次係銀米兼賑由知府加結報銷今甘省既查有冒賑浮開是各廳縣弊混元圯不能查出濫行出結罪實難辭並無串揑分肥情事後於三十九年四月調慶陽府知府至四十年十月卸事時止正值重辦捐監之時實係收捐本色實貯在倉並未串同屬員私收折色情弊等語臣查黃元玘所供監糧實貯並無串揑分肥俱屬一面之辭顯因現無案證有意狡飾應請旨將黃元玘革職嚴行看守臣已飛咨陜甘督臣李侍堯如應將該員提質即𣲖員押解赴甘審辦奏入上命軍機大臣傳諭阿桂李侍堯姚成烈雅德曰甘省各州縣收捐監糧折色於災賑時揑報開銷業經阿桂等徹底查辦供認明確此案弊竇俱已和盤托出何以黃元玘猶復裝點情節希圖狡飾著傳諭姚成烈即速𣲖妥員解往甘省交阿桂等歸案嚴審若有揑飾于定案時加倍治罪又前任固原州知州郭昌泰前據雅德訊問該員欵迹亦狡供掩飾並著一併解赴甘肅交阿桂等審辦不必解交行在並著傳諭各督撫現在審訊案內人犯如有似黃元玘郭昌泰之始終狡飾不吐實情者即一面訊供具奏一面將該員解交阿桂等歸案嚴訊一併加倍治罪欽定蘭州紀略卷十四
