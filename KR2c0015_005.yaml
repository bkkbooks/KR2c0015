body:
  text: 壬申阿桂和珅奏言竊惟行軍制勝必須設卡安營使聲勢聯絡號令森嚴方足以壯士氣而寒賊膽查蘭州省城自賊匪滋擾以來民心不無驚慌而緑營兵丁又因屢次打仗傷亡已多臣等未到之前聞西南關外一帶通賊處所賊人竟敢任意往來搶掠民間牲畜口食並于燒剩民房內藏匿乘間放火毫無顧忌臣和珅到後即先令人將該處燒剩民房間段折燬並殺死賊匪數名又賊人每于黑夜不過數人潛至城下騷擾守城兵丁虛張聲勢施放鎗炮徹夜不絶殊屬張皇不成事體臣和珅一到即嚴行禁止至各路調來之兵雖已陸續到甘因無總辦之人諸事渙散又各營零星散處聲勢既不聯絡紀律又不嚴整是以不能使賊人望而生畏臣阿桂已於本月二十一日巳刻抵蘭現在申明軍律激勵戎行並派兵自西關外從河岸迤南至山梁安設卡柵使彼此接應又于山包上扎一大營照料各卡俾賊人知我兵逼近不得不晝夜防守且有此卡營斷其來路賊人即不能近關外滋擾民心自漸安貼將來進兵攻勦時即可由卡營前進亦為迅便又此路卡營立定後所有城守兵丁即可撤下一二千名逐漸添放卡柵步步進逼賊巢扼其險要賊人自必日加窮蹙無難剋期殄滅至緑營兵丁因從前賊匪猖獗時未經揣量賊勢多寡強弱陸續到來地方官不俟力齊即催令零星打仗以致傷亡甚多愈形畏怯又各處兵丁內新者多而舊者少即如曽在金川軍營跟隨打仗者甚屬寥寥其新補兵丁未經行陳心志不固安能向前效命兼之兵不顧將將不知兵一遇賊匪即行遑遽實由于此臣等現在簡閲各營官兵令懦弱者守營或打仗時令其誘敵擇其強壯奮勇者向前打仗並令海蘭察額森特明亮總辦各營倘遇賊人滋擾即一靣報知臣等一面調遣勦殺則呼應較靈而兵丁知有所恃亦思用命出力如此提綱挈領安設布置庶壁壘一新可以相機進勦同日阿桂和珅又奏言查賊匪恃險跳梁雖不過茍延殘喘但自知罪大惡極併命相持是以現在之兵不為不多而緑營兵丁節次打仗間遇折傷殊形氣餒尚未能速行勦滅臣等揣度情形勢不能不添調徑兵以兾剋期集事今悉心籌酌竊以川省雜谷腦五寨屯練兵丁及安插降畨由松潘一帶前赴甘省實為近使現已飛咨四川督臣文綬令其速飭維州協副將李天祐于五寨內揀選曽經出師金川之屯練兵丁并金川安插土守備降畨等共一千名帶同都司守備等官兼程遄進星夜赴蘭協同勦捕又前次派出阿拉山兵雖經暫撤但該遊牧毗連甘省邊境道路更近剋期可到是以仍行文阿拉山王羅卜藏多爾濟即於該遊牧內擇其相近蘭州者揀派七百名或五百名速委幹員帶赴甘省羅卜藏多爾濟腿疾復發無庸親身前來以免遲滯臣等現在將緑營兵丁激勵整頓仍公同籌辦設法布置如有可乘之機即行一鼓殱擒斷不肯坐俟兩處兵齊始行進勦再查川省屯練兵丁暨降畨等由松潘一帶赴甘約須二十日內外臣等現在籌勦逆匪務期迅速集事但察看賊人所占山梁雖不甚髙而坡墈陡險路徑一線可通必須魚貫而上兵力不能施展今調取屯土兵等上山打仗最為得力惟思賊人於占據河州及焚燒省城關廂後搶掠馬騾甚多恐將來挺而走險乘騎竄逸此處現雖不乏馬匹而兵丁等馬上技藝能追趕殺賊者竟不能得是以調取阿拉山兵以偹追捕且使內地民人知口外蒙古兵丁皆可一呼而至亦足以安衆心而寒賊膽再臣等查成都將軍臣特成額四川提督臣明亮業於本月二十日抵蘭臣等公同商酌祇須留明亮一人在此帶兵協勦至特成額雖據懇求帶兵勦賊情詞真切但川省地處邊陲俱關緊要應令特成額即回成都辦事庶于調取川省屯練土兵來甘協勦事宜彼此有濟同日阿桂和珅又奏言前臣欽奉諭旨賊匪占據山梁從何處得有口食其施放鎗炮之火藥又從何得來其馬匹約有若干均著查明具奏欽此臣等查賊匪自戕害副將知府後占據河州民間糧食牲畜俱為搶掠一空又蘭州省城凡富商大賈俱在城外關廂開張店鋪最為繁盛今西南兩關廂俱被賊人焚燒搶掠計賊人起事以來所虜財物糧食甚多足敷口食其溝坎內俱有山水可供汲取至賊匪施放鎗炮之火藥亦係攻破河州時所得查河州本有總兵鎮守嗣經裁去改設副將是以兵數無幾而營中舊貯火藥原多皆為賊人所有再賊人步行者固多而乘馬者亦復不少所有河州及省城關廂並民間馬騾牛驢俱被搶去乘騎馱載總之賊匪負固死守雖不過茍延殘喘然皆習於戰鬭併命抗拒兼之緑營官兵當攻城危急時隨到即隨令打仗節次俱有損折其氣已餒是以未得立就殱除容俟熟籌捕勦機宜整作士氣剋期進兵一鼓勦滅即行馳奏仰慰聖懷均奏入上命軍機大臣傳諭阿桂和珅曰本日覽阿桂和珅奏到各摺自逆匪起事以來實在情形直至披閲此次奏函方始詳悉端委甚增憤悶亦因此而略慰至阿桂等現在籌辦各事宜皆朕早降諭旨逐一查詢者何以從前勒爾謹全未奏及今摺內所稱該處因無總辦之人諸事渙散又各營零星散處聲勢既不聯絡紀律又不嚴整不能使賊人望而生畏等語可見衆人袖手觀望毫無料理光景不出朕之所料勒爾謹身為總督既因辦理不善致釀事端及自狄道回至蘭州見賊已擊退上山竟謂半月可以完竣而伊安坐城中衙署一切毫不籌辦且將各路已調之兵全行停止俾賊衆得以遷延時日勒爾謹之罪尚可赦乎又阿桂等奏賊人皆習於戰鬭併命抗拒賊于何處曽習戰鬬而竟不奏聞勒爾謹之罪更大甚至未經揣量賊勢之多寡強弱陸續到來不俟力齊即催令零星打仗以致節次傷亡日多愈形畏怯兼之兵不顧將將不顧兵一遇賊匪惶遽退回太覺不成事體若京兵不令中途停止則此時頭起已到即所調四川兵阿拉山兵亦已可扺蘭州乃勒爾謹輒以半月之內定能勦滅奏請撤回是勒爾謹之貽誤軍機尤為罪在不赦今阿桂復檄調川兵一千及阿拉山兵自不得不如此辦理就現在情形而論阿桂一人儘足料理和珅不必同辦即遵前旨回京毋稍遲延也看來阿桂于滅賊大段情形俱有節制想賊人不久即可擒滅且官兵設卡安營賊不能復出肆掠即從前所虜之口食富足亦豈能支數月且賊人馬匹既多困守一山草料亦易匱乏即使宰馬為食亦必不能支持半載阿桂惟當整作士氣俟兵力齊集剋期進勦一鼓殱滅以副朕懷同日阿桂和珅等奏言竊查蘭州府知府員缺係省會首府本屬緊要且現因勦捕逆匪有辦理軍糧及一切撫恤事宜尤為慎重必得歷練出色人員方克勝任又河州新被賊匪蹂躪甫經收復撫綏防禦關係甚重亦需幹員庶無貽誤查有直𨽻涇州知州陸瑋在甘年久才具明練又候補通判謝桓協同循化廳營前往賊巢擒獲多犯並隨同總兵貢楚克達爾收復河州甚為奮勇現在蘭州府知府印務委令陸瑋署理河州知州印務委令謝桓署理可否即將該二員升用之處出自聖恩奏入上諭內閣曰阿桂等奏請以涇州知州陸瑋升用蘭州府知府候補通判謝桓升用河州知州著照所請行該部知道同日阿桂和珅伍彌泰奏言臣等伏查逆匪圍困蘭州之時文武大小員辨守城打仗奮勇出力者甚多且有臨陳受傷捐軀者臣等細加查訪蘭州道圖薩布候補道永慶于賊匪圍城時俱各捐資雇募民夫親身督率晝夜在城設法防禦永慶並為賊人鎗子擊落帽頂屹然不動又洮岷協副將䇿卜坦同王廷贊竭力守城莊浪佐領吉爾占親安炮位點放擊死賊衆數十人以上四人俱屬奮勇出力又烏嚕木齊協領舒成佐領扎蘭布托林保過蘭州時一聞賊有起事信息情願隨同守禦並跟隨打仗甚屬勇往相應奏明可否酌加奬勵之處出自聖恩再候補直𨽻州知州富寧阿同知福善孟衍泗通判佟躍岱知縣申保持莊等晝夜在城督率民夫盡力防守亦屬可嘉俟事定後遇有相當之缺即行補用以示鼓勵其知府宗開煌知州陸瑋州同董熙知縣蔣重熹萬邦英筆帖式紳揚亦屬出力除陸瑋業經臣等奏請升補蘭州府知府無庸加恩外餘俟事定後一併咨部分别議敘至佐雜內有出力者臣等量加奬勵再三月二十七日逆匪攻城甚急參將和泰守備善德在城上挺身射賊身受鎗傷陳亡二十九日與王宗龍同時陳亡者尚有涼州滿營驍騎校賽音察渾督標千總師永澄以上四員臨陳捐軀情殊可憫應請旨交部照例議恤再查本月十九日臣和珅率同海蘭察等進勦逆回固原鎮總兵圖欽保是日派令帶兵由山梁過溝進逼賊巢至撤兵時未見該鎮下落隨詳加查訊有隨同打仗之兵稱是日賊匪從山坡撲上時目擊圖欽保奮力砍殺因馬倒滚下山坡被傷身死又遊擊愛星阿王三杰亦於是日陳亡請將圖欽保愛星阿王三杰交部存記俟此事完竣後一併查明造册咨部照例議恤再圖欽保所遺固原鎮總兵員缺應請旨簡放但該鎮有派出隨營兵七百名現在必須幹員管轄臣阿桂等公同商酌查有陜西靖逺協副將哈當阿人甚明白前在軍營打仗奮勇出力賞戴花翎此次隨同攻剿亦甚勇往堪以委署臣等現即飭委該員先行署理又查西寧鎮總兵業經奉旨將貢楚克達爾補授黃大謀另行簡用今黃大謀現已來甘查該鎮從前未曽經歷行陳現在亦無需伊在此帶兵打仗是以臣等即飭令黃大謀赴京候補奏入上諭內閣曰阿桂等奏查明守城打仗出力人員一摺內稱道員圖薩布永慶捐資雇夫親身督率晝夜防禦永慶並為賊人鎗子擊落帽頂屹然不動又副將策卜坦同王廷贊竭力守城佐領吉爾占親安炮位點放擊死賊衆數十人又烏嚕木齊協領舒成佐領扎蘭布托林保于過蘭州時聞有信息情願隨同守禦打仗甚屬勇往等語圖薩布永慶䇿卜坦吉爾占舒成扎蘭布托林保均能奮勇出力不愧滿洲甚屬可嘉著賞戴花翎仍交部從優議敘此外隨同出力之冨寧阿等均照阿桂等所奏于事竣後分别題補及咨部議敘同日上諭內閣曰阿桂等奏固原鎮總兵圖欽保於十九日進勦賊匪時持刀砍殺賊人因馬倒滚下山坡被傷身亡又遊擊愛星阿王三杰亦同日陳亡又參將和泰守備善德於三月二十七日賊匪逼城挺身射賊受鎗陳亡驍騎校賽音察渾千總師永澄亦於二十九日陳亡等語圖欽保等奮勇勦賊臨陳捐軀殊堪憫惻著照陳亡例從優議恤其傷亡兵丁等一體查明豫以優恤至前此被害之文武員辨兵丁勒爾謹並未詳悉查奏伊等因公殞命情俱可憫並著阿桂查明實在情節將應行議恤者奏聞給豫恤典臣等謹案臨難捐軀人臣之大義況逆回肆惡人人髮指孰不思敵愾同仇爭先殺賊至若悍衛城闉尤守土者分所當然我皇上於守城諸臣嘉其勞績陳亡將校憫其捐生恩綸疊沛優恤頻加仰鴻慈之髙厚大小臣工宜莫不殫勵精誠益深感泣也同日上諭內閣曰固原鎮總兵員缺著哈當阿補授同日阿桂和珅奏言臣等查按察使福嵩前隨督臣勒爾謹帶兵狄道商辦搗賊巢穴收復河州以及勦捕事宜俱悉心贊助妥協經理旋復帶兵回省救援現又跟隨打仗甚屬勇往該司現奉諭旨升授廣東布政使但甘肅正當辦理軍務之際藩司王廷贊病體新愈且自守城以來精神愈覺疲憊照料恐有未周應請暫留福嵩在甘幫辦一切實為有禆俟此事完竣後再令該司即赴新任奏入上諭內閣曰王廷贊著來京陛見其甘肅布政使員缺即著福嵩調補西安鹽法道員缺著永慶補授同日上命軍機大臣傳諭阿桂和珅曰阿桂等所奏同王廷贊守城之道員等請酌量加恩現已明降諭旨但此事何以王廷贊始終並未奏及在伊被困時所發之摺或因倉卒未得詳敘及賊人已退奉到朕恩旨後自當以衆人協同出力而伊一人受恩于心有所不安據實陳請否則亦應將此情稟知勒爾謹代為陳奏方足以鼓勵衆心而王廷贊默無一言竟爾一人獨攘其功實屬非是而勒爾謹回省城亦竟無一言問及當問伊無暇問及者所辦何事且阿桂等奏王廷贊病體初愈精力亦疲恐不能料理周到而升任臬司福嵩甚能出力莫若竟以福嵩轉補于事有益現已降旨將福嵩調補甘肅藩司王廷贊來京陛見藩司為通省大員見勒爾謹如此錯誤而伊竟隨同觀望遷延誤事如此行為恐亦尚有不可信之事且逆回滋事總督之下即係藩司王廷贊亦豈能辭咎著傳諭阿桂將王廷贊在任所辦諸事詳悉確查如有應參奏者即據實參奏五月甲戌畢沅奏言臣適接大學士公臣阿桂尚書臣和珅咨開現在勦捕逆回必須騎射出衆之員業經奏請將侍衛遜濟鼐等三十員名令其輕裝馳赴甘省所有車馬等件合行飛咨預備等因臣當即飛飭東西兩路將官兵等入關復需用車馬酌量挑選預備齊集以便將來到站立即遄馳不致稍稽時刻至官兵等需用箭枝臣前經在西安滿營挑撥二萬枝解赴甘省就近存貯兹復飛飭各委員先期上緊送到以期不誤臨時應用奏入上諭曰所辦甚好此事誤聽勒爾謹半月成功之言實是舉碁屢易朕甚愧之勒爾謹誤事之罪尚可赦乎同日上諭內閣曰從前逆匪滋事之初因阿桂在豫省查勘河工即傳旨令其就近馳往督辦又因阿桂出差已久于此案詳悉情形及朕節次所降諭旨未能深悉復令和珅賫欽差大臣關防馳往令與阿桂相見同行三日告知一切後即回京面奏後據阿桂奏稱瘡疾發動儘力遄行未能迅速而甘省現無大臣董辦是以令和珅兼程前進同海蘭察額森特等迅往帶兵勦捕今和珅于四月十七日行抵蘭州而阿桂亦于四月二十一日續到看來此事阿桂一人自能辦理妥協無須復令和珅同辦且恐和珅在彼事不歸一即海蘭察額森特等向隨阿桂領兵打仗阿桂之派調伊等自然呼應更靈而朕啓鑾臨幸熱河為期已近御前大臣領侍衛內大臣軍機大臣等扈蹕者現亦無多是以傳旨令和珅速行馳驛回京而以勦捕賊匪及籌辦善後諸事俱交阿桂專辦以期逆賊迅就殱除明彰國憲所有朕派辦之先後原委著通行傳諭俾中外知之同日上命軍機大臣傳諭阿桂和珅曰前日據阿桂和珅奏到蘭州現在情形各摺如摺內所稱河州自裁去總兵改設副將兵數無幾而營中舊貯火藥原多皆為賊人所有一節河州裁鎮改協一案約已二十餘年該處存營火藥雖多此二十餘年中該營演放鎗炮自應將舊存火藥逐漸用完豈有另配新藥開銷官項反將舊藥存營之理若果如此是即勒爾謹辦理不善之故著即查明具奏又所稱緑營官兵隨到即催令零星打仗以致傷亡甚多如此不量兵力舉動乖謬勒爾謹固罪無可赦即伍彌泰仁和馬彪俱係統兵大員而仁和又係本省提督從前設法帶兵渡河時尚覺其有料理及至蘭州便與伍彌泰馬彪等俱存觀望見勒爾謹種種錯謬並無一言阻止任聽其措置乖方均屬不合著阿桂傳旨將伍彌泰仁和馬彪嚴行申飭並詢問伊等因何不勸阻勒爾謹緣由據實覆奏乙亥上命軍機大臣傳諭阿桂和珅等曰甘肅逆匪一案誤事之大全在勒爾謹一人設逆匪略有計算先逼犯狄道州即將勒爾謹殺害伊轉得幸邀恤典不至拏問治罪可見勒爾謹之僨轅敗事竟是天奪其魄必欲令伊身受國法也至勒爾謹到蘭州後如此懦無能則其自狄道收復河州必係福嵩出力幫辦著即行傳詢福嵩將彼時實在情形據實覆奏至阿桂等所調四川及阿拉山兵據奏約二十日內外可到此摺係四月二十二日所發則五月初十左右此項兵丁已可到全且伊前摺內稱斷不肯坐候兩處兵齊始行進勦想目下進兵勦捕痛加殱戮而此數日間又無信息盼望實為焦急抑或必須兩處調兵到全後方行圍勦耶至賊匪占守月餘恐其乘間于黑夜中四出竄逸前于進到圖內用硃筆批示並傳諭令將何路派兵若干帶兵將領何人及圖內尚有未見派兵之處一一加簽指詢著傳諭阿桂等即將指示各處一一嚴密辦理毋使賊匪一人竄逸一面速行奏聞丙子上命軍機大臣傳諭阿桂和珅曰朕因甘肅逆匪之事晝夜厪念每想及應辦者即傳旨馳諭和珅令其查奏如飭查勒爾謹不能覺察逆回起事緣由及事發後又不徹底根究其實在如何貽悮之處并逼犯蘭州之三千餘賊內中有無脅迫良民為之先驅又新教首犯馬明心何時拏獲從前如何辦理又蘭州河州居民為賊蹂躪實在情形應如何加恩撫恤又勒爾謹令舊教土兵打仗出力以公報私是否係福嵩畫贊又勒爾謹藉守城為名安坐城內衙署僅派道員駐劄城外各條俱係此案緊要關鍵和珅至今均未奏到若此時業經起程著將已經查辦者于途次繕摺覆奏倘未及查辦可即寄知阿桂令其詳悉查辦迅速奏聞再阿桂現辦勦捕事宜若何川省及阿拉山兵何日可到防守賊人竄逸各路口如何堵截嚴密毋使一人幸脫及何日可以勦洗淨盡之處著即加緊馳奏其寄諭和珅查覆各條並著一面抄寄阿桂閲看應覆奏者即行覆奏以慰數千里外懸注同日上諭內閣曰雲南鶴麗鎮總兵羅江麟著賞銀一百兩馳驛前往甘肅交大學士公阿桂差遣委用事竣後即回本任不必來京請訓欽定蘭州紀略卷五
