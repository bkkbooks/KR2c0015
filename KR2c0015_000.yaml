body:
  text: 提要臣等謹按蘭州紀略二十一卷乾隆四十六年奉敕撰考回人散處中國介在西北邊者尤獷悍然其教法則無異劉智天方典禮擇要解即彼相沿之規制也其祖國稱默德那其種類則居天山之南北後凖噶爾據有山北乃悉避處於山南今自哈密吐魯番以外西暨和闐葉爾羌皆所居也逮我皇上星弧遙指月窟咸歸諸回部並隸版圖為我臣僕中國回人亦時時貿遷服賈來往其間姦黠之徒遂詭稱傳法於祖國别立新教與舊教搆爭守臣狃於晏安不早為防微杜漸互相讐殺乃馴至嘯聚稱戈辛丑四月循化㕔逆回蘇四十三等突陷河州復擁衆犯蘭州㑹援師既集斷其歸路而羽林勍卒益部蕃兵亦皆奉詔遄征尅期並赴逆回飛走路絶乃退據城南十里龍尾山扼險死守釡魚暫活褌蝨終殱填塹焚巢百道俱進蹙之於華林寺或俘或馘無一人幸漏網焉蓋是役也平曰釀釁之漸在大吏之積薪厝火故猝發而不及防臨時制勝之方在聖主之省括張機故一舉而無不克是編所録始末釐然至於規畫兵制慎固邊防一切敷陳批答亦皆備書併足見長駕逺馭之謀杜漸防微之略所以貽萬世之安者睿慮尤深且逺也乾隆五十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書欽定蘭州紀略天章四月朔日作辛丑王狗鴻龍順斗遷春消九十夏初旋已欣時澤利牟麥更幸大田起陌阡紅雨緑雲方爛熳青山碧水未留連問書旁午勤批答慙愧番回蠢動邊昨據勒爾謹奏蘭州撒拉爾番回因爭立新教抗官拒捕殺害知府楊士璣副將新柱嗣又占據河州城今日復據畢沅奏逆匪直逼蘭州省城因調派滿漢各路官兵并健鋭火器營京兵四千名前往㑹勦命大學士阿桂尚書和珅帶領侍衛督率進兵日內正值軍書旁午實不勝慙悶之至孟夏常雩禮成述事未躬承昨嵗南巡奠璧祈壇意倍寅祇為萬方勤一已幸䝉尺澤渥三春今歲正月間春雪頻仍二三月以來雨膏優渥實向年所僅見若時暘雨顒年稔既潔粢盛沭帝仁薄伐番回不容己昨因蘭州撒拉爾番回肆逆傷害大員占據河州進逼省城不得已調派各路官兵并發健鋭火器兩營徑旅命重臣董率即日㑹合進勦惟冀迅速掃滅以安邊民維揚速冀晏邊民陜甘總督勒爾謹等奏報勦捕撒拉爾番回志事十韻有序撒拉爾番回即狗西番其俗人畜並處好即人怒即獸往年因大加懲創安靜五十餘年今其醜類復滋昨督臣勒爾謹奏撒拉爾畨回蘇阿渾等因爭立新教殺傷舊教多人遣官往捕而賊匪等竟敢抗拒並戕知府副將勒爾謹因率臬司福嵩領兵往𠞰更調集井省提鎮仁和等五路兵而賊已乘間侵占河州維時事起倉猝勒爾謹暫駐狄道藩司王廷贊保守蘭州省城賊乃間道進逼省城焚燒關廂西安巡撫畢沅以聞將軍伍彌泰提督馬彪各領兵赴援奏到即勑簡八旗徑旅並大學士阿桂尚書和珅等往蒞其事乃兵甫啓行而王廷贊即奏誅殺賊匪教主馬明心兹勒爾謹畢沅仁和等奏克復河州省城圍解且擒殺賊匪要犯多人擊退上山即日可期勦滅云云因敕分别奬賞頒諭中外並賦十韻紀事如左狗西黑帳本畨雛白帽非回竄籍呼狗西畨又名黑帳房與內地回人帶白帽者本另一種類昨勒爾謹奏乃以其不食猪肉遂沿俗稱番回現已飭令詳查具奏毋令竄混爭教始因執新舊據州遂肆攫萑苻撒拉爾畨回本舊教近因賊首蘇阿渾等欲另立新教殺害舊教數人肆行不法該督委蘭州府知府楊士璣河州協副將新柱前往查拏途次白莊被逆畨聚衆殘害時勒爾謹一靣率臬司福嵩帶督標兵五百名往勦一靣調集仁和等五提鎮兵二千名㑹勦而逆匪乘官兵未到之先竟擁男婦二千餘搶占河州實為罪大惡極神人共憤如狂一旦為猖獗不畏三軍置鑕鈇提鎮領兵皆宿將井肅提督仁和西安提督馬彪及各鎮總兵圖欽保德寧等皆曽經出兵金川久列戎行故臨陳調遣井然因并交部從優議叙以示奬勵監司守省具嘉謨井肅藩司王廷贊以文臣能保守省城於賊匪圍逼時悉力守禦又安定縣回民馬明心係賊人新教之主前已拏禁省城王廷贊因賊人索取許其城上一見指稱禀明督臣批至釋給隨將馬明心正法以免後患辦理實合機宜因賞給一品頂帶仍交部從優議叙㑹征有算妖氛斂决戰無前賊勢孤此案事起倉猝勒爾謹先調各路官兵㑹籌征勦仁和由途次迎勦並令德寧額爾恆額一面把守賊人所毁河橋施放炮位一面直渡黃河率官兵勇奮殺賊圖欽保復手刃四賊將逆匪擊退上山此時賊衆已成釜底游魂擒賊指日可計矣近日伏林逺滿四井省番回雜處好勇鬬狠其常也近年之王伏林明季之滿四暨今之蘇阿渾皆其類也然小醜潢池官兵一至即盡灰滅耳何辭淨勦受駢誅分馳禁旅原資衆先據畢沅奏報蘭州被圍即簡派健鋭火器兩營京兵四千名選乾清門巴圖魯侍衛帶領又欽差大臣和珅拉旺多爾濟及海蘭察額森特前往督率並命大學士公阿桂由河南取道往同會𠞰以壯聲勢詳覽軍書敢懈吾本省制軍紓壯略鄰封安撫裕良圖勒爾謹既調集井省各路兵而畢沅在西安境內聞報即悉心調度協濟滿漢官兵事事迅速妥協並有先辦而與所降諭㫖相合者實屬可嘉之至因賞給一品頂帶仍交部從優議叙以奬賢勞羣心齊自成功速小醜殱將乏處逋方籲佑隨聞捷信是日宴邊雩祭有薄伐番回不容己維揚速冀民之句回鑾至御園遂接此奏誠埀貺昊乾也曰欣曰敬曰慚夫初夏御園雜言遣慮昨嵗事南巡前年逮釋服御園初夏景均未一逰目清和今適值喜雨况霑足和近春婪尾清非夏騰燠因為清和什德潛說闢獨嵗時紀四月朔為清和節考古人引用皆然沈德潜乃訛唐之中和節為清和因以謝詩首夏猶清和謂四月似二月其說臆斷無據别有清和詩闢其謬云風日既以佳心情應亦俶而何繾井省番回逞凶倐軍書勤批答厪懷日以六自三月三十日勒爾謹奏撒拉爾番回肆逆一案軍書旁午日勤批答至四月初六日始據奏報各路官兵陸續到齊擊退賊匪上山賊勢窮蹙惟待擒獲正凶勦除餘孽云却報官兵集賊氛勢已衄正凶猶待獲雖慰意仍蹙有暇偶泛舟散慮林蘌曲懷昔不忍歡遣慮吟書屋命尚書和珅往井肅同總督勒爾謹㑹籌執醜善後事宜並遭賊氛燹後何以加恩處奏來頒㫖詩以言志番回爭教肆狂狺竟劫河州逼省闉雖事鋪敦將執醜却憐蹂􅏳已殃民籌咨善後孰居要撫恤為先合沛仁曰隱曰艱應入告十行次第待頒綸確信彌月繾蘭州確信披驛致河州雖已復蘭州解嚴未撒拉爾番回肆逆一案自三月三十日以來日夜厪念昨四月初六日據勒爾謹奏已克復河州省城圍解并有半月成功之語意謂事可速蕆乃今已及彌月直待大學士阿桂尚書和珅先後到蘭州奏明實在情形披閲始覺明晰然得信已遲致誤事機實堪憤悶莊凉兵初集賊暫向山避勒爾謹奏井肅提督仁和凉州總兵德寧等帶兵赴蘭州協勦奮勇殺賊圖欽保復手刃數賊將賊衆擊退逃竄入華林山時來竄焚擾城門原尚閉四月草九日據阿桂和珅奏伊等未到之先蘭州西南關外一帶通賊處所賊人竟敢任意往來搶掠民間牲畜口食並於燒剩民房內藏匿乘間放火又於黑夜不過數人潜至城下騷擾而守城兵丁虛張聲勢施放鎗炮徹夜張皇和珅到彼後始嚴飭禁止並搜捕殺賊數人又各路所調之兵零星散處不俟力齊催令打仗以致間有傷亡士氣不振現在阿桂等申明軍律激勵戎行并安設卡柵彼此接應又于山間札一大營照料各卡俾賊知大兵逼近不得不晝夜防守民心亦漸安貼等語如此料理始漸有頭緒覽矣奏略慰知賊渠將不日就擒勒爾謹誑奏謂半月功遂因命所發兵中途回以暨前勒爾謹奏現在所調各路官兵先後到蘭惟有公同商酌四路擒勦並分派漢土官兵分途前往預偹擒拏半月可以成功等語阿桂于途中聞此信遂令頭起領兵之人不必前往候㫖而回奏到因將所發健鋭火器營京兵撤回其前調川兵及阿拉山兵亦經勒爾謹咨撤庸臣輕舉辦事未見面目頓止援兵以致遲誤實為可恨設無此奏則京兵及川兵阿拉山兵均早抵蘭州可以一鼓擒滅兹阿桂和珅復奏請選調川省曾經出師之屯練兵丁千名阿拉山兵七百名兼程赴蘭協同勦捕此亦無聊之計雖現在軍容整頓壁壘一新奏功指日可期而前此舉碁屢易貽誤已多言之徒增慚恚耳和珅及阿桂先後到次第乃據實情報庸臣敗國事我兵初到蘭衆力未齊偹率即驅之戰而又乏董帥一二致傷亡遂乃餒士氣緑旗兵本怯聞戰先驚悸設京兵弗回此時將逮至舉碁屢易著兵法之所忌二臣謂阿桂和珅調川兵是亦無聊計申律勵戎行旗鼓重新示僨轅雖抵罪貽誤已不啻功雖指日蕆旰食徒增恚庸臣誰所用自責志吾愧鑑逺堂溪堂臨水稱鑑逺俯檻非徒玩渺渟千里蘭州厪逺慮勦番回欲悉情形撒拉爾番回肆逆一案勒爾謹總未將前後實情具奏實為晝夜厪念昨閲阿桂等奏約二十日前後乘機進勦各情形始覺明晰有經理惟日望殱獲渠魁捷音速至耳井肅布政使福嵩奏報得雨詩以志慰殱賊命王師無非計安民行程計近逺一再遣重臣前因蘇阿渾即蘇四十三等肆逆遣京兵往勦因命尚書和珅及海蘭察等馳驛速往蘭州時大學士公阿桂在浙辦海塘回即命由河南取道前往和珅入甘境即有雨隨輪和珅等於四月望前入甘肅境即遇雨今接旬宣奏屢被膏澤均福嵩奏稱甘省春夏之交每患雨澤稀少本月自四月內省城得雨三四次今五月初七初九十二等日近省一帶又連次得雨三四寸地土滋潤往年罕有等語甘省艱致雨地瘠誠民貧犁巢雖未蕆農兆慰則真宣來咨實情珅回復由秦蘇阿渾一案勒爾謹總未將前後確實情形明晰具奏因念該處阿桂一人儘足了事而朕往熱河御前領侍衛及軍機大臣扈從者不宜少因命和珅回京並靣詢甘省一切事宜據稱沿途經過甘肅西安山西各省麥收即日登場收成均在九分以上云云秦晉麥已收胥稱九十分何以承天庥惟益勵敬勤永佑寺瞻禮皇祖當年喜此居自應神御奉如初禮因義起言思彼仁以憲章事創豫至必先瞻欽繼述念惟切已敢舒徐不期梗化回猖亂復此有征盼捷書撒拉爾番回肆遂一案已屢有詩紀事昨阿桂奏川省屯練土兵等到齊欲令預悉華林山勢及進兵路徑先於閏五月初三日派海蘭察明亮等帶領阿拉山馬兵及屯練兵由龍尾山繞至華林山西南斜撲賊卡又派舒亮等帶滿漢奮勇兵過溝由山南直壓賊卡額森特及伍彌泰等在山坡山梁分路策應除鎗石殱賊不計數外三次攪戰約殺賊六七十名現擬於初九初十兩日尅期大舉四路官兵攻打以期一舉殱滅晝夜惟望其捷音速至耳安逺廟新疆底定後安逺建祇林是廟肖準噶爾固爾札之式為之萬里夜來往自平定新疆後伊犁駐以將軍回部各駐欽差大臣烏魯木齊則設都統與屯耕驛站相通百姓來往貿易者夜行無恐較之內地尤為安貼也草年久靜愔衆生資庇蔭一已致䖍欽回逆偏猖近阿桂奏閏五月初九日分派官兵四路攻勦賊營搶得賊卡四座殺賊百餘名乃賊人尚敢傾穴出迎拚死抵拒現在另籌進取於賊營迤西嚴密圍困令其無路覔食等語連日切盼佳音又未能即刻擒獲殊增憤悶陳師却愧心遊獅子園獅子峯陰居賜昔額題仍是御毫揮有懷因便為一豫無逸敢皇懈萬幾頻問郵籖心不懌閏五月二十三日據阿桂奏十五日大舉攻剿將賊匪卡子四座攻得復乘賊退回攻得賊人大卡殱戮賊匪甚多隨于左近四面拏卡聮絡接應海蘭察明亮等即帶兵駐守次日天明又占得兩處山包並將賊營迤西本布爾廟燒燬殺賊甚多現在官兵接連占至黃河邊兩岸俱有兵丁水手防範賊勢窮蹙不日可勦除淨盡等語今又隔數日惟晝夜盼望捷音耳忍看畫障景如依成詩數首旋歸去行漏曽非四刻違書扇賜大學士阿桂時在蘭州勦回寇邇日書詩經曩時曽書詩經全部並指示畫院圖之間亦涉筆兹重觀之覺書法未臻因復手寫一通易之適書至小雅北山從事賢勞經營四方之句不覺繾懷于役者之勞云北山什重勘即事懷賢臣于役頻再三江河資畫策逆回兹勦陷大學士阿桂於上年臘底命往浙江閲勘塘工今春並令由江南至河南查辦河務時值井省匪回肆逆遂命由豫取道赴井㑹勦近雖屢奏勦殺賊匪並于賊人所占山梁四面拏卡圍逼賊勢窮蹙待斃而蕆事捷音尚未奏到懸望日甚一日耳徒以恃險守絶壁及深塹密圍待坐困報功信遲缺憤悶爾我同賢勞久煩憺卿無父母憂豫有股肱念賜扇解炎暑是用五字掞阿桂奏圍困賊營斷水情形詩以志事賊營蓄糧足延時取水黃河更密邇所以守穴三月久近始四面圍築壘黃河被隔填井泉絶水賊窮知必死老教逃出將欲斃前經阿桂等奏安設木城卡柵將賊營四面攻圍並設法隔斷水磨溝水道其華林寺後及雷壇二井俱用土填築兹復據奏守卡官兵殺死夜間盜水賊匪數名并有脫回之老教等八名提訊該犯等俱受渴已極不能出聲豫水亦不能下徐徐灌潤始能言語據供稱賊匪五百餘名老弱傷病者斷水五日已有渴死者即賊渠蘇四十三及力能打仗之人亦斷水三日雖有炒麵不能下咽騾馬驢牛數百匹倒斃淨盡俟其困􅉵已極即進兵擒捕不使一名兔脫等語與水亦不能飲此徐徐灌活始取供其衆五日苦斷水觀奏翻為心惻然凶渠首禍纍衆耳然猶一心拒王師反惻為恨亦彼取叶厄魯回部及金川不無勦殺為蕩洗何以兹番乃憐賊古稀因識吾老矣吁嗟嘉兵有至訓豈願興戎不得已阿桂奏報撲殱賊營已誅賊首蘇四十三詩以志事番回滋事信竒談嘯合千人死守井邪教縱能令志固元戎原是用兵諳前因撒拉爾番回蘇四十三肆逆官兵圍之于華林山而賊衆井為死守阿桂節次奏到調派官兵安設木卡斷絶水道諸務辦理皆合機宜填壕撲柵羣心奮斷水焚糧衆力戡乃得一朝破巢險猶然數百冒鋒酣六月草二日巳刻據阿桂等奏到於本月十五日令海蘭察明亮率同領隊大員并侍衛章京等帶領官兵屯練降番及阿拉山兵先在卡邊埋伏相機進攻垂密雨時出賊人不意將枝捆土袋拋填賊人所掘壕溝我兵奮勇直進哈當阿帶領川省降番首先躍入壕內與賊匪攪殺經官兵拋擲火彈乘勢擁進勦殺賊衆占得賊卡賊壕俱拆燬填塞海蘭察明亮督率官兵逺則鎗箭齊發近則短兵相接各路官兵咸懷振奮分占磡上賊卡海蘭察明亮又拏立木柵帶兵直撲賊營痛加勦殺拋射火箭火彈燒燬帳房板屋奪獲賊人刀矛鳥鎗無算餘賊竄回華林寺死守呈驗割得賊首一百二十餘顆隨令前此擒獲監禁之賊黨家屬等逐一辨認據認出首犯蘇四十三韓一提巴拉周阿渾張阿渾即張懷德馬黑提卜等首級確實無疑并據投出老教杜山别等供俱稱賊人被殺死并帶傷者三百餘人所二百餘人遁入華林寺不敢復出現殘敗賊黨尚有官兵四面圍緊架炮轟擊數日之內即可勦戮淨盡等語因明降諭㫖將首先出力之海蘭察明亮并哈當阿交部從優議叙其餘在事出力員辨及受傷陳亡官兵查明分别議叙優恤降番等概行賞給一月錢糧以示奬勵並令阿桂將蘇四十三首級傳諭各省梟示俾回民共知警戒云異哉狠戾撒拉爾馘矣倡狂四十三不屑紅旗飛報捷但云蕆事更云慚命加恩井省被番回兵燹窮民詩以志事用四月降㫖查恤施恩詩韻何來雜種逞刁狺竟犯州城躪市闉早以詳查命大吏先是命尚書和珅往井肅即令將該地方遭賊氛燹何以加恩之處奏請頒㫖有曰隱曰艱應入告十行次第待頒綸之句兹應實政惠窮民本年糧賦全蠲納六月草八據阿桂等奏井省應行撫恤事宜請將蘭州河州地方照乾隆三十年寧逺等縣地震之例辦理因即降諭㫖將蘭州河州本年應徴錢糧加恩概行蠲免其傷斃人口每名房屋每間請各給銀二兩又每人先給倉糧三斗再普行加賑一個月每户賞給置辦器具銀一兩牛馬每頭匹借給價銀四兩俾被賊焚掠貧民各安生業俱交行在户部核覆依議速行仍令該地方官實力撫綏以示優恤燹處灾傷普施去聲仁小醜潢池纍黎庶自無德化愧絲綸阿桂奏報淨勦番回信至詩以志事賊首雖陳斬餘黨十遺四乃竟勿出降死守華林寺釜底困仍鬭延草日弗潰邪教固人心亦誠大竒事築柵近逼之火攻下策試縱拚命跳踉圍戮無噍類勦回績斯蕆飛章馳信至賊首蘇四十三先於六月十五日經阿桂令海蘭察明亮等督率官兵直入賊壕勦殺賊衆割取首逆蘇四十三等首綴其餘黨四百餘人尚死守華林寺思欲乘隙突出竄逸兹阿桂奏報於七月初六日海蘭察明亮率同侍衛官兵由華林寺撲入重重圍裹拋擲火彈鎗箭齊發短兵砍殺生擒賊六十七名割獲首級四百五十寺內躲藏餘賊殱戮無遺不致一名漏網等語因思一月前賊或紛迸避爾時圍未周使賊於一月前未立木柵時衝突而逃追捕正自費力每召見軍機大臣等豫諭及此然賊衆自蘭州被官兵擊退後即死守華林山被我兵得拏柵環攻盡數勦殺不復留餘孽實感也上蒼恩賜鳥散艱羅致知不足為患當更延久滯負隅待盡殱誠感天所賜然世有逆民即為君德纍教化所未孚言及惟抱愧言志井省捐監蠧始自王亶望木偶視督臣一氣通下上始以井省嵗被災地方吏欲藉捐監糧以為賑恤之用部議因准行並令祗收本色米其後乃私收折色銀實始自王亶望為藩司而總督勒爾謹竟如木偶並不參奏甚至通省上下聮為一氣冒賑分肥毫無忌憚因令阿桂等徹底嚴查方悉其弊定議收本色糧也貯倉資賑放墨吏收折色銀也欲壑叨無量報部仍本色公然行詐誑何能終久瞞水落石出狀利令其智昏抑亦良心喪此而逭抵法弊吏將何尚冒賑兼剝民自取罪應償然豫慮因咽廢食益非當辦理捐糧冒賑一案原為剔除官吏積弊使百姓實受賑濟之益但恐各督撫誤㑹此意因咽廢食致將灾賑之事靳固不舉因明降諭㫖嚴切訓諭并傳諭李侍堯將井省本年報灾各屬派委明幹公正大員詳悉查勘即勘不成灾亦量豫撫恤或豫蠲緩或借給口糧籽種以資接濟其有不肖劣員因無可分肥諱灾不報者尤必加倍重治其罪蓋積弊不可不去而灾民不可不恤愛民所以事天丁寧訓誡不啻三令五申矣明道程語晦叔吕公著字讜言恆所仰寧受百人欺好賢心莫曠吾以用之賑寧濫毋遺宕誠恐覬覦者謂吾靳賑餉巧吏何弗為恤民事胥忘弊不可不懲即此恐招謗吾如有所吝全蠲賦三貺丙寅庚寅丁酉三次降㫖蠲免天下正供其各省漕糧亦於丙戌庚子兩次降㫖蠲免萬民被豈虛萬世傳寧妄是用布赤心言志期共諒嗟乎為君難展轉增惆悵回蹕至御園作山莊避暑木蘭獵祖迹繩承畢闡謨旰理宵批敢懈彼民難吏治益厪吾今嵗至山莊時正在辦理撒拉爾逆回一案嗣莭次據阿桂奏報撲勦賊營已誅賊首蘇四十三其餘逆黨殱戮俱盡至六月間又據河臣奏報黃河決口先邳睢南岸之魏家莊繼儀封北岸之曲家樓今南岸已經堵築而北岸據奏報堵築工已過半計十月中可以合龍因命阿桂於甘省事竣後取道赴豫督辨又甘肅監糧折色一案王亶望為藩司視總督勒爾謹如木偶與首府蔣全迪狼狽為奸通省上下聮為一氣恣飽欲壑冒災殃民鞫訊得實分别抵罪嗣四川復有嘓嚕匪搶劫拒捕之案且紏集多人竄入鄰境皆由總督文綬平日養癰貽患所致因降㫖革職發往伊犁效力贖罪以福康安代之督率文武嚴行查辨近上已據報獲賊百餘人指日根株可盡閭閻得以安枕以四事均於吏治民生大有關係數月來飛章馳報批答傳諭殆無虛日御園􅊩止昨何異冬節初臨景略殊忽憶五年前此况暢春亟去問安無陜甘總督李侍堯奏報秋收七分有餘並秋雨情形詩以志事甘省春夏間今年雨頻暨以此命詳察乃盡悉積弊向來甘省每嵗報旱今春因叛回蘇四十三之事遣大學士阿桂尚書和珅先後往甘據莭次奏報四五月間攻賊之時每以雨阻且藩司福嵩亦據實奏報得雨曽有詩志慰因命詳查甘省莭年報旱緣由始得盡悉王亶望等上下勾通折收捐糧藉賑冒銷之弊寧濫毋或遺原期民受惠剝民入私蠧濫乃至鬻吏方伯如坐尸上下通一氣始以甘省頻年旱灾地方吏請收捐監糧備賑部議准行原令祇收本色米使受實惠後王亶望乃私行收折色銀與首府蔣全迪串通各州縣冒賑分肥毫無忌憚甚至如麥桓之指缺賄求公行鬻吏而總督勒爾謹竟如木偶一任各屬恣意妄行並未奏聞斯而不扺法君誠若旒綴然恐覬覦者錯㑹吾之意謂吾或靳賑重增吾之罪既令而復申三五已不啻甘省冒賑一案經阿桂等查審得實因命將勒爾謹王亶望王廷贊解至熱河親鞫分别治罪以彰國法其蔣全迪程棟以下多犯案贓多寡分别治罪庶剔除積弊此後或遇賑濟俾窮民實受恩惠但恐為督撫者誤㑹此意因咽廢食致將灾賑之事靳固不舉因屢降明㫖嚴切曉諭遇有嵗歉即當據實奏報並令督率屬員痛除積弊俾窮民均受實惠不啻三令五申矣即以甘省言偏災仍命恤叶幹甘省本年報偏災者已少仍傳諭李侍堯派委明公正大員詳悉查勘即不成災亦量豫撫恤蠲緩或借給口糧籽種以資接濟今嵗報秋收七分荷天賜李侍堯奏甘省夏秋以來除被水被雹受偏灾數處其餘皆雨澤調勻秋禾粟穀雜糧大半黃熟間有收割者寧夏水田稻榖亦漸成熟收成約在七分以上此或因今嵗積弊一清民情豫順感召天和雨暘時若未必不由此也市集糧價半吾民或少濟貪官何處無捐監大竒蔽侵帑復剝民豈有不招戾積弊一以清召和理應致三釜遍閭閻閲奏心誠慰厯久被人欺是吾之過事觀過可知仁自解兼明志降㫖加賑甘肅四縣被災貧民詩以志事壬寅向來甘省每加賑墨吏侵之弗逮民甘省每年報災加賑自王亶望為藩司藉詞賑濟開銷監糧私收折色串通各州縣侵冒分肥因捋王亶望等分别治罪以彰國法復恐此後或實遇偏灾督撫等誤㑹此意因噎廢食諱灾不辦屢降明㫖嚴切曉諭遇有嵗歉即當據實奏報並令督率各屬痛除積弊俾窮民均受實惠墨吏抵罪民何罪因咽廢食誨諄諄去嵗報災者四縣前弊盡去兹應真輕者借種上聲重加賑甘省上年寧朔平羅等縣因河水泛溢秋禾被災已屢降㫖照例給賑今春青黃不接因再加恩將被災較重之寧朔平羅二縣貧民展賑一月其災輕之隴西寧夏二縣著該督撫等查明缺籽乏食之户酌借籽種口糧以資接濟俾災黎共慶安全用敷春澤惠兹地瘠與民貧申諭大吏體豫意切忌諱災須直陳陜甘總督李侍堯奏報甘省雨澤情形詩以志事甘省地瘠民本貧自昔無嵗不報災去年勦賊頻阻雨詢之乃悉弊所媒甘省往歲每奏旱災上年因遣尚書和珅大學士阿桂先後往勦撒拉爾據奏省城四五月間連得雨澤有益民田而略阻攻克之進因諭問向何每年稱旱始悉王亶望等揑災冒賑之弊相習成風懲貪示法逭民缺秋收多穫民氣培猶恐因噎而廢食詩吟言志誠心開甘省冒賑剝民積弊經阿桂等徹底嚴查得實王亶望等抵法本因剔除積弊使百姓得受實惠起見但恐該督撫等誤㑹此意因噎廢食致有靳恤災賑之事因明降諭㫖再三申誡以積弊不可不去而災民不可不恤並賦言志詩頒諭中外以示開誠布公之意春末缺雨為厪念今辰始報佳音來月初陸續得被澤各屬無不沾以該四月二十二日據李侍堯奏蘭州于四月初旬連次得雨又於十一十二日省城得雨深透四郊霑足並據各屬陸續具報得雨三四五寸及深透不等通省普獲應時甘澍逺近均沾等語覽奏為之欣慰隨復丁寧頒諭令李侍堯悉心查察各屬如間冇一二歉薄之處仍行據實奏聞毋稍諱飾額手西望為慶幸更頒敕諭叮嚀哉莫因目前望秋後一隅豈無獨泣儕君臣之設為民耳慎之其善體豫懷陜甘總督李侍堯奏報麥收雨水情形詩以志慰地瘠户貧甘省信連稱荒旱却非誠率圖因賑官為弊徒使向隅民受名甘省地瘠民貧乃向年官吏竟藉報災賑濟為名折收監糧其實上下通同侵冒分肥小民未霑實惠去嵗收成已過半今年時澤更如情上年甘省於春夏間屢經得雨秋成頗稔今據李侍堯奏報通省各屬於本年四五月間陸續得雨深透其地氣較暖之處二麥稞豆均已揚花結實並有收穫者即收成稍晚處所麥豆亦經吐穗含花禾苗滋長民情愈悅等語驅除惡吏施實惠感召天和福萬氓陜甘總督李侍堯奏報甘肅收成八分詩以志事吏蠧弊以去民和召有應雨沾諸郡普秋穫八分增李侍堯奏甘省今嵗夏澤頻霑六月中旬後二麥先後登場近復屢獲甘霖各種秋禾得雨滋培益見暢遂通省各府州屬呈報田禾收成共八分有餘自昔荒區慮而今稔嵗膺叮嚀仍致囑莫視此為恆甘省自清釐積弊後年來雨暘時若收成豐稔但該處素稱瘠土設將來偶遇偏災地方官斷不可因連嵗豐收稍存諱飾昨藩司福嵩陛見時已面加訓誡兹李侍堯奏復傳㫖嚴行諄諭令其仰體朕意時刻留心陜甘總督李侍堯奏報甘省得雪詩以志事秋收報九分昨據李侍堯奏報甘肅通省秋未收成約九分冬雪報四寸兹又據蘭州省城於十月初九日得雪四寸且同雲密布勢甚寬廣附近州縣業據禀報是日得雪分寸相同農情深為歡慰甘省所希聞額手慶非分墨吏去深弊赤子蘇久困或因召天和作善降祥信水懦夙自慚法亦弗骫盡甚者率扺罪一線寬其論甘省冒賑一案上下通同舞弊侵帑殃民于法都無可寬但入數衆多不忍概豫駢誅因命查將上年於蘭州有守城微勞之謝桓等三十一犯免死發黑龍江及極邊烟瘴地方至冬前勾决時又將侵冒銀一萬兩以下之周人傑等一十五犯亦照前例免死發遣蓋已寬四十六人矣即看勾到日亦被甘膏潤十月二十七日勾决是日得雨三寸益欽帝照臨戒滿敢不慎欽定蘭州紀略欽定四庫全書欽定蘭州紀略總裁提調收掌纂修諸臣職名總裁臣阿桂臣福隆安臣和珅太子太保户部尚書仍管陜甘總督事務世襲嘉勇侯臣福康安經筵講官太子少傅協辦大學士户部尚書臣梁國治經筵講官户部左侍郎署理吏部左侍郎事務臣董誥字位過密無法顯示臣福長安滿提調光祿寺卿今升噶什喀爾都統臣保成户部銀庫員外郎今任兵部武選司員外郎公中佐領臣伊江阿户部銀庫員外郎今升內閣學士兼禮部侍郎臣松筠户部陜西司主事今升西安副都統兼纂修事臣敷倫泰漢提調原任鴻臚寺卿江西布政使臣馮應榴户部陜西司郎中今升吏科給事中兼纂修事臣劉謹之兵部武選司員外郎今升江南道監察御史兼纂修事臣汪日章滿收掌户部廣東司員外郎今升山西贛州府知府臣富尼善户部江南司員外郎今升山西道監察御史臣舒濓吏部文選司主事兼纂修事臣索明阿漢收掌工部都水司郎中臣蔣謝庭刑部浙江司員外郎今升山西道監察御史臣吳熊光漢總纂吏部文選司員外郎臣馮培滿纂修原任內閣學士兼禮部侍郎臣嵩貴漢纂修吏部文選司主事今升考功司員外郎臣程維嶽宗人府主事今調工部都水司主事臣吳俊校録內閣中書今升起居注主事臣張曽效原任户部浙江司主事臣毛上炱內閣中書臣秦瀛內閣中書臣章煦
