  text: 欽定四庫全書欽定蘭州紀略卷十七
  hash: sha256:6ab02c4608f426fc6cb37eeb11d435832ff344a6858822d5a4f5033d9c2fefd3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0015_WYG_017-1a, image: WYG0362/WYG0362-0437a.png}
body:
  text: 乙未上命軍機大臣傳諭英亷雅德曰前因王亶望於揑災冒賑一案業已明正典刑並將伊子發往伊犁自備資斧充當苦差兹據雅德查奏王亶望之子共十一人長子王裘業經刑部辦理其次子王棨王焯現在飭提起解此外尚有子八人王祐王紳王晉王越王瑶王鈺王庚官王海官俱年在六嵗以下等語此等重犯將伊子發往伊犁自屬罪所應得但念其年尚幼小若即行發遣朕心尚有不忍著加恩將王祐等八人交雅德嚴行管東待年至十二嵗時再行遵照前旨陸續發遣伊犁如雅德離任山西即著交代接任之人遵照辦理丁酉阿桂李侍堯奏言臣等𣲖委布政使福嵩平慶道汪新前往洪濟橋唐家川數處查拏從逆餘黨及逆犯應行緣坐家屬據該司等陸續稟稱由洪濟橋渡河住宿唐家川密傳各該處回人鄉約選𣲖兵役協同搜捕將搜獲逆匪及應行緣坐人犯分起解省臣等提集嚴訊逆犯馬六六等或為賊扎筏濟渡或熬茶接待或隨同抗拒官兵各自供認不諱其應行緣坐各犯非父兄從逆即子弟黨賊亦質對確鑿俱無疑義應即行正法以彰國憲其馬復才之兄馬進朝已據拏獲解省在監病斃當即戮尸至唐家川等處搜獲緣坐婦女九十五口循化續行搜獲撒拉爾逆回婦女三十口共一百二十五口應發往伊犁賞給厄魯特索倫察哈兵丁為奴唐家川等處搜獲緣坐幼男四十名循化續行搜獲撒拉爾幼男二十五名共六十五名應發往雲南普洱廣西百色極邊煙瘴充軍奏入上從之同日阿桂李侍堯又奏言臣等遵旨查勘甘省添建倉厫各案內惟永昌撫彛張掖三處糧食較多𣲖軍機司員敷倫泰前往勘驗兹據稟稱該廳州縣所添厫座均經改造但查永昌縣添建厫座七十間惟五間貯有糧石其餘皆屬空間張掖縣添建二百八十間現空間一百三十二間撫彛廳添建八十間止空間十九間預備開徵之用等語臣等伏思建倉原為貯糧今永昌縣建倉七十間竟空間六十五間是舊有倉厫已敷藏貯何用添建張掖縣雖查有糧四十餘萬石而空間之倉有一百三十餘間則四十五年該縣又何必添厫至二百間之多顯係借貯糧為名希圖暗侵公帑應請將此二案照西寧等處二十三案例概不準開銷銀兩著落詳請之員暨各上司分賠其撫彛廳添建之八十間張掖縣四十一年添建之八十間業據查明實貯糧石尚非虛設惟工料較之原估多有偷減容臣李侍堯于盤查各屬時另行核減報部至厯年詳請添建之各州縣即係現在審明折收冒賑之員歸案時一併從重定擬惟成縣知縣談可則任內並未捐監辦災苐擅請建倉亦屬弊混應請旨將該員革職勒限一年賠繳倉費以為藉端揑冒者戒如不能依限繳清仍按律治罪奏入上敕部知之九月庚子上諭內閣曰甘肅揑災冒賑侵吞監糧一案自乾隆三十九年以後通省各官聨為一氣朋分公帑經大學士公阿桂等在甘查辦節次訊録確供奏請將該員等革職拿問並請將任所原籍資財一併查封以抵官項業經降旨允行此項自王亶望蔣全迪等首先倡率以致闔省效尤通同弊混各州縣亦視侵冒官項為故常竟無一人潔已奉公庸中佼佼者此而不治以亷弊吏之謂何今既查辦確實不得以罰不及衆竟置不問朕前降旨云辦理此案實出于不得已者正謂此也朕既不能道之以德不得不齊之以刑而無耻之徒方且仍冀其茍免也世道人心澆薄至此朕甚愧之現在直省各督撫遵旨將各該員家産查對陸續開單具奏但念此事發覺已久其案內人犯前聞王亶望拏問之信知事已敗露預為隱匿寄頓誠不能保其必無而在各督撫查辦此等貪吏自不敢骪法徇情自干愆咎顧若以查抄嚴密之故或株連拖纍有意苛求别生枝節致令外間無識之徒妄滋竊議則各督撫之不能深體朕意也況此等婪得贓私理無久享此時即有隱藏其子孫亦斷無安坐而食之理此天道之昭然不爽者朕之辦理此案權衡審慎祗欲使貪黷營私之吏知所炯戒庶足以勵官常而振法紀非真籍錙銖籍沒之資財抵償官項也所謂不為已甚去已甚朕之辦理庶務始終期以此意而已將此通諭中外知之臣等謹按甘肅大小各員侵帑分肥恣行貪冒其婪得贓私即將家資盡數籍沒未足相抵我皇上以辦理此案惟在飭法紀而凛官方俾墨吏共知警畏非藉此以抵償官項并恐各省督撫不能善體聖懷或致有意苛求株連滋纍申諭諄切始終不為已甚去已甚之意益見權衡致當云同日副都御史汪承霈奏言竊查自乾隆三十九年以後各省赴甘報捐監生不下二十餘萬人今奉旨停鄉試三科此九年中在奉公守法者或知追悔從前冒昧報捐尚能安于義命但其中保無躁進之徒竟將甘省所捐監生憑依年貌頂替那移而本身則更易名字在部報捐仍復公然入場徼幸中式乃以原名頂替于同父弟兄三科以後又可冒名就試籍貫三代均屬相同即地方亦無從稽察是混迹科場濫邀名器弊難盡絶且恐開挾嫌告訐藉端滋擾之漸臣竊惟聖恩寬大與其再犯而懲以冒混之條不若先事而豫以自新之路所有此項監生請明定章程通行曉諭該生等如有志上進情願應試者令其各將在甘所捐監照呈部注銷準以原名在部另行改捐給與監照遇鄉試年分準豫一體應試免其停科其不應試而情願銷照另捐者亦聽在部另行報捐並請勒限二年于限內報捐方準應試如過二年期滿未經銷照另捐者即作為頂帶榮身不許赴部重捐雖扣滿三科後亦不準其應試既可正士子進身之始並以嚴科場冒混之端奏入上敕部議奏旋經户部議覆應如所奏準令各生將原照呈銷以原名赴部報捐應試勒限二年如逾期不赴部改捐者即作為頂帶榮身不準應試其現充各館謄録監生有情願另捐者亦準其于二年限內一體赴部報捐再此外尚有廪增附各生在甘省加捐監生及由甘省所捐監生中試副貢並有由監生在部捐職捐貢人員亦應酌定章程請將廪增附各生加捐甘肅監生一體繳銷執照在部重捐應試其已經中式副貢人員亦令在部補捐監生方準其入場鄉試至從前由甘省監生在部捐職捐貢除頂帶榮身不願考試者無庸查辦外其仍願赴試者亦令于二年限內補捐部監應試至嗣後有甘省原捐監生情願加捐貢生及職銜者應令將原捐監生注銷補捐其未行補捐部監者一概不準加捐奏入得旨如所議行辛丑阿桂李侍堯奏言甘省揑災冒賑各州縣內程棟一員已于在京刑部及行在供明臯蘭縣兩年辦理災賑浮冒之數約有十餘萬兩其在甘省陸續取供之陸瑋等六十五員或餽送王亶望或餽送蔣全迪楊士璣及本管道府等或代勒爾謹王亶望王廷贊等買辦物件或供應上司或公幫公捐各項用去外餘剩銀兩俱係各該員自行花銷據伊等所供按其浮冒銀數自九萬三千餘兩至二萬一千餘兩者陸瑋等十九員一萬九千餘兩至一萬四百餘兩者閔鵷元等三員九干餘兩至一千餘兩者韋之瑗等三十員一千兩以下者夏恆許士梁吳詵三員自應按律定擬以彰國憲而警貪婪應將侵冒銀二萬兩以上之程棟陸瑋那禮善楊德言鄭陳善蔣重熹宋學淳李元椿王臣許山斗詹耀璘陳鴻文黎珠伍葆光舒攀桂邱大英陳澍伯衡孟衍泗萬人鳯二十犯均照侵盜錢糧入已數在一千兩以上者斬例請旨即行正法其一萬兩以上之閔鵷元林昻霄舒玉龍王萬年杜耕書楊有澳李本楠彭永和謝桓徐樹梅周兆熊福明陳韶十三犯俱照侵盜倉庫錢糧一千兩以上例擬斬監候秋後處決入于本年秋審情實至一萬兩以下之韋之瑗尤永清錢成均萬邦英丁愈趙元德顧汝衡侯作吳陳金宣王旭董熙宗開煌沈泰墨爾更額善達華廷揚賈若琳龎橒史堂覺羅承志李弼申寧吉謝廷庸葉觀海麻宸張育琳三十犯亦照侵盜錢糧一千兩以上例擬斬監候秋後處決一千兩以下之夏恆許士梁吳詵三犯應照侵盜錢糧一千兩以下例杖一百流三千里其因路逺尚未調取來省之四十三員俟續行審明歸案定擬至假揑結報之各道府內有供認收受屬縣銀兩陳庭學汪臯鶴張金城鍾賡起等四員其收受銀數自千餘兩至數百兩不等又未經得受屬員餽送止認揑結之秦雄飛等六員查該員等舊日所屬各員離甘省尚未訊供者難以遽定應俟各該員解到後質對明白再行分别定擬具奏至冒銷銀數據各該員所供合計約略浮冒十分之二但該犯等通同舞弊侵貪害民情節可惡應照所供加倍追出以示懲警所有應追銀兩按辦過賑銀十分之四核算于冒賑各員名下追繳三成其一成于各上司名下追賠如查對備抵尚有不敷于本人及家屬名下著追現在總督藩司均已治罪查抄應于各官假揑出結之道府直隸州分賠此內道員所屬較多應追賠一成之四知府直隸州應追賠一成之六如蒙俞允即遵照辦理奏入上敕軍機大臣會同行在大學士九卿核擬速奏旋經軍機大臣會同大學士九卿奏言程棟等二十犯俱侵冒銀二萬兩以上應如大學士公阿桂等所奏請旨即行正法又閔鵷元等十二犯俱侵冒銀一萬兩以上亦應如所奏擬斬監候秋後處決入于本年秋審情實又韋之瑗等三十犯俱侵冒銀一萬兩以下亦應如所奏擬斬監候秋後處決又夏恆等三犯俱侵冒銀一千兩以下亦應如所奏杖一百流三千里再徐樹梅陳韶二犯折收冒賑得贓逾一萬兩以上錢成均王旭陳金宣宗開煌等四犯得贓雖在一萬兩以下但該犯等俱係冒請建倉于揑賑開銷之外又復設法侵欺情罪更甚請將擬斬入于本年秋審情實之徐樹梅陳韶二犯俱從重請旨即行正法其擬斬監候之錢成均王旭陳金宣宗開煌四犯從重入于本年秋審情實以昭炯戒至冒賑揑結各員業將其婪得贓私悉行查封以抵官項所請分作四成及在本人各家屬名下追賠之處應毋庸議奏入上敕留京辦事王大臣會同大學士九卿科道再行核擬速奏癸卯阿桂李侍堯奏言查止捐監生未經揑災冒賑各員雖違例折收亦有應得之罪但開捐之始王亶望即主持折色王廷贊即改歸首府總辦積習相沿州縣不能自主尚與有心舞弊借賑開銷者不同此等人員任內有冒請建倉者除趙明旭已于揑結案內革職其西和縣知縣卲維賢及改教計參之郭之屏劉坰應請一併革職從重定擬其餘各員銀兩應以改歸首府收捐後所定五十五兩為準糧數以四十石為準除去公倉費等項銀七兩外每監生一名應多餘銀八兩于各該員名下按所捐監生照數追繳此內一百名以下者即令完繳一百名以上者勒限一年五百名以上者勒限二年一千名以上者勒限三年如限內完清將該員革職留任八年無過方準開復如逾限不能完繳者將該員參奏革職仍按律治罪至揑災案內未經出結止于揑結監糧實貯之道府等業經革職應毋庸議奏入上敕該部議奏旋經吏部等議言請將案內現任伏羌縣知縣楊芳燦等即豫革職留任查明各員捐監數目照阿桂所定年限勒令完繳仍于銀兩完繳之日起扣限八年方準開復患病調理之寧州知州范履乾另案降調之環縣知縣楊縉雲等應停其補用行文按限追繳俟銀兩全完方準起用仍于補官日革職留任扣限八年開復其已經休致之敦煌縣知縣李文曽另案革職之正寧縣知縣張瑾等亦行文按限追繳其病故之伏羌縣知縣楊瀛等仍在家屬名下著追以上現任候補及休致另案革職各員如逾限不能完繳各該督撫將該員參革治罪奏入得旨如所議行乙巳陳輝祖奏言臣遵旨將原任革職安肅道陳之銓丁憂鞏昌府知府潘時選提解到省率同司道嚴訊據供與州縣折收冒賑得受分給銀兩又復轉餽上司各情節查陳之銓潘時選身為道府于所屬折收監糧知而不舉已屬玩法逮冒災濫銷復敢扶同結報侵盜分肥法難寬宥應即按律定擬陳之銓潘時選均應照侵盜倉庫錢糧一千兩以上斬監候例俱擬斬監候秋後處決奏入上敕軍機大臣會同行在大學士九卿議奏旋經大學士三寶等議言此案陳之銓潘時選二犯應敕令該督派員押赴甘省交陜甘總督李侍堯將有無與各州縣通同舞弊之處質訊明確再行定擬歸案辦理得旨如所議行戊申上諭內閣曰王廷贊接任甘肅藩司於王亶望通同屬員揑災冒賑一案並不據實參奏及早清理乃轉踵行其弊仍將監糧私收折色且改歸首府辦理又每名加收心紅紙張銀一兩並𣲖屬員買辦物件及事已發覺經朕硃筆訓諭令其據實供吐尚敢支吾狡飾前據行在大學士九卿會審按律問擬斬決本屬罪所應得因念其本年三月蘭州守城微勞姑從寬典改為應絞監候兹又續據阿桂等查奏甘省浮銷賑糧腳價一項王廷贊將腳價銀二萬八千餘兩發交楊士璣收存為辦公之用當經傳諭留京辦事王大臣提訊王廷贊據供原知此項冒開因勒爾謹説有應辦公事遂準其領去楊士璣並未分晰具報等語此案王廷贊始終揑混踵弊效尤即其𣲖令屬員買辦物件一事向來藩臬不準進貢屢經降旨嚴飭更非如勒爾謹身任總督尚可藉口年節買辦土貢者可比是其婪索勒𣲖種種情罪百喙難辭目下已屆官犯勾到之期王廷贊係情實官犯著即行處絞仍通諭中外知之辛亥上諭內閣曰甘肅揑災冒賑一案骩法營私大小官員通同一氣為從來未有之奇貪異事故當以重法治之非不知罪人不孥而此實非常之罪也除王亶望勒爾謹等分别明正典刑並將伊子革職發往伊犁以示懲警至王廷贊蔣全迪楊士璣程棟等核其情罪本屬相同伊等之子俱應一律辦理除蔣全迪業經正法並無子嗣毋庸置議外楊士璣贓私纍纍使其身尚在亦應正法已於蘭州被害幸免刑誅王廷贊現已處絞程棟陸瑋那禮善楊德言鄭陳善現在審明贓欵定擬斬決該七犯俱有子嗣其所捐官職無論是否係伊父在甘省任內出資報捐俱著查明一體革去並著發往伊犁充當苦差以為貪婪不法者戒壬子上諭內閣曰甘肅收捐監生業經降旨停止所有陜西省收捐監糧並著一併停止欽定蘭州紀略卷十七
