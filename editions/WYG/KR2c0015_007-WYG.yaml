body:
  text: 戊子阿桂奏言官兵自初二日進𠞰賊匪痛加殱戮以後賊匪甚露惶懼情状臣恐其乗間竄逸當即飛飭防守後路各將備晝夜嚴宻防範毋稍疎虞數日來臣等察看賊匪於華林山前拏立石卡拆缷民居土坯砌築碉房欲於孔穴暗放鳥鎗以為抵禦之計我兵若照舊進兵仍須過溝上磡賊必藏匿溝壕併力支持不肯出壕受𠞰臣與海蘭察額森特明亮相度地勢惟從華林山之西添派一路健兵從後路夾攻方能集事現在簡選之奮勇滿漢兵仍須令其從初二日進攻之路過溝上山衝壓賊營乘賊人盡力防禦之時派兵從西路突入賊人四顧不暇方能得手但就現在滿漢兵丁内再行練選派進轉易為賊人知覺預先備禦進勦恐難得利是以再四籌酌不得不稍俟兵力齊全以期一舉殱滅查䕶軍統領舒亮等帯同侍衛章京三十人日内陸續可到臣又聞本省附近之保安四屯土兵及鐡部畨兵勇悍可用業經飛飭檄調若此二處土兵調到實在可用又不必專候屯練即乘機進𠞰臣揆度賊勢自節次打仗𠞰殺後賊人望見海蘭察額森特明亮等騎馬數人即望風敗北其毫無伎倆可見况賊匪撒拉爾巢穴業經被搗無路可歸而又與舊教及畨人等素相仇怨自揣一經逃散必被擒拏是以誓死守此一隅臣與海蘭察額森特明亮日夜籌畫必思計出萬全一舉殱盡不肯以打仗為虗應故事同日阿桂又奏言查三月二十日福崧聞逆囘不法跟随勒爾謹帯兵前往𠞰捕甫至狄道聞河州已失即在彼駐守勒爾謹與福崧詳細籌酌一面催調官兵一面飛檄署西寧鎮貢楚克達爾由循化一路乘虚直抵賊巢收復河州並令駕馭老教土兵先驅出力所有一切堵截後路安慰回民及籌辦𠞰援各事宜俱係随同勒爾謹商辦臣觀福崧雖不敢以收復河州等事自以為功但臣抵蘭半月見勒爾謹神䰟失據束手無措情形從前必不能如此籌畫可知其為福崧出力帮辦自屬實情至臣自到蘭州以來節次得雨霑足黎民歡慶以為罕見稀有氣象甚屬順遂均奏入上命軍機大臣傳諭阿桂李侍堯曰阿桂奏現俟兵力齊全一鼓𠞰洗賊匪以現在情形而論逆匪既逃竄無路其所搶糧食亦斷不能支兩月即餓斃亦可完事但以么麽小醜如此肆逆不法非痛加殱戮生擒首犯盡法處治不足以洩忿恨而彰國憲今川兵及阿拉山兵於二十以前可抵蘭州為期已近此時自不宜更冐險以致損威第目下既不即進𠞰何不先行曉諭賊黨并脅從之人以罪魁逆首止蘇四十三若能將伊擒獻則汝等脅從尚可奏請邀恩寛減倘執迷不悟將來大兵𠞰捕無分首從一同受戮雖悔無及如此明切開導衆心自可解㪚或作檄文曉示或令舊教土司等設法遣人傳諭使賊衆猜防彼此疑慮擒捕賊首未始非解散黨羽之計至所稱檄調附近之保安四屯土兵及鐡部畨兵勇悍可用但此等畨土兵是否與逆賊差往求援之安定㑹寧回人及為賊紥栰過渡之唐家川六處逆回同屬一教著阿桂查明覆奏又另奏勒爾謹庸懦無能從前籌畫實係福崧出力帮辦朕前降諭㫖以事發之初亦不宜輕易地方大吏以起邊氓輕玩之心且以勒爾謹如果尚能調度出力不妨俟事定後再行核其功罪此係專就顧惜大體勒爾謹尚能辦事而論若阿桂和珅到蘭州後即目擊其束手無措自當早為奏聞所謂應機而動又當别論何尚待朕看其實不可留特行降㫖拏問乎同日阿桂又奏言三月二十五日賊匪攻城時勒爾謹赴狄道城中只有王廷贊同道員等竭力守禦文員本不知兵且當賊匪攻城危急時望見兵到即催令打仗是以三月二十五日起至二十九日止固原凉州靖逺各鎮恊緑營兵陸續到蘭節次打仗損折甚多官兵愈形畏怯至二十九日以後仁和勒爾謹馬彪伍彌泰等俱陸續到蘭兵亦漸集即無零星打仗之事至伍彌泰仁和馬彪俱係統兵大員目覩勒爾謹無能不能帮同籌畫妥協料理實屬咎無可辭同日阿桂又奏言逆回滋擾不法由勒爾謹辦理不善自狄道回至蘭州見賊已上山遂謂易於𠞰滅並無調度督率輙奏稱半月内可以成功至各路已調之兵全行停撤今賊人退守山梁口食不能寛餘草料亦易匱乏原不能乆為支持臣與海蘭察額森特明亮亦斷不肯曠日持乆待其糧盡自斃現在士氣較前振作而簡選之奮勇滿漢兵丁巳能直前對敵不肯退縮前所調之川省屯練兵丁約計二十以前可抵蘭州此項兵丁到日阿拉山兵亦已先來兵力齊全即可分路進攻至總兵圖欽保於四月十九日打仗陣亡臣到蘭州後詢問海蘭察知是日官兵由龍尾山越溝纔上華林山梁有賊匪數百直前來撲惟時圖欽保先已下溝被賊截住即海蘭察亦在被圍之内射死二賊始得衝出其時和珅即嚴飭各兵令其堅立而海蘭察又馳馬由龍尾山斜坡直前與賊接仗親身射死二賊官兵合力復將賊匪壓下山溝即帯土兵下溝𠞰殺次日和珅查出圖欽保之親随兵丁五人詢知該鎮因馬倒被賊戕害再王廷賛於賊匪起事後恐其直犯蘭州飛調莊浪滿漢兵丁三百名兵到之後賊匪随即圍城此項兵丁即在賊人攻打緊急之西門竭力抵禦自三月二十五日起至二十九日止各鎮協緑營兵陸續到蘭節次打仗多有折損該司又率同在城大小文武員弁督率民夫晝夜防禦查出奸細即行正法賊匪於攻圍至急時王廷賛因賊人有懇放馬明心即行退㪚之語遂將馬明心提出在城上令賊人一見即將該犯正法但又將馬明心之子及婿放令出城予賊雖屬一時緩賊之計寔失國體均奏入上命軍機大臣傳諭阿桂和珅曰阿桂奏王廷賛於三月二十五日至二十九日令調到緑營兵節次打仗損折甚多亦係出於無奈尚屬過之小者至其將馬明心之子及婿放令出城予賊此則不是甚大其罪實在於此伊於逆賊逼犯省城時既将馬明心提出示賊即行正法何以又將其子婿放給藩司大員豈可損威失體若是阿桂和珅於此等辦理錯鏐之事何不早行奏及王廷賛現有交代之事尚未能即行起程並著阿桂先行面詢據寔覆奏同日阿桂又奏言蘭州城外西南二處闗廂節次焚燒搶掠居民未免失所勒爾謹先令該府縣開倉減價平糶以濟民食其無力貧民捐米設厰賑饑臣與和珅到蘭州時恐地方官徒事虚文有名無實嚴飭布政使王廷賛轉飭承辦各員細心查察並令添委幹員分厰督率寔力經理毋使吏役人等侵漁滋弊俾貧民均霑實惠現在逃散之人漸次歸回舖面亦逐漸開張其河州被擾居民聞已陸續歸業亦諭該司轉飭知州謝桓加意撫綏毋致失所現在調撥附近州縣糧料草束陸續運省供支各路官兵足敷兩月之用是屬有盈無絀再查副將新柱知府楊士璣先後被賊匪戕害情形及賊匪攻破河州時署都司李竒千總朱廷竒外委李九章徐烈俱被戕害署守備袁尚仁𠞰賊陣亡署知州周植自縊身死臣訪查亦屬確實阿桂又奏言王廷賛承辨軍需糧務諸事欵項繁多一時難以交代清楚且福崧現有交辦事件應請暫留經理俟稍有就緒再令起程進京均奏入報聞庚寅和珅由途次奏言臣於初入甘省時即聞有新教回人暗相勾結之語十七日到蘭後即宻行訪察並無確據及拏到馬復才馬應髙等訊供有唐家川等六處回民紥栰偷渡及随同蘇四十三攻打蘭城之語即面同阿桂商酌以回人從逆者俱在賊營其餘各處㪚布尚復不少若以千數兵力分頭誅𠞰勢有所難俟𠞰賊完竣後趂兵威嚴整酌派明幹大員於甘凉一帯兵丁撤歸本營之便順路一鼓擒𠞰使逆匪出其不意别無逃藪自可𠞰洗無遺至馬復才馬應髙等所供安定㑹寧一帯蘇四十三遣人求救臣等已於此等處所俱𣲖兵彈壓防範且宻加訪查各該處回人尚皆安静如常亦無勾通形跡即臣來往俱由安定㑹寧一帯經過詢知該處回人舊教新教襍處較之百姓為多臣目擊情形亦皆安静似無别項情跡馬復才等一面供詞未必非揺惑人心之計總俟拏獲蘇四十三等後此等賊人黨羽似不難迎刃而解奏入上命軍機大臣傳諭阿桂李侍堯曰和珅奏唐家川等六處回民難以千數兵力分𠞰俟𠞰賊完竣於甘凉兵丁撤回之便順路𠞰洗至安定會寧一帯俱已派兵彈壓各處回民尚皆安静馬復才等一面供詞未必非揺惑人心之計是以且不露端倪等語唐家川等處逆回人數不少此時未便即行分𠞰所慮亦是至安定㑹寧等處回民現在尚皆安静或竟係賊匪令馬復才等假揑供詞以為揺惑人心之計亦未可知但既有此供不可不嚴加防範且舊教新教襍居一處究屬非妥此次起釁之由即因新舊教争殺而起况新教即係邪教著傳諭阿桂李侍堯務須籌熟妥計將新教一類使之不留餘跡以期永不滋事又阿桂前奏拏獲馬應髙一犯供稱同韓八十馬正南韓四個蘇六個等五人探聼安定兵丁多寡信息韓八十等四犯現在曽否續獲著阿桂詳查覆奏壬辰和珅由途次奏言臣抵蘭之初即聞王廷賛於賊人圍困蘭城時將馬明心之子及婿放出與賊並與賊講和之事而又並未具奏臣原擬即行劾叅實因該司辦理一切軍需糧餉頭緒紛繁恐一時難以驟易生手擬於軍務完竣臣回京復命時再得據寔叅奏請㫖定奪再臣前拏獲賊犯訊據有近日從賊之人亦頗懊悔思欲逃走之供是以於五月初二日打仗之前一日曽派福崧同仁和馬彪令撒拉爾回人繙冩回字曉諭賊人如果能擒獻蘇四十三韓一的巴拉等首犯不但免罪而且邀恩等因原擬派老教回人設法賫示前往因伊等皆為賊衆熟識不敢前往是以派人潜越賊營附近一帯揷立布旗分散曉示無奈逆回等惡貫滿盈執迷不悟未能得力至臣前奏約于五月二十五日前後抵京因彼時涇州長武一帯連日陰雨山路泥濘恐行走不無濡滯自過西安以後天氣晴爽每日兼程加站晝夜遄馳今於本日已抵平定州䟎程前進約二十二日可以抵京復命奏入上命軍機大臣傳諭阿桂李侍堯曰和珅奏前此初抵蘭州即聞王廷賛於賊圍困蘭州時將馬明心之子及婿放出與賊並有與賊講和之事等語馬明心係新教之首其在安定一帶煽惑搆衅已非一日最為此案罪魁即蘇四十三擒獲就戮之後其新教餘孽若不查辦浄盡尚未可稱為竣事盖此等新教即係邪教所到之處最易煽惑不但内地不可容留即新疆各處亦不可發遣安揷致貽後害此等即從嚴多辦亦不為過所謂辟以止辟不得不如此也阿桂李侍堯等如何設法料理計出萬全使新教一類根株盡去永保無虞之處須斟酌妥善行之至舊教相沿已乆且人又衆多自須妥為撫輯令其各安夲業伊等自必益加感激於綏靖邊隅之道更為有濟又據圖桑阿面奏十九日和珅帶領官兵打仗時第一排係舊教土兵第二排係緑營兵丁第三排係駐防滿兵其領兵官員在後督戰當賊匪下壓時舊教土兵遇賊接仗不能抵禦而緑營兵即畏怯一同回走經和珅將馬彪等嚴行申飭並用刀鞭砍打方始立定等語緑營兵如此恇怯無能寔為可恨甘凉兵力向來尚稱可用何以近日竟廢弛如此則他處可知若不實力整齊營務尚可問乎至福崧現已調任甘肅藩司接印任事王廷賛交代後即可令其起程來京毋再遲滯癸巳阿桂奏言數日以來有自賊營滚溝脫囬老教土兵一名漢回四名詳加訊問俱稱賊匪於初二日打仗被戮甚多神情惶懼終日刨挖溝壕安立卡柵防守甚宻臣與海蘭察額森特明亮公同商酌若俟兵力齊全再圖攻𠞰為日尚逺不如派兵仍由舊路進攻若有可乘之机即直壓賊營設或賊匪仍為我兵所誘出壕抗拒亦可痛加殱戮並可觀賊人出入抵禦路徑為他日一舉擒滅之計因於十三日派海蘭察額森特明亮帯領奮勇滿漢官兵及老教土兵由龍尾山過溝上華林山派伍彌㤗莽古賚等率領滿漢官兵佔住龍尾山梁接應堵截海蘭察等過溝先令老教土兵上前誘賊伊等暫駐墈邉待其出壕即行截勦賊匪狡猾異常惟蔵匿溝壕放鎗抵禦終不敢出壕迎敵自寅至未併力支持我兵若令深入於制勝機宜尚無把握因將官兵徐徐撤回佯示賊人以我兵形勢不過如此既可堅其死守之心而於他路防備必懈一俟屯練兵到即可添派兩路健兵從華林山之西面後面突前進攻賊人四顧不暇方能一舉殱滅查此次打仗賊匪為鎗礟擊斃者二三十名土兵受傷陣亡者共有數名又華林山之北有髙樓一座向為賊人窟穴於進攻之路有碍且下臨直磡深至數丈官兵不能越過臣預派土司楊宗業畨兵數名藏伏溝内乘賊匪在前抵禦時奮力爬上放火燒燬賊人愈加惶懼而於他日進兵甚有禆益業將該土司酌量奬賞同日阿桂又奏言賊匪自初二日創敗以後愈形惶懼將所踞華林山四面溝壕更加刨􅀈寛深止留向南小路一條盡力抵禦為死守之計我兵非不能過去但現在簡選之奮勇滿漢兵僅能直前對敵若令深入賊營恐難得利不能不稍俟兵力齊全一齊殱滅現在阿拉山王羅卜藏多爾濟及伊子旺親班巴爾等帯領該處兵於十三日到蘭川省屯練亦據文綬咨稱於五月初六日起程飭令沿途迅速行走臣又接次迎催約計二十内外可抵蘭州此項兵齊即可尅期了事惟是賊匪不過千餘而辨理如是之費手實非臣意料所及至蘭州城外四面皆山西闗外𦂳接賊營並無隙地惟東闗外稍覺平坦可以劄營又距賊營較逺聲勢不能呼應民心更覺驚惶是以臣等入城居住臣等目擊情形不得不通融辨理斷不敢當此勦賊𦂳急之時尚欲辭勞就逸也至洪濟橋唐家川等處回民素與馬明心蘇四十三潜通膽敢札栰偷渡賊匪寔為罪大惡極現經該處民人首告指拏及兵役陸續拏獲賊黨七十餘名婦女㓜孩數十口臣已飛飭分起提解到省嚴審通同謀逆各確情將要犯派員解京其附從各犯俱即正法以彰國憲如通同附送未經就獲者尚多仍於𠞰賊事平後派兵前往痛加懲治以儆兇頑所有拏獲之馬復才馬丁加蘇二個馬應髙四犯除馬應髙患病甚重恐逃顯戮業經正法梟示外其馬復才等三犯即遵㫖派員先行解京至循化㕔等處從前挐獲各犯内蘇五個馬八十三二名據該㕔禀報因傷監斃戮屍其餘各犯前因賊匪逼近蘭城未便提解臣阿桂等抵蘭後已飛飭各該屬妥速解省俟解到時即行詳細審明分别解京正法此外現在拏獲監禁人犯甚多並經行知該各地方官訊供明確亦即照此辦理均奏入上命軍機大臣傳諭阿桂李侍堯曰阿桂奏十三日派兵誘賊出拒賊仍藏匿不出擬俟屯練兵到添派兩路健兵一舉殱滅等因用兵機宜設卡安營自應與賊逼近形勢方能聫絡今賊在城西而大營轉逺在城東中隔一城安能遥為照應今詳閲奏進圖説方得洞悉形勢從前城東安營之處究屬錯悮阿桂等到後住居城内轉覺與賊營相近且可安城中百姓之心而前此伍彌㤗仁和馬彪等之安營錯悮阿桂自必見及亦因成事不説耳至為賊札栰過渡之犯及蘭州西南兩闗廂並河州回民從逆者均屬亂民當概行𠞰洗馬明心家屬例應縁坐者亦當即行查辦毋使兔脱至解京賊匪除現行起解外止須將蘇四十三及黨惡要犯數人解送其餘即於該處正法以免疎虞至此案辦理闗鍵現在總以帮扶舊教滅除新敎為詞明白曉諭以安舊教囘衆之心阿桂李侍堯妥協經理同日阿桂又奏言查分路防守之洮河起台堡老鴉闗巴煖營四處俱係零星隘口業於洪濟橋沙泥站總路安設重兵不能越過此四處若使賊人結夥逃竄現在已有馬兵可以追殺若不過四散潜逸即現在各處所安之兵數足敷堵截毋虞逆匪逺颺奏入報聞同日王廷贊奏言臣歴官甘省三十餘年屢䝉皇上格外天恩不次擢用洊厯藩司任重才庸涓埃未報今於撒拉爾逆回不法一案乃以守城㣲勞復䝉聖主叠沛殊恩邀榮非分現在用兵之際需用浩繁臣情願將厯年積存㢘俸銀四萬両繳貯甘省藩庫以資兵餉奏入報聞甲午上命軍機大臣傳諭阿桂李侍堯曰和珅到京復命面詢一切所有現辦𠞰賊情形已畧悉大概阿桂在彼自能料理妥恊至前此詢問圖桑阿據稱馬彪年嵗已老今又詢之和珅據稱馬彪雖年老而人尚壯健且厯練戎行此次亦尚出力至仁和辦事光景及熟悉營伍之處似尚不如馬彪且仁和初到蘭州時在金城闗遥為放礟和珅到後察看該處距賊營約有數里中隔黄河又安能以礮擊賊轉恐賊人由山路繞至金城闗搶奪礟位因令將礟撤回省城等語看此一節仁和之辦事不得窽要可以類推且伊係本省提督更非馬彪之由西安赴甘協𠞰者可比似此不知事體恐難得利因思明亮於統兵打仗之事究為可恃和珅亦奏其勇往出力朕意或將仁和與明亮對調但川省地方亦屬𦂳要是否仁和尚可勝任著傳諭阿桂秉公據寔具奏候朕再行酌定又㨿和珅奏賊人以打牲為業夲有火藥鳥鎗至攻破河州後所搶火藥又多是以現尚未缺乏且施放轉較官兵有凖等語賊匪所得火藥雖係在河州搶掠者居多但其平日何因得有鳥鎗火藥打牲此皆地方官查禁不力所致而緑營兵轉不如其純熟寔屬不成事體著傳諭阿桂李侍堯將嗣後如何設法查禁不使畨回復能購備配合火藥一併入於善後事宜案内妥議具奏再甘省兵數向因節次移駐新疆眷兵未經補額以致各處存營兵少此次賊匪起事不能尅期調集前已有㫖令阿桂李侍堯於善後事宜案内酌議添兵數千今據和珅面奏情形將來竟須多為添駐方足以壯聲勢而靖地方傳諭阿桂李侍堯即查明前後移駐眷兵共計若干即照數補額並令時加訓練務使盡成勁旅至西安提督向夲駐劄甘肅固原州後固原改駐總兵而提督移于西安駐劄管轄甘肅營務今據和珅奏固原州地方𦂳要似仍應駐劄提督而以固原鎮總兵移駐河州其河州恊副將請於安定或㑹寧駐劄方足以資控制彈壓至西安已有將軍都統似可無須再駐提督等語此事並著阿桂李侍堯於善後事宜案内一併詳悉妥議具奏乙未上命軍機大臣傳諭阿桂李侍堯曰此案用舊教而除新教最為吃𦂳闗鍵盖舊教相沿已久回人等耳濡目染習慣性成今欲去之勢有不可譬如僧道未常非異端亦勢不能盡使為民也而新教則如白蓮等邪教平日雖亦拜佛念經而惑衆滋事其名目斷不可留將來辦理之法首先分别新舊名色即其中有已歸新教而仍自認為舊教者是尚知畏罪避禍查辦時亦只可因其避就量與生路所謂法外之仁不得不網開一面也至逆犯等家屬將來俱應問擬縁坐前經降㫖即速發往伊犂之厄魯特索倫察哈爾等兵丁為奴但思此處縁坐之犯既非善類新疆地方亦不可不妨其復行煽誘莫若改發雲貴等省極邉烟瘴之地較為得宜着傳諭阿桂李侍堯於完案時遵照辦理再閲圖内賊營迤西一帯缺兵把守山路叢雜將來𠞰捕賊匪於勢窮力蹙時或致竄逸藏匿不但得以倖逃顯戮並恐事定後又復潜出惑衆均未可知且聞賊人有將來事急欲投黄河之供或竟自焚自戕皆所不免總之阿桂等若能生擒首犯固為盡善即或一時不能生獲而查檢首惡屍身舊教回人俱能認識如王倫之自行燒斃確屍可認亦未嘗不可了事斷不可拘泥必欲生擒之見轉致賊人乘間逃逸阿桂等於𠞰滅賊匪時尤當相機辦理毋使一名漏綱再和珅奏陜西毘連四省形勢最為扼要而現在西安駐防滿兵未免稍单且詢之伍彌泰據稱現有從前裁缺兵房空閒甚多若添撥駐防兵數千亦易安揷等語阿桂於辦理善事後宜亦即將西安應添駐滿兵若干之處㑹同該將軍悉心籌酌奏請派往丙申上命軍機大臣傳諭阿桂李侍堯曰前王廷賛有奏繳積存㢘俸銀四萬両以資兵餉一摺因思王廷賛僅任甘省藩司何以家計充裕甘省地方本為瘠薄而藩司何以僉稱美缺若云有營私貪黷之事何以王廷賛在任多年並無聲名不好之處即從前王亶望在甘省藩司任内亦未必竟敢勒索屬員以肥已槖但王亶望於捐辦淅省海塘工程案内竟捐銀至五十萬両之多伊在浙未乆其坐擁厚貲當即在甘省任内所得因思甘肅收捐監糧其中必有私收折色多得平餘情弊且聞向來監糧係各州縣分收而近來則全歸省城即使折色多得平餘而在部報捐者亦未嘗不收盈餘若甘省所收平餘較多則捐監者自不樂從何又紛紛向甘肅逺省捐監並稱較部捐便宜其故實不可解若云該省監糧是係收納本色而夲色又如何多得盈餘其中情節總未能深悉著傳諭阿桂李侍堯即將王廷賛因何家道充餘是否即於捐監一事有染指情弊或另有巧取之處嚴宻訪察據寔覆奏不可稍渉瞻徇臣等謹案甘省収捐監糓原為邊疆積貯遇有歉收可以賑濟貧民無需撥帑如果實收實發經理得宜於民生自有禆益乃為大吏者竟敢上下通同違例折收銀兩減價多捐虛報糓數甚至揑稱灾賑侵欺飽槖其殃民骫法恣意侵冐竟成牢不可破之勢我皇上聖明洞察以甘省地本瘠薄而王亶望等何以各擁厚貲所有私收折色諸弊當未經敗露之先睿慮所及已一一炳燭無遺臣阿桂等凛遵指示悉心確察遂使厯年積弊一旦破除從此吏治肅清民沾實恵聖天子坐照如神彼貪蠧隐私實無纎毫之能遁也已欽定蘭州紀畧卷七
