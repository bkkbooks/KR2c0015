  text: 欽定四庫全書欽定蘭州紀畧卷二十
  hash: sha256:d754e890965055f1d7464c7614f19e87ee6801210b43a3ea96f56eb1f47761d6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0015_WYG_020-1a, image: WYG0362/WYG0362-0472a.png}
body:
  text: 癸亥李侍堯奏言查蘭州大城毋庸展築新工止須完葺舊城仰荷聖明指示欽遵辦理至華林山建築土堡或加砌磚工或改用虎皮石復蒙諭㫖垂詢臣查省城附近諸山俱係土岡聮屬向不産石須於九十里之外打磨溝地方採取計算開採價脚及灰觔匠工較原估土堡加増銀三萬二千六百六十餘兩若燒磚加砌計増銀一萬五千四百四十餘兩是磚工較省於石工至甘省土堡甚多若加工堅厚儘為鞏固其中建設兵房駐劄兵丁均敷安置自不如節省之為便華林山堡似可仍用土工但使工歸實用自能堅固永久奏入上從之乙丑上諭内閣曰甘省捏結道府直隸州前經降㫖革職交李侍堯查審有無通同舞弊及别項欵蹟分别定擬具奏兹㨿李侍堯查明將止係捏結並未收受屬員銀兩之道府秦雄飛劉光昱等一十八員俱定擬已經革職毋庸議經軍機大臣㑹同該部核准降旨允行此等捏結各道府以屬員收捐折色之監糧作為實貯遇有灾荒復聴從王亶望蔣全迪等朋比為奸豫定分數分𣲖各州縣結報扶同申詳核其情節即與虚出通闗無異按律科罪實所應得祗因甘肅通省各官情罪更有重大於此者不得不於嚴示創懲之中特予加恩末減設在他省則執法定擬秦雄飛諸人烏得竟置勿論且道府為方面大員訪察屬員是其専責即有上司抑勒何難直掲部科乃甘為扶同出結國家亦安用此道府為乎現在全案爰書已定前任捏結之道員秦雄飛等俱已格外加恩赦令回籍嗣後自當永不録用以儆官邪各省道府各官有稽查結報之責者均當引為前鑒倘有似此誣捏袒庇之事一經察出朕必按律重治其罪不得以秦雄飛等諸人之例謂可倖邀寛宥也三月乙邜李侍堯奏言甘省倉庫虧空一案臣於上年九月内將查出虧短銀兩約共一百餘萬先行奏聞兹㨿各州縣查明並無虧空之秦州等三十八㕔州縣該管各道府加結具報外其臯蘭等三十四㕔州縣虧短倉庫確數如應解地丁耗羡雜税茶課改折倉費及舊案軍需核减節年平糶價銀渠工經費雜欵等項共銀八十八萬八千九百九十餘兩常平監糧徵收民屯糧草籽種口糧等項共糧七十四萬一百一十餘石草四百五萬一千七十餘束俱係歴任州縣侵虧臣查甘省積弊相仍折捐冒賑業已盈千累萬乃於倉庫正項復敢任意侵欺甚至應放籽種口糧亦有侵冒種種昧良舞弊迥出意計之外雖各犯均於折捐冒賑案内業經正法及問擬重辟但國帑未便全歸無着自應著落分賠臣查甘省虧空之弊其來已久並不始於近年現在細核冊檔自雍正年間至乾隆二十年以前各處即有虧欠不清之欵銀自數十兩至千餘兩糧自數十石至千五百石迨乾隆二十年以後積習相沿虧空日甚一日多者至有萬餘各州縣轉相容隠接收上司亦因循不辦捏結保題釀成錮弊以致後任各州縣毫無忌憚任意侵欺至于此極現今查出乾隆二十年至四十年虧項積有四十二萬俱係那新掩舊是督撫司道以下各官均不能辭咎今四十年以後自總督以至州縣俱已治罪抄産無可再議追賠其四十年溯至二十年之厯任州縣道府藩司督撫自應即照伊等任内虧空四十二萬之數著落加倍賠補擬令督撫一成藩司一成道府三成州縣五成照股分賠此内如有無力完繳者即入通案各員名下分賠其尚有八十二萬餘兩請於臣及司道府㕔州縣各飬廉内擬賠完項查通省飬廉一年共有十二萬餘兩約留七成以資辦公毎年擬扣三成陸續歸補奏入上命軍機大臣傳諭李侍堯曰甘省倉庫正項銀兩竟敢任意侵欺即令加倍賠補亦所應得但念厯年已久各員輾轉接收較之折捐冒賑昧良舞弊者尚屬有間其濫行出結保題之各上司咎止失察著加恩將虧空四十二萬之數按其在任久暫照股分賠毋庸加倍賠補至該督所稱尚有八十二萬餘兩請於現任總督及司道府㕔州縣各員飬廉内攤三成陸續歸補等語此等劣員既經冒賑殃民又復侵虧正帑實屬罪無可逭除已經正法各犯外所有現在解部人犯已交軍機大臣㑹同英廉胡季堂劉墉詳加核奏候朕另降諭㫖至李侍堯福崧等辦理此案徹底清查尚屬實心即現在道府及州縣各員多係新任若令攤扣飬廉辦公未免竭蹶且恐將來轉有藉詞賠累復致虧缺之弊並着一體加恩免其分賠此次寛免之後若再有虧短一經查出斷不能為之曲貸該督等仍當不時查察毋得稍有徇隠同日李侍堯奏言查辦甘省各屬虧空錢糧案内有節年民欠未完籽種口糧銀一項内除厯次邀恩豁免外尚有應徴積欠倉斗糧二百四十五萬四千八百三十餘石折色銀三十萬七千三百二十餘兩請分年帯徵奏入上諭内閣曰甘省地瘠民貧朕従前節年加恩出借緩徴用紓民力在小民感激朕恩自無不踴躍輸將但念該省毎遇偏灾動項賑恤多為劣員等侵蝕冒銷閭閻未得普沾實惠甚非朕愛飬黎元之意今該省積弊已除所有此項積欠銀粮着加恩全行豁免以示朕體恤邉氓有加無己之至意臣等謹案甘省民人節年上厪宸衷發帑賑䘏并借給籽糧緩徴逓豁恩施極為周渥乃因劣員通同侵冒致膏澤未獲普霑兹當清釐積弊之餘小民得均蒙實恵輿情抃慶自益踴躍輸將我皇上軫念彌殷所有應徴積欠糧二百餘萬石銀三十餘萬兩概予蠲除浩蕩恩施有加無已邉氓感荷生成益當鼓舞倍萬云同日李侍堯奏言甘省虧空案内有各州縣因辦理班禪額爾徳呢經過地方借用司府各庫貯銀十七萬五千五百餘兩此内雖有實應動支之項然斷不如此之多其承辦官員俱已於冒賑案内抄産正法現在無従著落賠補請定限于全省官員飬廉内陸續扣賠奏入上諭内閣曰據李侍堯奏甘省各州縣辦理班禪額爾徳呢過境借用庫貯銀兩一項此係從前承辦各員藉端冒支該員等俱已查抄治罪無徔跟究若令無干之後任官員抵賠將來辦公不敷又得藉詞致有虧缺是因去弊而轉復滋弊所有此項銀兩著一併加恩豁免該部知道四月壬辰軍機大臣等奏言李侍堯摺内稱甘省積弊相仍折捐冒賑業已盈千累萬乃倉庫正項復敢任意侵欺甚至糧石草束亦有侵冒等語查甘省虧空各犯除冒賑案内業經正法者毋庸置議外其解部各犯中有冒賑一萬兩以上問擬斬候即應入于情實今復查出虧空銀糧草束者六犯閔鵷元虧空各項計銀五萬九千五百四十兩零杜耕書虧空銀三萬三千七百七十兩零楊有澳虧空銀二萬八千五百八十兩零福明虧空銀三萬二千九十兩零林昻霄虧空銀四千九十兩零王璠虧空銀三萬二百二十兩零又冒賑賍本在一萬兩以下問擬斬候應於秋審時請㫖分别辦理今復查出虧空銀草粮束等項如顧汝衡虧空銀三萬一千二百七十兩零墨爾更額虧空銀二萬二千八百兩零趙元徳虧空銀一萬七千八百八十兩零龎橒虧空銀二萬六千一百四十兩零沈泰虧空銀一萬七千四百九十兩零以上五犯統計前後侵虧各項均在二萬兩以上又董熈虧空銀一萬三千三百兩零丁愈虧空銀二千九百八十兩零華廷颺虧空銀六千一百六十兩零章汝楠虧空銀三千二百兩李弼虧空銀七千三百七十兩零葉觀海虧空銀六千九百八十兩零以上六犯統計前後侵虧各項雖均在二萬兩以下但查各該犯本係冒賑營私通同舞弊法無可貸仰蒙皇上天恩姑予監禁暫緩刑誅已屬恩施格外乃續查出各犯任内于倉庫正項膽敢肆意侵蝕雖虧空數目多寡不同實難再為區别應請將原擬斬候之閔鵷元杜耕書楊有澳福明林昻霄王璠顧汝衡墨爾更額趙元徳龎橒沈泰董熈丁愈華廷颺章汝楠李弼葉觀海等十七犯一併請㫖即行正法奏入上諭内閣曰軍機大臣㑹同英廉等將李侍堯奏閔鵷元等十七犯續查出任内虧缺銀糧草束等項核擬具奏請㫖即行正法此案閔鵷元等犯于甘省厯年灾賑項下婪得多賍數至盈千累萬上年辦理通案人犯時因擬入斬决人數衆多不得不畧為區别而該犯等侵冒銀數亦尚在二萬兩以下是以姑従寛改為斬候令刑部入于本年秋審情實臨時再行請旨朕于辦理庻務従不為已甚如該犯等情節有一綫可原者尚欲加恩曲宥今㨿李侍堯續行查奏該犯等任内又有虧缺于銀粮草束各項多者至五萬九千餘兩即至少者亦有數千餘兩是于捏灾冐賑本罪之外又復任意侵欺毫無顧忌多一虧空罪名實為從來所未有此而不辦何以懲貪黷而申國憲閔鵷元等十一犯總計前後侵虧銀數均以在二萬兩以上罪實無可復逭閔鵷元杜耕書楊有澳覺羅福明林昻霄王璠顧汝衡墨爾更額趙元徳龎橒沈泰均著即處斬其董熈等六犯依議斬決亦屬罪所應得但其冒賑并虧空銀兩合計尚在二萬兩以下董熈丁愈華廷颺章汝楠李弼葉觀海俱著従寛改為應斬監候秋後處决俟本年朝審勾到時刑部請㫖辦理所有閔鵷元等著𣲖胡季堂福長安景熠前往監視行刑即將此旨宣諭該犯等使知情真罪當實由自取並將此案分别辦理緣由通諭中外知之七月乙邜上諭軍機大臣傳諭留京辦事王大臣刑部堂官曰朕昨閲蘭州紀畧于賊匪蘇四十三肆逆時謝桓協同循化㕔營前往賊巢擒獲多犯並隨總兵貢楚克達爾收復河州甚為勇往又宗開煌萬邦英董熈等于逆匪圍困蘭州時晝夜在城督率民夫防守又黄道煚在安定縣拏獲馬明心均屬出力念伊等従前尚有微勞于萬無可寛之中求其一綫生路著傳諭留京王大臣並刑部堂官將監禁各犯逐一通查原案如有似謝桓等情節曽經阿桂等委𣲖兵務實在出力著有勞績者即行㨿實具奏並將此㫖宣示各犯許其詳實自行㨿實呈明俟奏到時交軍大臣詳晰查核再降諭㫖八月乙丑上諭内閣曰上年甘省揑灾冒賑侵蝕監糧一案其婪得銀數在二萬兩以下各犯俱問擬斬候情實于本年勾到時刑部分别請㫖昨閲蘭州紀畧于逆回蘇四十三肆逆時謝桓宗開煌萬邦英董熈黄道煚五犯或前往賊巢擒獲多犯或于逆匪滋擾蘭州時晝夜在城督率民夫防守或在安定縣拏獲教首馬明心因念伊等從前曽有微勞當即傳諭留京辦事王大臣㑹同刑部堂官將現在擬斬監禁各犯逐一通查原案有無似謝桓等情節曽經阿桂于摺内聲叙出力者許其自行陳訴一併交軍機大臣核辦兹㨿留京王大臣等覆奏除謝桓等五犯外其餘麻宸申寜吉等二十八犯供稱或在蘭州隨同守城或拏獲餘黨及辦運軍糧等事當經軍機大臣查奏所訊各該犯供詞核之阿桂等上年原摺並未將該犯等在事出力之處聲叙或因各該犯隨同効力非出色之員是以阿桂等摺内未經提及請交李侍堯再行詳晰確査具奏等因此案人犯侵帑殃民俱屬法無可貸因念王亶望等之肆行侵冒舞弊營私皆係朕平昔寛仁未免失之姑息以致各該犯毫無忌憚所謂水懦民玩朕甚愧之今復因人數衆多不忍概予駢誅不得不又寛一綫所有謝桓等五犯従前既㨿阿桂等奏明曽經在事出力朕不肯没此微勞謝桓宗開煌萬邦英董熈黄道煚俱著從寛免死發往黑龍江充當苦差但伊等情罪重大不加顯戮已屬格外施仁嗣後雖遇大赦各該犯等不得援照省釋伊等所生親子亦不准應考出仕以示懲儆其餘麻宸等二十八犯所供各情節是否確實并著李侍堯再行詳細查明具奏到日叧降諭㫖其各犯供詞一併發交李侍堯核對朕于案内各犯非不欲求其可生之路但求其生而不得則朕亦無如之何直省大小官員嗣後務須潔已奉公母蹈覆轍如再有此等之以侵貪敗露者朕必按律嚴懲不少寛貸勿以現今甘省應正法者多獲寛免仍以身試法僥倖茍免庻不負朕諄諄教誡之至意臣等謹按人臣有守土之責者惟當潔己奉公宣布徳意乃甘省州縣各官侵拏殃民法無可貸雖當逆回滋擾時有協同守城及委運軍糧諸事原屬分所應為未足言功又豈能逃罪我皇上法外施仁於萬無可原之中求一綫可寛之路追原在事稍為出力如謝桓等五人外復令確查情節許各犯自行陳訴並交該督李侍堯核對相符即特沛恩綸免其顯戮仰見大聖人好生之心同符造化俾地方官鑒彼前車不以為徼幸而以為愧耻則赦過宥罪之仁即道徳齊禮之教也已甲申李侍堯奏言伏查去嵗逆回滋擾事起倉卒一切守禦巡防及軍需供應在在需人經前任督臣勒爾謹藩司王廷賛臬司福崧先後調𣲖各員分辦迨臣抵任時逆匪尚未勦除復有續行𣲖委者事平之後即值查辦監糧冒賑之案各犯内縦有微勞不足抵其重罪今䝉恩㫖垂詢臣謹案各犯供詞確核彼時情事均屬約畧相同尚非虚飾内有麻宸尤永清賈若琳彭永和張毓琳李本楠史堂舒王龍八犯當賊匪初起之時或協同守禦省城或𣲖防本境要隘或督辦軍糧或盤獲奸細並于河州循化安定伏羗等處拏獲逆黨要犯均有案㨿可查至如申寜吉汪鶴臯錢成均善達朱蘭王旭蒲蘭馨七犯亦經在省協同防守並𣲖辦收支糧草查安東路軍報臺站押送在山打伏兵丁口食奔走差委均屬實情又如丁愈承志韋之瑗張金城章汝楠華廷颺李弼謝廷庸宋樹榖侯作呉葉觀海陳金宣十二犯均在各本境防守並有辦運糧草牛羊協濟騾馬照料征兵起程過境等事查各該犯本境距省城河州循化逺近不一其離省窵逺者所供督率兵民防守無憑確悉即在賊氛較近之區守禦城池亦屬職分應為之事但核其承辦軍需一切供支照料均無貽悞惟閔焜一犯先經告病離甘嗣因查辦冒賑一案經臣行文原籍吉林查拏並未回籍迨十月間始經陜西拏觧來蘭則所供隨同防守蘭城顯係畏罪捏飾之詞奏入上諭内閣曰㨿李侍堯覆奏麻宸等各犯供詞確核彼時情事均屬約畧相同尚非虚捏惟閔焜一犯先經告病離甘因查辦冒賑一案行文原籍吉林查拏並未回籍迨十月間經陜西拏觧來蘭並未隨同防守蘭州等語所有麻宸等二十餘犯交軍機大臣核其情罪另降諭㫖外至此案前令各犯等自行陳訴原係朕格外施仁該犯等稍有人心自應㨿實直陳乃閔焜已久經告病離甘之員竟敢捏稱守城希圖倖逃法網實屬䘮盡天良情節更為可惡是該犯不必論其侵蝕銀兩多寡就此冒功欺罔一節即當立正典刑著刑部堂官將閔焜一犯提出宣示諭㫖押赴市曹即行處斬並將此情節明白曉諭各犯使共知昧良冒功轉難倖免也丙戌軍機大臣奏言臣等遵㫖將前奉恩㫖免死發遣萬邦英等五犯核其侵冒銀數萬邦英侵銀一萬九千餘兩為數最多謹將李侍堯查明各犯内除閔焜一犯現今奉㫖正法又華廷颺一犯現㨿刑部咨明在監病故外其餘共二十六犯所侵銀數與萬邦英比較分别開單並將原擬罪名及各情節詳悉註明恭呈御覽又遵㫖將逆回滋擾時已離甘省各犯内除王夢麟一犯現亦㨿刑部咨明在監病故外共二十三犯分别開單一併進呈奏入上諭内閣曰㨿李侍堯查奏舒玉龍等各犯或協同守禦𣲖防要隘或委辦軍糧捜獲餘黨不過稍効微勞俱係伊等職分應為之事並非若萬邦英等五犯之在事出力經阿桂等奏明給予議叙者可比然數十人騈首就戮朕心實有所不忍但此内如善達承志身係滿洲用為知縣尤當潔已奉公以盡職守而遇有上司抑勒婪索等事即應直掲部科或告病回旗乃竟愍不畏法隨同侵帑殃民營私舞弊似此亦得倖邀寛免旂員更何所儆懼耶善達承志仍著交刑部入于朝審辦理其舒玉龍等所供在甘効力之處既屬確實萬邦英等五人既經免死則舒玉龍李本楠彭永和麻宸丁愈章汝楠李弼葉觀海錢成均陳金宣王旭朱蘭韋之瑗尤永清宋樹穀蒲蘭馨侯作呉賈若琳史堂申寜吉謝廷庸張毓琳張金城汪臯鶴二十四犯亦可従寛免死發往黒龍江充當苦差仍照萬邦英等之例雖遇大赦不得援照省釋該犯等所生親子亦不准應試出仕以示懲儆朕辦理諸案常以水懦民玩失之姑息為愧今于舒玉龍等因人數衆多不忍加之駢戮宛轉求其生路仍不免于姑息此實朕矜慎庻獄不得已之苦心亦天下臣民所共見者至此案舒玉龍等各犯俱應立置重典特因其于蘇四十三之事稍經出力即得仰邀未減此後凡身任地方之責者設遇賊匪竊發尤宜共矢天良力圖報効庻不負朕訓誡矜全之意戊子上諭内閣曰善達承志二犯因其身係滿洲輒敢隨同舞法營私罪難末減仍交刑部入于朝審辦理實屬法無可貸特念該二犯于賊匪滋事究有協同守城𣲖防要隘一節可貸其一死又烏嚕木齊浮銷粮價案内之傅明阿木和倫二犯亦係滿洲原擬應斬監候自屬罪所應得但其侵冒銀兩究由上司勒索與監守自盗者尚屬有間所有善達承志傅明阿木和倫四犯俱著従寛免死發往烟瘴地方雖遇大赦不得援照省釋所生親子皆係旗人未便令其閒住著交該旗存記除親軍䕶軍披甲等差使准其充當外其有頂帯職分概不准挑補以示懲儆又烏嚕木齊案内之徐維紱張建菴亦係定擬斬候之犯今查徐維紱前在張掖縣丞任内曽經調令帮同萬邦英守城張建菴侵冒銀數較少俱尚有一綫可寛徐維紱張建菴均著照萬邦英之例免死發往黒龍江充當苦差雖遇大赦不得省釋其親子亦不准應試出仕十月庚寅上諭内閣曰甘省収捐監生本欲藉積貯監糧為備荒賑恤之用前次開捐時已不免稍有弊端經大學士舒赫徳奏請停止至乾隆三十九年該督復奏請開例彼時大學士于敏中管理户部即行議准併以若准開捐將來可免部撥之煩巧詞飾奏朕誤聴其言遂爾允行至今引以為過其時王亶望為藩司恃有于敏中為之庇䕶公然私收折色將通省各屬灾賑厯年捏開分數以為侵冒監糧之地設此時于敏中尚在朕必重治其罪姑念其宣力年久且已身故是以始終成全之不忍追治其罪自此次開捐監粮以後甘省上下勾通一氣竟以朕惠飬黎元之政為若輩肥身利己之圖侵帑殃民毫無忌憚天下無不共知朕亦早有風聞而内外臣工並無一人言及思之實為寒心直至上年辦理蘇四十三一案㨿阿桂等屢次奏報得雨降㫖查詢始知厯年該省旱灾請賑全屬虚捏此皆由各該犯昧良骫法天理難容惡貫滿盈自然敗露因令阿桂等徹底查辦種種積弊和盤托出實為従來未有之竒貪異事此案若照侵盗錢糧一千兩以上應斬正例則所有各犯皆應置之重典特以人數衆多不忍一概駢誅因照侵冒銀數多寡稍為區别並因蘭州被賊滋擾時曽有守城等事微勞者格外貸其一死除侵冒銀數在二萬兩以上者業經陸續正法及降㫖加恩免死發遣各犯外本日朝審勾到尚有二十三犯内陳起撝史載衡伍諾璽孫元禮呉鼎新等五犯侵冒銀俱在一萬兩以上又無守城微勞法無可貸現已予勾其餘各犯侵冒銀在五千兩以上及五千兩以下之竒明周人傑楊賡颺布瞻景福顧芝廣福吕應祥李立佛保劉炯郭昌㤗等十二犯及捏結收受餽送之陳之銓潘時選熊啟謨等三犯俱著加恩免死内旗人竒明等五犯著照善達等之例發往極邉烟瘴地方雖遇大赦不得援例寛釋所生親子著交該旂存記除親軍䕶軍披甲等差使准其充當其有頂帯職分概不准其挑補至周人傑等十犯著照萬邦英等之例發往黑龍江充當苦差雖遇大赦不得援照寛釋該犯等所生親子不准應試出仕至成徳陳嚴祖二犯尤非他人可比成徳係髙晉之子書麟之弟陳嚴祖係陳大受之子陳輝祖之弟該二犯世受國恩身為大員子弟尤當潔已奉公以圖報効見有通省貪婪舞弊情事若能直掲部科朕必優加奬擢乃亦愍不畏法隨同侵帑殃民雖該二犯冒賑銀數俱在五千兩以下但係大臣子弟如此昧良負恩情罪尤重是以予勾俾大臣子弟等知所儆懼即為大臣者亦當引以為鑒嚴教子弟又巴彦岱一犯收受餽送代屬員擔承虧空尚屬甘省故習及事敗露復瞻徇隠匿有心袒䕶亦無可寛是以予勾此案陸續正法者前後共五十六犯免死發遣者共四十六犯似此通省捏灾冒賑藐法營私案情重大朕心有所不忍因于萬無可寛之中曲貸其一死實仍失之姑息引以為愧朕矜慎庻獄凡大小案件無不凖情酌理權衡至當内外大小臣工見此案内之身受大辟者即當知畏其得邀恩免死者當知愧而不當以為幸經此畨懲創之後務須各凜冰淵共矢小廉大法之誠副朕明刑弼教之意若再有愍不畏死以身試法者即按法處治斷不能如此次之曲為寛貸也所有辦理此案緣由著通行曉諭中外知之臣等謹案甘省私収折色侵蝕賑帑錮弊已積數年至辦理蘇四十三時屢經奏報得雨始將前此告旱冒賑貪欺骫法一一發露此天理所難容即為國典所不宥若按律辦理俱難仰邀末減我皇上以案内人犯衆多覈其婪得贓數節次區别于守禦微勞及侵冒較少之犯均予免死發遣以昭法外深仁至身為大臣子弟如成徳陳嚴祖負恩昧良仍不稍為寛貸伏讀訓諭煌煌洵足永垂炯鑒云十一月丙申上諭内閣曰朕昨閲蘭州紀畧于賊匪蘇四十三肆逆時蘭州府知府楊士璣前往查辦在白荘被賊殺害署河州知州周植因城失守自縊身死因思該二犯于捏灾冒賑案内俱侵蝕銀在四萬兩以上例應斬決發遣子嗣若其身尚在自應按律正法將其子發遣但念楊士璣被賊戕害周植城亡與亡究係殁于王事彼時與楊士璣同被賊害之副將新柱身係武職緣並無冒灾捏賑之罪現已加恩給與難䕃且従前守城著有微勞之謝桓等各犯俱邀恩宥免死發遣楊士璣周植自應一體加恩其應得冒賑之罪以不予難䕃折之至該二犯之子已經發遣者着赦回原籍其年未及嵗現在監禁者亦一併釋放俾身任地方之責者知有罪必懲有功必録益當感發天良力圖報効庶不負朕軫念微勞格外施仁之至意臣等謹案楊士璣周植於冒賑案内侵蝕至四萬兩以上雖蘇四十三滋擾時或為賊所害或與城俱亡而死事之勤不足償貪冒之罪其子照例發遣罪所應得我皇上披覽紀畧一編念其殁于王事垂慈軫惻並蒙矜宥甘省全案既蕆而守土者益知所勸懲從此大法小亷共凛服官之責毋倖矜恤之寛庻無負聖天子明罰勅法之至教也與欽定蘭州紀畧卷二十
