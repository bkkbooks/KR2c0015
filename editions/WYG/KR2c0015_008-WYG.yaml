body:
  text: 戊戌阿桂奏言官兵自十三日與賊接仗後夲欲俟屯練兵到四路進攻以期一舉殱滅惟是賊匪勢雖窮蹙佯作䲭張竟敢於十四日下華林山至舊教土兵安卡處滋擾及海蘭察額森特明亮等帶馬兵數十名馳至山坳土兵知有倚恃翻身趕殺數人賊始竄歸窟穴其狡譎寔屬可惡且接文綬來咨頭二起屯練於五月初六初八等日自維州起程于二十五六方抵蘭州等語臣等再四籌酌於十八日派海蘭察同那木扎彰靄明山阿蘭保阿拉山公多爾濟色布坦帶領侍衛章京阿拉山馬兵由龍尾山過溝繞至華林山西南潜行埋伏額森特明亮同泰斐英阿福寧阿爾都哈當阿等步行帶領滿漢奮勇兵分為三路在水磨溝内埋伏派舒亮帶領土司楊宗業畨兵在華林山後埋伏伍彌泰莾古賚旺親班巴爾烏爾圖納遜仁和馬彪三徳等仍率領滿漢官兵佔龍尾山梁接應堵截臣阿桂臣李侍堯在後督率䇿應於是日寅刻先令老教土兵由華林山前撲壓賊營賊於溝壕之外安設卡柵數重放鎗抵禦土兵時前時却至巳刻佯作敗退之狀果有賊數百人出壕追壓海蘭察等帶領侍衛章京由溝中奮勇衝出截為兩斷馬上鎗箭齊發阿拉善兵用長矛隨後刺殺其被截之賊殱戮殆盡而未被截住之賊稍退復囘與我兵一處擾殺及被殱甚多始竄歸卡柵在溝壕内潜藏放鎗抵禦維時明亮等亦從溝内覓路上撲無如崖磡陡峻賊人先已預防鎗勢甚急不能立即砍營而入直至未時我兵雖屢次前撲賊終藏匿不出因將官兵徐徐撤囘查此次除鎗炮擊死賊人不計外約殺賊六七十名侍衛哲森保放鎗打死騎馬賊目臣等恐賊匪計圖竄逸連夜派精細之人於賊營左近偵察並預行派定官兵一有信息海蘭察等立即帶兵馳追本日早據報賊營尚無動作此次侍衛内哲森保珠爾杭阿阿禪保克臣保及守備馬得俱帶有鎗箭等傷尚無妨碍同日阿桂李侍堯又奏言甘肅一省寔因地廣兵單以致奸人暗生覬覦釀成事端若能多添官兵數千時常操演寔為思患預防之計其應於何處添駐及循化㕔是否另須大貟彈壓之處俟剿賊完竣臣等於善後事宜案内悉心籌畫經理另行妥議具奏均奏入上命軍機大臣傳諭阿桂李侍尭曰本日阿桂奏剿賊情形一摺賊匪勢已窮蹙尚敢潜出滋擾寔為可恨看此光景賊人自知指日就擒衆心渙散意圖分路竄逸恐官兵防守嚴密是以先行下山滋擾故為䲭張行徑以便事勢窮蹙之際從後路竄出即從前有事急欲投黄河自盡及設誓死守之供恐亦係虚言散布使我兵不行准偹便可乗間脫逃此則阿桂等最應留心稽查者前閱進到圖内賊營迤西一帶山勢重疊恐其中小路甚多而所安設官兵尚未能十分嚴宻使賊匪即從該處乘馬衝逸練營官兵未必能悉力堵禦若改换衣㡌分散潜逃又恐捜捕不能浄盡惟在先事預防使一名不致漏網為要至賊人雖已露待斃情形但亦不可輕視即川省屯練兵二十五六等日到蘭為期已近然尤宜持重整頓兵力使一鼓盡殱方為妥善再此次侍衛哲森保趕殺賊匪頭目勇往可嘉且又受有鎗傷著阿桂查明該侍衛現係何等職銜即奏明加一等陞用以示奬勵其餘受傷各員並著逐一照例奬賞至添設官兵一事亦據和珅面奏數千尚屬不敷即添至一二萬亦無不可現已交部查辦矣同日阿桂又奏言賊匪佔匿山梁雖屬崖磡陡峻其地勢較兩金川實大相懸絶誠如聖諭豈有金川能進兵而此處賊匪反不能剿捕之理惟是現在簡選之滿漢官兵尚非殺賊好手不得不稍俟屯練兵到四路齊進以期一舉殄滅至我兵數次攻剿俱下龍尾山過水磨溝上華林山方能直壓賊營山徑路窄止容一人一騎魚貫上下賊於溝墈兩旁及壕内施放鳥鎗皆可暗傷官兵是以未能即時剿滅又華林山前我兵打仗處所並無水泉其華林山後賊人佔匿之處下臨黄河汲取甚便臣初到蘭州時即與海蘭察等籌計欲分兵佔守杜其飲汲之源則不數日間賊即不戰自亂但華林山後河岸甚窄既不能駐劄多兵且賊人居髙臨下鎗石兼施我兵難以存住若在對河放鎗勢不能及是以止可多派兵丁在隔崖嚴宻堵截而不能斷其水道坐令困斃奏入報聞閏五月癸夘阿桂李侍堯奏言查蘇四十三等逞兇肆逆其撒拉爾各莊新教逆囘起事者皆其死党其搶佔河州圍逼省城自知罪大惡極無可解免即洪濟橋唐家川等六處党惡從逆隨至蘭州者亦自知罪在不赦是以立誓死守難于解散臣阿桂與和珅於五月初間亦曽令撒拉爾舊教囘人繙寫囘字曉諭脅從賊党令其擒獻賊首尚可免死於賊營附近一帶挿立布旗分散曉示亦如治病偏方姑為嘗試今奉諭㫖臣等復派令舊教撒拉爾囘人前往賊卡相近處大聲曉諭以現在天兵齊集帶兵將軍等從前曽經掃蕩西路囘城數十處爾等不過數百人據彈丸之地何難立時剿除所以數日内不即進攻者因仰體大皇帝好生之心不忍爾等脅從諸人同受剿戮若能得賊首及大頭目擒獻尚可不至於死如再執迷大兵一進不分首從俱行剿洗諭畢賊匪頭目拍掌聲喊似不欲其党羽聽聞老教囘人復行宣諭一次賊党有懇求寫字散給者此雖欲生致首逆之一法總不若俟屯練兵到四路進攻一舉剿滅無餘方足以奮兵威而揚士氣至保安四屯土兵及鐵部畨兵已陸續調到數百名看來亦不及屯練降畨逺甚此等土兵即係畨人向屬土司與撒拉爾逆囘種類各别保安四屯在循化附近其鐵部畨兵屬洮州土司楊宗業該土司現派頭人帶兵打仗最為恭順惟鐵部與松潘接壤程站亦遥一時不能到齊其未起身者業已停其調撥所有該二處土兵與逆賊差往求援之安定㑹寧及為賊紥栰過渡之唐家川六處囘民相去遥逺並非同教同日阿桂李侍堯又奏言查賊匪肆逆以來循化河州等處及各州縣陸續擒獲黨惡要犯並附從賊犯又搜拏逆賊家屬共七百餘名口除因傷身故及在監病斃外尚有六百餘名臣阿桂到蘭州後即飛飭各州縣將已經赴解各犯分起管解到省派員㑹同按察使福寧嚴審通同謀逆各確情將要犯派員解京其無闗𦂳要各犯審明後即行正法至循化河州西寧各處監禁逆犯尚多臣等核其供詞内情節𦂳要者提省審辦其餘從賊各犯即檄飭該州縣㑹同營員監視正法將來擒獲首逆蘇四十三並為逆匪出力主謀之大頭目等即派員解京訊問其隨同抗拒及為賊脅逼甘心從賊者拏獲審明後亦即予駢誅以昭國憲至現在各處監禁之家屬婦女幼孩數百口統俟剿賊完竣遵㫖就近發往伊犁賞給厄魯特索倫察哈爾等兵丁為奴以省長途解送之煩同日阿桂李侍堯又奏言臣等遵㫖詢問王廷贊據稱三月二十七日午刻賊衆聚集西城門下索討馬明心見面稱係伊教主等語因問馬明心經總督宻飭安定縣知縣黄道煚拏解來省廷贊隨令臯蘭縣知縣蔣重熹宻喚馬明心上城前赴垜口賊衆一見皆跪呼經主知其為案内起事首犯無疑廷贊正欲交臯蘭縣嚴加看守而賊衆因不將馬明心放給大肆猖獗將月城門燒燬彼時有二人隨從馬明心上城問係隨來服侍之人廷贊欲令馬明心寫字止賊諭以靜候禀明總督批辦馬明心以不能書寫不肯寄字欲令在旁二人前去告知其時賊勢兇惡已進逼大城門下冀可暫緩賊勢是以即將二人縋下城去賊匪並未依從益加攻撲廷贊一面宻囑臯蘭縣速將馬明心正法一面督率兵民盡力施放鎗石並架礮轟斃多人賊始敗退此在城文武官弁所共見者但以倉猝之際未能詳細陳奏實係王廷贊之罪只求皇上從重懲治等語再臣到蘭州後即聞王廷贊有將馬明心之子及壻放令出城予賊之語未及查訪確實嗣後宻飭安定縣黄道煚詳查稟覆據稱馬明心從前解省時跟隨之人一係表姪張懐徳隴西縣囘民一係表姪婿張漢安定縣囘民在省一同管押看守該犯之子並未隨同赴省等語合並聲明均奏入上命軍機大臣諭阿桂李侍堯曰閲阿桂等奏到供單内據買成伏供有賊人因西寧糧草最多令其前往探聽虚實之語賊匪自知計窮垂斃必思挺而走險乗間竄逸斷不肯束手就縳西寧一帶山多地曠兼糧草富足尤不可不加意防範若賊人乗機結隊奪路衝逸尤屬不成事體著傳諭阿桂等逆匪首犯若能設法生擒固為盡善倘一時不能擒獲即被鎗炮殱斃甚或自焚自戕得有確屍亦可完事斷不可令其乗機兎脱以致别滋事端又阿桂等前奏賊人所掠糧草僅能支給月餘今又閲數旬自已匱竭賊人又從何處得有接濟恐仍有潜出搶掠及附近匪徒暗為運送之事著阿桂等嚴宻防捕毋使暗中接濟得以茍延殘喘至逆犯家屬將来辦理時其婦女幼孩不可合為一處所有婦女仍發厄魯特等處為奴其男丁雖幼孩改發雲貴烟瘴地方著阿桂等于剿賊完峻後分别遵照辦理又阿桂等另摺奏詢據王廷贊稱賊人索討馬明心時王廷贊令馬明心寫字止賊馬明心欲令在旁二人前去告知退散王廷贊隨差此二人縋城前往送信暫緩賊勢等語王廷贊夲係文職或因一時賊勢猖獗計無所施將此二人放出為一時緩兵之計尚近情理今據稱因聽馬明心之言始將二人縋城前往殊為巧辯不實俟挐獲該二犯時阿桂等當嚴行詰訊徹底跟究毋得顢頇了事同日阿桂李侍堯又奏言查唐家川即在洪濟橋該處囘民多從蘇四十三等新教潛通交結並敢紥栰偷渡賊匪前經老教囘民首告共拏獲賊黨七十餘名在河州監禁臣核其所供情節將𦂳要人犯提省審辦餘于該處正法者現有三四十名是唐家川逆党除隨同賊首佔據山梁外其在原處居住俱係拏獲正法即有餘孽亦屬無多俟剿賊完竣趂兵威嚴整之時派明幹大員帶兵前往無難查辦至所拏賊犯馬復才係在白塔山溝為守卡兵民挐獲已派員解京馬應髙一犯係安定縣知縣黄道煚拏獲已因病重正法至舊教新教雜居一處之故縁伊等所念囘經本同不過有小聲大聲之異地方官無從辨别且有父子兄弟而各分新舊教者惟因兩教互相讐殺是以起衅滋事亦幸其兩教彼此結怨是以新教逆回易于拏獲無處竄颺經此畨懲創之後回民㫁不敢復習新教趂此立法嚴禁自可斷絶新教名目俟臣等于辦理善後事宜案内妥計熟籌設法革除以為永逺安輯之計其馬應髙供出同夥之韓八十等四人臣阿桂於該縣禀報挐獲馬應髙時即飛飭該縣添派兵役速往内官營一帶山溝搜捕嗣據該縣稟稱各處捜查並無踪跡是馬應髙供詞不可盡信所有韓八十等四名仍令各處嚴緝務獲並俟拏獲正賊再行審究奏入報聞同日阿桂李侍堯又奏言臣等欽奉諭㫖查甘省收捐監榖有無弊竇及應否停止之處據實奏聞等因仰見皇上坐照如神無微不燭查甘肅收捐監糧事例于乾隆三十一年奉㫖以漸收折色者多於積貯實政無裨特勅停止嗣于三十七年調任總督文綬奏稱新疆烏魯木齊一帶屯政日興年榖順成産糧既多而往彼販運者甚少若非預籌收貯不免有榖賤傷農之慮請照舊例准各省商賈士民報捐監糧以裕積儲經户部覆准奉㫖允行而三十九年原任總督勒爾謹即奏請甘省各處仍復捐監舊例以省撥帑之煩亦經部覆准行在案此甘省捐監其停止之故寔因杜絶弊源其停而復開則欲藉捐輸而資裒益也臣等伏思捐監一事如果地方大吏經理妥善原于帑項倉儲均屬有益若辦理不善則收捐既為利藪稽察亦屬虚文包攬之徒得以因縁為奸而貪墨之吏並且從而染指非惟有名無寔甚至百弊叢生臣阿桂自到蘭州留心體察從前所謂折色包捐諸弊寔難保其必無至臣李侍堯䝉恩授以陜甘總督重任監糧一事通省利弊攸闗何敢不寔心查辦惟是甘省幅員寥濶各州縣寔貯常平倉糧監糧共二百五十餘萬石未必如數無虧非半年數月盤察難周而事闗通省官吏亦不得不慎重圖維俟臣等悉心體訪有無弊竇虧缺於臣阿桂起身前再行據寔具奏奏入報聞同日上諭内閣曰本日大學士九卿等㑹奏定擬勒爾謹情罪一案勒爾謹于逆囘爭立新教從未奏聞辦理以致養癰貽患又不能相度機宜速行剿滅擬以斬決自屬罪所應得但其平日居官尚無貪黷枉法欵蹟即辦理此案含糊觀望坐失事機寔伊庸弱無能所致而朕委以封疆重任不及早覺察易置寔不能不引為已過勒爾謹著從寛改為應斬監候秋後處決臣等謹按封疆大臣職司鎮守無事則弭亂未形有事即相機速辦若起釁之初既不能預杜禍源及致養癰貽患又復觀望遷延束手無措如勒爾謹之貽誤地方自應按律定罪明正刑章乃䝉聖慈曲諒猶以此案僨事寔由庸弱無能所致且平日未有貪婪贓欵權其重輕改為監候迨至冐賑折捐蠧弊盡發之時其罪仍不少貸我皇上寛嚴折衷至公至當何一非鑑空衡平者乎戊申阿桂奏言前據四川總督文綬咨稱派令副將李天祐帶領屯練兵丁於五月初六初八日分起啟程二十五六可至蘭州等語臣查李天祐帶領屯兵由維州至松潘程站本近原可三日即到其自松潘至蘭州路程雖有二十餘站内十三站僅五六十里及六七十里若併站趲行又可早到五六日計算頭二起兵原可於二十三日以前皆到乃竟毫無音信經節次嚴催頭起屯練四百八十名於二十九日酉刻始抵蘭州其李天祐所帶二起屯練尚無確信玩延至此若不嚴叅示儆何以明軍律而肅戎行應請㫖將四川維州協副將李天祐革職發往伊犁自備資斧効力贖罪所有分帶屯練之都司汪啟守偹闗聨陞張占魁等俱係聽李天祐管領姑免置議奏入奉硃批上諭曰彼固有罪革職令其軍前効力贖罪若再不奮勉即於軍前正法可也同日阿桂李侍堯奏言黄河船橋被賊燒燬後遵奉諭㫖此時且毋庸搭成以防賊人偷過至金城闗一帶現已添派多兵晝夜防範無虞竄逸惟前日有自賊營脱回之老教土兵三名據稱蘇四十三向伊醜類揚言到至急時隨伊北走死後即得好處之語妄言哄誘臣思賊營之北𦂳臨黄河既有此言將來勢窮計蹙希圖跳入黄河倖逃顯戮亦未可定因令地方官預備船隻搭造浮橋並於河邊安設卡柵派副將一員帶兵二百名駐守又令多備皮渾屯撓鈎安設水網以俟進剿時撈取活賊及屍身以正國法臣因屯練兵丁久無音信本欲於二十八日大舉剿賊嗣聞屯兵於月内可到不如稍俟以圖計出萬全但思該兵丁等䟦涉幾三千里必須休息數日方能鼓勇殺賊而自十八日以後未經派兵進剿不能悉其近日情形因於二十六日派侍衛遜齊鼐等二十餘騎至賊營之西山嶺上察看情勢佯為遊兵誘賊賊匪遥遥觀望不敢出迎又於二十八日派海蘭察額森特明亮伍彌泰莾古賚馬彪仁和等酌帶滿漢兵在龍尾山梁向賊營架礟轟打使賊不得休息其挑出奮勇官兵俱未派往令得蓄養鋭氣惟時我兵打至數十礟多有中其帳房人馬者賊匪窘迫又見官兵尚少即有賊人數百下華林山過溝於磡邊放鎗希圖衝突而上皆為我兵放鎗擊敗其稍近前之賊又被侍衛章京奮勇追殺賊即紛紛竄歸卡柵我兵本不欲深入故未追赶因于申時撤回賊匪被鎗礮打死者頗多沿溝俱有血跡此次接仗殺傷賊匪約數十名我兵陣亡三名帶傷十餘名本日頭起屯練兵已抵蘭州俟二起到時令其休息數日即尅期大舉四路進攻同日阿桂李侍堯又奏言查馬明心正法後至今兩月有餘如果該犯黨羽甚多聞知馬明心被殺不肯甘心則於賊匪攻圍蘭州時安定縣城無兵防守自必乗虚蠢動豈能安堵如常乃自逆回起事以來該處回民甚屬寧靜驛使往來及運送火藥糧餉經過毫無他故而㑹寧尤安貼未聞别有浮言是馬復才所供賊匪差人往安定㑹寧等處求援一語未必非揺惑人心之計至臣等於安定等處早已派兵彈壓並飭該縣時刻稽查防範俟剿賊完竣酌派明幹大員於陜省官兵徹回大營之便將馬明心家屬党羽訪查確實照倡立邪教之例按名拏獲嚴行辦理至新教即係邪教但訊據賊党稱馬明心自二十六年從口外回家即倡立新教令人大聲念經葢緣新疆各城所居囘民其念經即係髙聲大念臣阿桂所素知者至内地回民之小聲黙念或於唐朝初入中國時為人訕笑因改為黙念馬明心自口外囘家遂以為在西域得有真傳轉相傳習其實經本一様而愚民厭故喜新俱為煽惑隨教者甚多地方官又因其本屬一教無從辨別異同未經查禁是以甘肅一省臯蘭狄道河州鞏昌安定㑹寧金縣渭源秦州固原西寧平凉靈州伏羗凉州肅州鹽茶㕔等處數十州縣回民甚多新舊雜處臣阿桂與和珅先後到蘭州各新教囘民心懐疑懼或為逆匪煽惑特出示曉諭令各安本業其未經從逆者決不波累以安衆心查回民崇奉新教不過以能得好處之言彼此煽誘今見倡立新教之馬明心已身正刑誅家屬縁坐興起新教之蘇四十三等俱遭殱戮而洪濟橋唐家川從逆新教又殺戮無赦其餘各處新教有與馬明心蘇四十三往來勾結者難逃顯戮回民雖愚亦知祸福㫁不肯復習新教自投羅網臣等於辦理善後事宜案内立法嚴禁飭令各屬將新教所起禮拜寺概行折燬革去新教阿渾掌教名目如有私行傳習陽奉陰違者一經查出照邪教律從重辦理並曉諭舊教囘民隨時覺察一有萌孽即首告指拏如此立法稽查則新教自然淨盡可以杜祻源而靖邊陲至原任甘肅藩司王廷贊已飭令於閠五月初一日起身赴京其辦理錯謬之處實難辭咎除伊奏請情愿捐銀四萬兩遵㫖作為軍營犒賞兵丁之項外此後凡軍營一切賞需俱著落該司名下儘數捐出歸欵奏入上命軍機大臣傳諭阿桂李侍堯曰阿桂等奏到各摺賊匪情勢日見窮蹙屯練兵到齊後自可尅期剿滅但兵丁䟦涉逺來自應休息數日以期一舉集事至蘇四十三事急北走之語恐係故為揚言以為向西奔竄之計葢回人向以西方為正面猶内地之以南為正前閲和珅所携之圖賊營向西一帶亂山叢雜路徑甚多阿桂等務宜加意防守寔力堵禦勿使一人乗間兎脫方為妥善至所稱馬明心正法後安定一帶回民安堵如常並無蠢動形跡所奏固是但馬明心挐獲解送時蘇四十三尚未攻圍蘭州該處回民自不敢遽行蠢動及馬明心正法後官兵即陸續雲集馬明心家屬黨羽即使得信亦未敢肆行不法然馬明心究係傳教首犯該處一帶囘民平日素與交結者不可不留心訪察辦理至其家屬應縁坐者尤應嚴行查辦務宜根株悉絶不可存姑息完事之見又據奏甘肅新舊回民雜處之各州縣不下數十處統俟事竣後立法查辦革去名目等語亦祗可如此辦理但如唐家川洪濟橋等處從逆回民則剿洗不可不盡斷勿少存姑息以致養癰貽患欽定蘭州紀畧卷八
