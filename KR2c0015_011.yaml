body:
  text: 甲申上命軍機大臣傳諭阿桂李侍堯曰昨據阿桂等奏到圖內賊匪所占之華林山並龍尾山緊接蘭州西南一帶關廂該處商賈湊集最為殷富而蘭州省城本小轉在山下殊於形勢未協朕意欲將西面城垣展寬至此山梁俾西關一帶民居及現在賊營占據之處一半包入城內如此跨山臨水既足以壯觀瞻並可以資控制至河北金城關逼近黃河渡橋形勢亦關緊要將來添設兵丁時亦應於該處多添兵丁令將領大員駐扎似更足資彈壓且大河南北聲勢聨絡於巡緝防守等事尤為有益著傳諭阿桂李侍堯將此二事入於善後事宜案內一并妥議具奏同日閩浙總督署浙江巡撫陳輝祖奏言臣奉旨查訊王亶望在甘肅藩司任內折收監榖有無通同舞弊情事正值王亶望自海塘工所進省料理應繳銀欵臣隨傳至署敬宣諭旨據供我自三十九年八月間到甘肅藩司任已在督臣勒爾謹奏準捐監之後我詳議規條原係收捐本色後來風聞有折收之事當經責成道府查禁彼時甘肅情形倉貯頗少我私心忖度只要各州縣收捐之後將監糧照數買足自然倉貯充裕隨時奏聞見得我辦公有實濟處這是我要討好糊塗的心事所以既聞有折收情弊不過責成道府查禁結報並不曽徹底跟究此即與通同作弊無異已屬罪無可辭臣復詰訊其若非通同分肥豈肯明知屬員違例折收不行嚴參究辦王亶望總稱意在捐多穀多以致一任通融辦理並無分肥入已等語查王亶望借此分肥雖堅不承認但其縱屬私收折色咎已難逭俟楊魁到浙臣再會同嚴切審問如有舞弊分肥情事即一面奏聞一面解部治罪奏入上命軍機大臣傳諭阿桂李侍堯陳輝祖楊魁曰據陳輝祖奏查訊王亶望在甘肅藩司任內私收監糧折色一事既據王亶望供稱風聞有折色之事當經責成道府查禁結報且意在捐多穀多以致一任通融辦理等語彼時道府係屬何人如何假揑結報王亶望何以並不據實供明著傳諭陳輝祖再行審訊王亶望將彼時道府何人如何私收揑報各情弊令其逐一供明覆奏并傳諭阿桂李侍堯亦即將王亶望在甘肅時結報監糧各道府查案具奏至捐收監糧原為倉儲起見今既稱私收折色仍行買補穀石還倉且以捐多穀多為能事是該省之糧石充足可知何以每年又須賑恤即云各府豐歉不齊譬如河西各屬被災或致穀少則河東各屬豐收地方百姓自將糧石赴糶欲得貴價此亦流通便民之事百姓當亦自知也何必輾轉經手官吏收買致令短價勒買官得便宜而民仍受𣲖纍此事理之顯然者且即欲收捐亦當聽本生自行交納本色或者捐監之人不致抑勒百姓百姓仍得貴價也何須官為包攬以致敝竇百出朕于監糧一事本為甘省地瘠民貧每歲不惜百十萬賑濟以惠養窮黎若以惠民之事而轉為纍民之舉徒令不肖官員借端肥槖所關甚大况此事不發則已今既經發覺自應跟求到底令其水落石出此事積弊已久通省大小官員無不染指有罪但亦斷不能因罰不及衆輒以人多不辦為詞即從前之結報各道府此時已經升調人員亦屬無幾無難治罪况中外人材不乏斷無少此數人便不能辦事之理此而不嚴行查辦將何事不可為也著傳諭阿桂李侍堯務將此事如何舞弊分肥如何冒銷勒買各情弊並向來朦混出結之道府嚴切跟究據實指名參奏倘阿桂等此次稍存瞻徇代為擔承將來别經敗露伊二人其何以對朕耶戊子阿桂李侍堯奏言查逆犯馬復才所供八蠟廟有樓房九間上下多是賊人糧草一節今八蠟廟已圍在官兵木柵之外該處並無樓房亦無賊人存貯糧草至賊營所踞周圍不過半里並無草束堆積其糧食俱口袋盛貯藏於地穴火彈既不能及而所支帳房半屬虛設賊人亦多不在內居住且被我兵每日鎗炮環擊俱經破毁是以前次雖經製造火箭數十枝尚未施用至從前燒燬華林寺後樓房屋宇即係拋擲火彈俟將來逼近賊卡再行拋擲焚燒可使潰亂又奉諭旨賊人所挖溝壕雖屬寬深或令官兵等填壕而進賊人必出而抗阻我兵即可用鎗箭剿殺仰見聖明逺照於現在情形洞若觀火臣等實深欽服查官兵自六月初一日夜於賊營南又拿立木柵一層逐漸進逼並於木柵內接築炮台數座施炮放鎗即欲為填壕而進之計數日以來賊匪乘夜又挖深坑潛匿及於卡內藏身挖孔放鎗不敢探身出望日間亦不敢于近處行走其為𣲖出之好鳥鎗手打倒者每日七八名至十餘名不等而挖溝拿卡官兵亦間有受傷者臣阿桂與海蘭察明亮再四籌酌現離賊溝尚有數丈計於第二層木柵外接連刨挖人字形溝三處直逼賊壕相離不過數尺復於溝上拿立木卡三座令官兵足以蔽身溝內兩旁安門可以來往又於三木卡相間處通身刨挖成溝並於柵內填築土臺用鎗炮在上擊打來擾之賊然後令官兵於柵內及溝邊將枝捆土袋拋入賊壕挑選奮勇官兵屯練在溝內預偹俟賊壕填滿即一擁而進自可期其得手惟初六日大雨竟夜勢甚雱霈初七初八連綿不止直至初九日始晴雖雨止即行刨挖而泥水甚大施力較難伏思華林山上雖絶無水泉而經此數次大雨賊匪承接藏貯可敷六七日飲用須再待五六日方受渴困􅉵而此十餘日內又安知不雨是斷水為最善最速之䇿而目今已覺其緩惟有遵照諭旨指示俟數日內木卡拿成逼近賊溝填壕而進仰仗聖主威稜自應一舉集事奏入上命軍機大臣傳諭阿桂李侍堯曰連日盻望捷音及披閲奏函仍係籌辦情形且因連遇隂雨不能迅速刨挖而泥水甚大施力較難愈深憤悶想阿桂亦焦急愈甚至甘省近日雨水甚多致逆賊得以接濟固亦無可如何但糧食何以尚能久支况阿桂既稱賊營並無樓房貯糧而目下官兵四面環攻賊人已如釡底此時豈復尚有黨羽為之接濟何以尚能如此支持雖據阿桂稱斷不待其食盡坐斃但正恐不能不如此耳至甘省如此多雨而厯來俱謊稱被旱上下一氣冒賑舞弊若此安得不受天罰現命提訊勒爾謹及王廷贊令其據實供吐阿桂李侍堯務將此案徹底嚴查不可稍存瞻顧也同日上命軍機大臣傳諭留京辦事王大臣刑部堂官曰本日據阿桂等奏籌辦賊匪情形一摺內稱本月初六日大雨竟夜勢甚雱霈初七初八連綿不止等語甘省向年俱奏報雨少被旱歲需賑恤今阿桂屢奏稱雨勢連綿雱霈且至數日之久是從前所云常旱之言全係謊揑該省地方官竟以折收監糧一事年年假報旱災冒賑作弊已屬顯然勒爾謹久任總督王廷贊亦久任道府藩司何以從前俱以雨少被旱為詞豈有今年甘省雨獨多之理著傳諭留京辦事王大臣前赴刑部會同該堂官提出勒爾謹當堂訊問並將王廷贊傳至刑部一併質訊令其據實供吐録詞具奏並著刑部堂官將王廷贊𣲖員在衙門看守俟阿桂等覆奏到日再降諭旨己丑上命軍機大臣傳諭留京辦事王大臣刑部堂官曰昨已降旨將甘省折收監糧冒賑作弊之事覆行提訊勒爾謹并傳王廷贊到部嚴訊此事折收既已屬實又復冒銷災賑種種弊端難以枚舉現在阿桂等節次所奏雨水情形與甘省常年被旱之言逈不相符其為揑飾浮冒開銷監穀更屬無疑王廷贊在蘭州守城時雖有辦理錯謬及獨自攘功之事然朕總念其保全省城功不可沒一槩恕而不究今伊若天良未泯能將甘省厯年如何通同舞弊之處逐欵據實供明朕仍不忘其守城之功必加特恩寬宥即勒爾謹王亶望罪不可逭王廷贊尚可以功抵罪若伊竟執迷不悟始終不肯實説則是喪盡天良自取重罪不能復邀寬典矣况此事既已發覺斷無置而不辦之理即阿桂李侍堯亦斷不肯代為隱匿王廷贊若不趁此時供明將來阿桂等查明奏到時又豈能再行狡展乎將此傳諭留京辦事王大臣及刑部堂官向王廷贊面傳諭旨令其同勒爾謹各自詳悉供吐即行據實具奏並傳諭王廷贊伊之生死總在此番實供與否令伊自定朕不食言臣等謹案甘省折捐冒賑積弊經聖明洞照斷不能稍為隱匿王廷贊久任道府藩司於王亶望作姦骫法隨同附和逮傳旨詢問又復含糊支飾其罪已無可寬我皇上因念保守省城曽有微勞尚欲以功抵罪命王大臣等諭以據實供吐必加寬宥並蒙特示丹毫令其自定死生大聖人解網深仁委曲周至實無以復加乃王廷贊天奪其魄竟執迷弗悟不肯實供則是喪良負恩自罹於法無能再為解免者也同日上命軍機大臣傳諭陳輝祖楊魁曰前據陳輝祖奏審訊王亶望私收監糧折色一事未將結報之道府何人逐一供明業經傳旨令其即行覆訊具奏此事私收折色于前勒買冒銷于後情節已屬顯然即王亶望亦不虞其始終狡展但楊魁陳輝祖等向其訊問並無證據未必肯據實供吐著傳諭陳輝祖即𣲖妥員將王亶望拿交刑部嚴審並飭沿途小心防護母致疏虞同日上諭內閣曰前以甘肅私收監糧折色一事明係揑災冒賑上下通同舞弊已屢經傳諭阿桂李侍堯徹底嚴查務令水落石出至監糧折收之銀大半歸於冒銷賑恤但賑恤一事甘省向來如此自應治冒銷者之罪不應因有此弊竟因噎廢食朕愛養黎元每遇各省水旱偏災不惜多費帑金優恤寧濫無遺以期不使一夫失所况甘省素稱邊隅磽瘠尤宜加意撫綏豈可以有冒賑之事遂致貧民或有拮據昔宋臣曽有以薦人不當輒有悔意者時程子云願侍郎受百人欺不可好賢之心稍替為大臣者尚應如此存心况朕君臨天下保赤情殷亦寧可受萬人之欺不肯使視民如傷之念因之稍懈也即以逆回一事而論蘭州百姓並無從賊之人此實由朕平日子惠邊氓有加無已是以閭閻激發天良不肯附從逆匪豈非仁政之明效大驗耶總之甘省冒賑之弊斷不可不辦而甘省賑恤之事仍不可不行著傳諭阿桂李侍堯遍行出示甘省百姓使之家喻户曉倍深愛戴以仰副朕意臣等謹案我國家子惠黎元每遇各省水旱偏災不惜多發帑金優加賑恤甘肅邊隅磽瘠尤蒙聖心廑注蠲賑頻施至復準收捐監糧因慮採買病民俾各糴糧輸納而閭閻餘粟亦藉流通本屬法良意美無如地方大吏不能仰體皇仁妥為經理甚且揑災冒賑姦蠧百出若不嚴行查辦何以剔弊懲貪我皇上復慮及地方官因噎廢食不敢報災請賑以致貧民或有拮據特頒訓諭愷切周詳寧受萬人之欺不肯使一夫失所大哉王言不獨甘省士民均知感泣凡薄海內外無不益深淪浹矣癸巳阿桂李侍堯奏言臣阿桂於十五日令海蘭察明亮率同多爾濟色布坦那木扎彰靄泰斐英阿福寧明山阿蘭保哈當阿阿彌都老格并侍衛章京帶領奮勇官兵屯練降番及阿拉山兵先在卡邊預偹埋伏令海祿鄂輝旺親班巴爾烏爾圖納遜帶兵䇿應舒亮仁和馬彪羅江鱗䇿卜坦三德德寧武靈阿額爾亨額帶滿漢官兵各由本卡相機進攻以牽賊勢伍彌泰莽古賚在龍尾山添助聲勢臣阿桂臣李侍堯董率照料是日清晨轉乘天氣濃隂出賊人不意方傳官兵將枝捆土袋拋入賊壕而我兵勇氣百偹哈當阿帶領降畨屯練首先跳入壕內與賊匪攪殺急令官兵用撓鈎搭住溝沿賊卡鈎開土袋板片一面拋入火彈一面踴身而上其卡內之賊惶遽奔竄我兵一擁而進乘勢追殺殆盡隨將溝邊一帶賊卡十餘座及第二層賊壕俱行占得折毁賊卡填滿溝壕以便兵丁往來行走賊匪見官兵已過溝卡知死在旦夕傾穴出迎抵死衝撲海蘭察明亮督率官兵奮勇勦殺賊匪潰敗竄回少頃又復前來衝突如是三次及被我兵剿殺無數始竄歸巢穴惟時各路帶兵將辨見正面官兵得手倍切奮勵三德德寧䇿卜坦帶領守卡漢兵及老教土兵由華林山西覔路攻進搶占賊卡殺死賊人數十名仁和帶守卡官兵亦從華林山東直墈攀援而上殺散賊人將墈土賊卡占得海蘭察明亮令䇿應各兵即於賊卡前拿立木柵一層未刻海蘭察明亮等帶兵撲入賊營痛加剿殺拋射火箭火彈燒燬帳房板屋其蘇四十三所住巢穴係板屋內挖地窟數層外用板片遮蔽所有賊營內衣服什物以及堆貯火藥糧食尚多因官兵拋入火彈時引起賊人火藥盡行燒燬奪獲賊人刀矛鳥鎗無算賊匪退回華林寺死守周圍預築土墻迤南有溝一道寺之西旁尚餘零星帳房及賊人板柵土房一處敗殘衆賊尚復拚死支持其時天已傍晚海蘭察明亮又令官兵即逼近華林寺拿立木柵一層賊匪於木柵將次拿成時奮力來撲日落後又衝突一次俱為我兵鎗箭打回被殺亦多臣等飭令各官兵遇有賊匪頭人俱須擒獻不可殺傷無如賊人狠戾性成雖負傷甚重茍有殘喘俱儘力抗拒不肯束手就縛有中箭五六枝尚持石奮擊者于官兵焚燬賊營時猶復捨死前來搶奪糧食雨水實屬􅘀狡強悍是以官兵對敵時勢不得不即行殺死恐稍遲即為賊人搶去本日殺死之賊除被賊搶去尸身未經割獲首級外共割得賊首一百二十餘顆陸續送至臣阿桂處呈驗因令前此被擒現尚監禁候質之新教馬三十九及馬六十七等逐一詳細辨認據認出蘇四十三韓一提把拉周阿渾張懷德馬黑提卜首級五顆臣阿桂細驗蘇四十三首級雖連鬢短鬍面白色與馬復才所供相符尚恐難以憑信因𣲖軍機司員會同按察使福寧陜西鹽法道永慶携帶蘇四十三等首級五顆飛馳進城提出蘇四十三等家屬令其一併識認此內蘇四十三首級不特蘇四十三妻妾認明哭泣即其十餘歲幼女亦撫摩泣涕其為蘇四十三首級確鑿無疑是晚又投出老教杜山别等四人臣等詳加訊問據供十五日官兵過溝攻卡韓一提巴拉帶人守卡被官兵將韓一提巴拉殺死卡內有帶傷賊人逃回營盤告知蘇四十三見衆人害怕不敢上前親身拿帶刀矛同馬得明海朝宗張懷德張漢催衆迎敵向前攻撲彼時官兵鎗箭甚多蘇四十三等俱被打死賊營中被官兵殺死併帶傷的有三百多人現在退回華林寺居住者尚有韓黑提卜馬作南兩個頭人並能打仗者大小二百多人因韓黑提卜等二人不是大頭人衆人也不甚聽他們的話但各人怕死不肯出來等語查此次過溝奪卡奮勇官兵屯練降番俱屬出力而降番尤為鼓舞先登陳亡三等侍衛吉爾坦保拜唐阿塔克達那受傷官六員乾清門侍衛那木扎參將阿什達祥保遊擊皂王保都司汪啓千總郭明宗兵丁內陳亡受傷者尚屬無多俟詳查明確另行造報現在賊人止有華林寺及寺旁板棚土屋帳房一處前挖溝濠一道死守地更逼窄無難奮勇撲進但困獸猶閗而我兵仰攻賊人於華林寺上放鎗抵禦恐不免損傷此時首逆及緊要頭目俱已殺死所存不過敗殘賊黨更不值傷我官兵現令官兵四面緊圍架炮轟打華林寺俟賊人困殆即乘勢撲進將餘黨勦戮淨盡同日阿桂李侍堯又奏言此次官兵殺死賊匪阿渾五人內周阿渾係河州新教回民該州于逆回啓釁時即拿獲監禁後聞蘇四十三等往攻河州因周阿渾係待訊人犯難以即行正法又恐被賊人搶去隨將伊腿䥷斷嗣經賊匪攻破河州奪去此次被官兵直入板棚內殺死馬得明亦係河州新教在洪濟橋唐家川等處掌教蘇四十三過洪濟橋時該犯帶同附逆回民從至蘭州至張阿渾二人一名張懷德隴西回民係馬明心表姪一名張漢安定回民係馬明心表侄壻從至蘭州為王廷贊放出豫賊者又海朝宗係蘭州城外海家灘新教回民四月中旬伍彌泰仁和馬彪公同商酌欲遣人至賊營明切曉諭解散黨羽擒獻首犯馬彪隨令海朝宗前往被賊留住未回查周阿渾等四犯甘心從逆罪不容誅律應緣坐至海朝宗雖係馬彪遣往被留但聞該犯在賊營即稱阿渾與蘇四十三等同坐議事且為賊人打仗受傷不法已極其家屬應一併緣坐臣等現在將各該犯家屬查拿到案照例治罪至蘇四十三韓一提巴拉罪惡滔天神人共憤律應寸磔今於對敵時殺死實不足蔽辜所有該二犯家屬應即於省城盡行正法以快人心至馬彪遣海朝宗前往賊營臣阿桂等到蘭州數日後該提督即向臣告知臣思其言是否確實欲俟拿獲海朝宗訊問明白再行具奏今海朝宗既被官兵殺死無可究問臣即詢之伍彌泰仁和僉稱實係公同商酌並非馬彪私自遣去但馬彪既未專摺奏聞伍彌泰彼時正在總辦亦未具奏均有不合謹據實奏明再節次脫回老教雖查係三月二十九日護送勒爾謹到蘭遇賊打仗被其裹去但伊等裹入賊營已經數月不即脫回顯有從逆情節臣等以其父兄子弟現在隨同打仗未便即將伊等正法其自上月十九以後脫回者明知賊勢窮迫始行投出希圖寬免實屬法無可赦臣等俟勦賊完竣後再行辦理均奏入上諭內閣曰此次圍勦賊巢馘斬首逆海蘭察明亮屢次率衆爭先攻奪賊卡殱戮甚多實屬首先奮勇出力並哈當阿著交部從優議敘其餘在事出力之大小各員辨著阿桂等查明分别咨部議敘其陳亡之三等侍衛吉爾坦保著交部照例給與恤典拜唐阿塔克達那並著加恩照藍翎侍衛例議恤此外受傷各員辨及陳亡被傷之官兵等均著阿桂等查明照例給與優恤至此次川省降番尤為鼓勇先登內受傷者著阿桂先加賞賚其餘一槩再行賞給一月錢糧以示奬勵其首逆蘇四十三首級並著傳示各省俾回民等共知警戒再阿桂等奏此次官兵殺死逆黨阿渾五人內查出海朝宗一犯係四月中旬伍彌泰仁和馬彪遣赴賊營曉示被賊留住即稱阿渾與首逆同坐議事等語伍彌泰等身任將軍提督俱有奏事之責既經遣人赴賊營曉諭又復被留未回何以並未陳奏直待阿桂等查出甚屬錯謬伍彌泰仁和馬彪俱著交部嚴加議處同日上命軍機大臣傳諭阿桂李侍堯曰本日巳刻遞到阿桂等八百里奏報之摺知本月十五日官兵直撲賊營痛殱賊衆所有首逆蘇四十三等俱經被殺割得賊人首級一百二十餘顆等語已明降諭旨分别議敘議恤矣此時餘黨無多且要犯首犯皆殱斃所餘不過敗殘賊衆何以尚然如此死守實不可解但此時自不值復煩我官兵用力攻勦袛須圍守嚴密或待其飢渴自斃便可乘機擒捕惟在掃除淨盡不致漏網為要至蘇四十三雖已不能生擒檻送盡法處治以快人心但其黨惡要犯中尚有韓黑提卜馬作南二犯均係頭人如能設法生擒解京審辦亦可跟訊賊人起事的確實情盡法處治至蘇四十三首級當照康熙年間辦理噶爾丹之例傳示各省回民居住地方每處懸示數日使之共知警戒再此時勦捕餘賊自屬易辦之事所有由京𣲖往之海蘭察額森特及侍衛官員等著阿桂酌量如將來辦理餘黨尚需伊等帶兵則仍行暫留倘已無需多員或就其中酌令陸續先行回京並傳諭伊等到京後準其在家休息俟八月初再赴熱河以示優恤同日上又諭內閣曰此次勦滅撒拉爾賊匪海蘭察甚為奮勉著加恩將伊子安祿授為三等侍衛以示鼓勵欽定蘭州紀略卷十一
