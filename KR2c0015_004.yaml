body:
  text: 庚申伍彌泰馬彪奏言臣等於四月初九日到蘭遵即傳㫖將花翎荷包賞給王廷贊并面詢伊出城賫摺之人據稱係寧夏府中衛縣考職正八品吏貟姚起彪設法更換衣服粧作民人縋城而下將摺遞送驛站臣等亦已遵㫖重加賞賜奏入上諭內閣曰姚起彪以微末吏貟如此奮勉出力甚屬可嘉著交吏部行文調取來京引見候朕再降諭㫖同日畢沅奏言臣查新疆並西寧一帶至京文報最關緊要臣前在甘省稔知該處邊塘向日程途其新疆一路文報自肅州進嘉峪關即由涼州迤東之大河驛北趨草地從寧夏至陝省之延榆一帶入山西境至西寧一路則由該府至莊浪平畨北趨草地歸入邊塘是二處文報雖經由蘭州以北沿邊地方而地隔重山去省城尚在一百數十里外且有黃河間隔並不與軍行驛路同途所有新疆西寧二處文報似可無虞阻滯同日畢沅又奏言發往甘肅之健鋭火器營兵丁其未經起行之二千名昨已奉㫖停其發往其尚未起行之健鋭營第四起官兵五百名一併停止至臣從前擬照金川出兵之例沿途改用長騾查此項騾頭向係各屬行户承攬臨時按日給價不用即可聽其自便不至虛糜至于乘坐馬匹臣已將西安滿營及提鎮各標營內挑選二千匹解甘交近省各州縣加意餵養現在京兵一千五百名到時儘足敷用其山西撥用之馬二千匹現已飛咨停止至火藥鉛丸弓箭等項除各兵自行攜帶外滿漢各營皆須應用不妨寬為預備臣現仍委貟陸續運送甘省均奏入報聞壬戌伍彌泰奏言竊臣接奉諭㫖令臣將甘省一切調度及應辦軍需糧餉各事宜悉心經理臣伏查官兵軍需糧餉各事宜督臣勒爾謹已𣲖蘭州道圗薩布候補道永慶總理糧餉事務今該道等按日支放辦理妥協並無貽誤現在圗薩布等駐劄城外隨臣辦理一切事務臣統計滿漢官兵到蘭共有萬餘名現貯糧草可供兩月之需仍催各州縣陸續趕運斷無虞稍有缺乏并查城外關廂實在情形北邊黃河浮橋被賊燒燬西南寺廟燒燬數處民間房屋亦間有燒燬經督臣率同司道加意撫恤且大兵雲集布列城外賊已無能為再督臣勒爾謹因在狄道聞逆匪有赴省之信隨一面率臬司福嵩帶兵來省應援一面飛飭將備仍撥官兵在河州狄道一帶緊要隘口嚴加堵截賊匪知巢穴已破無路可歸是以現據省城西南華林山頂藉陡險深崖為死守之計除城上石炮打傷并節次𠞰殺外所有賊數不過千餘臣等各路到蘭官兵共一萬有奇調撥守城兵三千名放卡兵二千名其打仗兵丁尚有五千餘名臣與督提諸臣和衷商確現擬分兵四面夾攻務使𠞰滅盡淨以絶根株再查各路應調官兵惟續調之延綏興漢官兵尚未到齊其餘各鎮營官兵俱已全數到蘭奏入上命軍機大臣傳諭和珅勒爾謹伍彌泰曰本日據伍彌泰奏軍需糧餉官兵事宜一摺似勒爾謹代伊為此奏且所稱勒爾謹派委道貟等在城外駐札隨同辦事伊自必安住省城署中此案本係勒爾謹養癰貽害咎已難辭現在惟當親駐城外督率調度使賊匪早行殄滅乃將軍提督等俱在城外統兵圍𠞰而勒爾謹安坐署中伊即不知悚懼獨不知惶愧乎况伊到蘭州時如果於賊衆圍城之際奮身入城同王廷贊固守尚可稍贖愆尤今賊已先擊退上山而勒爾謹尚藉守城為名安然不動有是理乎此事著傳諭和珅即行查明據實覆奏至朕盼望𠞰賊之信甚切該處各路官兵既已調集自應即速進勦一鼓成擒况賊止千餘而官兵已逾一萬是以十人而擒一賊更欲何待何以尚未見勒爾謹𠞰賊之報豈伊意欲待和珅到後方始進兵耶萬一賊匪乘隙於黑夜中四行竄逸則惟勒爾謹等是問恐伊不能當其罪也癸亥伍彌泰奏言臣查賊匪肆逆以來河州至省城一帶文報未免稽遲其西寧文報由平畨逹省城北黃河橋雖被賊燒斷然有船可渡河西一帶仍屬聲氣聯絡各州縣運糧往來亦無阻礙自河州收復之後循化河州狄道一帶直連省城行旅往來如舊文報更無間阻臺站已毋庸另行安設至逆回近占華林山所有要緊隘口及偏僻小路臣等俱已撥兵把守再蘭州省城居民經督臣勒爾謹及臣愷切曉諭設法撫恤現在民情俱屬寧謐蘭州藩庫現存銀二百六十餘萬又各省解甘沿途截留銀一百餘萬儘敷軍務應用沿途驛站馬匹亦已令各州縣通融協濟一切事宜臣等公同妥協商辦斷不至稍有貽誤奏入上命軍機大臣傳諭和珅勒爾謹伍彌泰仁和曰本日據伍彌泰覆奏新疆文報各摺於現在𠞰賊事宜並無一語提及此必勒爾謹幕友書吏為之代辦奏稿而勒爾謹則並未出名賫奏殊不可解此時官兵已逾一萬賊匪僅止千餘何難一舉殱淨况自初八日進𠞰逆賊距十三日發摺時又隔五日未知伊等此五日間在彼坐待何事况兵貴神速豈宜如此觀望不前竟欲待和珅到後再行商辦乎看來伍彌泰止知帶兵前往蘭州其實毫無主見不免意存怯懦至仁和前此帶兵渡河打仗似屬勇往而近日則氣漸不振必以勒爾謹既到蘭州即隨同弛懈不復上緊出力而勒爾謹則竟安坐署中一籌莫展徒勞朕於數千里外晨夕懸盼試問伊等於心安乎勒爾謹伍彌泰仁和俱著傳㫖嚴行申飭再賊衆千餘人占守山梁為日已久從何得有口食豈賊人能裹帶如許乾糧抑山寺本有存積糧石供其坐食且賊人馬匹在山又焉得如許草料餧養此皆勒爾謹所當詳悉奏明者而竟無一字提及著和珅於到蘭時將勒爾謹等所為何事因何不及𠞰賊緣由一面據實查奏一面再行傳㫖申飭至仁和等摺內稱土司魯璠前經腿帶鎗傷等語該土司非內地緑營貟辨可比乃竟能帶兵助勦實屬可嘉前此已有㫖加一等賞給職銜今知伊并受有鎗傷尤當逾格奬勵用兵之道全在賞罰嚴明此事勒爾謹亦早應具奏請㫖加恩何至今始於仁和摺內帶叙及之耶至各處山隘小路防守堵截所派兵數某處若干某處係某總兵某處係某副將參將帶領從前或以事起倉卒不及詳奏今自初八日至十三日伊等更有何事此等要務皆不奏乎看來伊等互相觀望恐賊匪乘間逸出而伊等所謂把守之處亦不可信朕甚憂之著和珅詳悉查明迅速覆奏甲子上命軍機大臣傳諭阿桂和珅曰昨閲伍彌泰仁和等奏到各摺是勒爾謹之安坐衙署一籌莫展已可概見且並未見伊馳奏𠞰賊情形竟若置身局外恐該處無督辦大臣指示調度衆人互相觀望無可倚恃關係非小阿桂仍須到彼料理於𠞰捕事宜方為有濟著傳諭阿桂即行兼程前進毋稍稽緩並諭和珅知之同日上命軍機大臣傳諭和珅勒爾謹曰土司魯璠已據兵部查明係三品指揮使職銜前此因其帶兵打仗出力降㫖加一等給銜自應豫以二等頂帶但伊既受鎗傷不可不格外奬賞著傳諭和珅勒爾謹查明係何等鎗傷即行照例賞給得傷等次銀兩并加賞大緞二匹以示優奬臣等謹按行軍制勝全在賞罰嚴明俾知所懲勸至土司等更非緑營辨貟可比尤宜加意撫綏使之感激奮勉乃勒爾謹於魯璠受傷一節竟未具奏我皇上覽及仁和摺內帶叙之處即敕兵部查明該土司品級特沛恩綸加賞其後土司韓煜受有石傷經臣和珅具奏亦並䝉特㫖優賚仰見聖人有功必叙所以旌勞績而勵戎行者有加無已宜該處土司等悉勵兵奮勇共期速殱黨渠也同日上又命軍機大臣傳諭阿桂和珅曰連日因勒爾謹並未奏報𠞰賊情形已屢經傳㫖申飭至賊匪千餘人占踞山梁亦已半月有餘勒爾謹等袖手不動所辦何事即云山陡崖深亦斷無過於兩金川者兩金川如此險隘尚可進兵蕩平此皆阿桂海蘭察等所身歷而謂逆匪現占山梁竟至官兵不能進𠞰有是理乎勒爾謹如此遷延觀望將來即當明治其罪丁卯文綬奏言臣伏思逆匪么䯢小醜自必立就殲除但官兵會集蘭州合力𠞰捕逆回潰敗之後勢必四散奔逸若由鞏秦一帶潜逃恐甘省官兵一時未遑兼顧且川省滿漢官兵一千五百名約計此時已入甘境自應酌留堵禦以防逃竄臣悉心籌核將軍臣特成額有本省邊防要務應即遵㫖先行回川提臣明亮酌留官兵暫駐甘肅之白馬關一帶探聼𠞰捕情形相機堵截倘甘肅尚需兵力即就近前往亦較迅捷至川省邊界接壤處所如松潘龍安柴門關黃勝關等處俱有小路可通甘境現在情形更關緊要必須大貟督率查辦方為得力松潘等處雖係總兵劉俸所轄但該鎮駐劄新疆未便調往川北鎮總兵成德帶兵熟諳隨委該鎮酌帶辨兵前赴龍安等處督同參將馬應詔遊擊何澄嚴密巡防是鞏昌一帶既有川省官兵截其去路而龍安松潘小徑可通之處復經分守要隘如有逆回竄逸即可儘數擒𠞰自不致稍有漏網同日特成額明亮奏言臣等帶領川兵於十五日行抵甘省白馬關接准陜甘督臣勒爾謹咨㑹所帶川兵業經具奏停止毋庸前往臣等查白馬關距蘭州一千三百餘里由此輕騎馳赴不過四五日即可到彼計到時亦尚在𠞰捕之際除將滿漢官兵即停其前進飭交副將魁麟遊擊沙津岱等帶歸本營外臣特成額臣明亮仍各帶跟役數人由間道馳抵蘭州無論何營辨兵即可率領𠞰捕稍效臂指奏入均報聞己巳和珅奏言臣於十七日午刻馳抵蘭州接見伍彌泰勒爾謹詢以近日情形知逆匪不過千餘人負固抗拒我兵雖打仗數次總未能大加殲戮臣和珅即於是日至蘭州北門外用船渡過黃河登白塔山察看賊人盤踞華林山梁雖有支搭帳房俱係虛設賊匪在八蠟廟雷壇及水磨溝一帶挖窑潜處外臨立坎內挖深濠凡有小路可通之處俱行掘斷以圗死守臣留副都統圗桑阿城守尉額爾恆額率兵守城隨分兵四路令海蘭察同圗欽保泰斐英阿阿爾都帶兵三千五百名由過溝從山梁一路進𠞰令額森特同興漢總兵三德侍衛福寧帶兵一千一百名由丫口一路斜撲賊營進𠞰令仁和西安副都統薩炳阿帶兵一千名由沿河向西直撲八蠟廟大樓一路進𠞰臣和珅同伍彌泰勒爾謹馬彪帶兵二千七百名由龍尾山梁一路為各路策應十九日卯刻臣和珅等前至龍尾山梁即有賊匪數百從山梁斜坡撲上緑營兵見而慌遽施放鳥鎗惟寧夏西安駐防滿兵俱齊立不動其時海蘭察所帶之舊教土兵已將賊匪趕至山梁臣等即率辨兵奮勇𠞰殺自辰至午始將賊匪殺敗我兵乘勢追趕將賊人壓下山溝臣海蘭察即帶土兵將溝內賊匪殺盡其餘賊人俱遁回巢穴藏匿臣等率兵追趕相隔有立坎一道深至數丈小道皆先被賊人挖斷不能飛度因暫行整隊緩緩撤回此次打仗殺賊二百餘名奪取器械馬匹無算但賊匪自知罪惡淹天無可逃命立誓死守是以人自為戰勇悍異常雖係釜底遊魂而困獸猶鬭實難一鼓勦滅且賊匪俱係深藏溝洞及挖窑居住我兵施放鎗炮俱為山梁溝坎所攩而賊人轉得於孔隙處所暗放鳥鎗傷我官兵容俟相度形勢另行籌書𠞰捕機宜務將賊首拏獲至本日打仗漢土官兵亦間有傷亡者容俟查明續行具奏同日和珅又奏言臣昨接阿桂來札現在勉力䟎行十三日抵西安省城十五日出陜西長武縣境二十一日可抵蘭州俟阿桂到蘭後自當公同悉心商酌相機籌辦搜捕事宜但就目前𠞰賊情形而論雖各路所調官兵俱已雲集而緑營貟辨兵丁俱未能得力請派侍衛護軍等三十貟名馳驛來甘帶兵勦捕庶賊首黨惡可以速行殲獲毋致稍稽時日又臣前奉諭㫖令查明賊匪新舊教情形臣抵甘後詳加詢問知逆匪實係新教回人因在撒拉爾畨地居住是以多有俗稱畨回者至日前藩司王廷贊摺內所稱正法之馬明心即係蘇四十三之師倡立新教凡新教之人皆係賊黨若舊教回人則此處俱稱為老教現隨打仗甚為出力臣已面加鼓勵分别奬賞再本日打仗之老教土司韓煜甚屬奮勉腰間受有石傷伊係四品頂帶可否照土司魯璠賞戴花翎之例一體加恩鼓勵出自聖恩均奏入上命軍機大臣傳諭阿桂和珅勒爾謹曰本日閲和珅等所奏抵蘭後𠞰賊情形一摺是此半月有餘勒爾謹等之遷延觀望果不出朕之所料也事本勒爾謹辦理新舊教不善所致又平日不能實力訓練緑營兵丁以致臨事懦怯不能得用且勒爾謹安坐省署以致伍彌泰等皆逡巡推委俾賊匪得延殘喘未能即時擒滅其罪甚大况緑營兵既見賊即慌勢難望其得力勒爾謹等若早行奏明則派往之滿兵此時亦可早抵蘭州奮同攻𠞰蕆事豈不更速乃又以賊匪不難殲滅飾詞具奏並請停止京兵朕亦誤聽總之此事自始至今錯中有錯實益憤悶今和珅等既經打仗一次因賊人竄入窟穴死守此時惟有迅速籌辦以期𠞰滅淨盡至詳閲圗內所稱已安兵把守各處路口聲叙總未詳細即如洪濟橋係賊人扎筏偷渡之處最為要地又由亂古堆坪至沙井驛係另有一路恐賊匪從此分竄圗內亦未聲明是否派兵安駐又如賊營對面一帶現係何人帶兵圍住均著阿桂和珅等照發去詢問貼簽處所詳細簽明覆奏至和珅另摺奏請派侍衛護軍等三十貟名已經傳㫖令其即日起程並令乾清門侍衛彰靄那木札一同馳往並諭令沿途督撫迅速應付馬匹俾得遄行但到彼究需時日阿桂和珅仍當迅速督辦不可待伊等到彼再行進勦也又和珅奏稱老教土司韓煜甚屬奮勉并受有石傷請照土司魯璠之例酌量加恩該土司如此奮勇協力甚屬可嘉伊係四品職銜著加恩賞給三品頂帶并賞載花翎加賞大緞二匹以示鼓勵至韓煜既係舊教回人何以又有土司之名究係何時設立給與頂帶號紙並著詳查覆奏同日上又命軍機大臣傳諭阿桂和珅曰和珅奏稱接阿桂札知伊於二十一日可抵蘭州現在𠞰滅賊匪正須督辦阿桂此時到彼與和珅一同和衷籌辦甚為妥善俟勦捕事宜稍有就緒和坤年力壯盛即可先行速回面陳一切阿桂尚須經理善後事宜自當緩程回京至現在督辦一切阿桂和珅尤須同心協力迅速籌辦不可少分畛域方於公事實有禆益朕于數千里外因此事深為厪念日夜不寧伊二人應亦深體朕懷也同日上命軍機大臣傳諭勒爾謹袁守侗雅德畢沅曰和珅等奏請派侍衛護軍等三十貟名馳往帶兵𠞰捕等語現已諭令該侍衛等迅速馳赴并添派乾清門侍衛彰靄那木札一同馳往均于今日起程晝夜星馳著傳諭沿途各督撫此不過三十餘人即將馬匹等項妥協預備俾伊等到站即得迅速遄進毋得稍有遲誤庚午勒爾謹奏言竊臣欽奉諭㫖令查辦蘭州城外關廂被賊焚燒及河州被賊占擾應行撫恤事宜仰見聖主軫念災黎恫瘝在抱之至意伏查蘭州東關百姓防護極嚴房屋鋪面並未被賊燒燬西南二關俱被焚燒數段關廂門扇亦被焚燬居民有逃竄者亦有在屋藏匿者逆賊前曽於城外關內潜來窺探搜虜財物適臣於三月二十九日自狄道帶兵旋蘭與提督仁和按察使福嵩駐札城外詳悉籌酌即於三十日派兵將關廂保護堵守逆賊無從得入民心漸安惟是逆酋未獲城門未開百姓日需河水臣現在派撥官兵把守東門按時啓閉聽民取水復飭令臯蘭縣開倉減價平糶以濟民食其無力貧民臣等即行捐給以資糊口河州被擾居民現已陸續歸業已諄飭署知州謝桓仿照省城辦法加意撫慰毋致失所至應如何加恩優恤之處查尚書和珅現已到蘭大學士公阿桂亦不日可到容臣隨同詳悉確查妥議具奏同日勒爾謹又奏言副將新柱等被害情形臣前因未及查明是以未經陳奏兹據署西寧鎮總兵貢楚克達爾署河州知州謝桓稟報查得三月十七日副將新柱奉委彈壓新舊二教帶領辨兵一百二十三貟名備帶矛刀鳥鎗鉛藥等項由河州起程知府楊士璣亦隨後進發十八日申刻新柱行抵白莊子蘇四十三率領逆回千餘人屯聚莊外新柱諭令兵丁放鎗蘇四十三率衆擁入將新柱殺害辨兵俱被殺傷蘇四十三等隨趕至起臺堡打破堡城楊士璣罵賊被賊殺害護送楊士璣之土司韓成璘亦被賊捆綁殺死又查三月二十一日晚蘇四十三等將河州攻破署河州協中軍都司事守備李奇千總朱廷奇外委李九章徐烈俱已被害署守備袁尚仁𠞰賊陳亡署河州知州周植自縊身死等情稟報前來除新柱原帶辨兵有無逃回及河州守城兵丁傷亡確數並文武衙署倉庫錢糧現飭確查至日另行分晰陳奏外所有蘭州府知府印務因涇州知州陸瑋前在省城隨同王廷贊等設法守城晝夜防護即委該貟署理河州知州印務因候補通判謝桓前委在循化擒𠞰多賊辦理奮勇又派赴河州安集百姓是以就近委署再河州協副將印務因歸德遊擊白守忠奉委在循化擒𠞰逆賊甚為出力暫委該貟護理又蘭州府知府印信河州知州印信已據楊士璣周植家人呈繳前來現已飭發委署之貟鈐用其河州協副將印信現在跟尋均奏入上命軍機大臣傳諭阿桂和珅曰勒爾謹此奏恐有不實前以伍彌泰奏勒爾謹專派蘭州道圗薩布候補道永慶駐札城外隨同辦事則伊自必安坐城內衙署當此緊要之際竟爾安然坐視實屬全無人心今勒爾謹又自稱駐札城外此必伊近日自知罪重且聞伍彌泰已經奏及因復移居城外為此飾奏阿桂等務須詳查據實覆奏不可稍有隱諱至伊摺內所稱現在派撥官兵把守城門按時啓閉聽民取水等語尤屬不成事體賊匪自擊退上山之後必不敢復進省城滋擾况現有官兵萬餘屯駐城外若尚慮賊人來犯則又安用此官兵為乎且城門未開徒令逺近居民因此疑懼所為示寇弱而怯兵志錯謬莫此為甚所有勒爾謹奏到各摺俱著發交阿桂等閲看詳悉查辦另行陳奏同日上諭內閣曰甘肅逆匪蘇四十三等肆擾不法一案係因爭立新教舊教不從致被殺害起釁若地方官早為嚴明料理斷不致釀成事端乃勒爾謹經理不善以致養癰貽患從未奏明此事其罪已無可辭及事發之後即當迅速妥辦以贖前愆乃朕已簡派八旗徑旅啓程前往並就近酌調阿拉山兵協𠞰而勒爾謹轉一味含糊且以半月之內即可殲滅飾詞具奏致京兵等均各撤回今賊匪竄匿蘭州城外山梁幾及月餘雖節次勦捕賊匪窮蹙待斃已如釡底游魂而現在尚未淨盡殲戮致稽時日且調往將軍提鎮等在城外督兵𠞰賊而勒爾謹竟安居城內衙署僅委道貟駐札城外視為與已無涉以致衆相觀望坐失事機殊不可解朕初意本以逆匪滋事時轉不便輕易地方大吏今勒爾謹如此辦理錯謬其罪甚大難以姑容著阿桂和珅傳㫖將勒爾謹革職拏交刑部治罪并派妥幹章京押解送部目今即擒𠞰賊匪淨盡而善後之事正資料理因思李侍堯雖以簠簋不飭獲罪而其材實能理繁治劇陜甘總督員缺著李侍堯以三品頂帶馳驛前往管理李侍堯未到之先著阿桂暫行兼管此朕用人苦衷中外宜共諒之臣等謹案逆匪滋擾不法實地方大吏平時疏玩所致當起事之初皇上鴻慈曲宥猶不欲遽易大吏乃勒爾謹罔知愧懼不思督率官兵力圗報效以贖前愆甚且停止京兵一籌莫展昏䝉謬戾措置乖方罪難枚舉以至上干天譴特降明綸宣諭中外拏問治罪仰見聖主於臣工罪案權衡不爽書曰自作孽不可活罪由自取其洵然歟同日上命軍機大臣傳諭阿桂曰現已明降諭㫖將勒爾謹革職拏交刑部治罪著阿桂派委妥幹章京管解來京至陜甘總督貟缺已命李侍堯以三品頂帶馳驛前往管理其未到之先阿桂暫行兼管至現在賊回雖已屢加殲戮窮蹙待斃但必迅速殲滅净盡不可再稽時日因思阿桂於督兵𠞰捕之事經厯已多即海蘭察額森特等皆曽在其手下呼應較靈是以從前原令和珅與阿桂相見三日後將欽差大臣關防交阿桂接受辦事并令和珅即行回京嗣因阿桂身有瘡疾行程不能迅速是以令和珅先行馳往今阿桂亦已行抵蘭州所有一切應辦事務俱著交阿桂督辦阿桂奉到此㫖即傳諭和珅令其遵㫖回京毋稍稽扈蹕前往熱河也欽定蘭州紀略卷四
