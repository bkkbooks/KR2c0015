body:
  text: 壬午阿桂李侍堯畢沅奏言伏思陜甘二省乃三秦重地東連豫晉西達新疆北控邊城南通楚蜀兼以崇山峻嶺重復回繞四面則番族環居內地則民回錯處習俗剛徑為自古用武之地仰蒙聖明燭照睿慮周詳以陜甘二省近年以來各營官兵裁撥太多地廣兵單節次特降諭旨令臣等酌量添設誠慎重邊陲為永逺敉寧之至計也惟是添兵之大要有二一則督提鎮標各有兵數千屹然巨鎮勤加訓練平時既可資彈壓臨時又足以供調遣一則緊要營堡各有兵數百分防駐守時加稽察則聲勢既可聨絡姦宄不至潛藏查甘肅督提四鎮除提標及寧夏鎮標毋庸議添外其督標五營地居省會控制宜嚴現存實兵一千五百三十八名今請設兵三千名應添兵一千四百六十二名肅州控扼嘉峪內外為新疆門户地居衝要現存實兵一千八百三名今請設兵二千四百名應添兵五百九十七名西寧鎮標現存實兵二千二百九十五名今請設兵二千五百名應添兵二百五名涼州鎮標現存實兵二千一百四十五名今請設兵二千三百名應添兵一百五十五名河州以協改鎮現存實兵九百十名今請設兵二千名應添兵一千九十名陜西撫標現存實兵七百五十名今請設兵一千名應添兵二百五十名提督從前本駐固原為甘省東路襟喉且其地去西安蘭州均不過六百餘里呼應既兩省可通而西控鞏秦北連延慶均有指臂相聯之勢自乾隆二十九年移駐西安固原改設總兵兩處額兵隨亦裁減現存實兵一千三百五名今提督仍駐固原改設提標五營請設兵三千名應添兵一千六百九十五名至西安提鎮現存實兵一千七百四十五名提督業已移駐固原雖有將軍副都統大員不能兼轄六營若歸入撫標統轄究係文臣不能専心訓練且提標所屬潼關富平宜君等營俱在西安東南如仍令固原提督管轄亦恐鞭長莫及請設兵二千一百名應添兵三百五十五名分中左右三營另設西安鎮總兵一員専司撡演兼轄附近營汛其兩營官辨即隨提督移駐固原至陜西延綏興漢二鎮其延榆一帶外接土默特鄂爾多斯阿拉山諸部落久為臣僕中外一家無須重兵防範惟興漢一鎮與四川湖廣毗連山谷險阻林木深邃周圍三四千里最易納匪藏姦關係緊要舊存實兵一千四百七名今請設兵二千名應添兵五百九十三名至緊要營堡如河州鎮屬之循化起台保安臨洮西寧鎮屬之歸德南川北川巴燕戎格巴暖碾伯肅州鎮屬之嘉峪關紅崖堡梨園洪水南古城馬營墩涼州鎮屬之莊浪岔山口安逺張義堡寧夏鎮屬之花馬池同心城靈州橫城西安鎮屬之潼關神道嶺慶陽紅德長武邠州西安城守興漢鎮屬之白土漁渡紫陽七里關舊縣關陽平關寧羌略陽漢鳳漢中城守興安城守固原提屬之靖逺下馬關蘆塘西安州永安堡八營堡洮岷鞏昌秦州平涼階州文縣西固岷州舊洮蘭州城守紅城苦水各等處現有兵額均不敷防守應請添兵自數百名至數十名不等庶可以守要隘而偹捍衛至安定為鞏昌分泛相距不及二百里駐兵百名把總一員足資防守臣等通盤核算甘省添兵六千五百八十二名陕省添兵六千三百五十八名統計二省衝繁扼要營泛共請添兵一萬二千九百四十名除勒爾謹於上年奏準酌復公糧兵二千名外現在實添兵一萬九百四十名臣等又查向例添兵必須添設將備等員辨於所添兵額內又多占養廉名糧於事無益今以提督移駐固原所有請設西安鎮止須安設中左右三營將前後二營遊擊守備以及千總外委等一併裁移固原以復五營舊制至河州設鎮應添左營中軍遊擊一員即以陜西紅德城遊擊裁移守備一員即以永安守備裁移至循化廳控制番回尤關緊要本設兵八百名舊設遊擊一員尚不足以資彈壓應以鎮海參將移駐而以循化遊擊改駐鎮海之丹噶又循化應添守備一員即於哈拉庫圖爾營裁移紅城堡應設守備即以永固協屬之黑城都司裁改其餘各該處應添千總外委等亦均於各營內籌酌裁改總期添兵萬餘而將備毋庸多設以歸實用再前奉諭旨兵丁有馬步守三項之分各省大約以馬三步七為率今既酌為添設不如竟將馬兵酌添六七千名等因欽此伏查陜甘兩省各營制有馬步各半者馬六步四者馬三步守各半者有馬三步三守四者俱屬參差不齊大約提鎮各標地居都會及各府平原曠野馬兵自較步守為優而操演亦易得力至僻逺險要營分跬步皆山路徑叢雜無所用騎又應多設步守臣等按各該營舊制於新添兵一萬二千九百四十名內共請添馬兵五千五百八十一名步兵四千二百四十四名守兵二千九百五名外添公費馬步守兵共二百十名至金城關離省城不過二里逼臨黃河與省城聲息相通似可毋庸添兵且該處地方逼窄祇可安設泛兵防守巡緝不能駐扎將領大員是以未列添兵單內奏入上敕軍機大臣會同該部議奏旋經尚書額駙公福隆安等議言查向來西安將軍原設滿洲兵七千名節經移駐裁減止存三千七百餘名所有西安提標現存之兵應請添足二千一百名照成都將軍兼轄漢兵之例設立軍標中左右三營即令該將軍一體管轄與滿洲兵就近訓練以成徑旅其另設西安總兵之處應無庸議至河州西安肅州涼州寧夏西安興漢固原等處各提鎮所屬營堡如循化起台等處或關隘層疊或汛廣差繁在在俱關緊要應如所議河州鎮屬之循化營請設兵八百名應添兵三百三十名保安營請設兵五百名應添兵三百三十八名起台堡請設兵二百五十名應添兵一百五十三名臨洮營請設兵三百名應添兵一百六十五名大通協請設兵六百名應添兵一百三名永安營請設兵五百名應添兵一百十七名鎮海堡請設兵二百名應添兵五十三名歸德營請設兵七百名應添