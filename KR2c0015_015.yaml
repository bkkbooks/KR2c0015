兵三萬四千五百九十二名除節次裁撥移駐扣留公糧並公費養亷屯防兵一萬三千一百七十四名外實存兵三萬一千四百一十八名通計陜甘二省共存兵五萬五千九百二十二名較原額少兵三萬五千二百七十一名內歷年裁撥移駐新疆眷兵九千七百六十名各官養廉公費九千七百七十五名及屯防兵七千八百五十四名扣存公糧七千九百三十名至公糧因何扣存不補之處查係乾隆二十一年前督臣黃廷桂任內因陜甘兩省辦理軍需緑旗各營公私借墊頗多欽奉諭旨免其扣抵奏準於兩省兵數內酌扣公糧十分之一共銀二十四萬六千五百餘兩通融彌補嗣於二十六年扣案清完即將此項節省銀兩歸入新疆經費項下調用支銷至畢沅前奏陜省此時兵力合計不過萬餘一節其意因固原鎮雖屬陜西提督管轄而所管各營則在甘肅地方故未列入且彼時提標及興漢延綏兩鎮俱以派調兵數千是以止剩萬餘其甘省存兵雖尚有三萬四千餘名但一提四鎮與各協營以至嘉峪關外安西河州靖逺三營東西南北相距數千里地方遼濶堡戍繁多所有額兵除派安墩汛隘口及逺近差使外其實在存營差操兵已屬寥寥且逆匪起事時省城一帶兵力單弱逺處徵調緩不濟急倉猝之際更不免左支右絀此當日實在情形也再部中所查兵數與現在逈不符合其故總因養亷公費俱占名糧一經裁移改撥牽混不清不特難於查核且恐易滋弊竇應請嗣後陜甘兩省每年造具兵册送部時將實在馬步守兵為一册其養廉公費兵另為一册如此則案牘不至混淆而支銷各有定數較為妥善如蒙俞允並請敇下該部通行各省均照此辦理入奏上敇原議大臣一併議奏旋經尚書額駙公福隆安等奏言查陜甘二省現存實兵較原額共少三萬五千二百七十一名業據大學士公阿桂等酌請添補經臣等議準具奏至兵丁賞恤銀兩現奉諭旨俱於正項支給報銷所有陜甘扣存公糧公費各欵應令該督等查明核辦又陜甘節年開報兵數應令該督撫各按省分將實在正額馬步守兵為一册其屯防移駐各兵另為一册分晰造報庶額兵定數相符不致牽混滋弊併通行各直省一體遵照辦理奏入得旨如所議行同日阿桂李侍堯又奏言竊照營伍之制其應歸各提鎮管轄者必須逺近適中始足以重操防而嚴控制陜甘二省現已遵旨增添兵額以備捍衛所有各路營協堡泛有宜斟酌變通者如西安提督仍駐固原除應設中左後五營外其原屬固原鎮之固原城守靖逺蘆塘西安州永安堡八營平涼秦州鞏昌九營應改歸固原提督統轄又西安提督原管之慶陽協紅德涇州兩營應仍歸固原提督統轄西安添鎮仍設中左右三營外其提督原管之西安城守潼關協神道嶺商州金鎖關富平西鳳宜君各營應歸西安鎮統轄又邠州長武二營原𨽻慶陽協查該營在陜西地方距西安較近應改歸西安鎮統轄河州改鎮應設左右二營外其原管之循化保安起台臨洮並撥歸固原之洮岷舊洮岷州西固階州文縣蘭州城守各營俱仍歸河州鎮統轄又紅城苦水二營向係蘭州所屬該二處在莊浪迤東七十里至一百二十里距涼州較近且在黃河迤西應改歸涼州鎮屬之莊浪營參將管轄至肅州鎮向轄金塔永固二協嗣於乾隆四十二年將肅州口外之安西協副將等十一營汛改歸肅州鎮屬所管不為不多而永固協所屬各營俱在甘肅地方向來一切文移由甘肅提督咨行肅州鎮復由肅州行文永固往返迂回每至稽遲貽誤應將永固協並所轄甘州城守大馬黑城洪水馬營墩山丹硤口梨園南古城十營堡改歸甘州提督統轄不惟文移往返不致紆繞而一切考驗巡查俱為近便於軍政大有禆益奏入上敕原議大臣一併議奏旋經尚書額駙公福隆安等議言應如所奏辦理至西安現經臣等議請設立將軍標其提督原管西安城守一營近在同城應即歸將軍管轄其潼關協神道嶺商州金鎖關富平西鳳宜君各營及慶陽協屬之邠州長武二營應仍歸固原提督統轄以符舊制而重責成奏入得旨如所議行同日阿桂李侍堯奏言陜甘二省兵丁遇有紅白賞恤事件向來於惠濟項下動支陜省原有銀六萬三千兩甘省原有銀十一萬三千餘兩俱交商營運每年所得息銀除賞給兵丁紅白事件外尚有盈餘自乾隆三十三年停止以後所有陜省惠濟銀六萬三千兩又以息作本并存剩息銀共十萬六千七百七十餘兩甘省惠濟銀十一萬三千餘兩又以息作本併存剩息銀共十五萬三千四百餘兩概行撥充兵餉等項其陜省兵丁紅白賞銀在朋合銀內支給甘省兵丁紅白賞銀在裁馬改步節省銀內支給查裁馬改步及朋合二項銀兩雖係就各營中通融節省而其賞仍歸於開銷帑項况甘省現請添兵六千五百餘名內添馬兵二千七百餘名所有裁馬改步節省銀兩自應仍撥充現添馬兵之用若既添馬兵而復摘缺停補於體制更屬未協至陜省現添兵六千三百餘名朋合一項亦恐不敷支給皆須另請動欵撥補伏思皇上添設陜甘兩省兵額原為捍衛邊陲起見不惜多費帑銀苐國家經費有常亦不可不通盤籌畫前各省撤回惠濟銀兩緣生息名色特敕停止查此項銀兩雖屬交商營運而所獲息銀俱為豫備賞恤兵丁之費國家本無取利於其間臣等公同籌酌陜甘兩省現請添兵一萬二千九百餘名併原有兵五萬五千九百二十二名其從前惠濟銀兩似當仍請復設惟查原定交商營運甘省係一分五釐起息陜省則一分五釐一分二釐不等定數未免稍重可否仰懇天恩概定一分二釐以下行息餘俱查照舊例遵辦再臣阿桂前在雲貴知該省自停止生息銀兩後所有兵丁紅白事件俱以裁減兵額節省銀數充賞查滇黔等處俱係邊陲兵力亦不宜單弱若將生息銀兩復舊即所裁兵額仍可補足於防守實為有益其他四川閩廣或係邊地或係海疆亦關緊要容俟臣阿桂回京後查明再行請旨辦理奏入上命軍機大臣傳諭阿桂李侍堯曰據阿桂等奏請酌復惠濟銀兩以禆營伍一摺固為兵丁需費起見添兵自當添賞恤然總屬無多且現在所有兵丁其賞恤本即動用正項也其果有不敷之處以致不行賞恤乎著奏聞國家賞兵之費藉商營運支給其名究屬不美况現在户部庫項充盈即陜甘二省添設兵丁所需紅白賞恤費用較多原當開銷正帑著傳諭阿桂李侍堯畢沅所有此次添兵之費及將來陜甘二省兵丁紅白賞恤事件俱著動用正項開報同日阿桂李侍堯奏言臣等遵旨確查甘省奏請添建倉厫一節查工部單內所開甘省自開捐以後共請添建倉厫二十七案臣等將各廳州縣未經開捐以前倉間糧數與詳請添建時現存糧數比較內西寧大通靜寧三州縣合監糧常平額徵各項糧石而計尚不及乾隆三十九年以前舊存糧數此外隆德淵泉安西玉門敦煌肅州高浪三岔州判禮樂西和清水徽縣成縣古浪洮州廳十五廳州縣雖查詳請建倉時糧數比從前增減不等但甘省捐監現據各該員供稱俱係以銀抵糧並不買補還倉其實貯糧數仍較舊額短少臣等伏思建倉所以貯糧今糧石既無贏餘何用添設厫座明係該員等借添建為名以為侵蝕公帑之計此等揑報劣員即係現在審明冒賑開銷之人將來歸案辦理時自當一併定擬完結但該員等種種藉端揑冒情節更重俟分發人員到甘省先行參革審辦所有西寧隆德十八廳州縣添建厫座二十三案應請敕部無論曾否建蓋概不準開銷其部中已銷者查明詳請之員及各上司分賠未銷者即行扣除如銀兩業經給發即一併追繳至撫彛廳及張掖永昌二縣所存糧石較多舊有倉厫不敷藏貯向來皆係借賃民房廟宇堆積添建尚係有因但是否實在蓋造亦難憑信臣阿桂已派軍機司員敷倫泰前往查勘另行具奏奏入上諭內閣曰甘省監糧一項既屬紙上空文乃該員等復借建倉為名恣其侵冒是又於冒賑開銷之外設法侵欺其情節較冒賑各員更重將來審明定案時必當加倍治罪以為貪婪狡詐者戒欽定蘭州紀略卷十五
