  text: 欽定四庫全書欽定蘭州紀略卷十六
  hash: sha256:11e87d0c02f6b695d2cd199bfa4127385e7165526cbb48d76ad785cdafcef595
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0015_WYG_016-1a, image: WYG0362/WYG0362-0423c.png}
body:
  text: 乙酉上諭內閣曰國家設兵衛民簡核軍實期于行伍整齊兵額充足如兵丁等紅白事件從前設有生息惠濟銀兩以資賞恤其後特敕停止昨據阿桂等奏陜甘添兵案內籌及賞恤聲請酌復惠濟銀兩朕以國家賞兵之費藉商生息支給䆒屬非宜已傳諭阿桂等令其動用正項開銷矣兹袁守侗海祿前赴行在令軍機大臣傳㫖詢問直𨽻雲南賞兵銀兩支銷欵項據稱直𨽻裁扣公糧銀二萬兩雲南裁扣公糧銀一萬六千餘兩以備賞用等語看來各省大都如此兵丁紅白銀兩原係加惠營伍格外施恩若因此裁扣名糧致兵額不足殊非核實營伍之道况今户部帑項豐盈各省藩庫積存充裕即現在京營添兵四千九百名陜甘二省各營添兵一萬二千九百餘名其馬步糧餉合之各省兵丁賞恤紅白銀兩約算嵗支尚不及百萬國家何靳此費不令開銷正帑而各省乃紛紛裁扣名糧又且請復生息甚無謂也朕臨御四十六年以來惟事事以敬天勤民為念凡三次普免天下地丁錢糧兩次普蠲各省漕糧以及遇灾即賑統計何啻萬萬又並未加增賦稅仰荷上蒼嘉佑開拓邊陲府藏殷實國用充饒朕又豈肯稍存靳惜致令有司開聚斂尅扣之端乎所有各省營伍賞恤兵丁紅白銀兩自乾隆四十七年為始俱著於正項支給造冊報部核銷至各省提鎮以下武職員辨俱有應得坐糧馬乾等項前業經降㫖通諭各省督撫將各該省武職所得公項逐一查明覆奏俟奏報到齊令軍機大臣㑹同該部核辦照文員之例議給養廉其所扣兵餉即可挑補實額核計添給養亷歲支亦不及二百萬兩官員既無拮据而各省又增添兵力於營伍大有禆益朕御極之初户部庫項不過三千萬兩今已增至七千餘萬復有何不足而不加惠天下散財以得民乎所有辦理添補兵額紅白賞恤銀兩及名糧裁添養亷緣由明晰曉諭中外知之丙戌左副都御史吳玉綸奏言甘省自乾隆三十九年開例捐監原為専收本色儲倉榖以恤災黎乃報捐者竟全係折色固由甘省承辦官員借捐冒賑舞弊分肥該生等明知折色違禁因較本色省費實多是以避重就輕相率滋弊比年來赴部捐監者日少而在甘報捐遂至數十萬之多生監為士子進身伊始豈容如此取巧營私兹䝉皇上格外鴻慈免其褫革但以所繳折色數十兩即安然濫厠成均比之京監數目懸殊似不足昭平允而杜幸獲臣請敕下該部凡甘省自三十九年以後報捐監生現奉恩㫖免其斥革者每名令其補繳銀六十兩由各該生繳本籍各州縣彚解藩庫由該督撫按季彚摺陳奏以備甘省災賑撥用並請勒限二年繳完如逾限不繳即將該生原照查銷奏入上諭內閣曰據吳玉綸奏甘省自三十九年以後報捐監生每名令其補繳銀六十兩等語所見甚小王亶望等私收折色一案朕本不欲辦恐各省因此諱灾今種種弊端水落石出伊等于光天化日之下竟敢明目張膽網利鬻官致朕不得不辦之苦衷天下後世共見之然侵漁各員已將伊等平日私收冒銷婪得贓私查抄入官亦足抵該省浮開冒賑之數若又令各捐生紛紛補繳是轉開錙銖較利之端于國家政體甚有關係朕不為也吳玉綸此奏不准行至該生等明知折色違禁乃相率報捐亦不可不加懲警所有乾隆三十九年甘省開捐以後報捐監生者停其鄉試三科已經中舉者停其㑹試三科其加捐職官現任者罰俸三年捐納職官未經銓選者俟到班三年後方准銓選其在各館充當謄録者著五年期滿後再效力三年俱以奉㫖之日為始查明扣算其止捐監生頂帶榮身者著加恩毋庸查辦戊子阿桂李侍堯奏言查撒拉爾回人分居十二工離循化地方近者數里逺或數十里皆地處邉外與諸畨邉界毗連其風俗情形逈非內地可比今逆回蘇四十三等已就駢誅新教餘孽俱已勦除淨盡臣等查十二工地方惟漢大寺孟達夕厰三工俱係舊教並無新教其蘇四十三所住之查家工韓二個所住之清水工及張尕别列草灘崖慢蘇只街子打蘇古等七工俱係新舊錯居現在止存舊教二千六百四十八户其新教業已殱除所有遺存籽種地共二百三十四石零應上額糧十九石零並查各工地畝多係山頭地角依崖傍壑零星沙地不成片段臣等伏思逆回所遺田土現散在九工之內若令內地民人前往耕種則一村之內民少回多勢不能彼此相安若於各工零星安設訊地少則孤懸邉外難資彈壓多則徒費錢糧臣等公同籌酌此次勦除逆匪所有隨同打仗之舊教回人頗為奮勉出力其節次打仗傷亡土兵共有三百三十餘名現在造冊咨部議恤可否仰邀皇上天恩即以逆匪所遺之田土賞給陳亡土兵等家屬交土司韓煜韓光祖確查田土數目酌量人户多寡均勻派撥令其佃種按舊則輸糧仍由循化㕔徴收伊等每人名下所分籽種地不及一石無慮地廣力增在衆回效順捐軀者受賞獨優亦必益深悅服而陳亡之户荷䝉恩賞得以安居樂業尤必感激聖慈輸忱向化奏入上從之同日阿桂李侍堯又奏言臣等前奉諭㫖令將蘭州省城展寬跨山臨水仰見我皇上慎重巖疆圖維久逺至計伏查營建城垣必須占據形勢方可設險衛民大抵因山為城則當包括山之岡脊若在平坦處建築又須距山稍逺蘭州北臨大河西南兩面俱山嶺重疊惟城東一帶地稍平衍省城舊係州治規模本小其後添築三面外城不過就民居所至隨意甃治全無逺慮所以與龍尾山地勢緊要而外城西南之安定門離龍尾山尚有一百四十餘丈外城西門至龍尾山則僅止數十丈且山髙於城此次撒拉爾逆回一至蘭州在龍尾山慿髙向城攻打守城兵夫無可遮蔽且該處商賈凑集居民稠密又未預留火道居民墻屋直接城垣賊匪攀援攻撲是以即日而破然至外城失守賊匪力攻大城西門雖甕城券洞俱被燒燬而大城終能固守無虞者則以賊至城下勢須仰攻我兵登堞俯臨木石俱可擊退也但外城之破䆒係以險資賊即使繕修高峻仍不足恃兹䝉聖明指示將西南城垣展寬至龍尾山梁俾西關一帶居民及華林山之半俱包入城內實足以壯觀瞻而資控制惟是龍尾華林兩山中有水磨溝一道山水發時其勢頗猛難以跨築垣墻且龍尾山土鬆沙汕每遇大雨時行即衝成溝坎或數丈或數十丈不等若於其上建築基址既不堅實斷難經久臣等公同商度惟有將大城向東展寬西自外城安定門起由拱蘭門迤東至風神廟後又自通逺門東南角起由迎恩門至廣武門北角止共擬新添城垣計長一千一百七十餘丈連舊城五百五十九丈共一千七百二十餘丈周圍約九里有餘雖東北地形稍覺狹窄而限於大河不能展拓西南二郭城俱擬拆去共去舊城二千餘丈所有大城甕城俱擬多添一層以為重關保障所有西南兩關廂居民勸諭遷移撤去房屋空出地面寬留火道則崇墉夾峙可以捍制邉陲至華林山近在城西數里並可倚為屏蔽應於其上築營堡一座移督標右營一營官兵在彼駐劄並於龍尾山上相對大城西南一帶擇據形勢安設空心大墩四處即於右營兵丁內輪派駐守平時則氣象更覺嚴整有事則東可以護衛大城西可以接應華林山營聲勢聨絡更足以資彈壓至此次籌改添建各事宜工費浩繁且為永逺敉寧之計必須鞏固堅實應請㫖派熟悉城工之大臣一員帶領工部司員至蘭逐一詳悉勘估方可興工辦理奏入得㫖如所議行同日上命軍機大臣傳諭阿桂李侍堯曰蘭州添建城垣一切興工估計自須熟諳工程之員前往辦理現在工部堂官惟侍郎德成于工程尚為熟練但盛京一帶辦理城工不便遽離該處所有蘭州城垣業經阿桂等相度已定俟德成於冬底回京時令其前赴蘭州勘估亦不為遲同日阿桂李侍堯又奏言臣等屢奉諭㫖籌辦善後事宜除添設兵數改繕城垣専摺具奏外謹將應行事宜酌議數條恭呈御覽一蘭州省城舊存子母炮十六尊僅與鳥鎗無異施放不能及逺又威逺炮八尊子重十六兩至二十兩轟擊稍逺而施放時易于跳動難得凖頭俱不甚得力况年久亦多損壞此次攻勦賊匪照四川劈山炮式樣製成二十尊並于凉州調到食子六十兩大炮四尊轟擊頗為應用又查凉州鎮屬各營舊貯大炮一百六十六位係前明萬厯年間製造厯年久逺多有脫落炸壞各營視同廢鐡其存貯凉州城內不過二十餘尊餘俱散貯各營堡容臣李侍堯特派熟悉炮位専員逐一勘驗將無用廢炮盡行銷燬試演堪用好炮分貯督撫提鎮駐劄各城如尚不敷㨂選凉州匠役鑄造大神炮位酌定數目分貯至劈山炮亦應多為鑄造督撫提鎮大標約計兵丁二百名即給一尊並飭各營時常撡演試放以期有准其陕西各標營亦如此照辦一回教相沿已久而新教則自馬明心口外回家妄謂西域得有真傳愚回厭故喜新俱為煽惑以致蘇四十三等肆逆不法今經此一畨懲創之後各處回民感懼愧悔出于至誠凡已習新教者俱仍改從舊教現已嚴飭各屬將新教禮拜寺概行拆燬如查有私行傳習陽奉陰違者照邪教律從重辦理並曉諭回民不許稱阿渾名目於回民內揀選老成之人令其充當鄉約隨時稽查互相勸誡其舊俗相沿念經禮拜仍聼其便不准添建禮拜寺及收留外來回人居住日後如有復倡異教者即行首告指拏如該處實無新教每年令鄉約等聨名具結一次彚齊咨部查核仍先遍行出示曉諭如此立法則新教自然淨盡一撒拉爾回人散處十二工環繞循化㕔地方每年納糧八十三石各工回人至循化㕔河州蘭州等處或貿易絨褐販賣牛羊本不禁止並有在循化河州充當衙役者以致新教黨羽漸熾與舊教互相仇殺起釁滋事此皆平日地方官不稽查拏䆒遂爾養癰貽患應請嗣後撒拉爾回人不准復充循化河州衙役及營伍兵丁亦不准其任意至內地行走其有往各州縣村鎮貿易者由循化同知給與照票定以限期事畢即令回巢將票繳銷不許在各處逗遛並責成保安起台堡老鴉關駐守辨兵嚴切盤查稽其出入仍隨時訪察毋令內地逰匪潛往該處煽惑滋事亦不得借此勒掯需索違者皆重治其罪凡甘省各屬與畨地土司境壤毗連者均應一體仿照辦理一鳥鎗為閭閻自衛之資從前曽奉諭㫖不必概行收禁况畨回山居野處平日打牲為業勢難禁用鳥鎗至硫磺為配製火藥所必需甘省河東各年配造火藥取資于蘭州庫貯駱狐泉採獲之磺河西各營取資于肅州玉門庫貯牛尾山採獲之磺如果開採時並無透漏封閉後不敢私挖畨回何從私行偷買實皆地方官查禁不力所致嗣後飭令該管文武員辨于封閉磺洞選派妥役嚴行稽察届開採時多派兵役嚴查又聞秦州等處採磺亦有零星偷挖販賣者應通行嚴查封禁不許絲毫透漏至律載內地私販硫磺五十斤熖硝一百斤以上者杖一百徒三年窩藏囤販知情者俱照私販律治罪應飭各地方官嚴查內地鋪户如有將前項磺斤聽畨回潛行購買貪得重價或不法商民在畨回土司地方私賣硫磺並私熬熖硝者均照私販及偷買律加等治罪仍令該管文武大員嚴飭所屬實力奉行並令將有無私販私賣情弊按季結報如敢虛應故事致滋弊竇一經發覺將文武各官及失察各上司一併嚴加參處一新疆各城回衆以墨克地方為回教之宗主而內地回民又以新疆等處經典多而流傳為較真前奉諭㫖俟將來事竣後傳諭新疆各路辦事大臣嚴密查訪毋許內地回民在彼習學回經致生事端實為杜漸防微之至計臣等尚恐各城將緣事回民發至內地此等大概皆不安本分之徒與內地回民皆係同教倘因其自西而來以為得有真傳或又相煽誘均未可定應請敕下新疆各路大臣此後各城回民有犯發遣等罪者或於各城互相安插不必改發內地於杜絶新教根株之法更為周備一循化地方已於添兵案內改駐參將一員設兵八百名足資彈壓至循化同知係乾隆二十六年移駐該處原定疲難二項中缺應歸部選惟是該處畨回錯雜一切撫綏控馭必得幹練之員方可勝任實非部選人員所能經理應請嗣後改為疲繁難三項相兼要缺在外㨂員題補又河州太子寺距州一百二十里向設州判一員嗣於乾隆四十一年裁汰查該州地方逺濶漢回雜處其東隅之景古城離州城二百四十餘里附近之崦隴關即係畨地又正東之黑石山南之三渡水等處俱離州城一百八九十里及二百餘里不等均係習俗黠悍之區一切稽查匪類撫馭畨回該州鞭長莫及應請復舊制于適中之太子寺地方設立州判一員分防稽察其衙門及分駐事件各循其舊又該管之蘭州道原係驛傳兼巡蘭州向為衝繁難兼三要缺嗣因驛傳改歸臬司管理定為中缺歸部銓選伏查蘭州道雖止一府然地居省㑹為兩河扼要應仍舊改為衝繁難兼三要缺請㫖簡放庶人地相宜於體制亦屬允協奏入上命軍機大臣會同該部議奏旋經軍機大臣等議言均應如所奏辦理至私販硫磺及私熬㷔硝若在畨回土司地方售賣即非內地私販可比查例載附近苖疆五百里以內民人煎穵窩囤興販硝磺事發計斤定罪以次遞加五十斤以上者杖一百流二千里至百斤以上者照合成火藥賣與鹽徒例發近邊充軍又例載凡商漁船內夾帶違禁硝磺等物接濟外洋者船户以通賊論斬舵工水手知情者同罪各等語是私販硝磺定例內地與邊疆各有専條而境內私販與出境偷賣輕重逈異今該省境接畨回其私賣硝磺關係尤重應請嗣後該省秦州等處産磺地方如偷挖熬煎畨回土司地方私賣係在內地者不得僅照尋常內地之例問擬應比照附近苖疆五百里以內私販之例計斤定擬分别軍流從重科罪若偷賣出境與外地畨回交易應比照商船夾帶出洋論斬知情同罪之例審擬庶足以示懲創而嚴關守奏入得㫖如所議行同日大學士三寶等奏言據閩浙總督兼管浙江巡撫陳輝祖委員將王亶望案內前任蘭州府知府蔣全迪押解前來奉㫖行在大學士九卿㑹同直𨽻總督袁守侗嚴審定擬具奏臣等公同研究緣蔣全迪係安徽歙縣人由捐納知縣歷任甘肅皋蘭縣題升肅州知州於乾隆三十八年捐升知府離任三十九年甘省奏請開捐維時藩司王亶望即將蔣全迪奏留甘省題補蘭州首府専辦捐監事務自王亶望到任後即令各州縣公然俱收折色希圖上下分肥蔣全迪亦圖從中取利遂慫恿王亶望行令各屬遵照辦理其所收銀兩即藉灾賑任意開銷蔣全迪與王亶望商議凡各州縣報灾之輕重及給發實收之多寡俱由藩司衙門主政酌定分數開單給發各屬令其照單開賑蔣全迪遂藉此勒要各州縣冒銷辦賑銀兩又商議設立坐省長隨凡各州縣餽送王亶望銀兩俱令坐省長隨送進蔣全迪希圖分潤亦向各屬勒索餽送又蔣全迪署中所有親朋捐監俱勒令各屬填給實收並不發價蔣全迪擁有厚資遂藉稱患病告假回籍逮王亶望升任浙江巡撫復將蔣全迪奏留浙省辦事希圖通同作弊此蔣全迪與王亶望先後勾通舞弊婪索無厭情節已據蔣全迪供認不諱查例載侵盜倉庫錢糧入已數在一千兩以上者擬斬監候等語今蔣全迪身為道府大員不思潔已奉公乃與王亶望朋比為奸主令各屬私收折色復公然酌定報灾分數及給發實收多寡肆意冒銷將辦賑銀兩婪索入已此外復收受各屬餽送盈千纍萬其黨惡藐法侵帑殃民莫此為甚蔣全迪應照侵盜倉庫錢糧入已數在一千兩以上者斬例擬斬請㫖即行正法以為貪吏害民者戒至該犯子侄親友在伊任內有無捐監未經給價之人應聽大學士公阿桂等查明一併歸案辦理奏入得㫖蔣全迪著即處斬餘依議同日上命軍機大臣傳諭阿桂李侍堯曰甘省私收折色一案骫法營私弊端百出現已將首先倡議侵冒分肥之勒爾謹王亶望王廷贊蔣全迪等俱分别明正典刑矣至此案大小各員通同侵蝕自應按律問擬以彰國憲而警貪婪但人數較多若概豫駢誅朕心有所不忍自當核其贓私之多寡以别情罪之重輕著傳諭阿桂等將各該犯所有侵冒銀兩其在二萬兩以上者俱當問擬斬决二萬兩以下者入於情實其一萬兩以下各犯亦應問擬斬候請㫖定奪並分晰開繕清單進呈所有應行定擬案犯俱著趕本年勾到以前具奏毋致延緩同日上諭內閣曰甘省收捐監糧一事地方官私收折色任意侵欺揑灾冒賑釀成不得不辦之大案實非朕所喜也且各省偶遇灾歉皆動正項賑恤何獨於甘省賴捐監為乎此後甘省捐監一事竟宜停止將此通諭中外知之己丑軍機大臣奏言臣等遵㫖將韓阿渾即馬六十七蕭得福馬達烏特韓三個韓四個五犯嚴行鞫訊該犯等各將為蘇四十三糾合回人跟隨攻掠河州城池蘭州關廂及屢次向華林山賊營送信等情逐一供認不諱實為罪大惡極應請㫖將該犯等依大逆律凌遲處死奏入得㫖韓阿渾即馬六十七蕭得福馬逹烏特韓三個韓四個俱著即凌遲處死癸巳阿桂李侍堯奏言臣阿桂前奉諭㫖前此被害之文武官辨兵丁查明實在情節將應行議恤者奏聞給豫恤典欽此查原任副將新柱原任知府楊士璣在白莊子起台堡等處猝遇匪賊所有跟隨打仗陳亡受傷之辨兵自應一體議恤其被害之知府楊士璣於揑灾冒賑案內婪得多贓城破自盡之河州知州周植亦係侵蝕監糧揑灾舞弊均有應得之罪一併扣除隨同楊士璣前往起台之河州土司韓成璘因公被害亦應議給恤賞至河州守城各兵俱經駁飭扣除所有與賊打仗陳亡及受傷真實者方造入冊內但該辨兵等究屬失守城池應請㫖交部减等議恤奏入上勒部知之同日阿桂李侍堯等又奏言臣阿桂前奉諭㫖逆回占據河州該處曽經出仕回籍人員有甘心從賊不顧名義必當從重治罪欽此查撒拉爾逆回於三月二十一日夜間攻破河州二十三日即由河州赴蘭滋擾該州並無出仕回籍人員甘心從賊者業經詳悉查明奏入報聞同日阿桂李侍堯又奏言甘省浮冒侵漁各州縣前經奏明一時乏人委署暫緩參革兹㨂發人員將次到甘而此等揑灾冒賑之員俱係侵帑營私大干法紀未便令其尚任地方致滋貽誤應請將現在甘省六十九員內除陸瑋等十二員已奉㫖革職拏問外其在任之那禮善王臣李元椿伍葆光詹耀璘閔鵷元孟衍泗陳㴻伯衡舒攀桂萬人鳳杜耕書王萬年舒玉龍伍諾璽周兆熊福明陳韶楊有澳林昂霄彭永和尤永清丁愈錢成均章汝楠黃道煚韋之瑗顧汝衡宋樹榖趙元德萬邦英賈若琳夏恆華廷揚王璠經方龎橒申寧吉李弼麻宸謝庭庸承志葉觀海許士梁張育琳吳詵四十六員請㫖革職拏問以便歸案定擬具奏其丁憂事故尚在甘省之陳鴻文邱大英徐樹海蒲蘭馨孫元禮沈泰王旭陳金宣墨爾更額史堂善逹十一員應一併請㫖革職拏問歸案定擬至已離甘省四十三員內除張何衢等九員已經身故陳棟一員現已革職解甘竒明現在來甘業經革職外其升調别省及回旗之楊賡揚張春芳吕應祥趙杭林陳嚴祖廣福佛保景福八員及丁憂告病終養降調勒休之何汝楠陳常鄭科捷陳起撝陶士麟麥桓史載衡林德基布瞻成德王夢麟劉甫岡顧芝李立慱敏劉治傳閔焜薛佩蘭十八員相應請㫖革職拏問並已經革職之吳鼎新朱家慶周人傑王汝地嵩柱朱桂六員請交留京辦事王大臣及任所原籍各督撫伊犁將軍將各該員提訊令其逐一供認如已得實即可定擬具奏設或狡飾即派員解甘質審歸案辦理奏入上諭內閣曰據阿桂等將甘省揑報灾賑侵蝕帑項之各州縣奏請一併革職拿問一摺所辦甚屬公當此案係前任藩司王亶望與前任蘭州府知府蔣全迪通同舞弊首先作俑以致通省效尤習為固然實有不得不辦之勢至各州縣雖職任大小不同但國家設官分職均宜潔已奉公亷隅有勵豈有因上司勒令報荒遂爾朋分侵蝕之理况道府州縣即無奏事之職遇此等事件原可直揭部科使纍年積弊早經破露亦不至貽罪多人朕必嘉其公正特加擢用乃竟聨為一氣恣飽欲壑置民瘼於不問此而不辦何以肅吏治而警官方現據阿桂等查明此案俱已水落石出朕之辦理實出於不得已且各員等入已贓私俱自行供認將來定案時朕惟于輕重權衡折𠂻至當於按律定擬之中仍寓法外施仁之意至已有㫖詢問而其人仍狡供者必不恕也所有阿桂等此次查明參奏之知府前任知縣楊賡揚伍諾璽同知前署知州韋之瑗同知前任知縣閔鵷元孟衍泗趙杬林同知善逹顧芝張春芳通判賈若琳經方慱敏佛保謝廷庸知州那禮善伍葆光覺羅承志陳常知縣陳鴻文王臣李元椿邱大英詹耀璘陳樹伯衡舒攀桂萬人鳳杜耕書舒玉龍福明陳韶楊有澳林昂霄彭永和徐樹栴尤永清丁愈錢成均章汝楠黃道煚蒲蘭馨顧汝衡孫元禮宋樹榖趙元德萬邦英沈泰王旭夏恆陳金宣華廷揚墨爾更額王璠龎橒申寧吉史堂李弼葉觀海何汝楠鄭科捷陳起撝陶士麟麥桓景福布瞻成德王夢麟麻宸吕應祥陳嚴祖廣福劉治傳州同前署知縣王萬年州判前署知州吳詵州判前署知縣薛佩蘭布政司經歷前署縣丞許士梁縣丞前署知縣周兆熊閔焜縣丞史載衡李立經厯前署知縣張育琳等業經降㫖革職拿問其已離甘省及升任别省各員俱著各督撫迅速派員解赴蘭州交阿桂李侍堯歸案審明分别定擬具奏同日上又命軍機大臣傳諭阿桂李侍堯曰阿桂現在查辦甘省一案自己漸有就緒即此時尚未定案並有各省審訊人員陸續解甘質訊者俱可交李侍堯歸案審辦遵照前㫖一併分别定擬具奏現在豫省河工漫口開挖引河築挑水壩及堵塞合龍事宜最為緊要阿桂即可將甘省審案一面交李侍堯辦理一面起程赴豫督辦欽定蘭州紀略卷十六
