  text: 欽定四庫全書欽定蘭州紀略卷三
  hash: sha256:cda6b1188774ff022bdfb56b9becdc8677adb2e09dc65ae6fd7cdae2180e8c2d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0015_WYG_003-1a, image: WYG0362/WYG0362-0270a.png}
body:
  text: 壬子勒爾謹仁和奏言逆回蘇四十三等由河州山僻小路潛至省城在附郭一帶放火搶奪因城內官辨兵民防守嚴密是以城垣並未傷損三月二十九日晚勒爾謹等帶兵到省駐扎城外逆回等先已退占離省數里之山梁臣等與署副都統額爾恆額總兵圗欽保德寧按察使福嵩公同籌酌隨於城郭關廂左近添派官兵嚴加防範隨於三十日派逰擊祥保帶領緑營兵五百名土兵七百名臣等督率前往由東山梁後繞道擒勦逆匪率衆來迎自辰至未殺賊三十餘名是晚逆匪亦未敢潛來窺探但其所占山梁形勢甚為險峻且蘭州跬步皆山設一經逃竄轉致茍延殘喘必須分派官兵四面圍擒庶不致一名漏網計所調各路官兵於三四日內可以齊集惟有悉心籌酌以期一鼓直擒不使稍稽顯戮同日和珅奏言臣昨於山西平定州途次接奉諭旨速赴甘省督辦一切伏思甘省距臣刻下行程尚有二千六百餘里雖晝夜遄行實非一時遽能趕到彼處近日情形未知何似心中倍切焦急此時西安旗營各鎮及甘省附近各提鎮官兵定當雲集第一時未有統屬之人恐諸鎮將爭先幸進賊匪烏合之衆或致他竄未免别生事端即或散歸巢穴將來追尋首夥各犯亦恐潛行藏匿轉得幸逃法網無以警凶逆而靖邉陲臣又一時未能即至昨蒙寄到諭旨令伍彌泰先行調度督辦臣不揣冒昧已將愚見所及飛檄該將軍等令其即速籌辦不致坐失事機即將來臣抵甘後亦可不虞棘手臣拜摺後仍星馳兼程前進均奏入上命軍機大臣傳諭阿桂和珅勒爾謹仁和曰此時賊匪既經占據山梁必當厚集兵力同時併進迅就殱擒方為妥善勒爾謹等所稱三四日內各路調兵到齊會𠞰自應如此辦理所有伍彌泰馬彪帶往之西安滿漢官兵此時諒亦全到如已能將逆賊𠞰洗淨盡固屬甚善否則將留駐西安聼調之京兵一千五百名徑令直抵甘肅會同圍𠞰則聲勢更大尤可一鼓成擒再本日和珅奏到途次檄令伍彌泰等先行籌辦一摺目今光景辦理似為較易但和珅此時仍須迅速前往會同辦理即阿桂亦仍著前往督辦不必即回京畢沅在西安得信較近京兵到陜時如甘省尚未藏事即令速往再現在所獲人犯及陸續擒獲者應嚴密押解省城監禁審訊俟阿桂和珅到彼覆審後將首夥要犯嚴加鎖􅀈派委乾清門巴圖魯侍衛等押赴熱河照從前拏獲王倫案內逆犯辦理俾衆共知警戒至馬明心一犯據王廷贊奏稱本係安定回民則此案中必有民人中素常為匪者為之主謀煽惑並著阿桂和珅勒爾謹等確實嚴查覆奏同日陜西布政使尚安奏言提督馬彪等各挑西安滿漢官兵共二千六百名分為六起於二十五二十七二十九等日先後起程前往會𠞰臣隨稟明撫臣自西安馳赴陜甘交界之長武縣地方督飭各州縣將應行借支車馬等項妥協備辦俾官兵得迅速馳往復思涇州為入甘首站復由長武馳至涇州據該州稟稱現在庫貯銀數無幾辦理拮據臣隨查該處現有截留直𨽻解甘餉銀十五萬兩因事關急需即令該州於此項銀內借支一萬兩酌量應用據實報銷一面詳明督撫臣備案臣即仍回長武兹於四月初三日陜省滿漢官兵俱已全數妥速過境奏入上諭內閣曰前因甘省急需幹員辦事已傳諭尚安令其馳往該處幫同料理令伊於未奉諭旨之前即先起程前往正與朕前旨相合且一切經理妥協甚屬可嘉尚安著交部議敘同日上又諭內閣曰此次派出官員兵丁等賞項諒已多製備行裝若一時令其繳還恐伊等力有不能所有未經起程之官員兵丁著照部議分作兩年扣還其已經起程續奉撤回者著加恩賞給一半以示體恤癸丑西安提督馬彪奏言臣挑選夲標官兵一千名並派委員辨飭令迅速赴蘭臣即于三月二十五日先行起程途次接布政使王廷贊來扎逆回現在攻打蘭城臣晝夜趲行四月初二日已扺蘭州省城現在𠞰捕事宜與督臣勒爾謹提臣仁和等公同商酌四路追𠞰擒拏同日陜西延綏鎮總兵周鼎奏言臣接準陜西撫臣畢沅來文令延綏鎮挑選精兵一千名前赴督臣勒爾謹軍營聽候調度臣即刻挑兵一千選派領兵官辨臣親為統領星夜直往蘭州又準畢沅來文復令再派官兵一千名前往平涼鞏昌堵截䇿應臣復即挑兵一千派副將觀音保統領星飛前往臣先帶領前派官兵一千名於四月初一日自榆林兼程迅往會同𠞰捕均奏入上命軍機大臣傳諭阿桂和珅勒爾謹曰馬彪奏初二日已馳抵蘭州現在公同商酌追𠞰等語此時各路所調兵丁諒已陸續到齊自應遵照厯次所降諭旨妥協籌辦至前此因未見勒爾謹奏報恐有隔阻而和珅又未能刻即到彼是以傳諭伍彌泰令其籌辦一切原因彼時無人料理起見今勒爾謹既到蘭州而和珅又趲程前進所有調度官兵及軍需糧餉各事宜自應仍令勒爾謹經理一俟阿桂和珅到彼即會同商辦伍彌泰仍止専司領兵𠞰賊俾事權歸一辦理方有章程再蘭州城外關廂曾被賊焚燒河州亦曾被賊占擾該處居民自不免為所蹂躪不可不加意撫恤著傳諭阿桂和珅即會同勒爾謹將實在情形若何應如何優恤之處詳悉查明具奏候朕加恩至勒爾謹仁和所奏賊人占據山梁其情形總未明晰逆匪數千人據守山上何從得有口食敢為此盤據苟延之計勒爾謹等摺內亦並未聲説著將近日賊人逃竄在山如何情景再行詳查據實覆奏又本日總兵周鼎奏帶領官兵一千於初一日兼程前往會同𠞰捕該鎮既係奉調前往自應在彼協同𠞰賊聼候和珅等調遣一俟𠞰洗事畢即同各路鎮將等撤回夲任甲寅畢沅奏言臣於夲月初六日接提臣馬彪來札知初二日已抵蘭州逆回現據龍尾山華林寺山梁察看賊匪不過千數餘人惟以放火劫掠為事蘭州各路兵丁會集現有三千餘名一兩日內進兵會𠞰逆匪無難殄滅等因再查將軍伍彌泰於初八日到蘭副都統薩炳阿隨後接續行走約計初八九日滿營官兵一千六百亦俱全到臣續派潼關協副將馬鎮國帶兵三百名接濟馬彪計初八九日可到而督臣所派河西各路官兵想亦陸續至蘭是此時兵力漸厚省城斷無意外之虞至狄道居河州蘭州之間東通鞏秦最為􅱌要恐賊匪見我兵勢盛從大路竄出該州僅有兵二百名甚為單薄臣連日飛催興漢鎮臣三德令從間道往赴狄道保護且堵截賊匪歸路已據該鎮報到帶兵五百名迅速行走計初十前可到狄道同日西川將軍特成額總督文綬提督明亮奏言臣等於四月初二日接準陜西撫臣畢沅札稱令臣等迅速派兵由鞏昌一帶前往會𠞰逆回伏查河州係腹內地方逆回等妄作不靖川省地界毗連急須協力赴𠞰以期迅速撲滅臣等即就近選派滿漢官兵一千五百名臣明亮即日帶兵三百名由鞏昌一路星夜前往臣特成額亦即帶兵三百名尾隨起程其餘官兵接續進發臣文綬一面再行酌量預派附近各營官兵以備續調均奏入上命軍機大臣傳諭阿桂和珅勒爾謹畢沅曰據畢沅奏所辦甚屬可嘉至賊匪僅止千餘不過釡底逰魂茍延殘喘陜甘兩省兵丁到齊無難一鼓聚殱京兵竟可無須前進此時畢沅備而不用亦可至四川所調之兵諒亦無需但現在既已起程且不飭令停止著傳諭勒爾謹如賊匪業已𠞰淨亦即知會特成額文綬并一面飭知領隊官員停其前往乙邜阿桂奏言臣於初七日接陜西撫臣畢沅來札知賊人退踞龍尾山八蠟廟等處各路官兵陸續前到兵力稍厚陜西省連發滿漢官兵五千約計初十以內俱可到齊并聞督臣勒爾謹於三月二十九日帶兵回省目前似可無意外之虞等語又於初八日畢沅將馬彪原札寄閲據稱河州業已收復經督臣派撥舊教回人二百名同西寧兵二百名在彼防護賊人現在占據龍尾山華林寺山梁察看賊勢不過千餘人等語臣思伍彌泰等所調之兵皆可接續齊集小醜自不能復逞螳臂若賊人盤踞山梁遷延不去自當殱戮無遺即使勢窮力促計圖竄逸該督業已派兵在洪濟橋沙泥站兩處堵截縱有餘匪竄入深山官兵四面圍擒亦可𠞰除淨盡臣查勒爾謹畢沅節次調遣陜甘兩省緑營兵及伍彌泰額爾恆額帶往之駐防滿兵已有八千餘名其勢足敷會𠞰及邀截搜捕之用且四川兵二千名俱界連甘肅尅期可到兵力已屬有餘就現在情形而論不但晉豫兩省官兵毋須調遣即京兵亦可停止派往伏乞皇上特降諭旨令京兵已經起行者中途撤回未經起行者即令停止臣一面仍先行咨帶兵行走之護軍統領舒亮等暫行停駐俟奉到諭旨即陸續分起回京再臣晝夜趲行程途多寡不等每日夜約行一百五六十里計程明日可過潼關如尚書和珅尚未經過臣於途次留心探訪恐沿途驛站馬匹不敷分應擬於前途暫停俟和珅經過晤悉一切先令迅速前往臣再儘力遄行奏入上命軍機大臣傳諭阿桂和珅勒爾謹袁守侗畢沅富勒渾曰據阿桂奏途次連接畢沅來信知現在各路所調之兵已有八千餘名足敷會𠞰等語前以京兵一千五百名業經起程是以且未撤回俟擒賊實信到日即行降旨但思小醜既可立就殱擒自不必復需徑旅現已另降諭旨令領隊大臣舒亮即行帶兵回京并著傳諭沿途各督撫知之丙辰馬彪奏言臣于初二日行抵蘭州提臣仁和總兵圖欽保俱已到彼會勦臣前於途次復接撫臣畢沅來札於西安提屬各營續派兵一千名西安滿營派兵一千六百名延綏鎮屬派兵一千五百名興漢鎮屬派兵五百名并甘肅提屬各鎮營官兵現在陸續到蘭臣同督臣勒爾謹提臣仁和相度機宜厚集兵力四路捕𠞰務期盡絶根株奏入上命軍機大臣傳諭和珅勒爾謹仁和曰據馬彪奏甘肅各路調派之兵並西安滿漢各營兵現在陸續到齊等語該處所調兵丁已及一萬而逆匪不過千餘人自應即時分頭圍勦一鼓殱擒前據勒爾謹初二日所發摺內稱三四日即可辦理今馬彪之摺係初六日所發何以尚未見勒爾謹等奏報𠞰賊之事此時兵已厚集更將何待著傳諭勒爾謹等即將勦滅逆匪情形迅速馳奏至賊匪占據龍尾山梁華林寺從何處得有口食此時官兵自必將賊圍住其施放鎗炮之火藥又從何處得來賊人馬匹約有若干向何處掠虜均著勒爾謹仁和詳查覆奏又昨據阿桂奏到摺內有馬彪札知督臣派撥舊教回人二百名同西寧兵二百名防護河州等語此事何以亦未見勒爾謹奏及著傳諭該督一併據實覆奏和珅到彼時所有一切應行查辦事件並著查明具奏同日畢沅奏言臣接奉諭旨令于西安藩庫先酌撥一百萬兩查各省協撥甘省銀兩現在尚有三四起在途未到臣前已飛諭各州縣令其沿途截留貯庫以供就近支用此次酌撥銀一百萬兩臣即行分起選派妥幹員辨帶領兵役飭令小心護送不致遲誤奏入報聞丁已勒爾謹馬彪仁和奏言臣等先後抵蘭與賊匪打仗數次殺傷甚多惟占據南山自髙而下勢甚險峻必須厚集兵力出其不意四面夾攻庶可一鼓而下查甘省各路漢土官兵一二日可以齊集即肅州鎮屬及陜西提屬官兵亦將次到蘭兵力已不為單弱臣等定期於初八日進兵圍勦仰仗天威逆回自不致一名漏網稍稽顯戮再查有由烏嚕木齊赴京之協領舒成佐領札蘭布托林保到蘭該員等因現值𠞰捕逆匪情願隨征報效察其情詞甚為懇切自應準其所請一同進勦同日勒爾謹馬彪仁和又奏言臣等遵查撒拉爾俗習回教近緣新教欲另立一門令舊教順從舊教不服以致互相爭殺現在所調循化土兵即係舊教畨回是以悉其原委大概伏查擒𠞰逆賊莫先於斷其後路而掃除巢穴正須舊教畨回臣勒爾謹前在狄道與臬司福嵩詳加籌酌密飭循化文武妥為駕馭舊教畨回令其奮勇出力以公報私并飭署西寧鎮印務副將貢楚克達爾帶兵到循化就近搗其巢穴即將新教餘孽儘數擒拏兹據副將貢楚克達爾暨循化同知洪彬委員候補通判謝桓逰擊瑚嵩阿白守忠等先後稟報帶領官兵及舊教土兵搜拏餘孽節次殺死逆賊百餘人生擒逆賊一百零九名婦女幼孩一百數十口現在嚴禁并將蘇四十三等要犯祖墳刨挖燒燬揚灰是逆賊已無歸路無難全數𠞰擒惟河州為循化咽喉最關緊要臣勒爾謹已飭令貢楚克達爾帶兵駐劄河州截殺逃逸賊匪俾聲勢連絡并於老鴉關沙泥站洪濟橋等要隘派兵堵截自無虞稍有竄逸再查舊教土兵素稱恭順臣等三月三十日帶兵𠞰賊時即令舊教前敵頗屬奮勇業經量加奬賞奏入上命軍機大臣傳諭阿桂和珅曰本日勒爾謹奏新舊教情形始略有端緒至令兩教互相攻殺以破其勢朕於事發之初即早經降旨今勒爾謹稱前在狄道與福嵩商酌令舊教土兵奮勇出力以公報私所辦尚是但勒爾謹未必能見及此或出自福嵩之贊畫至賊人占據山梁多至十數日何從得有口食且大兵既經各路堵截又往何處搶掠俱著查明覆奏總之此案起釁實在情形勒爾謹如何辦理不善致釀事端其被擾之地方應如何加恩務須徹底詳查逐一妥辦具奏請旨同日上命軍機大臣傳諭勒爾謹曰畨回爭立新教起釁勒爾謹節次所奏總未明晰前經朕降旨令其將舊教土兵作為前驅勒爾謹何以不早行具奏又未將何日接奉諭旨之處奏明諸事遲延勞朕于數千里外為之籌畫為總督者應如是乎至所稱現在合屬官兵將次到蘭定期於初八日進兵擒𠞰賊匪自應如此迅速辦理朕盼望滅賊之信甚切該督務須速行具奏不得仍前遲緩致厪懸注同日王廷贊奏言逆回連日仍復緊攻省城并放火延燒房屋虜掠民財城中兵力單薄勢頗危急臣戒諭居民不得驚慌妄動率同文武員辨懸給兵民重賞激勵人心奮勇協力多方設法守禦將火炮安放城上􅱌急之處連聲轟擊又以滚木石塊擊斷賊人雲梯火鎗弓箭齊發殺死賊人甚多賊始退却不能上城至二十九日總兵圖欽保城守尉額爾恆額提督仁和等先後帶兵進援督臣勒爾謹亦自狄道旋省逆匪不敢攻城現俟各路官兵齊集相機會勦即當殄滅奏入上嘉之同日畢沅奏言京兵前赴甘省𠞰捕逆回自須迅速趲行于事理方為有濟陜西自潼關西至長武臣前已與司道公同商議酌分七尖八站至沿途應用馬匹車輛及例應供給各項業經飭屬如數加緊豫備但陜甘幅員遼濶當日所分里數較之他省為大臣因甘省素鮮車騾勢不能按臺更換官兵乘騎改用長騾若令日夜趲行道逺站長恐防疲乏將來入關以後如遇天氣晴爽或程途里數略近到站為時尚早車馬不甚疲乏即令兼程星速前進至長武以西涇州平涼一帶已與蘭城密邇軍威所到聲息相通又當約量程期庶不致欲速反遲轉稽時刻奏入報聞戊午直𨽻總督袁守侗奏言臣查第一起京兵據署藩司郎若伊稟報于十二日送至河南安陽縣停駐其二起三起兵丁亦在邯鄲柏鄉一帶尚未出直𨽻本境今欽奉諭旨令領隊大臣舒亮帶兵回京臣遵即飛飭藩司先將三起京兵用原載車馬逐站送回其二起頭起兵丁應仍令挨次間日行走庶車馬得以輪應至清苑良鄉等站車馬其撤回歸農者臣亦飛􅊾飭調上緊妥備并督同署臬司梁肯堂署清河道顧學潮往來照料以期無悮奏入報聞己未伍彌泰勒爾謹馬彪仁和奏言臣等帶領官兵并舊教土兵一由黃河南岸直衝賊營一由賊巢之東南山梁壓下逆賊率衆迎敵我兵奮勇直入殺死逆賊五十餘名搶獲馬驢牛羊賊勢倉皇退而固守因坎陡崖深不能即時搗穴天色已晚暫且撤兵臣等伏查逆匪已無歸路計窮力竭是以占據險地乘便放火為茍延旦夕之計即從前賊數約有二三千人屢次被官兵𠞰殺鎗炮擊斃以及逃竄為各路截殺已不下七八百人現在所存者不過千餘人適接軍機大臣來咨乃知上厪聖懷派出健鋭營兵三千名火器營兵二千名天兵申討自當迅奏成功但以現在情形而論所調各路官兵業已雲集京兵似可停止再臣伍彌泰於初九日到蘭所調寧夏滿兵已起程五百名不日亦可到蘭其備調兵五百名以及畢沅咨調四川官兵臣等現已行文停止同日阿桂和珅奏言臣和珅於山西途次接奉諭旨即星夜兼程行走於初十日過潼關臣阿桂於初九日過潼關沿途探聽知臣和珅相隔不逺因緩程稍候於十一日先後俱到臨潼臣和珅當即將諭旨并一切應行籌辦事宜與臣阿桂公同熟商妥議俟到甘省時相度機宜辦理再臣等行抵陜境賊匪大概情形俱已深悉現在逆回退踞山梁各路官兵雲集足敷堵截𠞰捕之用其在途之京兵一千五百名計程僅抵豫境臣等一面奏聞一面即行知帶兵行走之護軍統領舒亮等令將前隊作後隊陸續按起回京至乾清門侍衛等雖無須伊等帶兵打仗但將來拏獲首逆及要犯應行解京遵旨令伊等押解進京臣等擇其中曉事者酌留泰斐英阿福寧二人并三等侍衛阿爾都以備差委餘一併令其回京並令伊等沿途緩程安靜行走俾驛站馬匹不致應付竭蹶以免煩擾至額駙拉旺多爾濟已遵旨由潼關走山西一帶出口回伊逰牧處所又農起等俱已傳旨行知令其回京臣阿桂帶往甘肅之衛輝營參將劉之仁業於初十日在華州給咨令回原營至前奉旨派出之記名以道府用之司員李照等六人除海廣現隨阿桂臣和珅即先行帶往其餘五人容俟到甘後另行酌量差委再定去留臣和珅於拜摺後仍即星夜兼程前進臣阿桂遵奉恩旨緩行聽候諭旨均奏入上命軍機大臣傳諭阿桂和珅曰前此派往京兵早有諭旨撤回本日勒爾謹等奏將寧夏四川兵停止所辦尚是但賊既據險自守又放火何為若云以放火為搶掠之計則此時官兵四面圍困賊人又從何處搶掠所奏甚不明晰著和珅詳查覆奏現又據阿桂和珅奏稱十一日先後俱到臨潼公同商酌一切事宜和珅併留泰斐英阿福寧阿爾都以備差委仍即星夜兼程前進等語泰斐英阿等前已有旨令其押解逆犯進京和珅所辦甚是至阿桂此時途次只須緩程前進再行候旨同日特成額明亮奏言臣等於初二日帶兵先後起程初七日於梓潼途次接畢沅札催令臣等帶領川兵迅赴鞏昌協同進𠞰復於初八日武連驛途次接奉諭旨令調四川從前曾經平定金川之兵星往堵截臣等伏查現帶川省滿漢兵丁併領兵將辨多係曾經出師金川之兵現令儘力趲行每日步行一百二十里務期迅速到甘以資會𠞰兹自武連驛至陜省之大安驛計程五百餘里其鞏秦一帶須由大安驛分道前往查大安至鞏昌計程八百餘里均屬山僻小徑為畨回出沒之所臣等到大安驛時即當察看事勢相機辦理奏入上命軍機大臣傳諭特成額明亮日據特成額等奏現調川兵一二千名飛赴鞏秦一帶協𠞰等語此項官兵前經傳諭該督文綬飭令停止特成額等此奏想未接到停止之信故仍照前旨啓程今既據伍彌泰勒爾謹等奏稱賊僅據險自守不日即可勦除併已行文停止川兵此項官兵自當撤回本營歸伍倘阿桂和珅到彼後相度機宜尚有須用川兵之處再俟降旨遵行同日勒爾謹又奏言逆犯占據河州時將監犯全行放脫內逃兵自首情實七次斬犯一名王伏林案內緣坐情實三次斬犯四名緩決三次絞犯三名緩決一次絞犯一名新案斬犯一名絞犯一名流犯一名現審人犯四名今據河州知州謝桓稟報該犯等俱已自行投到現在監禁看來該犯等尚知畏法均奏入上諭內閣曰勒爾謹奏逆回占據河州時將監犯全行放脫現在各犯俱已自行投到仍行監禁等語賊匪敢於縱脫獄囚實屬死有餘辜至該監犯等於被放之後併不為賊脅從自行投首尚知畏法著加恩交該督查明概豫寬減發落以示勸勵臣等謹案逆回肆惡不靖敢於縱釋罪囚妄為煽誘實寸磔不足蔽辜乃該囚等既不肯作姦從逆復不敢私自逺揚投首就獄可見平時德澤深厚淪肌浹髓雖身在囹圄之中咸知感發天良不以事起倉卒稍萌茍且之念我皇上特沛恩綸概令寬減貸其前愆豫以自新聖仁高厚彼縶身犴狴者益當共知感格共知愧勵矣同日畢沅奏言逆回進逼蘭城自三月二十七日至本月初一日西安文報隔絶臣遴委妥幹員辨迅赴蘭城查探實在情形據該辨回稱蘭州自二十九日總督回至省城各路官兵日漸齊集打仗幾次殺賊甚多賊匪初尚屯聚八蠟廟五泉山等處近已移向龍尾山梁聞總督及領兵各大員會議即日進𠞰再回程經過之金縣平涼一帶自西安官兵前去之後行旅漸通逃散居民間有携同婦女還歸本土人心漸已安貼等語臣查陕省先調發西安駐防及提鎮官兵計五千名前往會𠞰計于十五日以前並可抵蘭至甘肅河西各標營兵督臣勒爾謹節次調遣亦不下五六千名通計省城官兵及調到土兵可得一萬數千名兵力不為不厚再五泉山係在蘭州正南迤西一支即為龍尾山在城之西南約有五六里去八蠟廟等處較逺似漸有震懾之意且所據地方西北兩面俱阻黃河西南阻隔洮河督臣所調西寧官兵由循化一帶繞出其後且河州收復小路俱經堵截今大學士公臣阿桂尚書臣和珅及各領兵大員星夜前往相機同𠞰賊匪自可即日殱洗又臣頃接將軍臣特成額提督臣明亮來札稱由成都前來程途尚逺須至二十左右始抵鞏昌約計彼時延綏續調之兵亦已到甘臣現派慶陽協副將隆安星速前往飛催協同延綏領兵官由安定捷徑直趨狄道與興漢鎮總兵臣三德堵截後路共計數有兵一千二百名况沙泥站一帶已經督臣勒爾謹派兵防守足資截殺所有前調川兵臣謹遵旨飛咨臣特成額明亮令其就近統領回營奏入報聞欽定蘭州紀略卷三
