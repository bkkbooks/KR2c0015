  - {type: page-break, offset: 0, content: '', id: KR2c0015_WYG_006-1a, image: WYG0362/WYG0362-0306a.png}
body:
  text: 丁丑阿桂和珅奏言臣等於二十六日𣲖海蘭察額森特伍彌泰明亮泰裴英阿福寧阿爾都馬彪仁和三德哈當阿等分帶滿漢官兵四千餘名分路進剿各處堵截臣阿桂臣和珅督催策應並令緑營兵丁預備鍬鐝一面打仗一面拏卡俱於二十六日子時計道途逺近不等先後進發卯刻齊抵龍尾山梁賊匪自十九日殘敗以後畏懼我兵勢大深藏溝穴不敢迎敵有從華林寺背後繞道前來迎撲者俱被官兵勦殺敗逃正追至賊營相近因溝磡陡險深至數大小路俱先被賊匪挖斷賊人潜於土窑孔隙處所拚死放鎗抵禦勢亦甚急一時未能得手明亮等即督率官兵於龍尾山梁拏立大卡三座自早至晚賊匪藏匿不出因𣲖舊教土兵及緑營兵分守各卡其餘各兵俱整隊撤回臣等逆料賊匪鬼蜮伎倆必乘夜上山搶卡預令各營准備是晚果有賊匪前來撲卡土兵及緑營兵不能堅守俱為所動臣等即連夜𣲖兵三路海蘭察明亮泰斐英阿福寧馬彪哈當阿由龍尾山左為一路額森特仁和三德阿爾都由龍尾山右為一路另𣲖老弱兵由中路前進為誘敵之計賊人預揣我兵必上奪卡分路埋伏明亮等兩路兵早已望見佯為不知並不令中路兵與聞冀其前進誘敵可以痛行殲戮賊匪見中路兵已過突出撲戰我兵果為衝動賊即乘勢衝壓惟時海蘭察額森特等所帶官兵由兩翼夾攻奮勇截殺賊即紛紛潰散拚命逃走海蘭察等用箭射死多人追至溝底其時舊教土兵在彼埋伏見官兵得勝亦俱從後奮勇砍殺賊即踉蹌奔竄逮至賊營相近因溝濶磡深不能得利暫將各兵撤回計兩日打仗殺賊共一百餘名漢土官兵受傷陳亡者甚少同日阿桂和珅又奏言臣等莭次欽奉諭㫖令查此案起釁緣由臣等現將拏獲賊黨馬復才嚴切究訊據供我係河州東鄉大禮拜寺二十㑹人從前也是舊教乾隆三十六年才跟隨新教馬明心在撒拉爾地方念經這經來厯都是一樣只是念的不同舊教是小聲默念新教是大聲髙念或搖頭跳舞自三十六年馬明心㑹各處阿渾傳經有河州舊教阿渾馬來遲說是邪教不肯遵從故與他們舊教時相仇殺本年正月內因丁藏莊念經起釁兩家打仗到三月裏舊教回子殺了新教些人後來蘇四十三約齊人半夜裡去也殺了舊教許多人舊教人到循化告狀省城委了官來我們出來分辨被舊教人阻住三月十七日我們又出來到白莊子遇見新副將聽說要動兵剿我們蘇四十三起意才殺了新副將後來又聽見楊知府來已經殺官這事大了不如連楊知府也殺了罷這都是蘇四十三主意二十日去攻河州原想殺馬來遲子孫還要滅舊教的人二十一日早到河州攻了一日至二更時候將城攻破原想回撒拉爾去攻循化又想要兩路攻狄道蘭州因聞總督在狄道看守嚴緊不敢過去在河州住了兩日二十三日聽說馬明心已被省城拏去收監蘇四十三等都趕到蘭州要救馬明心二十四日到洮河西邉渡船已被官役打壞不能過河有洪濟橋唐家川六處回子扎筏渡他們過河這六處回子原都是馬明心新教徒弟內有許多人跟隨蘇四十三同來蘭州連他撒拉爾族共有一千數百人在蘭州打死受傷的有幾百人如今還有千餘人在河州帶來火藥鉛子約有七八十䭾如今却還存二十䭾藏在營內地壕等語又訊據逆犯馬丁加及蘇四十三之姪蘇二個所供亦約略相同臣等復查閲原案本年三月據舊教回民韓哈拉勿韓五個以蘇四十三請來安定縣教師馬明心韓二個等另立新教因伊叔韓哈戶長不隨新教被其殺死彼此互相仇殺共殺老教四十餘人受傷一百多名一切家財牲畜糧食搶掠無存等情在總督衙門控告經勒爾謹飭委蘭州府知府楊士璣前往查辦並劄飭河州協副將新柱親往彈壓㑹同楊士璣督率兵役按名嚴拏嗣據新柱稟稱轉據循化㕔洪彬札知新教回畨韓一的巴拉等有畏罪投案之意而蘇四十三不自省悟煽惑衆心恐到案自投法網執意負嵎抗拒不法已極現與楊士璣一同前往帶領辨目相機辦理等因蘇四十三聞官兵往拏即約㑹各莊新教之人約有一千餘名帶鳥鎗器械先後將新柱楊士璣殺害其時勒爾謹審出馬明心傳教滋事即飭安定縣黃道煚拏獲解省監禁此逆犯蘇四十三起釁滋事實在情形也至諭㫖內詢其爭立新教係由何處流傳向來有無此等名目臣等查檢舊案緣撒拉爾回民約有六千多戶分為十二工各工俱有掌教韓哈濟係世傳總掌教該處回民每遇婚喪必延請本工掌教同總掌教在章哈禮拜寺念經乾隆二十六年韓哈濟與賀麻六乎等同在一處念經搖頭韓哈濟說他不是祖傳老教規矩賀麻六乎又說韓哈濟要的布施多因此兩家不和二十七年賀麻六乎就另起禮拜寺三座至三十四年韓哈濟稟知循化㕔斷令仍歸一處將新起禮拜寺封閉賀麻六乎等懷恨轉以韓哈濟串通馬國寶斂錢惑衆揑稱大聖人到天入地成仙誘人入教等情赴按察使衙門控告而韓哈濟韓武等又訴稱二十七年馬明心夥同楊回子等潛入撒拉爾與賀麻六乎馬索南韓哈勺等妄言禍福煽惑愚人經地方官訪明將馬明心等逐出撒拉爾出示嚴禁追具賀麻六乎永不招留外來游匪甘結詎賀麻六乎等又在章哈寺牆壁畫門為圖妖言門內顯示聖人天仙搖頭念經跳舞等因在臬司衙門具呈其控賀麻六乎一黨即有蘇四十三在內經地方官㑹同審明兩造所稱成仙得利大聖人到天入地及妖言門內顯示聖人天仙惑衆跳舞等情俱係揑詞誣告將賀麻六乎韓武均照誣告人死罪未决律擬以杖流賀麻六乎首先生事從重發烏魯木齊為奴韓哈濟等擬以枷杖馬六個韓哈勺蘇四十三訊不知情均豫免議并議稱該犯等教雖稍有異同實非兩教但既不願合為一處亦不必强之使合轉啓釁端應飭令撒拉爾十二工各舉身家殷實品行端方一人充當掌教令其約束稽查其新寺三座係回民禮拜之所應仍聽分開禮拜以杜爭端各工回民遇有婚喪所延掌教聽從本家之便不得勒令延請等因議擬咨部完結在案此新教流傳兩教互相仇殺緣由也臣等查馬復才供內稱三十六年馬明心令各處阿渾在撒拉爾地方傳經之語是馬明心于二十七年逐回原籍後潜來撒拉爾傳經惑衆地方官並不稽查拏究以致釀成事端至兩教互相仇殺之後舊教至省控告時勒爾謹並不查明兩教强弱衆寡實在情形即𣲖副將帶兵輕率前往逆匪遂激而生變實勒爾謹辦理不善所致統俟勦賊完竣後再行據實查明參奏但新教流傳二十餘年甘省各屬回民新教甚多且有父子兄弟而各為一教者臣等恐各處新教回民心懷疑惑或為逆匪煽誘現已出示曉諭令其各守夲分其未經從逆者决不波纍以安衆心至唐家川六處回民素與馬明心蘇四十三潜通自應一律嚴懲亦已派兵彈壓俟拏獲首犯後再行嚴切查辦至新教是否係馬明心倡立抑另有傳習之人馬明心業經正法無從查一訊亦俟事定後嚴究辦理總之甘省各屬回民雜處據馬復才供稱蘇四十三分遣賊匪往安定㑹寧一帶求救並現據安定縣盤獲奸細馬應髙供亦相符現已分兵前往各處防範但究係新教少而舊教多兩教互相仇怨且舊教土兵現在隨同打仗奮勇出力不能合而為一尚可不致蔓延同日阿桂和珅又奏言臣等遵㫖將伍彌泰仁和等嚴行申飭伏查伍彌泰等自初八日進剿後於初十日又打仗一次十四日海蘭察等到後亦隨同率兵攻撲因未能得利停止數日且華林山岡嶺重復溝墈深陡雖有兵萬餘不能四面登陟攻圍是以賊匪雖止千餘尚難一舉殲盡現在勘明各處要隘添兵堵截使賊人不能偷越自可令其坐困再華林山前後中間原有民間麥田可供牧放是以賊人馬匹非必須草料喂養至所有各處關隘如河州狄道循化沙泥站洪濟橋等處最為緊要現已檄飭副將遊擊等分路帶兵把守其餘各山僻小路亦俱派委員辨兵丁分頭防駐無虞兔脫再查回人素不崇信佛教蘇四十三圍城時所有關廂內庵觀寺院俱被放火燒燬賊匪之是回非畨尤顯而易見其在撒拉爾者止有此一種𨽻于土司韓煜共有千餘戶隨蘇四十三新教為逆者八百餘戶衣服多穿白褐亦能漢語形狀與內地回子相仿惟將鬚辮剪短各營並無此類食糧之人其在循化河州充當衙役者間或有之至土司魯璠於元明以來世襲土司管束莊浪土兵本朝順治康熙年間曾隨征立功魯璠之祖魯華齡曾任甘州城守營參將署凉州鎮總兵魯璠之父魯鳯翥於乾隆二十年協濟軍需臺站馬匹議叙軍功加級該土司世受國恩最為恭順現又奮勇出力嗣因受傷後遣回調養此外隨從打仗出力者有舊教土司韓煜業經奬賞並奏請加恩鼓勵其餘隨同打仗之土司尚有數人俟伊等有出力之處臣等再行酌量奬勵均奏入上命軍機大臣傳諭阿桂和珅曰本日覽阿桂等奏四月二十六七兩日派兵分路進勦一摺所稱溝濶磡深且有至丈餘不能過去者各處小路又被賊處處挖斷是以暫將官兵退回該處既云溝濶磡深則賊人何從前出撲卡又能竄回死守豈賊人能過而我兵轉不能過乎殊不可解看此情形恐竟須俟川兵及阿拉山兵到後方能勦捕净盡此時未能尅期了事至詳閲覆奏新舊教搆畔緣由一摺是此案起釁釀毒已久若勒爾謹早為嚴切辦理何致搆成事端乃伊竟毫無措置以致悮事不小實斷不可復留至新教逆回如此肆擾實為罪大惡極不可不嚴斷根株如所稱洪濟橋唐家川六處回子素與馬明心蘇四十三潛通且扎筏渡賊匪過河尤為罪不容誅此事應於勦賊事平後趁兵威嚴整之時痛加懲治以警凶頑不可姑息了事此皆阿桂在彼應督辦之事其餘地方善後各事宜不妨交李侍堯辦理其拿獲之馬復才等及從前已獲各犯即派員先行解京至朕為此次逆匪之案日夜焦勞籌計於數千里外阿桂須仰體朕懷悉心督辦隨時奏聞以慰厪念己卯上命軍機大臣傳諭李侍堯及各省督撫曰昨阿桂等奏查明甘肅逆回新舊教起釁仇殺緣由一摺此等逆回在該處煽惑愚人妄言禍福甚至設立掌教及總掌教之名以致無知回民被其愚惑入教指揮聽令現在逆回蘇四十三等即其餘黨竟敢率衆抗拒官兵總由當日養癰貽患所致著李侍堯于辦理撒拉爾善後事宜內將總掌教名目不動聲色令其裁去並各省有無似此等回教名目者亦令一體妥為裁革至韓哈濟與賀麻六乎等爭教互訐非尋常案犯可比自當據實奏聞按律嚴辦以示懲警乃當日該督撫僅以咨部完結刑部亦照咨率覆或入于彚奏均屬錯悮嗣後各省督撫遇有此等邪教爭控聚衆念經之案即應親提案犯嚴審從重究擬據實具奏以净根株不得顢頇了事率行咨部完結致復蔓延滋事刑部堂官遇有此等外省咨結之案亦即據實特奏從重定擬不得咨覆完案至邪教案內凡有發遣之人不得發往奉天吉林及新疆等處致將邪教復行煽惑民人被其愚誘將此傳諭李侍堯及各省督撫一體遵照臣等謹案新舊教仇殺始自賀麻六乎等傳經惑衆互相訐訟其釀毒肇釁已非一日彼時大吏不能嚴斷根株顢頇了事致使餘孽蔓延肆行不法雖兵威所懾悉膏斧鉞而究其養癰貽患之由實咎有攸歸皇上特命宣諭各省督撫俾回民悉安舊業惟裁去總教名目誠以椎魯小民易滋煽惑與其懲治於事後不若潜化於未萌至若讞牘既成申誡大吏毋稍寬縱並諭刑部奏明從重辦理蓋聖人之心無非欲去稂莠而安善民使萬物各遂其生所以為仁之至義之盡歟辛巳文綬奏言竊臣於四月二十八日接准大學士公阿桂尚書和珅咨稱飭令維州協副將李天祐揀帶屯練兵丁並土守備降畨等共一千名由松潘一路迅速來甘協同勦捕等因臣即扎松潘鎮總兵劉俸維州協副將李天祐於雜谷腦五寨屯練內挑選曾經出師得力兵丁八百名精壯降畨二百名即交阿桂等指調之都司汪啓守備關聫升張占魁並土守備木塔爾丹把西拉布等分起帶領均著李天祐統領尅日由松潘之柴門關一帶兼程進發至降畨係松建二道所管柴門關一路為松茂道所屬並飭該道王鳯儀署道賈廷彥等星赴各該處督率沿途經過地方將一切應付事宜妥協辦理奏入上命軍機大臣傳諭阿桂和珅曰據文綬奏所調川省屯練等兵一千名已尅日進發計此時早可陸續前抵蘭州即阿拉山兵亦可漸次到彼協同勦捕阿桂等是否必須俟二處兵到方可進勦抑或相度機宜有可先行乘間設法擒捕之處著即將現辦情形迅速馳奏以慰厪念壬午阿桂和珅奏言臣等在滿漢官兵內㨂選一千五百名作為三隊派海蘭察額森特明亮福寧泰斐英阿哈當阿侍衛阿爾都統領由龍尾山過溝至華林山直撲賊營派伍彌泰薩炳阿馬彪仁和三德分帶各隊滿漢官兵占踞龍尾山梁接應堵截臣阿桂臣和珅督催策應俱于初二日丑時先後進發寅刻齊集山梁查龍尾山至華林山中隔大溝一道崖磡甚陡其華林山左臨溝一帶壁立數丈雖有小路俱為賊人挖斷不能由此前進山右現為賊匪所踞無由繞進惟山前一路可通須下龍尾山過水磨溝而上路亦甚險賊匪預料我兵必由此路進攻於漫坡接連兩旁溝磡處所刨挖深壕以為抵禦之計惟時海蘭察等帶領奮勇官兵及舊教土兵搶上華林山直撲賊營賊匪自盤踞以來從未見我兵得上華林山者遂傾穴出迎拚死抗拒我兵撲至壕邉賊匪在溝內放鎗抵禦勢難踰越因令舊教土兵佯作敗退之狀我兵亦往後稍退誘賊出濠方可大加殱戮相機撲進其時賊匪果有六七百人全行衝出希圖追壓我兵退至稍平處所海蘭察額森特明亮等帶領官兵奮勇截殺勦戮多人賊即紛紛敗逃我兵追至溝邉賊匪拚命跳入而溝內亦尚有賊匪數百潜藏放鎗我兵不能得利因復暫退誘其出濠勦殺如此三次賊性狡猾其第二次出迎已較前漸少至第三次則竟藏匿不出自寅時打仗起直至申未因山上並無水泉我兵難以久駐其時海蘭察額森特明亮先令各兵徐徐撤回伊等在後防護賊匪不敢再行近前此次打仗計殺賊二百餘名殺死賊人頭目二名割去賊人首級及搶獲馬匹器械甚多此次滿漢官兵及舊教土兵實屬奮勇出力雖未能一鼓勦滅而賊匪經此一畨創敗亦已魂膽俱破但賊人負固死守上山下溝中間多係一線魚貫而行之路不能一擁而進是以臣等現在另行籌畫布置相機進勦同日阿桂和珅又奏言臣等察看華林山一帶形勢較之兩金川險峻誠屬大相懸絶但賊人占據山梁負固死守我兵必由龍尾山過溝再上華林山梁下壓賊營而山腿經山水冲刷俱成橫截立墈自數丈至十餘丈不等止容一人一騎上下兵力不能施展且賊人潜於墈後放鎗勢難下壓是以初二日打仗臣等止㨂選奮勇滿漢兵一千五百名直撲賊營誘令向前方能大加殲戮若使大兵可以長驅直進即各路所調兵丁現有萬餘誠如聖諭以十人而擒一人自無難一鼓勦滅現在惟有督同海蘭察額森特明亮等設法進勦迅速集事以期仰慰聖懷再土司韓煜現已遵㫖賞給三品頂帶并賞戴花翎加賞大縀二匹該土司感激天恩自必愈加奮勉至該土司管理撒拉爾一族回民由元明以來世襲土千戶之職韓煜于乾隆二十九年承襲兵部給與號紙𨽻循化㕔同知管轄均奏入上命軍機大臣傳諭阿桂和珅曰據阿桂等奏本月初二日勦賊情形一摺此次所辦尚好但勦殺賊匪不為快意至所稱崖墈止一人一騎魚貫上下之語山徑路窄雖不能一擁前進但賊人可以魚貫而行我兵轉不能魚貫而行乎况金川賊畨亦何嘗不死守今地勢較兩金川既大相懸絶豈有金川能進兵而此處賊匪反不能勦捕之理阿桂等務即上緊妥速為之同日上諭內閣曰四川建昌鎮總兵鄂輝著賞銀一百兩馳驛前往甘肅交大學士公阿桂差遣委用事竣後即回本任癸未上命軍機大臣傳諭阿桂李侍堯曰現在賊勢日益窮蹙從前所掠糧食較多而困守山梁日久人畜必漸皆乏食所謂釜底游魂計日待斃此時轉須計出萬全不宜輕率舉動稍傷兵力惟賊人自知窮迫難支不甘就死或於黑夜中乘間分竄此則不可不實力嚴防著傳諭阿桂於派員安兵各隘口務須晝夜嚴密巡查毋使一賊得以逃竄至昨日奏到摺內稱山上並無水泉我兵難以久駐等語賊人所據之山無水可汲官兵防守又嚴賊更何從得飲果如所言則山下之水溝我兵即應占守既杜其飲汲之源兼截其逸出之路阿桂久厯行間於此等事最為嫺習自應一一籌計及之也至此案起釁滋事緣由係安定縣回民馬明心潜行往來撒拉爾地方傳經惑衆該犯以內地回民敢於如此肆逆則該處必尚多回匪聚集隨同入教者必須查拏嚴辦以淨根株又前此所奏蘇四十三分遣賊匪往安定㑹寧一帶求救現在盤獲奸細馬應髙供亦相符等語是此兩處匪回亦不可不實力查辦又所奏唐家川等六處回人均係馬明心新教徒弟賊匪到洮河時該犯等為之扎筏過渡情罪甚為重大業經傳諭趁兵威嚴整之時即行查辦至撒拉爾地方畨回錯處是否循化㕔同知得有幹練之員即足以資料理抑另須大員彈壓再此次起事之始因省城駐兵較少以致不能即時撲滅將來事畢後甘省地方竟宜多添官兵數千時常操演平時既足以資鎮壓臨事更易以供調遣較之有事後逺為派調徒費錢糧不能濟急者得失較然其應于何處添駐并一切事宜并著阿桂李侍堯於善後案內一併妥議具奏同日阿桂和珅奏言本月初四日接奉諭㫖將勒爾謹革職拿交刑部治罪派委妥幹章京管解來京並命臣等將勒爾謹所奏駐劄城外派兵保護關廂現在按時啓閉聽民取水等因查明據實具奏臣等即傳到勒爾謹令其跪閲勒爾謹伏地叩頭自稱身受皇上重恩畀以封疆重任如此種種辦理錯謬貽悮地方實為萬死莫贖只求皇上將我從重治罪等語臣等隨即傳㫖將勒爾謹革職拿問即派奉㫖發來甘省差委之吏科給事中李照顔料庫員外郎豐紳看守管押於初六日起程解京交刑部治罪其陜甘總督印務臣阿桂遵㫖暫行兼管俟李侍堯到後即行交代至勒爾謹前自狄道州抵蘭後曾在城外駐劄三日因城中居民心懷疑畏見總督到省亦住城外愈覺張皇該督始移入城內彈壓是以摺內有駐劄城外詳悉籌酌之語其所稱逆酋未獲城門未開現在派撥官兵把守東門一節誠如聖諭示寇弱而怯兵志尤屬不成事體臣等先後到蘭州時亦見城門關閉居民晝夜上屋瞭望其惶遽擾亂情形實堪憤恨于十九日即嚴諭禁止令將城門照舊啓閉派兵巡查現在節次打仗得勝之後兵氣稍揚民心日就安貼市肆鋪面俱已開設齊集再臣和珅于初六日起程回京奏入報聞甲申上命軍機大臣傳諭阿桂和珅曰甘省逆匪一案朕書夜縈懷如阿桂和珅所奏蘇四十三往安定㑹寧一帶求救阿桂等既查得此等情節自應派兵迅往查拿剪除賊黨又如唐家川等處匪回敢與逆賊扎筏渡河亦係黨惡要犯現在是否已經拿獲嚴辦阿桂等摺內均未聲明昨已降有諭㫖令其不動聲色妥協經理著傳諭阿桂即將實在情形迅速覆奏至和珅未起程之前此等事是否已㑹同阿桂商辦並著諭令於途次接奉此㫖即先行覆奏丙戌上命軍機大臣傳諭阿桂李侍堯曰就現在勦賊情形而論阿桂之意似欲候川兵及阿拉山兵到齊以川兵攀踰險阻直搗賊巢以阿拉山兵防其竄逸乘騎追捕一鼓而前可以勦洗淨盡惟是逆賊罪大惡極必須將首犯蘇四十三及幫同主謀之犯生擒解京盡法處治方足以正刑章而申國憲阿桂等務須設法生擒解京治罪至馬明心係內地回民非如韓煜之世襲土司者可比乃竟敢倡教惑衆實與賀麻六乎同為此案罪魁是否係安定縣知縣自行拿獲抑係勒爾謹差往擒捕著阿桂詳悉查明覆奏同日上又命軍機大臣傳諭阿桂李侍堯曰前據勒爾謹奏報收復河州時除將賊黨殲斃外擒獲蘇四十三之姪蘇二個胞姪蘇五個并要犯馬八十三等十七名又搜獲子女回婦二十三口并節次生擒逆賊一百零九名婦女幼孩一百數十口現在嚴行監禁等語此等黨惡要犯其應行解京訊問者不過數人多亦不過十人著即行派委妥幹員辨押解送京此外隨同抗拒打仗之犯均係罪無可逭即應於該處按律正法即將來擒獲蘇四十三並為逆匪出力之主謀大頭目等自應解京訊問其餘無關緊要之犯亦即於該處正法至其餘緣坐各犯非尋常邪教逆詞等案尚可邀減監候者可比自應按律即豫駢誅以昭國憲其婦女小口亦即就近發往伊犂之索倫察哈爾厄魯特等兵丁為奴不必拘泥成例給付功臣之家為奴俾轉得衣食豐足且省長途解送之煩著傳諭阿桂李侍堯即行分别嚴辦嗣後若有續獲之犯亦俱遵照辦理欽定蘭州紀略卷六
