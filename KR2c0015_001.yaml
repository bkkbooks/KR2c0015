body:
  text: 乾隆四十六年三月二十八日辛丑陜甘總督勒爾謹奏言據蘭州府循化同知洪彬稟報廳屬撒拉爾回人蘇四十三等因爭立新教將舊教回人殺傷數名臣隨委蘭州府知府楊士璣河州協副將新柱前往查辦三月二十日午刻據楊士璣稟報新柱與該府帶領兵役前往循化十八日申刻行至白莊子被新教回匪千餘人將莊圍住等語臣不勝駭異即選派本標兵二百名帶同臬司福嵩星夜前往該處務將逆犯全數查拏嚴審治罪儻敢負固不服即檄調附近官兵相機辦理同日勒爾謹又奏言二十日戍刻途次據署河州知州周植稟報新教逆回於十八日晚將知府楊士璣副將新柱殺害等語臣思逆回罪大惡極必須迅速勦除隨飛調固原涼州甘州西寧肅州五提鎮兵共二千名星速前往臣於現帶本標兵二百名外又續調三百名帶同福嵩連夜兼程前赴相機勦捕並札令提督仁和前往會同商辦又據河州署都司李奇稟報已派兵二百名交署守備袁尚仁帶往該署都司現在看守城池均奏入上命軍機大臣傳諭勒爾謹曰回人爭教細事何致因此殺害大員其所爭立新教係由何處流傳向來有無此等名目是否另有希圖搶劫别情勒爾謹摺內總未明晰聲敘將來獲犯時均應逐細審究詳晰具奏不可絲毫隱飾至勒爾謹初派本標兵二百名原屬過少其知府楊士璣副將新柱前往查拏時辦理亦未能妥協以致被賊殺害况知府副將係文武大員所帶官辨兵役自復不少若因兵少不能抵禦被賊傷損者多以致知府副將同時遇害自應據實奏聞朕必加之優恤若官辨不能督率兵役奮力禦賊甚或兵役等畏怯先逃致領兵大員遇害則逃兵等均應拏獲正法不可少存姑息著傳諭勒爾謹俟事定時遵照辦理至所帶兵數前後幾及三千又札會提督仁和前往會辦仁和係曾經出兵打仗之人軍務頗為熟悉勒爾謹當與之和𠂻速辦總以慎重明決為要并諭仁和知之臣等謹案甘肅地界邊陲民貧土瘠我皇上德澤涵濡痌瘝在抱撫綏賑恤無一不上廑宸衷至如蘭州河州等屬錯處番回沐浴恩膏均入帡幪之宇乃撒拉爾逆回蘇四十三等因爭教搆釁竟敢戕害長官肆行抗拒實出覆載生成之外其時督臣奏函甫達皇上首以慎重明決為諭嗣後屢示機要迅就掃除皆由睿謨廣運炳燭幾先是以數千里外如在目前也壬寅勒爾謹奏言臣於二十二日午刻行抵狄道州據河州協兵丁李成得報稱逆回男婦約有二千餘人各帶馬匹器械於二十一日二更時圍困河州城殺死守城兵丁一擁而入將州城占據署都司及知州未知存亡該兵逃出飛報等語逆回殘害大員占據城池殊堪髮指臣擬即親往勦滅但所帶本標兵丁僅有五百名衆寡不敵恐有踈失未敢冒昧且狄道緊鄰河州若狄道有失則省城亦屬可虞是以在州城屯劄堅守俟前調兵陸續到來如足一千名之數即親帶前往務將逆回盡行勦滅以快人心而伸國法奏入上命軍機大臣傳諭勒爾謹仁和曰此時勒爾謹帶兵無多自應持重堅守俟仁和并前調各兵陸續到來一鼓擒滅方合機宜自不便輕易舉動至逆回夲因爭立新教致相仇殺今閲該督摺內所稱殺官抗拒占據州城之賊如係新教首逆即應明切曉諭舊教之人赦其互相爭殺之罪作為前驅令其殺賊自效如此以賊攻賊伊等本係宿仇自必踴躍爭先既壯聲勢又省兵力而賊勢益分勦滅自易著勒爾謹與仁和相機妥辦至河州城池堅固有文武官辨兵丁守衛何致賊匪一擁而入將城占據其平日所為守禦者何事所有該署都司及知州等應查明下落如因城池失守以一死塞責尚有可原如竟茍活潛逃即當立正典刑以昭炯戒除另行傳諭西安提督馬彪帶兵二千名前往協同勦捕外並令西安寧夏將軍各預備滿兵一千名如必須協濟該督即一面飛調一面奏聞至健鋭火器兩營尤為徑旅現亦挑選預備該督與仁和務須和衷協力妥速辦理同日上命軍機大臣傳諭馬彪曰勒爾謹所帶兵丁恐不敷用提督馬彪曾經出兵打仗著即挑選各營精壯兵丁二千名選派勇幹將辨帶領星速前往隨同勦捕毋致稍稽時日同日上命軍機大臣傳諭欽差大學士公阿桂曰據勒爾謹奏蘭州撒拉爾回匪蘇四十三等搶據河州城勒爾謹因兵力尚少現在屯兵狄道州俟各路營兵調齊即行進勦等語現已傳諭西安提督馬彪帶兵二千名迅速前往並諭西安將軍伍彌泰寧夏將軍莽古賚各選集兵一千名預備儻須調用即令前往協同勦捕並於火器健鋭兩營兵丁內挑選預備阿桂此時查辦河務已將次就緒著即速起程來京儻有必須徑旅之處阿桂即可帶兵前往著將前降各諭旨及勒爾謹仁和奏到各摺一併抄寄閲看同日甘肅布政使王廷贊奏言二十一日申刻據報賊匪進逼河州勢甚猖獗現在督臣勒爾謹帶兵前往勦捕臣即飛稟督臣加調官兵速為應援并嚴飭附近地方官多集兵役堅守城池查省城重地甚為緊要臣現同蘭州道圖薩布候補道永慶督同文武官員派撥兵役嚴密稽查小心防守並安慰居民毋使驚擾奏入上命軍機大臣傳諭王廷贊曰蘭州係省城重地著令王廷贊督率堅守並須不動聲色毋得過涉張皇若稍有踈虞王廷贊不能當其咎也癸卯西安將軍伍彌泰陜西巡撫畢沅副都統薩炳阿西安提督馬彪奏言臣等於本月二十四日接準督臣勒爾謹札開甘肅撒拉爾回匪爭立新教互相仇殺并將知府楊士璣副將新柱傷害現已選派本標及檄調各鎮官兵親往勦捕等語查逆回凶殘不法實為天地所不容今督臣帶兵前往自當立即勦除但臣等思回匪必嘯聚多人方敢肆行抗拒且其地內逼河州外連番境若再稍稽時日不能全數誅鋤更屬不成事體自應協調官兵前往方足以資策應臣馬彪久在軍營兼以生長西寧熟悉情勢因即於二十五日星夜先行馳往并遴選西安緑營精兵一千名臣畢沅妥速料理派委西鳯營參將富舒後營遊擊海柱於二十六七等日分起帶兵迅赴河州臣伍彌泰薩炳阿現亦預挑西安滿兵一千名與臣畢沅察探情形倘有必須調度之處臣伍彌泰曾駐西寧稍為諳悉即當親自帶往奏入上命軍機大臣傳諭阿桂曰據伍彌泰畢沅等奏提督馬彪已於二十五日星馳前往並選兵一千分起迅赴河州又伍彌泰現挑西安滿兵一千預備親自帶往接應所辦與昨降諭旨相合甚屬可嘉至新舊教既自相仇殺必非合夥或赦一勦一以分其力未嘗不可而其互相仇殺之罪待事定再辦此等機宜恐勒爾謹不曉且爭教仇殺起釁自非一日勒爾謹何以早未籌辦此時各路大兵雲集調度機宜最為緊要恐勒爾謹未能料理悉協著傳諭阿桂竟不必來京即從河南取道徑往甘肅程途較近所有節次所降諭旨并批示奏摺已經抄寄閲看亦别無訓諭之處阿桂即由河南馳驛前往到甘肅後即將查明新教舊教及調度勦賊情形迅速具奏同日上命軍機大臣傳諭勒爾謹曰前勒爾謹所奏回匪名目及新教舊教總未明晰既係兩教爭立互相殘害斷無官兵緝捕時轉致合而為一之理究係何教之人首先抗拒逞凶現在彼一教情形若何著勒爾謹即查明覆奏此時總須鎮靜辦理不可稍涉張皇再昨降旨預備健鋭火器兵各一千因思自京至甘肅程途四千餘里若由烏魯木齊選兵前來較為近便已另降諭旨令奎林預備如有必須協濟之處勒爾謹即一面奏聞一面飛調甲辰勒爾謹奏言臣現在駐劄狄道候兵力稍集即行擒勦查蘭州固屬省會重地但若專顧省城恐狄道有失臣起程時已留中軍副將和成額小心防守一聞河州失事即飛飭布政使王廷贊會同和成額加倍嚴防至各鎮道路遙逺調兵未到其西寧鎮屬原調兵四百名兹據該鎮署副將貢楚達爾稟報現已派兵一千名率同將備分起帶往臣隨飭令迅速前進一到循化即就近直搗賊巢臣領兵由狄道河州一帶分途擒勦兩路夾攻仰仗聖主天威自能全數就獲勒爾謹又奏言查固原鎮總兵圖欽保奏請陛見已蒙恩允臣現委洮岷協副將䇿卜坦接署鎮篆兹圖欽保尚未起程臣即檄調帶兵前來幫同勦捕䇿卜坦暫令駐劄蘭州協同防守再臣原派涼州鎮屬兵四百名據該鎮總兵官德寧報稱原調四百之外又添派二百名已於三月二十三日帶領起程均奏入上命軍機大臣傳諭勒爾謹曰據勒爾謹奏現駐狄道州候兵力稍集即行進勦自應如此辦理此時務須持重安慰衆心至署西寧鎮副將貢楚達爾已派兵一千率同將備前進頗為勇往曉事如到彼果能出力即可勝西寧總兵之任又現在調集之提鎮仁和馬彪圖欽保等均係效力戎行熟習軍旅之人勒爾謹當與之和衷共濟將來仁和等勦賊成功即勒爾謹之功切忌自用同日上命軍機大臣傳諭阿桂曰昨降旨令阿桂馳驛前往甘肅辦理勦滅逆回事宜此時諒已奉到前旨迅速遄行矣因思阿桂到彼調遣需人已派乾清門巴圖魯侍衛福寧泰斐英阿明山阿蘭保各賞銀一百兩馳驛前往甘肅聽候阿桂差遣又現在來京引見之肅州都司馬雲即係西寧人熟悉該處情形亦賞給銀一百兩隨泰斐英阿等一同馳驛前往聽用看來此事起釁已久勒爾謹平日不能約束使之知威知懼或存將就了事之見以致釀成事端阿桂務惡心籌畫妥協辦理將賊匪勦滅盡絶根株以靖地方並此案或因勒爾謹辦理不善或係地方官釀成均著詳晰查明具奏臣等謹案回衆爭立新教與舊教互相仇殺肇釁已匪一日使地方大吏早為審斷經理得宜原可弭患未形乃姑息因循寖致養癰貽害勒爾謹實難辭咎我皇上洞燭如神於逆回起事之時已知督臣素無約束釀成事端命臣阿桂即由河南馳驛前往詳晰查辦臣阿桂等仰稟睿裁悉心調度凡綏靖機宜靡不在聖明宵旰中矣同日伍彌泰畢沅薩炳阿奏言臣等挑撥緑營兵一千名已於二十六七等日派員分起帶領全數起程約計四月初五六間即可前抵蘭州復接據布政使王廷贊等稟稱逆回已將河州攻破該回匪勢甚猖獗自應厚集兵力尅日勦除昨臣等預挑西安滿兵一千必須前往接濟方為妥協現已分作兩起臣伍彌泰於二十七日親自率領頭起官兵並攜帶印信星速起程其第二起即於二十八日派委協領等帶領前進與督臣勒爾謹等商酌相機會勦奏入報聞同日畢沅又奏言二十八日辰刻接據蘭州馬兵袁秉文稟稱逆回於二十五日午刻進逼蘭州焚燒關廂所有調到涼州鎮羌靖逺及大城看守兵丁傷折過半大城眼前失事等因逆回凶殘不法變出非常急須厚集兵力速行殄滅查馬彪帶領西安緑營兵一千伍彌泰帶領西安滿營兵一千已先後進發臣聞信後復飛札催促趲行應援臣前酌量逆回情形已於所調兵二千餘名外預調延綏鎮兵一千名現又續調一千名令從固原平涼一帶星速前往又飛調興漢鎮兵五百名令總兵三德帶領從略陽鞏秦一帶前往但各處路途遙逺官兵即晝夜遄行到彼亦須時日而逆回猖獗已甚非得八旗徑旅恐未能立即勦除仰懇皇上迅發京兵并派熟悉軍務大臣帶領前來以資策應至陜省此時兵力合計不過萬餘現已檄調三千五百名而南北地方遼濶兼之漢鳯略陽陽坪關隴州等處亦係外通畨境處處緊要均須妥為防守是本省兵丁不敷再調臣已飛札知會四川督臣文綬將軍臣特成額提臣明亮飛調官兵由略陽一路間道前赴甘省之秦鞏一帶以便堵截會勦復飛札河南撫臣富勒渾山西撫臣雅德飛調該二省官兵前赴西安省城聽候調遣至沿途臺站車輛馬匹糧餉軍火器械各事宜臣已與布政使尚安按察使浦霖等分頭迅速妥備務期無誤軍行再西安省城存貯火藥鉛丸除已調發外庫內所存無幾臣現在催促製造陸續運往並飛咨河南山西撫臣令其各備五萬斤速派委員運送西安以資接濟奏入上命軍機大臣傳諭阿桂畢沅曰本日畢沅奏逆回進逼蘭州焚燒關廂省城眼前失事已飛札文綬等調兵會勦復札富勒渾雅德調河南山西兵前赴西安聽調並懇迅發京兵派熟悉軍務大臣帶領前往等語昨已傳諭阿桂令其即由河南星赴甘肅今逆回如此猖獗阿桂應即迅速遄行現派尚書和珅額駙拉旺多爾濟領侍衛內大臣海蘭察護軍統領額森特馳驛前往甘肅並派巴圖魯侍衛帶健鋭營兵二千名火器營兵二千名即日分起迅速前往如和珅等先到甘省即行調遣辦理俟阿桂到彼即交阿桂接辦和珅仍即回京供職同日上命軍機大臣傳諭袁守侗文綬特成額明亮富勒渾雅德曰畢沅奏調四川官兵現有從前曾經平定金川之兵可以調往堵截至河南山西二省兵本不多且防守亦為緊要該撫等止須預備于本省邊境聽候調遣不必即赴西安惟所需河南山西各備火藥鉛丸五萬斤即當迅速辦運接濟至京兵四千名由直𨽻山西一路前往所有應用馬匹車輛及例應供給之處必須早為預備俾京兵迅速遄行同日畢沅薩炳阿奏言逆回進逼蘭州必須再調滿兵以資䇿應臣薩炳阿現已挑選西安滿兵六百名即日帶領起程星夜前往與臣伍彌泰協兵會勦所有滿營各事務現交臣畢沅管理奏入上嘉之乙巳上諭內閣曰現在甘肅需用銀兩甚屬緊要所有該省春撥銀八十萬兩尚恐不敷著再於部庫內撥銀一百萬兩仍於鄰近省分先行遞撥解往俾得迅速濟用該部即遵諭行上又諭內閣曰農起著賞戴花翎馳驛前赴甘肅辦理軍需李侍堯著加恩免罪賞給三品頂帶並賞戴花翎與副都統黃檢一體馳驛前往並著和珅傳旨黃檢即由保定前往不必來京同日上命軍機大臣傳諭阿桂和珅曰現在甘肅省事務紛繁急需大臣協同料理而軍需出入尤關緊要因思李侍堯前經獲罪但其才識可用此時需人之際不能復拘常格已傳旨免其前罪賞給三品頂帶花翎令前往甘肅又安徽巡撫農起來京陛見人尚結實亦令其前往又昨因黃檢在山西直𨽻聲名平常念伊祖黃廷桂舊勞仍用為副都統伊辦事尚屬勇往著和珅於過保定時面傳諭旨令其隨往伊等三人俱著總辦甘省軍需事務此外如有應辦事件阿桂和珅亦可一面交辦一面奏聞並派司員內京察記名以道府用之海廣李照豐紳蘇楞泰保年景如柏前往甘省交阿桂和珅差遣委用再應用武職人員現在派往之乾清門侍衛等即可酌量調派其候補副將和倫亦已傳旨前往此外如尚有需用武職人員並著就近檄調至阿桂和珅辦理此事必須印信已令福長安齎欽差大臣關防交與和珅帶往甘肅俟見阿桂即令轉交應用同日上命軍機大臣傳諭畢沅曰此次甘省需用銀兩較多已諭令該部於甘省春撥銀八十萬兩外再撥部庫銀一百萬兩並先令鄰近省分遞撥解往著畢沅即於陜省庫貯內先行酌撥選派妥幹員辨帶領兵役護送毋稍踈虞同日山西巡撫雅德奏言臣於三十日未刻準陜西撫臣畢沅札稱撒拉爾回匪直撲蘭州兵力不支陜省存營兵丁無幾現已請調京兵恐緩不及濟晉省與陜甘較近迅即酌派官兵星夜前來赴甘會勦等因伏思小醜跳梁必須多派官兵進勦以期迅速蕆事擬派太原鎮兵一千五百名大同鎮兵三千五百名共兵五千名已飛咨兩鎮調撥並多帶鳥鎗兵以資得力查大同鎮界處邊陲地方緊要且現在殺虎口副將尚未到任未便擅離太原鎮總兵福敏泰熟練軍務即令該鎮將所派兵一千五百名限三日內帶領起程其大同鎮所派兵三千五百名每兵一千名派出參遊一員為總領再派都司一員守備二員千總五員把總外委各十員分司管束並備隨營調遣之用挨次起程總歸福敏泰管轄協同會勦奏入上命軍機大臣傳諭阿桂和珅雅德富勒渾曰昨傳諭山西河南官兵止須在該省邊境駐劄以備調遣今據雅德奏言派兵五千名令太原總兵福敏泰帶領赴甘會勦是晉省兵丁業經起程現在和珅前往甘肅驛路本由山西行走即於經過時帶兵前進聲勢更為有益至河南兵力本不及山西著仍遵照前旨於本省邊境駐劄毋庸前赴甘省同日王廷贊奏言臣於督臣勒爾謹帶兵起程後率同文武各員嚴守省城城中兵除勒爾謹帶去五百名外止存督標兵三百餘名臣隨檄調附近之莊浪滿兵三百名漢兵二百名涼州滿兵六百名西寧鎮兵於原調四百名外又調一千名前來應援河州距省三百八十里逆回占據河州後即於三月二十五日帶賊衆三千餘人由間道徑抵蘭州幸是日莊浪滿兵三百靖逺漢兵二百先至臣即撥派兵二百名民壯百餘名出城在路口迎擊我兵多有損傷賊人直困蘭城今已兩晝夜於二十七日巳刻聞涼州滿漢兵九百名已抵省城之河北正欲渡黃賊衆竟殺傷護守浮橋兵民將橋拆斷把住河口兵難過河城內守兵單弱勢在危急而督臣駐劄狄道以待援兵均不能尅期即至臣為國家城池人民所關甚重不即死戰以誤大事惟有悉力守禦倘荷聖主洪福固原西寧之兵旦夕一至庶可獲全王廷贊又奏言此案內有安定縣回民馬明心係新教之主前經循化廳查出解省收禁今賊人來犯省城並聲言索取馬明心臣許其城上一見諭以稟明督臣俟批覆到時即行釋還原欲為緩期集兵之計但逆回凶惡實不可信况該犯為新教起事恐遲則生變或致被賊搶歸臣於令賊人見面後即將馬明心正法以免踈虞奏入上命軍機大臣傳諭阿桂和珅伍彌泰畢沅馬彪王廷贊曰據王廷贊奏報賊匪直抵蘭城困守兩晝夜等語伊係文臣能如此固守若再待數日援兵一至即可保全城池是即王廷贊之功深為可嘉又奏稱賊人索取馬明心王廷贊許令城上一見後即行正法既安賊匪之心又將賊首正法辦理甚合機宜著伍彌泰馬彪速催滿營緑旗各兵丁迅速前進赴援此時伊等統兵行至何處距蘭州尚有幾站即速奏聞王廷贊著賞戴花翎並賞御用大荷包一對小荷包二對交與伍彌泰等遣人齎賞王廷贊並傳旨嘉奬和珅接到此旨時亦即催伍彌泰馬彪所帶之兵迅速行走並將王廷贊能固守省城先除賊首之處明晰奬諭至此次為王廷贊齎摺出城之人亦屬能事可嘉並著伍彌泰等查明重賞以示鼓勵臣等謹案逆回占據河州進逼省城肆擾無忌實為罪惡貫盈皇上以蘭州省會重地早飭藩司王廷贊督率防護毋致疏虞兹因王廷贊奏報固守蘭城以待援兵之至嘉其守土勤勞奬賚稠渥復念及縋城馳摺頗屬能事亦令並逮恩施甄録所加不遺微末是以身受者無不感奮自效也欽定蘭州紀略卷一
