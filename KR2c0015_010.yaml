body:
  text: 戊辰上命軍機大臣傳諭阿桂李侍堯曰夲日據刑部解到從賊逆匪馬復才令軍機大臣嚴訊據馬復才供蘭州南關馬姓蕭姓回子俱有為賊接濟糧食之事著阿桂於辦畢正賊時一併查辦又供唐家川為賊扎筏過渡之回子約有七八十人馬常福為首又有唐德成唐蘇麻亨唐復有張老師父張國相也幫同扎筏等語唐家川助賊逆回夲應剿洗其指出各犯尤當實力查拿毋使一名漏網又供蘇阿渾説將來做不成事即要逃往苦蘆灣在洮河西岸約離西古城二三十里現在賊營尚有該處逆回三百來人都會打仗等語苦蘆灣如果有從賊三百人則此三百家即係賊黨亦應一併剿捕著傳諭阿桂將苦蘆灣地方查明於圖內添繪貼説呈覽己巳阿桂李侍堯奏言查賊營之前尚有溝濠二道溝上俱有賊卡我兵於閏五月十六日已撲至第一層溝邉賊匪在第二層溝墈及營內放鎗抵禦不能撲進即於迤西安設營卡並令馬兵接連占至黃河邉嚴密防守是夜賊人不敢復出攻撲惟於十七日申刻烈風暴雨時賊匪乘勢出壕衝突被鎗箭殺死十餘人始行退入溝內藏匿拚死支持臣思賊營既在掌握不值用力攻撲傷我官兵且恐我兵一擁進攻賊匪鋌而走險不能保無竄逸因與海蘭察明亮公同熟商於夲布爾廟迤西至蓮花池繞出華林寺從陡墈下直接龍尾山俱安設官兵木城營卡星羅碁布空缺處并刨挖深壕四面圍困使賊人不能下至黃河取水其華林山東水磨溝之水派員前赴上遊相度地勢可以旁泄處俱令旁泄其水磨溝業已斷流賊人水道既斷數日內不戰自亂可以盡數擒剿而官兵周圍攻打亦斷不致耽延時日奏入上命軍機大臣傳諭阿桂李侍堯曰閲阿桂所奏現在安設木城營卡刨挖深壕使賊不能下至黃河取水其磨溝之水業已旁泄斷流所奏自是正辦覽之亦為慰藉苐惜籌之不早耳至現在續令軍機大臣審訊逆犯馬復才據供八蠟廟內樓房九間上下多是糧草并墳園內有屋六間俱堆糧食等語恐賊人儲蓄尚復不少若我兵竟待其食盡坐斃則曠日持久亦復不成事體因思賊營樓房夲髙且樓屋皆係木植構成易於引火何不於夜間令沿河防卡官兵以火箭火彈等物向準拋射將所蓄口食盡行燒燬則於剿捕更速著傳諭阿桂令其妥酌辦理庚午上命軍機大臣傳諭阿桂李侍堯曰現在官兵四面圍困賊自不能復得援應但閲圖內東西北三面俱係陡墈而北面又逼臨黃河其勢俱難仰攻官兵自止能從南面進剿因思該處賊人所挖溝壕二道雖屬寬深然或令官兵等填壕而進賊人必出而抗阻我兵即可乘勢用鎗箭剿殺似亦辦理之一法至賊人所貯樓房之糧草昨已諭令阿桂派兵用火箭火彈拋射焚燒即使相離尚逺非火彈所能到而火箭自不難射及阿桂務須設法籌辦使之潰亂無為曠日持久待其食盡坐斃之計臣等謹按行兵制勝惟在相機決策方不致曠日持久蘇四十三等負嵎死守溝壕深廣未能迅就擒捕仰蒙皇上先幾指示將火彈火箭拋射填壕進攻臣阿桂接奉諭旨得所遵循於剿滅賊巢時全用火彈火箭及樹枝草捆填滿溝壕官兵遂一擁直入痛殱賊人馘斬首惡仰見聖慮周詳萬里情形洞若觀火非韜鈐家所能窺及也辛未上命軍機大臣傳諭阿桂李侍堯曰前經降旨令阿桂等於籌辦善後事宜案內將陜甘二省應添兵數若干妥議具奏因諭軍機大臣將陜甘二省原額兵若干現存兵若干交部詳查今據查奏陜甘二省兵丁除節年移駐新疆屯防並扣缺不補外現存兵五萬二千四百五十四名較原額少兵三萬一千九百二十名等語自新疆一帶盡入版圖拓地二萬餘里兵儲經費自應加增今該二省內地兵數既較原額減少三萬有餘自應量為添設但不必竟照原額添補朕意酌添兵一萬餘名亦足敷用至兵丁有馬步守三項之分各省成例大約以馬三步七為率朕意馬兵一項自較步守為優遇有調遣亦可得力今既酌為添設不如竟將馬兵酌添六七千名即所需兵餉較多而為捍衛邉陲起見正不必斤斤小費著傳諭阿桂李侍堯於籌議善後時確核此二省地方營制情形將某處應添兵若干及馬步守三項應如何酌量分添之處逐一妥議具奏其陜西一省並著會同畢沅辦理至現在所少兵三萬一千餘名查係厯年移駐新疆屯防及扣存不補之缺但新疆一帶未必駐兵有三萬餘名之多著傳諭阿桂等將新疆一帶實在移駐屯防兵若干此外扣存未補兵額若干及如何扣存不補之處逐一詳悉查明覆奏冉陜甘二省從前原係一省是以該部於原額兵册不能按省分開載但現存兵數既尚有五萬二千餘名即甘肅所駐較西安為多亦未必大相懸絶何以畢沅前奏陜甘此時兵力合計不過萬餘若陜省兵數實止如此則甘省存兵計尚有四萬餘名何致逆匪起事時又無兵可調其詳總不能深晰並著傳諭阿桂李侍堯詳確查明覆奏甲戌阿桂李侍堯奏言官兵數日以來於營卡相間處所刨挖寬深一丈溝壕溝邉安設木柵將賊營四面圍困其華林寺後及雷壇有井二處俱用土填築賊匪自知死在旦夕即夜間亦不敢出壕攻撲惟於溝內潛藏待我兵臨近時暗放一鎗希冀茍延片刻其營內騾馬牛驢數百因斷絶水草倒斃殆盡即間有逸出遇水奔飲亦多不能活官兵自十九日拏卡以後賊人業已斷水二日惟二十二日寅刻起至已刻止密雨四時賊人又得稍資接濟連日有自賊營脫回之老教三名臣等詳加訊問據供賊營自官兵斷絶水道後俱各惶懼曽於山上挖井二處掘至十餘丈不能得水二十二日天雨賊人各將帳房盆罐等器承取足敷一日飲用二十三日又已斷絶蘇四十三令賊衆不必聲喊恐官兵知其斷水喉啞賊營大小及受傷者尚有四五百人設誓共死糧食亦止能支七八日等語臣思賊匪雖尚勉強支持其困􅉵情形業已畢露不值力攻撲傷我官兵若兩三日不雨斷不能稍延殘喘即可盡數剿擒奏入上命軍機大臣傳諭阿桂李侍堯曰據阿桂奏賊匪待斃情形自斷不能冉稽時日惟望速得捷音擒獲首夥要犯以伸國憲而快人心冉甘肅省向來俱以被旱須賑為言幾於年年如此昨和珅一入甘境即遇陰雨今阿桂摺內又稱二十二日得有密雨四時可見該省亦並非竟少雨澤人言俱未足信著傳諭阿桂李侍堯確切訪察向年雨水情形據實覆奏阿桂夲係欽差重臣即李侍堯亦初任甘省總督無所用其回護想自能秉公直陳也同日阿桂李侍堯又奏言查賊匪占據山梁已及三月醜類夲有一千數百節次為我兵剿殺尚存四五百人誠如聖諭其從前搶掠所得糧食安能供給如許之久臣等於拿獲賊匪及自賊營脫回之舊教回民等屢經嚴切訊問其四月中旬以前洪濟橋唐家川等處從逆回民尚有馱運糧食為賊接濟者及該處安設多兵防守並陸續拏獲黨惡逆犯審明正法辦理後已無接濟之事惟賊營迤西一帶居民雖早已搬移避匿而其埋藏糧食有因一時惶急未能盡行携帶者賊匪於抗拒官兵之暇雖不敢逺出劫掠而於附近一帶空屋內搜取糧食實所不免所以不至乏食賊營迤西雖有洮河為限而該處山徑叢雜小路甚多屢奉訓諭防範倍須嚴密臣阿桂日夕籌慮不釋於懷但欲分兵堵禦須從五泉山迤南繞出華林山背後下至蓮花池亂骨堆始可安設營盤非得三千可用之兵實不足恃而中隔賊營越山繞路有四五十里與迤東各營聲勢絶不能通須從黃河北岸運送食物草料辦理既屬周章且恐數營孤懸山外後臨黃河萬一兵志不固稍有動移更屬不成事體是以與海蘭察額森特明亮冉四籌酌伊等亦屢次前往賊營迤西相度形勢未克遽為安設惟是夲月十五日攻得賊人大卡之後即在華林山逼近賊營四面趕設木城木柵營卡始能嚴密圍困至火藥一項賊人攻破河州所得止存二十馱而臣等未到以前官兵打仗多有陳亡遺棄尸身其所帶火藥轉為賊匪搜取添用自臣等到後官兵即間有陳亡夲屬無多同隊官兵即將尸身抬回火藥毫無所得臣等又詢之脫回老教人等乃知賊營火藥漸少實無附近匪徒暗為運送之事冉賊匪畏懼我兵之架炮轟打俱刨挖土穴潛居其帳房夲屬虛設且官兵現已四面圍困賊匪所踞不過彈丸無需大炮轟擊至蘭州舊存子母炮僅與鳥鎗無異施放不能及逺又威逺炮八尊子重十六兩至二十兩轟擊稍逺而施放時易於跳動又無凖頭俱不甚得力現已照四川劈山炮式樣製成二十尊擊打賊營甚為便捷得力又聞從前辦理凖噶爾回疆時所造食子六十兩重神炮現有存貯涼州者並已調到數尊應用亦甚得力有凖涼州尚有熟諳匠役現在調取來省令其照式試造雖現在圍困賊營已無需應用而省城重地鑄造炮位數尊亦可永資防衛奏入報聞同日軍機大臣奏言臣和珅等奏言臣等遵旨嚴訊馬復才該犯于前日刑訊受傷不能供吐現在病勢甚重查該犯係賊匪小頭目且又殺人放火應行凌遲未便令其自斃幸逃顯戮請旨將馬復才即行凌遲處死以彰國憲奏入報聞己卯阿桂李侍堯奏言臣等將賊營四面圍困斷絶賊人水道二十五夜間有數十賊從直磡縋下水磨溝至從前有泉處刨挖盜水官兵知覺鎗箭齊發殺死賊人數名餘俱受傷竄去溝內血迹甚多遺棄皮渾屯五個及木碗繩鞋等物次日有脫回老教數名詳加訊問據供是夜賊匪夲有五十名帶皮渾屯十五個因官兵鎗勢甚急止盜得十渾屯水又每渾屯止裝得水一半方能肩負爬山及竄回賊營即已一搶而盡無餘存等語臣與海蘭察明亮將該處守卡官兵嚴行申飭所有刨開泉脈多加土石填築並添派阿拉山鎗手百名赴該處嚴密防範至二十七夜間賊匪復圖覔路下溝即為屯練兵殺死一名生擒一名又有脫回之老教八名臣等一併提訊該犯等俱因受渴已極不能出聲惟解開胸懷以心貼地即豫以水飲亦不能下咽徐徐灌潤始能言語據供賊匪共有五百餘人老弱傷病者業已斷水五日已有渴死即蘇四十三及強壯有力能打仗者亦已斷水三日雖有炒麵作糧亦不能下咽至騾馬牛驢數百亦俱倒斃淨盡衆人受渴無奈俱向蘇四十三商量計䇿蘇四十三惟稱現在念經祈禱到至急時天必降雨救濟等語是賊匪困􅉵情形已可概見臣與海蘭察明亮公同商酌於二十九日派兵分路進撲以試其能否抵禦雖二十八日夜間賊人復至華林寺後身將舊井刨開盜水而據脫出之老教一名供稱賊匪因井內木石甚多刨挖費力且恐官兵驚覺止盜得兩小罐水等語諒不能多為接濟因派滿漢奮勇兵由中路進撲賊營派屯練降畨由華林山東攀磡上撲派老教土兵由華林山西覔路上攻我兵撲至壕邉賊匪雖不能如前剽悍尚於溝內卡上放鎗抵禦惟時官兵鎗炮齊發並添派熟練鎗手向賊營施放賊匪雖傷死頗多尚拚命支持不肯潰散臣思賊匪滅在旦夕不值用力攻撲傷我官兵因令撤回各卡防守此次攻撲賊營傷死賊人約有二十餘名臣查賊匪斷水已數日尚能死守實出意計之外現在將舊井及有泉處所愈加填築堅實並多派屯練及阿拉山兵在左近埋伏以偹乘機剿殺夲日寅卯二時又復密雨現在尚未晴霽然正值土王用事看來不至連陰賊人雖得稍資接濟亦不能多延時日俟其困􅉵已極即進兵擒捕冉查賊匪於二十五二十八兩夜至水磨溝及華林寺後身盜水該二處營卡係提督仁和及總兵羅江鱗所管不能嚴密防範殊屬踈玩臣阿桂業已嚴加申飭並將該二員存記以觀後效如冉有踈虞即一併嚴參治罪奏入上命軍機大臣傳諭阿桂李侍堯曰賊人當此窮蹶垂斃之時尚皆負嵎死守實是竒事出於情理之外今官兵四面圍攻又將其盜水處所填築土石加兵防範賊匪自必益加疲困早晚即可全就擒捕至脫回之老教即係順從新教同惡相濟之人此時或暫留軍營不即正法以為招致賊夥之計尚可但其從賊為逆已經數月隨賊打仗傷我官兵實屬罪無可赦且伊等果然舊教何不早行竄出直至目下知賊勢窮迫萬無希幸始復脫回托名老教以圖寬免自斷不可復留著傳諭阿桂等於剿辦正賊後即將此等情莭明示衆人將臨近脫回之老教概行按律正法無少姑息至賊人下溝盜水雖旋經知覺但已被刨挖得水用皮渾屯裝取實屬踈於防範在羅江鱗係他省總兵到甘效力或可諉之呼應不靈至仁和係甘省提督所派辨兵皆其管轄何致玩忽若此仁和之不是更大著傳諭阿桂於事畢時即嚴行參奏辛巳上命軍機大臣傳諭阿桂李侍堯曰昨王廷贊來至熱河因令軍機大臣會同行在大學士九卿傳旨以私放馬明心子壻及守城獨自居功二條俱從寬不究惟監糧私收折色一事令其據實陳明據王廷贊供到任後原不許折色因無人報捐只得仍如此辦又恐各州縣有短價勒買糧石之事是以定數五十五兩甘省糧價較賤足敷定額又因捐生多在省城改歸首府收捐仍將銀兩發給各州縣買補還倉按季申報並有道府加結等語所供殊不足信甘肅收捐監糧原為倉貯賑濟起見自應收夲色糧石何得公然定數私收折色且從無一字奏聞若云甘肅糧賤五十五兩已符定額足敷採買則該處收成自必豐稔何以每年又俱需災賑如災賑屬實糧價必昻則五十五兩之數又斷不敷採買二者均不可解可見所供盡屬支離其中恐有竟不買補虛開賑濟冒銷情弊且捐監一事自應聼夲生自行平買交納糧石何以必欲官為收銀并交首府總辦明係官則折收於前又復冒銷於後兩邉俱得便宜而百姓仍從中受纍此事情弊甚大不可不徹底清查此時惟阿桂李侍堯為中外最能辦事之人且於此事又從未經手毫無回護著傳諭伊二人即將此案實在情形詳悉查明據實具奏并嚴查有無弊竇將此等情莭四面較勘無難水落石出不可稍涉顢頇致他日復滋流弊但恐如此徹底一辦合省地方官皆為有罪之人伊等合成一氣察弊殊非容易然此事終不可不辦想伊二人斷不肯為他人擔此干係也現在王廷贊已令回京俟此事明白後冉降諭旨至剿賊情形前傳諭阿桂等或用火箭火彈燒其樓屋糧石或令官兵填壕而進誘賊殱擊均未據阿桂覆奏并著傳諭阿桂等將接奉諭旨如何酌辦緣由即行迅速覆奏至阿桂查辦監糧一事未免有需時日即在彼多住幾時徹底查辦亦可不必急來熱河復命癸未阿桂李侍堯奏言賊匪斷水之後雖於兩次夜間縋下水磨溝至華林寺後身盜水然為官兵鎗箭所中驚懼惶急盜取無多若冉渴數日亦必困􅉵潰亂無如夲月初一日寅時起巳時止密雨四時較二十二日其勢更酣賊人大資接濟初二初三兩日晴霽初四日又復陰雨幸不甚大臣阿桂與海蘭察明亮冉四籌酌現在大雨時行止可將斷絶水道為困賊之一法難以坐待必須另籌攻取之䇿但賊人所恃惟在溝內卡上放鎗抵禦我兵自木柵內進撲距溝尚逺未到以前已不免損傷因先在我兵卡外夜間刨挖溝壕令官兵足以蔽身然後逐漸刨挖於賊營南又拏立木柵一層離賊溝邉不過三丈至五丈不等擲石可及自初一日夜拏起賊匪惶懼時於卡內探身放鎗俱為自京派來之好鳥鎗手及阿拉山鎗兵擊斃初二初三兩日共陸續斃賊二十餘名及我兵木柵拏成賊乘夜又挖深坑潛匿日間並不敢溝邉行走我兵現擬於木柵內接築炮臺數座俯視溝卡內賊匪施放鎗箭並加炮臺擊賊卡令其不能存立一面挑選奮勇官兵預備俟有可乘之機即一擁而進同日阿桂李侍堯又奏言查八蠟廟並無樓屋九間惟華林寺後有九間樓一座已於五月十四日為官兵燒燬並無賊人糧草存貯即夲布爾廟向為賊匪窟穴官兵搶得燒燬時亦無儲蓄臣等訊據拏獲賊匪及脫回老教供稱賊人雜糧炒麵等物俱用口袋盛貯藏於地穴賊人畏官兵架炮擊打俱挖坑穴潛匿帳房亦屬虛設蘇四十三亦在地穴居住外搭木板等語是賊營內除華林寺外實無房屋為堆貯糧草之處至馬復才所供蘭州關廂回子暗通逆匪及西南關蕭姓馬姓回子為賊接應糧草一節臣阿桂等一到蘭州即風聞其事早已留心察訪並密諭按察使福寧借他事為名於閏五月十九日將蕭得福看守監禁俟訪有通賊實據於辦畢正賊時拏獲馬姓回子一併查辦其唐家川為賊扎筏過渡隨去回子除馬復才指出各犯外尚有張國清供出之張國桃等十四人唐王宗供出之唐宗第等二十三人臣一併存記俟搜捕賊黨時按名查辦至唐家川等處逆黨陸續拏獲者除前次奏明已正法三十四名外現又正法二十名審解二名恐尚有餘孽於剿賊完竣派員前往查辦諭令搜捕淨盡至馬復才供稱蘇四十三要逃往苦蘆灣現在賊營尚有該處逆回三百餘人都會打仗等語查苦蘆灣回子於逆賊初到蘭州時雖供有馱送米麵之事亦無三百餘人都會打仗之語但馬復才既有是供臣等寧信以為實於攻破賊營後逐一嚴辦至安定一帶被馬明心煽惑者自多伏羌新教從前拏獲之馬而立又供有斂銀資助馬明心之事俱應查辦臣等早已諭令該地方官嚴密查察事平之後即派明幹文武大員帶兵前往查明從逆確實各犯一併嚴辦不使復留遺孽其苦蘆灣在華林山之西距賊營一百里離西古城六十里緊臨黃河南岸有四五百家俱係皋蘭縣所屬回民諒無處習學打仗但該回民等即無幫同打仗之事若接濟糧食屬實俟擒獲正犯之後亦應一并嚴辦總之臣等查辦新教無論逺近其實係賊黨訪有確據者固應𠞰戮無遺即有稍涉疑似者亦必從嚴辦理務期淨絶根株斷不肯稍存姑息均奏入上命軍機大臣傳諭阿桂李侍堯曰據阿桂等奏于賊營南拏立木柵又接築炮臺一摺所辦甚是現在賊匪日益窮蹙不難計日待斃自不值傷我官兵朕雖日夜焦急盼望成功亦不得不耐心以待況官兵四面圍攻布置嚴密自不虞賊衆復有竄逸及外來賊匪接應之事至南關外逆回蕭德福既經訪明拏獲監禁著派委幹妥員辨解至熱河審辦沿途務令小心防範毋致少有疏虞欽定蘭州紀略卷十
