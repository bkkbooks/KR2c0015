body:
  text: 己亥阿桂李侍堯奏言賊匪敗殘餘黨退入華林寺死守官兵拏立木柵四面緊圍架炮轟打至六月十六日亥刻賊二百餘人奮力來撲海蘭察明亮督率守卡官兵奮勇剿殺鎗箭齊發賊人於鎗箭叢中拚死跳入溝內直至木柵邉希圖扳開木植乘隙竄逸俱被我兵刀砍矛戳殺死溝內餘賊始倉遽竄回是夜殺死賊人數十名割取首級九顆賊始不敢於夜間復出衝撲又有連日投出老教三名經臣等詳加訊問據供頭人馬作南傷重身死至賊營所餘雨水業經臭敗衆人飲用二日至十八日俱已斷絶十七日晚賊黨有因爭水互相殘鬭殺死三人等語臣等伏思賊營首逆及緊要頭目俱已殺死此時雖止存餘黨三百多人如盡數生擒尚可審究謀逆情節擇其稍關緊要者解送行在盡法處治若即督令官兵進撲賊人設或抗拒勢不得不盡力剿殺又復殱戮無遺是以稍遲數日俟賊人受渴困殆即進兵搜捕逐一擒拏一面令官兵拏柵進逼施放鎗炮預偹一擁撲入同日阿桂李侍堯又奏言查甘肅收捐監糧原為倉儲賑濟起見自應收本色糧石乃開例之始一面奏立規條一面即公然折色收捐情弊顯然王亶望僅以責成道府查禁結報希圖諉過又稱意在捐多榖多一任通融辦理更屬狡飾及王廷贊任內改歸首府總辦竟定以五十五兩一名收捐將銀兩發交各州縣買補如五十五兩之數足敷採買則必甘省連歲豐收市糧充裕何以又需報災賑恤若不敷採買而令各州縣經手又必有短價勒買及竟不買補虛開賑濟冒銷通同肥槖種種情弊皆不出聖明照察之中臣等現在公同熟商設法跟求一有間隙即嚴切究審務令水落石出同日阿桂又奏言甘省收捐監糧惟開例之始為多近來報捐者已屬寥寥臣將厯年所捐數目比較惟乾隆四十一年王亶望任內收捐監生至六萬三千餘名為最多而是年賑恤案內所動糧數至一百七十餘萬石亦較厯年為甚其中情弊王亶望百喙難逃但在浙省訊問王亶望恃無質證仍恐轉輾狡飾似應將王亶望即行提解進京臣陸續查有欵迹奏聞時即可敕交刑部堂官提集勒爾謹王亶望王廷贊三面質對以成信讞均奏入上命軍機大臣傳諭阿桂李侍堯曰據阿桂等奏賊匪敗殘餘孽尚思乘夜衝撲希冀逃竄實為可惡然此時我兵拏柵嚴密圍攻無虞竄逸自應待其困渴已極即可一鼓成擒此事蘇四十三攻犯蘭州被官兵擊敗後即死守華林山不復散往他處俾我兵得以拏柵環攻盡數剿殺益信上天嘉佑之恩再阿桂等覆奏查辦監糧折色一案此時既已發覺斷不能置之不辦即結報之道府亦應查明參奏至王亶望任內捐收最多年分報災亦較重其中情弊自屬百喙難逃阿桂等諒能徹底嚴查以成信讞也同日阿桂李侍堯又奏言臣等欽奉諭旨蘭州河州民人為賊蹂躪應如何加恩優恤之處查明具奏欽此臣等遵查該處民人至四月中旬後陸續來歸臣阿桂抵蘭諭令地方官設厰施賑前此流離顛沛之民今已漸次安集惟是兵燹之餘十室九空兼之棲息無所葬埋乏費牛馬被掠則無畜可耕地畝拋荒則收成無望自應仰體聖恩從優撫恤臣等伏查被賊焚掠貧民應如何優恤之處向無成例可循惟甘省乾隆三十年寧逺伏羌通渭等縣地震奉旨優恤案內將壓斃人口每大口給埋葬銀二兩小口七錢五分倒塌房屋每間給銀二兩生存人口每口先給糧一倉斗初賑不論大小口賑給糧三倉斗再普行加賑一個月每大口日給京升糧八合三勺小口四合一勺五抄倘有禾苗被災者入於災傷案內分别辦理又賞給器具銀一兩壓斃牛隻每隻借給牛價銀四兩分作四年徴還又奉旨將寧逺伏羌通渭三縣該年應徴錢糧一體蠲免在案此次蘭州河州被賊焚掠貧民困苦情狀實堪憫惻蒙皇上軫念災黎施恩優恤似應仿照地震災民之例辦理凡有傷斃人口每大口給埋葬銀二兩小口七錢五分燒燬房屋每間給銀二兩生存人口每口先給糧一倉斗初賑不論大小口賑給糧三倉斗被掠牲畜每牛馬騾一匹頭借給價銀四兩每驢一頭借給價銀二兩分作四年徴還務農民户每户賞給器具銀一兩其省城內外及河州附近一帶貧民業於閏五月初一日起先行開賑一箇月口糧至續歸之户一體賑恤以廣皇仁以蘇民困臣等現在飭令司道督率地方官確實查明辦理務使窮民均沾實惠奏入上諭內閣曰據阿桂等奏甘肅應行撫恤事宜請將於蘭州河州地方照乾隆三十年寧逺伏羌通渭三縣地震之例辦理等語此次甘肅蘭州河州等處猝被逆回焚掠急宜加意撫綏以蘇民困所有該處應徴本年錢糧著加恩概行蠲免以示優恤該部即遵諭速行其餘所奏恤賞各事宜並著行在户部速議具奏旋經户部議覆應如所奏辦理得旨如議行臣等謹案自逆回肆擾占據河州並侵犯省城關廂居民不免失所皇上厪念痌瘝於賊匪滋事之初即屢降諭旨令查明實在情形加恩優恤臣阿桂等仰體皇仁奏請撫恤各事宜即蒙敕部議覆迅速允行我皇上宵旰勤求俾蹂躪之餘得以早登袵席是以邉氓雖經兵燹而元氣不久旋復也七月乙巳阿桂李侍堯奏言賊匪又於溝邉連夜收拾木卡三靣共有十餘處因上次我兵用撓鈎鈎開木板土袋奪卡過溝更加填築堅實且將木植縱橫排立密布如鹿角以為賊卡外護二十一日有投出老教一名詢據供稱賊營尚有韓黑提卜韓六十個數頭人又有小木撒係蘇四十三徒弟傳語衆賊以若即投出即違棄教門務須同死方得好處係蘇四十三遺言各宜遵守至賊人斷水業已三日等語臣等揣度賊人業已受渴困殆擬即於二十三日進兵剿捕無如二十二日竟夜大雨如注直至二十三日邜刻始止賊人又資接濟勢不能待因即派兵乘賊人初得水飲精力未復之時于巳刻撲進賊人雖不敢出卡迎拒尚於卡內放鎗擲石抵死守禦而雨後潤濕官兵拋擲火彈其板柵木卡不能延燒惟時我兵鎗箭齊發賊人雖多死傷不肯潰散臣等因官兵攻撲已久不免損傷至申刻傳令撒回二十六日寅刻海蘭察明亮率同彰靄泰斐英阿福寧明山阿蘭保海祿哈當阿鄂輝阿爾都并章京侍衛帶領奮勇官兵由正面進攻策卜坦三德德寧帶領守卡官兵及老教土兵由西邉攻撲舒亮仁和武靈阿帶領本卡官兵及屯練降番由東靣攻撲我兵直至壕邉賊人於溝內卡上奮力抗阻且賊人舊存板柵土屋帳房連接緊密卡邉地勢狹窄又因躲避官兵鎗炮刨挖溝壕縱橫數十道日間總於溝內行走坑坎既多又有板片木植拉雜蓬蓋我兵至此眼目既不能逺及手足更無從舒展久攻無益因於辰刻暫行撤回令稍休息傳集將領辨兵飭整鼓勵復於午刻乘賊人不偹奮勇復進一面拋擲火彈一靣撲入賊卡痛加剿殺將溝卡盡占得並將溝內及守卡賊人殺死餘賊竄回華林寺我兵三靣鎗箭追擊殺死更多海蘭察等即督率官兵將華林寺旁板棚土屋帳房盡行燒燬其內積存糧食衣物亦多一併延燒奪獲賊人鳥鎗刀矛無數並於賊人窟穴旁尋得窖水土坑二處即用土填築此時賊人雖心膽已裂尚於華林寺土墻孔隙及寺墻外溝內放鎗死守天已將晚因在所得賊人溝卡邉逼拏木柵一層以防賊匪乘夜來撲此次殺死賊人一百餘名割取首級五十三顆生擒一名馬格拉五訊據供稱此時華林寺內大小賊匪及受傷者約尚有四百餘人本日倉遽竄回糧食不能擕取所積雨水之處又被官兵占得寺內存水無多不敷兩日飲用等語連日官兵奮勇攻撲損傷稍多陳亡官四員由烏什年滿進京告請存營效力之三等侍衛全海西安防禦羅密都司張進賢千總蔡珏受傷官三等侍衛阿禪保遜濟奈藍翎侍衛瑪圖納參領阿滿太佐領西爾們八十七副將富舒參將趙繼鼎逰擊程鵬翼都司馬得高人傑守偹李基革職副將李天佑降畨頭等侍衛木塔爾三等侍衛丹把西拉布又前鋒鄂木西奈護軍巴雅爾圖俱打仗受傷其餘滿漢屯土兵丁陳亡受傷者俟詳查明確另行造報現在賊人所占不過一華林寺勢更淺窄幾無容身之地且屢被剿殺窮蹙愈形自無難即日蕆事奏入上諭內閣曰據阿桂等奏攻剿逆回餘黨將華林寺旁板棚土屋帳房盡行燒燬殺賊一百餘名此次陳亡官員係三等侍衛全海西安防禦羅密都司張進賢千總蔡珏等語全海等奮勇剿賊臨陳捐軀殊為可憫著交該部照例優恤至革職副將李天佑打仗受傷著加恩賞還副將仍帶革職留任俟四年無過方準開復又降畨內頭等侍衛木塔爾屢經奮勇出力前已恩賞銀兩此次又復受傷著加恩賞給二品頂帶其三等侍衛丹把西拉布著加恩賞給二等侍衛以示鼓勵其餘受傷各員及陳亡受傷之滿漢屯土兵丁俱著阿桂等查明一體照例恤賞上命軍機大臣傳諭阿桂李侍堯曰賊黨垂斃之時尚敢抵死抗拒傷我官兵實堪痛恨但逆犯自知罪大惡極自不得不為茍延殘喘之計想官兵四靣圍攻且又將華林寺旁棚土屋帳房盡皆攻得進拿木卡賊僅踞華林寺內為地無幾想不日亦即可殱滅淨盡惟在防範嚴密不使一名乘間竄逸至現在尚有逆匪頭目韓黑提卜韓六十個及蘇四十三徒弟小木撒等在賊營率衆抗拒必得此三犯生擒解熱河審辦盡法處治以彰國憲再阿桂等前奏撒拉爾回衆共有十二工人數自必甚多此次作逆之蘇四十三等不過其中之二三工將來事平之後須於善後事宜案內將此數工歸地方官妥協經理使永逺數寧之處著傳諭阿桂等詳籌妥議同日阿桂李侍堯又奏言查捐監首嚴折色以防百弊叢生乃乾隆三十九年甘省開例之始即公然折色收捐業經王亶望供認不諱而彼時各道府並不盤查監糧有無亦即假揑結報共為欺罔若非染指分肥通同舞弊何以一力擔承臣等伏思此事所關甚大雖厯時已久人數衆多不可不逐一嚴參徹底跟究所有王亶望任內假揑結報之厯任道府直𨽻州知州謹詳悉查明參奏請旨將道員內升任甘肅藩司王廷贊現任江西藩司秦雄飛甘肅臬司福寧甘肅西寧道劉光昱四川川北道熊啓謨甘肅安肅道奎明浙江寧紹台道蔣全迪河東鹽運使程國表山東糧道觀祿知府各員內現任甘肅涼州府知府汪皋鶴廣東高州府知府周人傑甘肅甘州府知府鍾賡起甘肅寧夏府知府張金城泰陵郎中觀亮署知府各員內現任江西廣信府知府康基淵甘肅泰州直𨽻州知州侯作吳直𨽻州知州各員內現任刑部員外郎覺羅彥方湖北安陸府知府薑興周甘肅鞏昌府知府宗開煌署直𨽻州知州各員現任甘肅靈州知州黎珠甘肅寧夏縣知縣宋學淳等現任官二十一員革職除王廷贊及覺羅彥方現在京中請敕交刑部就近審訊外其在甘省各員臣等即一靣究訊至現任他省人員應令刑部行文各該省督撫委員押解來甘質訊又丁憂事故潘時選德明竒明黃元圮博赫郭昌泰陳之銓嵩柱吳鼎新魏椿年瑺泰楊士璣李承瑞等十三員應請敕交吏部工部查明如已補官一併革職押解其已經革職者亦行文原籍督撫派員解審即病故各員亦查明知照以便定案時扣除至王亶望升任以後各道府雖係相沿結報罪亦難辭俟臣等審明陸續參奏再現任甘省道府缺出甚多除另摺奏補外一時實無妥員委署應令被劾各員暫留頂帶辦事俟新任到日再行交代臣等有應行訊問事件即傳集究審亦無慮其彌縫掩覆同日阿桂李侍堯又奏言臣等查辦監糧折色收捐一事現向按察使福寧鞏昌府知府宗開煌嚴切究訊據福寧供開捐之始即係折色並未交糧上倉藩司原屬知情其實收王亶望總交蘭州府存貯給發各州縣或多或少俱係藩司主政各省捐生俱赴蘭報捐而各州縣亦就近在省填捐至各屬折色銀兩並未見買補歸倉多係放銀抵糧盤查既屬具文按季出結亦係虛應故事等語宗開煌亦有四十一年署西州任內敦煌玉門兩縣册結因未曽到任盤查詳請展限王亶望不準只得在省城出結之供是王亶望明知各州縣係折色收捐徒取道府一結為異日諉卸之地據福寧供各屬報災分數俱由藩司議定或於總督具奏後藩司補取道結或取空白由藩司填定從未親往勘驗即放賑時亦從未親身監視等語其中情弊已屬顯然且臣等檢查王亶望任內各屬報捐實收及開銷賑恤原案即如皋蘭一縣於乾隆四十年捐實收四千八百張應收糧十九萬一千九百餘石是年即開銷賑恤糧十五萬五百餘石銀一萬七千二百餘兩四十一年共捐實收八千張應收糧三十二萬石是年即開銷賑恤糧二十三萬四千八百餘石其餘各屬雖參差不齊大約多捐者賑恤必多其無災賑地方則報捐亦少是王亶望發給實收之多寡竟若預知各屬被災之輕重而定數者其為通同侵蝕任意開銷已無疑義至甘省上下如何舞弊分肥之處臣等查閲王廷贊致福寧原札內有前任升司於額收公倉費銀外各屬請領實收每張議收銀一兩以給上下各衙門吏役雜項之需等語查監生每名交公費銀四兩以二兩解部以二兩作各衙門書吏公費自五錢至二錢不等定數不為不多乃王亶望復於此外議收雜費銀一兩是明知捐監一事弊竇多端借此取悅衆人以塞其口且王廷贊到任後又於雜費銀一兩外每實收一張索銀一兩此衆所共知諒王廷贊亦無從隱諱若王亶望之舞弊分肥臣等詢問福寧據供王亶望在藩司任內各屬給發實收多少由其専主報災輕重由其議定厚薄因人而施自有交通染指情事即伊升任後無人不知其擁厚資而去但當日如何婪索屬員如何餽送不能指出實在憑據等語臣等伏思此事總不過首府首縣數人經手聞王亶望到任後即稟知勒爾謹將蔣全迪奏調蘭州府承辦捐監事務而王亶望即將實收交首府存貯轉發各州縣並於雜費一兩內議給首府衙門三錢是即勾通舞弊之據且蔣全迪在蘭州府任內捐升道員人亦有言其得厚資者該員現任浙江寧紹台道已於假揑結報案內另摺參奏請旨革職應一併提解至京與王亶望質訊再王亶望任內初開捐時之皋蘭縣知縣程棟現已捐升刑部員外郎在京供職應請敕交留京王大臣刑部堂官就近傳訊令將在任時如何冒銷如何賄求各欵逐一供明俟王亶望到時質對無難水落石出臣等現亦提到王亶望在任時接任皋蘭縣已升狄道州知州鄭陳善嚴切究訊據供王亶望聲名狼籍通省皆知有要捐的監生將監生名姓開單交給州縣令其用印填捐並不發給銀兩再四十年程棟辦理賑恤案內有運送適中給散賑糧腳價銀二千四百餘兩係我例應補領之項王亶望並未發銀等語臣等查王亶望任內四十四十一兩年所有皋蘭縣開銷此項腳價銀六千六百餘兩即以通省均未給發而論亦不過三萬二千餘兩王亶望之貪婪當不止此然此亦侵蝕之一端其通省如何冒賑開銷之處現在設法研求俟訊得確情續即具奏均奏入上諭內閣曰前以甘省收捐監糧一案私收折色冒賑浮銷上下通同舞弊既經發覺不可不徹底查辦因屢傳諭阿桂嚴切詳查據實參奏今據阿桂等將折收銀兩在省包辦冒銷賑糧種種弊端已全行查出此時即將甘省大小各員一併革職審究亦皆罪所應得但此事總在藩司為政其次則首道首府首縣勾通侵蝕為弊較多此外各道府州縣雖弊竇亦皆不免而此時尚未查明無庸遽行辦理所有前任蘭州府知府蔣全迪前任皋蘭縣知縣程棟自當革職拿解蘭州嚴審此外各員著交吏部查明其曽任蘭州本道首府及首縣者著即一體革職拿解蘭州審訊其餘各道府州縣並加恩免其提訊著該部查明再降諭旨至王廷贊前來行在時令軍機大臣傳旨訊以監糧一案伊堅稱並無情弊後遣令回京候旨又令留京王大臣會同刑部堂官覆訊並傳示硃筆諭旨以伊之生死在實供與否令其自定朕不食言乃伊仍祗供辦災以少報多以輕報重難保必無而於一切情弊始終不肯供吐今阿桂等業已跟究明確弊竇甚多是王廷贊之罪更不能復加寬貸王廷贊著革職拿問解交行在俟王亶望解到時交軍機大臣一併會同行在大學士九卿質訊辛亥上諭內閣曰本日據吏部查奏王亶望在甘肅藩司任內通同折捐冒賑之首道府縣各員除蔣全迪程棟已經革職拿問外所有曽任蘭州道之秦雄飛熊啓謨俱著革職拿問交與阿桂等嚴審至三十九年甘省開捐監糧以來即在王廷贊任內之道府州縣均屬通同舞弊自應一體嚴審所有已經查出之前任蘭州道陳庭學現任蘭州道圖薩布前任皋蘭縣知縣鄭陳善楊德言亦著革職拿問交阿桂等併案嚴審欽定蘭州紀略卷十二
