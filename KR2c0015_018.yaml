body:
  text: 甲寅上諭內閣曰甘肅揑災冒賑侵蝕監糧一案昨據大學士公阿桂等審明各州縣供認入已贓數自九萬至數千餘兩不等照侵盜錢糧一千兩以上例分别定擬斬決監候杖流一摺當經降旨令軍機大臣會同行在大學士九卿核議並交留京辦事王大臣會同在京大學士九卿科道再行詳加核覆僉稱案內各犯情真罪當法無可貸按例定擬具奏朕惟州縣為親民之官平時固宜潔已奉公亷隅自礪若遇有災祲尤當竭力撫綏使窮黎共沾實惠至於借賑恤之名為侵漁之地實從來所未有朕亦不忍以此疑人乃甘肅各州縣朋比侵吞毫無忌憚且有於揑賑開銷之外復冒請建倉設法以肥私橐其竒貪肆黷真有出於意想之外者此案始由王亶望蔣全迪等首先舞弊勾通上下狼狽為姦但各州縣有上司押令報荒勒索銀兩之事原許其直揭部科朕可簡派大臣按問何數年以來各該州縣視侵帑為故常竟無庸中佼佼者再閲各犯供內有將侵吞銀兩為冬季施粥施衣及修葺廟宇工程之用等語毋論該犯等溪壑難盈必不肯以婪得贓私飾為義舉即地方此等事件各州縣捐亷為惠施及貧民亦職分所應爾何處無之又安得復於事後藉口開銷希圖末減乎又有稱為驛站貼補者從來驛站為州縣之利藪且各省皆有驛站誰肯破産貼補現在此案爰書已定王大臣科道等復加核擬人無異詞則此等侵帑殃民骫法營私之吏固不能復為曲貸所有案內侵冒賑銀二萬兩以上之程棟陸瑋那禮善楊德言鄭陳善蔣重熹宋學淳李元椿王臣許山斗詹耀璘陳鴻文黎珠伍葆光舒攀桂邱大英陳澍伯衡孟衍泗萬人鳯等二十犯又冒賑不及二萬兩而任內有侵欺建倉銀兩之徐樹栴陳韶二犯若照擬一例豫以斬決轉與王亶望蔣全迪等首惡罪名無以稍示區别程㨂等著改為應斬監候入于本年勾到情實官犯內辦理今各省官犯已經勾決著𣲖刑部侍郎阿揚阿馳驛前往甘省會同該督李侍堯傳旨曉諭監視行刑其侵冒銀一萬兩以上之閔鵷元林昂霄舒玉龍王萬年杜耕書杜有澳李本楠彭永和謝桓周兆熊福明等十一犯又冒賑不及一萬而任內有侵欺建倉銀兩之錢成均王旭陳金宣宗開煌等四犯據王大臣科道等核擬斬監候即入本年秋審情實者雖應如所議但程棟既已末減為今年秋審情實閔鵷元等亦著從寬免其即入本年秋審仍牢固監候其侵冒銀自九千至一千兩以上之韋之瑗尤永清萬邦英丁愈趙元德顧汝衡宋樹榖黃道煚蒲蘭馨章汝楠侯作吳董熙沈泰墨爾更額善達華廷揚賈若琳龎橒史堂覺羅承志李弼申寧吉謝廷庸葉觀海麻宸張育林等二十六犯俱依擬應斬監候統俟明年情實官犯勾到時刑部聲明請旨分别辦理餘俱著照所議完結前經降旨朕于辦理此案不得不為已甚今酌核諸人罪情仍不忍其駢首受誅就其中情節最重之程棟等二十二犯先豫勾決所謂不為已甚去已甚實因吏治民生關係重大不得不辦之苦心所有辦理此案前後所降諭旨著李侍堯明白宣諭各屬俾觸目警心共知侵貪之吏天理所不容即國法所難宥庶幾辟以止辟所全者多也將此通諭中外知之臣等謹案州縣有牧民之責大法小亷職守應爾若借賑恤為名朋比作姦通省效尤竟無一人惕然為戒實屬從來未有之事甘省揑災冒賑各犯爰書既定於法均無可寬我皇上酌核情罪將最重之程棟等先正典刑餘俱稍示區别并令該督宣諭各屬使之觸目警心懲其既往禁其將來所以為吏治民生計者至深且備矣同日上諭內閣曰前因王廷贊楊士璣等七犯侵貪不法業經降旨查明該犯等之子革去官職俱發往伊犁充當苦差今閲阿桂等查奏各犯贓數單內蔣重熹侵冒銀四萬七千四百兩宋學淳侵冒銀四萬七千二百兩又詹耀璘侵冒銀三萬四千五百六十兩外復開銷添建倉厫銀六千二百五十兩陳澍侵冒銀二萬五千七百兩外復開銷添建倉厫銀一萬八千四百六十兩核其侵冒銀數均在四萬兩以上伊等之子亦應照王廷贊等之子一律辦理著交刑部查明該四犯之子如有官職者即行革去並發伊犁充當苦差以示懲警乙邜上諭內閣曰前已降旨停止甘肅陜西兩省收捐監生所有烏嚕木齊新疆捐監著一併停止丁巳上諭內閣曰甘省冒賑侵帑一案皆係王亶望為藩司時倡率舞弊以致通省各屬視侵貪為常事轉相效尤毫無顧忌現在程棟等二十二人之死悉王亶望一人導之使陷於伏法即與王亶望殺之何異核其情弊雖寸磔不足蔽辜然而按律斬決無可加增實覺罪浮於法是以前經降旨將伊子王裘等三人一併革職發往伊犂充當苦差其幼子八人俟年至十二嵗時再行陸續發往現據山西巡撫雅德奏將伊幼子監禁省城恐外省官官相護仍屬有名無實著雅德即將未發王亶望諸子𣲖委妥員小心解交刑部嚴行監禁俟及嵗時由刑部陸續轉發並著刑部存記雖遇恩赦不得奏請援宥回籍如王亶望之子有在伊犂及中途脫逃等事即于拏獲地方正法如此辦理於首惡情罪庶足相抵而大員之以侵貪作俑者亦共知炯戒乙未兩廣總督巴延三等奏言臣等將原任靖逺縣知縣麥桓由畨禺原籍行提到案督同兩司研訊據麥桓供乾隆四十一年在河州州判任內有靖逺縣知縣囑托省城素識之翟二南轉求蘭州府蔣全迪鑽營王亶望指缺求補司府各許銀四千兩又議定辦災使費司府各四千兩於奉文赴任時蔣全迪即預填實收六百張勒令補印收捐造入季報以抵前欠一萬六千之數自到任後計兩年報災辦賑冒銷入已共銀一萬九千八百五十兩隨於四十三年告請終養回籍等情臣等恐尚有不實不盡仍委員將麥桓押解甘省歸案辦理奏入上諭內閣曰甘省收捐監糧一案王亶望蔣全迪等明目張膽通同舞弊已屬從來未有之竒貪異事乃麥桓在州判任內膽敢與王亶望蔣全迪等鑽營關説指闕求官公行賄賂蔣全迪即勒填實收並議定辦災使費是不特冒賑殃民又復賣官鬻爵目無法紀至於如此之甚尤堪駭異所有麥桓一案現已據巴延三等委員解甘著李侍堯嚴行訊究令將夤緣賄賂各情節據實供吐母使稍有匿飾審訊明確後著另作為一案辦理至甘省現據阿桂等審定侵冒各犯內似此納賄營求者恐復不少除業經審明正法各犯外其餘案內人犯並著李侍堯嚴切鞫訊如有似此情節者俱著照麥桓之例另案定擬俾罔法營私鬻官行賄者知所炯戒丙寅阿桂奏言臣前次奉到各省營伍賞恤銀兩開銷正項及名糧裁添養亷諭旨仰見皇上聖謨逺大不惜多費帑金為足兵衛民之計惟是國家經費嵗有常規有不得不通盤算畫者臣於乾隆十年在銀庫郎中任內曾詳悉查核每年各省所入地丁關稅鹽課蘆課漕項等銀約三千餘萬兩災賑蠲緩不在此數此嵗入嵗出之大略也又查康熙六十一年部庫所存止八百餘萬兩至雍正年間漸積至六千餘萬兩而自西北兩路用兵動支大半我皇上御極之初戶部庫銀不過二千四百萬兩自四十六年以來並未加增賦稅而府藏充實國用富饒部庫增至七千餘萬兩皇上以藏富於民為念凡三次普免天下地丁錢糧兩次普蠲各省漕糧以及遇災即賑河工海塘厯年各處用兵凡為捍衛民生計者所費又何啻萬萬在皇上原不稍存靳惜但此等動支尚非經費可比夫經費驟加不覺其多嵗支則難為繼從前開拓新疆二萬餘里每年所費即以陕甘兵額餉銀裁移添補於國用並未加增兹奉訓諭陕甘各營酌添兵額一萬二千七百餘名西安增設滿兵二千五百名京營添兵四千九百名其馬步糧餉合之各省兵丁賞恤紅白銀兩遵旨開銷正項約算嵗支已有百餘萬兩若又將武職名糧改給養亷其所扣兵馬挑補實額核計嵗需又約二百萬兩以每年額增三百萬經費而論統計二丁餘年即須用至七千萬兩况武職所得名糧馬乾由來已久營員本不至拮據今諭旨改照文員之例一體議給養亷固屬核實辦理而其所扣兵餉似毋須盡行挑補實額伏思滇黔等處控制邉陲兵力不宜單弱川省於平定兩金川後內地兵丁移駐新疆未免不敷守禦其他閩廣海疆亦屬緊要均宜查明增添兵額以資彈壓其陕甘兩省業已添滿漢兵一萬五千餘名併此外省分俱係腹地所扣名糧均可毋庸挑補實額再近年以來滿漢兵制裁添改移者甚多嵗需經費是否與從前相仿伏乞皇上敕交戶部將每年一定出入銀兩數目通盤核算並將增兵餉養亷三百萬兩之後每年是否尚有餘存其各省兵額是否無須一律挑補之處交軍機大臣會同該部一併詳悉妥議奏入上諭內閣曰大學士公阿桂覆奏各省武職名糧裁添養亷挑補實額一摺國家經費原當量入為出而足兵衛民為萬年久逺計者又不得稍存靳惜之見阿桂現管三庫其所奏康熙雍正年間出入大數通盤區畫大臣籌國自應如是但朕以泉貨本流通之物財散民聚聖訓甚明與其聚之于上莫若散之于下且在官多一分即在民少一分顯而易見朕即位初年戶部庫銀不過三千萬兩今四十餘年以來仰荷上蒼嘉佑年榖順成財賦充足中間普免天下地丁錢糧三次蠲免漕糧兩次又各省偏災賑濟及新疆兩金川所費何啻萬萬而賦稅並未加增非如漢武帝之用桑𢎞羊唐德宗之用裴延齡以掊克為事而致府藏充盈也現在戶部庫銀尚存七千萬兩朕又何肯稍為靳惜乎且即以嵗支頓增三百萬計之至乾隆六十年歸政之時所用不過四千餘萬兩加以每年嵗入所存其時庫藏較即位時自必尚有盈餘又何必於此事鰓鰓過計乎從前海望在戶部時不肯明言銀庫實數其意似恐外人聞之朕彼時即不以為是國家惟正之供出入嵗有常經原屬大公至正又何必掩人耳目乎甚如明季金花聚斂乃至戶部請內帑亦不肯發則其鄙吝更可笑矣即以內帑而論憶乾隆初年內務府大臣尚有奏撥部庫銀兩備用之事今則裁減浮費釐剔積弊不特無需奏撥且嵗將內務府庫銀命撥歸部庫者動以百萬計又何必以部庫不敷嵗出為慮乎至于嵗入項下惟米豆關稅一節初年曽經免稅原欲使市價日平乃行之日久並未平減殊不滿朕意後因安寧奏請復收經部議準允行至遇地方歉收榖貴之年原有降旨特免米豆過關之數所以隨時調劑或商賈多往亦救災區米貴之一法耳今阿桂既籌畫及此但朕意究以多添兵力不惜經費為是在廷諸臣自必各有確見所有阿桂奏到原摺並朕此旨一併發抄使中外咸知朕意並著大學士九卿科道詳悉妥議具奏臣等謹案自古設兵衛民可百年不用不可一日不備我皇上睿慮周詳多添兵額所以裕武備而振國威誠鞏固金湯之良法也至馬步糧餉及營武賞恤均諭令開銷正帑計歲支已不下百餘萬又以武職名糧一體改給養亷每年經費共增至三百萬兩臣阿桂恐嵗入不敷未免鰓鰓過計皇上明切示諭不稍存靳惜之見惟務為久逺之圖易曰損上益下謂之益豈特普蠲加賑為藏富於民己哉戊辰吏部將甘省縋城遞摺之候補縣丞姚起彪帶領引見奉旨姚起彪著發往陕西交畢沅以縣丞用並加恩賞給銀一百兩同日李侍堯奏言監糧災賑案內所有私收折色冒銷賑糧諸弊經臣會同大學士公阿桂查節次具奏臣恐首府給發銀兩尚有弊端未盡查出之處隨令藩司福嵩再行確查兹具詳覆前來臣查原任蘭州府知府楊士璣任內所發實收各縣尚有未捐而揑報已捐者有此縣所捐銀兩竟為彼縣那用者又有此縣已捐銀兩業為彼縣那用而仍將報捐糧數於賑案內開銷者當時原屬任意騰那輾轉侵用逮楊士璣為賊所害一切弊竇不及彌縫遂致底裡畢露查乾隆四十五年共發實收四萬三千二十五張又四十四年年底存剩未捐實收八千八百一張二共實收五萬一千八百二十六張除四十五年分共捐三萬二千七百六十八張四十六年分又捐一千二百七十七張尚餘實收一萬七千七百八十一張前因查出監糧災賑諸弊臣即令藩司福嵩將未經填捐之實收盡行提回兹查出四十五年所捐實收內如漳縣寧夏武威山丹四縣共八百六十五張並未填捐遽行揑報已捐於是年賑案內將虛糧撥銷計監銀四萬七千五百七十五兩合糧三萬五千三十四石又楊士璣經手給發監銀並不按捐監州縣給發如平畨狄道河州會寧張掖西寧碾伯金縣等八州縣應填實收並未捐完楊士璣輒將他縣所捐監銀借給使用共那借過銀一十萬七千四十九兩零其已捐之州縣如安西玉門等二十州縣現在無項歸欵而山丹寧夏平羅漳縣華亭等五縣因所捐銀兩為他縣那用輒將報捐糧數於上年賑案內撥銷是監銀已屬無著而虛糧又已開報尤屬弊中之弊但此等州縣俱係本案問擬重罪之人資財亦經抄沒實無可著落追賠所有漳縣等揑報未捐實收八百六十五張現已停捐應即飭司詳查提回注銷至各員虛報糧石私那侵用無著銀一十萬七千四十九兩零容臣查明細數統歸假災冒賑案內辦理奏入上命軍機大臣傳諭李侍堯曰實收改歸首府總由王廷贊骫法營私楊士璣勾通揑冒以致百弊叢生各州縣視國帑為私財任意騰那輾轉侵蝕實屬從來未有之竒事但王廷贊已經正法楊士璣亦被賊害伊二人之子均已發往伊犁充當苦差於法無可復加至所有那用監銀開報虛糧入已究係何員任內自應詳查的實著傳諭李侍堯將那用虛開入己之各州縣詳悉查核此內已於前案定擬分别辦理者若干員其未經定擬並著李侍堯按照實在入已贓數仍遵前旨分别定擬具奏十月庚午上諭內閣曰昨據副都御史汪承霈條奏甘肅監生一摺請以原名準其在部另行改捐給與執照免其停科並請勒限二年報捐如過期不捐雖扣滿三科亦不準其應試等語此等監生逐利熱中希圖省費報捐即概豫禠革原不為過今照部議統限二年準以原名在部另捐入場應試已屬格外之恩但念該生等人數衆多從前在甘省上捐時俱係王亶望諸人引之犯法非盡該生之過况前已出資今概令重捐其中寒畯未免志切觀光而力有不逮情殊可憫著加恩將從前甘肅報捐監生者準其呈明另照在部捐監之數繳足即給豫執照許其科考至定限二年為期稍近恐外省邉陲一時未能遍曉及至遵例逺來而限期已過未免向隅著並加恩再寬限三年統限五年為率俾該生等從容報納上進有階以副朕宥過推恩作養人材之至意辛未李侍堯奏言前任蘭州道參革四川川北道熊啓謨現已解到臣嚴加審訊據熊啓謨供在甘肅驛傳道任時鄭陳善送過夀禮四百兩後丁憂離任陸瑋送過奠儀盤費五百兩又口外解到前任寧夏同知已升鎮西府知府伍諾璽據供署寧夏任內四十年辦過賑銀八千八百七十餘兩實散銀七千三百兩餘銀一千五百七十兩四十一年又辦過賑銀五萬九百九十餘兩實散銀四萬一千四百五十兩餘銀九千五百四十兩又前任秦州直𨽻州知州竒明供四十年在靈州任內辦過賑銀二萬三千九百餘兩實散銀一萬九千三百兩餘銀四千六百兩四十一年到秦州任辦過賑銀八千一百兩實散銀六千五百兩餘銀一千六百兩四十三年辦過賑銀一萬三千三百兩實散銀一萬一千二百餘兩餘銀二千一百兩查伍諾璽侵冒銀欵在一萬兩以上請照侵盜錢糧一千兩以上例擬斬監候秋後處決入於情實竒明請照侵盜錢糧一千兩以上例擬斬監候秋後處決熊啓謨請照監臨官勒索所部財物一千兩以下杖流律從重發往新疆效力贖罪奏入上敕原議大臣議奏旋經軍機大臣奏言伍諾璽竒明均應如該督所議定擬仍請遵照前奉諭旨俟明年情實官犯勾到時將該二犯交刑部一併聲明請旨分别辦理又原任蘭州道熊啓謨雖據該督訊無侵冒情節但扶同揑結又收受屬員銀九百兩自應按律問擬惟查此等揑結各道府現在陸續解甘該員等有於屬員辦理災賑案內揑結者有於折收監糧案內揑結者亦有災賑監糧俱經揑結者又其中曾否收受屬員銀兩情節轉重各有不同應請令李侍堯俟揑結各員解齊一併彚案確實情罪按律分别定擬具奏以歸畫一奏入得旨如所議行十一月己酉李侍堯奏言查監糧災賑案內已離甘省各員準各處解到參革原任涇州知州陳常原任武威縣知縣朱家慶原任平涼縣知縣布瞻原任合水縣知縣成德前任渭源縣知縣定邉縣知縣吕應祥原任東樂縣丞李立原署巴燕戎格通判佛保等七犯臣隨率同藩臬兩司逐一研訊查陳常侵冒賑銀三萬八千兩又捐監盈餘銀二萬兩朱家慶侵冒賑銀三萬兩又捐監盈餘銀一萬兩應請將該二犯照侵蝕錢糧一千兩以上例擬斬請旨即行正法布曕侵冒銀七千餘兩成德侵冒銀四千三百餘兩吕應詳侵冒銀三千五百餘兩李立侵冒銀二千四百餘兩佛保侵冒銀一千七百餘兩以上五犯均請照侵蝕錢糧一千兩以上例擬斬監候統入明年秋審情實請旨定奪再查陳常朱家慶二犯賘在四萬兩以上所有陳常之子陳光第陳于豐陳于範朱家慶之子朱聲琨朱聲瑋等應請發往伊犁充當若差臣一面移咨各旗籍查明解甘發遣奏入上敕三法司核擬速奏旋經刑部等議言應如該督所奏辦理同日李侍堯又奏言臣查甘省實收歸首府之後有未捐而揑報已捐者虛糧開銷復冒折色者四員武威縣知縣李元椿揑捐實收四百二十三張計銀二萬三千二百六十五兩山丹縣知縣萬邦英揑捐實收二百八張計銀一萬一千