body:
  text: 甲寅阿桂李侍堯奏言川省頭二起屯練兵於五月二十九及閏五月初一日先後到蘭臣等思該兵丁等䟦涉㡬三千里必須休息數日方能鼔勇殺賊而賊匪盤踞已久防禦甚周剋期大舉尤須計岀萬全以圖一鼓殱滅此數日内本不欲派兵進𠞰但屯兵初到蘭州於華林山形勢及進兵路徑打仗情形無由知悉必須預令得知而屯練兵丁亦踴躍報効因於閏五月初三日派海蘭察明亮同那木札彰藹明山阿蘭保及阿拉山公多爾濟色布坦帶領侍衞章京阿拉山馬兵川省屯練兵由龍尾山過溝繞至華林山西南斜撲賊卡派舒亮哈當阿三德㤗斐英阿福寧帶領滿漢奮勇兵過溝由華林山南直壓賊卡額森特帶兵在龍尾山坡俟有可乘之機即分路督率繼進伍彌泰莾古賚旺親班巴爾烏爾圖納遜仁和馬彪羅江鱗等仍率領滿漢官兵佔龍尾山梁接應堵截並架礟向賊營轟打是日寅刻齊至華林山賊匪已將前次進攻之路砍㫁並多掘坑墈令我馬兵不能馳騁海蘭察等帶領屯練兵曲折遶進相近賊卡賊匪仍於卡内放鎗扺禦不敢出迎惟時屯練兵即奮勇撲進直至卡邊賊匪見事勢已急即有數百賊出卡拚死抗拒屯練兵棄鎗短接刀砍矛戳殱戮甚多賊始退囘我兵乘勢撲壓賊匪又復出拒如此三次賊匪被殺更多始竄歸卡栅在溝壕内潛藏放鎗抵死不出此次本不過令屯練兵畧知路逕情形尚非大舉至未刻即將兩路官兵徐徐撤囘查此次除鎗礟殺死賊人不計數外其三次攪戰約斃賊六七十名官兵屯練陣亡者十二名副將保興都司皂王保守偹闗聨陞阿拉山三等台吉諾依多普㕘領達克巴俱帶有鎗傷尚屬無妨臣查賊匪能打仗者不過數百人現在滿漢屯土官兵已有萬餘任其盤踞死守茍延殘喘實非意計所及現在川省降畨已到更無可待臣等公同籌畫即於初九初十兩日剋期大舉四路進攻務將逆匪𠞰除净盡同日阿桂李侍堯又奏言查賊匪勢已窮蹙臣等時刻留心慮其竄逸所有防守後路各將備屢經嚴飭曉諭令晝夜防範嚴宻稽查至賊營之北𦂳臨黄河不但對岸金城關駐兵嚴防並於南岸船橋處所亦新立卡栅添兵二百名駐守其迤西一帶因欲於大舉時派兵從此路進攻故尚未安設多兵該處雖山勢重叠路徑叢雜迤西總有洮河為限不能越過沿河洪濟橋一帶有兵八百餘名迤南之沙泥站又有兵九百名防守賊匪即使結隊乘馬衝逸一至河邊不能不下馬覔渡無難𠞰滅若改換衣㡌分散潛逃則撒拉爾逆囘鬚髪截短言語不同易於識認且有舊教指拏不患不捜捕净盡臣等仍加意稽查先事准備以期殱戮無遺同日阿桂李侍尭又奏言查新教即係邪教固當按律辦理但馬明心自二十六年從口外歸家即倡立新教愚回厭故喜新俱為煽惑至三十四年賀麻六乎韓哈濟等互相控告地方官又並未飭禁流傳日乆現在各州縣囘民内崇奉新教並不知其為犯法自逆囘滋事以來新教囘民畏懼早已羣相避就若復究其已往無論原屬一教難於辨别異同且按户捜查亦多未便臣等再四思維馬明心為新教之首其家屬黨羽事竣後自當照倡立邪教之例按名查拏嚴辦其伏羌縣為馬明心歛銀之囘民如果屬實亦當一併查辦無遺此外向從新教者只可於辦理善後事宜案内立法嚴禁其首逆蘇四十三及助惡頭目韓一的巴拉等罪大惡極所有家屬當概予騈誅不留餘孽其餘各犯家口即遵㫖改發雲南普洱廣西百色等處極邉烟瘴之地以浄根株均奏入上命軍機大臣傳諭阿桂李侍尭曰前已屢次傳諭阿桂以賊營迤西一帶山徑叢襍小路甚多尤須留心防範且甘省囘民甚多其中多有蘇四十三黨羽該犯計其尚肯容留尤不患無藏身之地阿桂務須實力嚴防即或伊勢窮計蹙竟爾自焚自戕必當檢驗屍身確有凴據方為完事此尤辦理之最要者至馬明心之家屬黨羽自當按名查拏嚴行辦理其伏羌縣為馬明心歛銀之囘民如果查明屬實亦必須查辦無遺不可稍為姑息更不可化為無事倘查辦不能浄盡以致再養癰貽患其所闗甚鉅阿桂李侍堯務須妥協經理以期永靖邉陲同日上諭内閣曰此次調赴甘省𠞰捕逆囘之四川屯練降畨土兵甚屬勇往出力著加恩於甘省藩庫内各賞給一月口糧以示鼓勵同日阿桂李侍尭奏言烏魯木齊提督喬照過蘭來見據稱在京陛見時曽面求即在蘭州帶兵効力上以𠞰賊事務將竣屯田𦂳要未䝉俞允現當尅期進𠞰情願留甘帶兵等語查喬照年已七十餘嵗從前亦未經厯行陣無需伊在此帶兵打仗惟聞該提督在甘年久於陕甘兩省營伍情形最為熟悉現在遵㫖増添兵數其何處地方𦂳要何處控制番囘臣阿桂雖經過甘省數次不過畧知梗槩而臣李侍尭則更係初到無由深悉應請將喬照暫留二三十日臣等詳詢一切公同熟商俟辦有就緒再令往烏魯木齊任事至建昌鎮縂兵鄂輝於閏五月初二日扺蘭現在帶同帶兵打仗奏入報聞同日李侍尭又奏言現在調集滿漢官兵及土練屯練㑹𠞰逆匪一應供支俱應寛為籌備臣扺省以來查核軍糈頗為充裕尚有陸續報運者計算儘敷儲備至所需銀欵仰䝉皇上勅部發帑一百八十萬兩觧甘備用臣扺任後詢據布政使福崧禀稱前督臣勒爾謹先經檄令前任藩司王廷賛節次動撥司庫五十二萬四百兩零分發各州縣以應急需其東路州縣即於陜省解甘兵餉内截留應用銀二十二萬三十兩統計已共發銀七十四萬三千四百兩零勒爾謹因軍務倥􅘓未及奏明臣現在督飭承辦官員將前項給發銀兩動支欵項覈實具報俟即日軍務告竣分晰應否准銷按欵造冊具題照例據實核銷奏入報聞己未阿桂李侍堯奏言臣等於初九日令海蘭察額森特明亮同那木扎明山泰斐英阿福寧哈當阿鄂輝阿拉山公多爾濟色布坦帶領侍衛章京阿拉山馬兵川省屯練及延綏固原緑營兵共三千餘名由龍尾山過溝繞至華林山西斜撲賊營𣲖舒亮薩炳阿彰靄三徳帶領滿漢兵一千七百餘名由龍尾山過溝從華林山南直壓賊卡派馬彪仁和阿蘭保阿爾都帶領緑營兵二千名及舊教土兵由華林山東分路上撲賊營𣲖羅江鱗額爾恒額帶領土司楊宗業所屬畨兵由華林山後攻撲賊營羅卜藏多爾濟伍彌泰莾古賚旺親班巴爾烏爾圖納遜仍率領滿漢官兵佔龍尾山梁接應堵截臣阿桂臣李侍尭在後督催䇿應子刻先後發兵寅刻齊至華林山梁整飭各隊惟時海蘭察額森特明亮等帶領西南兩路官兵由華林山直撲賊卡即將賊匪所立卡子四座盡行搶得直至大卡邉奮力攻撲賊匪於卡邉刨挖深溝一道潛藏溝内放鎗扺禦鎗勢甚急未能撲進而賊匪見我兵直至大卡惟恐一失即不能存立遂傾穴出迎拚死衝壓海蘭察等因壕邉坑坎甚多不能馳騁即棄馬同衆兵歩行鎗箭齊發殱戮甚多賊人稍退復囘希圖撲壓如此數次始竄歸卡柵在溝壕内潛放鳥鎗我兵乘勢上撲不能得手而華林山之西亦有立磡數道兩旁溝壕甚多無路可上其時馬彪仁和等帶領緑營及老教兵從東邉溝内覓路奮力上撲無奈崖磡陡峻而賊人向下施打鎗石我兵多有捐傷不能立即砍營而入至華林山之後賊匪又已預備番兵攀援而上俱為鎗石所中滚下山坡自寅至未我兵作氣何啻三鼓若令久駐反恐無益臣等因將各路官兵徐徐撤囘此次打仗殺賊百餘名而官兵直至卡邉撲壓及攀磡仰攻未免捐折稍多陣亡三等侍衛齊勤泰一員把縂三員滿漢屯土番兵共七十六名查此次厚集兵力四路進攻滿擬一舉殱滅又因賊匪負固死守未能集事臣等實深愧憤焦急現在悉心籌畫另圖計取之䇿仰仗聖主天威必能一鼓𠞰除設或仍前阻住現在將届麥熟賊匪必思就近割取以充糧食即於賊營迤西趕𦂳安設數營嚴宻圍困晝夜防範先令賊人無路覓食不戰自亂可以乘勢殱除斷不至躭延時日同日阿桂李侍堯又奏言臣接奉上諭據賊人買成伏供有賊因西寧糧草最多令其前往探聼之語不可不加意防範臣查買成伏係三月三十日在西寧盤獲嗣經解省訊據該犯供稱三月二十六日晚間蘇四十三因聞西寧客商買賣人衆糧草最多令其前往探聼虛寔三十日行至平仲驛地方即被兵役拿獲等語計彼時正值賊人初至蘭州勢方猖獗各路官兵尚未到齊是以蘇四十三敢令買成伏前往探聼希圖搶掠糧草目下賊勢窮蹙各處俱安兵防範斷不能復至彼處滋擾至賊人雖拚死抗拒實不過釡㡳㳺魂現在惟有多方籌畫俾早就生擒即令自焚自戕以及跳河致斃亦必盡心設法求其屍身確據必不令乘間兎脱致别生事端其所有糧草尚係從前搶掠所得臣阿桂初到甘省時賊人猶潛出滋擾民間有被其搶掠前來禀報者近日以來並無禀報搶去糧食等物之事而賊營附近居民地方均已差人曉諭搬移賊人無從搶刧况沙井驛阿干鎮一帶皆有兵防守稽查嚴宻即有附近匪徒亦不敢暗為運送接濟奏入上命軍機大臣傳諭阿桂李侍尭曰日内盼望㨗音甚為懸切及披覽阿桂奏此次進𠞰又未能即刻擒獲殊増憤懣看來逆匪拚死抗拒頗為兇悍阿桂另摺所云賊勢窮蹙竟不可輕為此語且此次官兵打仗不可謂不盡力而仍未能一舉殱擒尤須慎重籌畫計出萬全不宜再多傷兵力阿桂所稱嚴宻圍困使之無路覓食不戰自亂自應如此辦理但防範倍須嚴密務使聲息不通至所稱賊人糧草尚係從前搶掠所得朕以為必無此理據前奏賊匪尚有一月糧食今賊匪佔據山梁已及三月即和珅囘程以來又幾五十日若僅係前此搶掠之糧安能供給如許之久恐仍不免潛出搶刧并或有人為之接濟朕始終以此為疑即火藥一項前據奏賊人止存二十䭾藏在營内地壕裏若果如此則目下亦將用罄何致尚稱鎗勢甚𦂳即賊人箭枝亦應用完何以尚有受箭傷之人是阿桂所稱附近匪徒不敢暗為運送者亦未必然惟當加𦂳防範不使復有刦掠接濟之事而迤西一帶尤宜防其逃竄并潛通消息為要同日阿桂又奏言此次與賊匪打仗海蘭察左脇下受鳥鎗傷箭傷各一處仍照舊領兵舒亮左肘下受箭傷一處即㧞去箭用手巾包裹仍領兵打仗薩炳阿心坎旁受箭傷一處鄂輝左腿受鳥鎗傷一處鎗子打入腿内劃開取出俱属無妨奏入上命軍機大臣傳諭阿桂李侍堯曰據阿桂湊海蘭察舒亮薩炳阿鄂輝𠞰賊時各受鎗箭傷深堪嘉憫著加恩各賞大荷包一對小荷包二對鄂輝被鎗子打入左腿已經取出實為奮勇著賞給巴圖魯名號並加賞銀一百兩同日阿桂李侍堯又奏言甘省自逆囘滋事以來莭次調派土兵隨同進剿所有莊浪土司魯璠舊教土司韓煜業經䝉恩賞戴花翎並加等給予頂帶此外有洮州土司楊宗業因年尚㓜係母楊馬氏䕶理土務派令頭目帶領畨兵一千餘名至蘭州軍營從征並於各後路派令協同防守將届兩月屢次打仗並捐備馬匹器械等項陸續徃軍營運送甚屬踴躍急公又寄信伊頭目等令其奮勇出力殊為可嘉查該土司始祖由明初世襲洮州指揮僉事其六世祖楊朝樑於康熈初年從征呉逆有功特授洮岷協副將並給騎都尉世職准襲三次該土司楊宗業現已年届襲職之期臣查甘省西南一帶番囘錯處各屬土司有三十餘員今楊宗業奮勉出力若䝉恩㫖嘉奬則衆土司各知鼓勵於綏靖撫馭機宜亦屬有益該土司現襲指揮僉事係正四品可否照魯璠韓煜之例請㫖賞戴花翎並加等賞給頂帶以示奬勵之處出自皇上天恩奏入上諭内閣曰據阿桂等奏洮州四品土司楊宗業派令頭目帶領畨兵一千餘名至蘭州軍營屢次從征打仗甚屬奮勇出力等語楊宗業著照土司魯璠韓煜之例一體加恩賞給三品頂帶併戴用花翎仍加賞大縀二疋以示奬勵庚申上命軍機大臣傳諭阿桂李侍堯曰昨據阿桂奏此次官兵打仗出力而𠞰洗尚未蕆事朕心實為厪念阿桂摺内亦稱甚屬焦急但此事現止阿桂一人督辦非如征𠞰兩金川尚有㕘賛之人務須持以鎮静方可悉心籌辦不可過于焦急至李侍堯與阿桂係同辦一事尤須善為勸慰諸事盡心贊助以期妥協不可以軍旅地方之事稍存岐視再海蘭察舒亮薩炳阿鄂輝等此次打仗奮勇受有鎗箭傷昨已俱加恩賞阿桂尤須加意撫慰其帶兵員弁及滿漢官兵出力受傷者已俱酌量加恩此際自宜稍令休息不可過於督責即川省屯練等䟦渉逺來臨陣時又能奮勇出力昨已加恩賞給一月錢糧所有此次打仗受傷者均須一體加以拊循使之感奮用命至此時辦理闗鍵總在各路堵截斷賊口糧不使搶掠供食而防守嚴宻勿令乘間竄逸尤為最要之事現在已届麥熟之期昨阿桂奏賊人必思就近割取朕意逆匪如果出卡割搶即可乘勢𠞰殺至民間新麥或竟官為買取刈割使不為賊人所得其應如何酌辦之處著阿桂李侍堯妥酌籌辦務令賊匪坐困乏食即可不戰自斃再聞賊人夜間並無防範若令海蘭察等帶領屯練降畨等衘枚前進潛刧賊營可以使其擾亂著即酌量辦理至朕於甘肅百姓每嵗發帑養贍恩施優渥而此等畨囘平日既無差科又非若金川必欲取之以絶後患者可比何致作逆若此揆之天理人情寔出意計之外或者向來地方官有所擾累若輩乎不然何以致此也昨得奏後終夜反覆思之實為憤懣想阿桂亦同深痛恨惟期妥協速行籌畫早為蕆事以慰懸望臣等謹案甘肅邊氓仰䝉皇上愛飬生全不惜帑金嵗加賑惜比之他省尤為優渥即番囘雜處亦荷一視同仁既不設以差科復不禁其習俗飲和食德世沐國恩乃逆囘敢於如此肆行實非情理所有揆厥由來皆因甘省大小官員冐灾殃民侵貪無忌歴年罪孽之重竟致上干天和積成戾氣以致流毒貽禍重煩師旅掃除伏讀皇上地方官或有擾累若輩之諭早已明炳於㡬先矣己丑阿桂李侍堯奏言賊匪自五月初二日被我兵痛加殱戮後即於華林山前拏立大卡一座拆卸民居土坯碎石砌築碉房内安孔穴又於卡邊刨挖深溝一道賊匪分布潛藏暗放鳥鎗以為抵禦之計其大卡前又有小卡四座希圖接應聯絡負固死守我兵屢次打仗俱係誘其出壕方能截殺迨賊匪敗逃竄歸卡栅我兵撲進時俱為溝内卡上鎗勢所阻不能得利臣阿桂晝夜思維非攻得賊人大卡不足以制其死命但賊人以逸待勞居髙臨下若力攻仍無把握因與海蘭察額森特明亮再四籌酌並於十三日令伊等至賊營迤西一帶相度安營處所又於龍尾山打礟併發兵過溝誘賊賊總不敢逺離大卡因觀其進退情形知賊匪見我兵撤囘後亦即由卡内將多餘之人陸續撤囘歇凉坐臥臣等公同熟啇惟有乘賊人懈怠之時出其不意突前撲壓或可集事因於十五日令海蘭察額森特明亮同多爾濟色布坦那木札彰靄明山阿蘭保阿爾都總兵羅江鱗併侍衞章京帶領馬兵五百名歩兵八百名於撤兵之際潛往華林山東南山溝内分路埋伏派泰斐英阿福寧哈當阿帶領滿漢兵在龍尾山南埋伏䇿應臣阿桂臣李侍堯同伍彌泰莽古賚旺親班巴爾烏爾圖納遜馬彪仁和三德武靈阿率領滿漢官兵在龍尾山梁向賊營架礟轟打寅刻齊集華林山梁惟時海蘭察額森特明亮等即先率兵衝撲賊卡將卡前山包佔得仍令老教土兵上前誘賊賊匪藏匿卡栅内放鎗抵禦不敢出迎午刻我兵徐徐撤囘至山梁潛伏其時海蘭察在龍尾山坳察㸔賊營動静其守卡衆賊果又陸續囘營止餘數十賊在卡存駐海蘭察偵探得實即单騎由五泉山繞道至華林山溝埋伏處所同額森特明亮等帶領馬兵突出疾馳直撲大卡歩兵屯練降番同時趕到齊至溝邊卡内之賊猝不及防惶遽無措我兵用鍁钁覓路過溝一擁進卡將賊匪數十盡行殺死其營中賊匪傾穴出迎拚死衝壓希兾奪囘大卡我兵鎗箭齊發殱戮賊匪甚多賊人退至兩處山包後潛藏放鎗抵禦時出力撲我兵既得大卡俯視賊營動静皆知實已扼吭據要時天已將晩即於新得卡座内砌築防守並於左近拏卡數處聯絡接應海蘭察明亮等即在彼帶兵駐守以備賊人攻撲賊匪果於夜間奮力衝撲數次俱被我兵鎗箭所中傷死甚多及至天色黎明海蘭察等逆料賊人終夜抗拒必已疲乏因分兵撲進又將兩處山包佔得並派兵將賊營迤西本布爾廟一座向為賊人窟穴一併搶得燒燬殺賊甚多現在我兵離賊營甚近賊人存立之地甚促不過中隔溝墈數道賊匪已無險可恃我兵勇氣倍増賊人竄敗窮蹙情狀畢露不難剋時殱滅而賊營迤西一帶我馬兵已接連佔至黄河邊臨河及北岸俱有兵丁水手嚴宻防範業已四面圍困無虞竄逸計兩日打仗除鎗礮打死不計數外殺死賊人百餘名我兵陣亡官二員阿拉山佐領根丕爾由京派來前鋒托倫保受傷官五員阿拉山三等台吉諾依多普千把總四人兵丁内陣亡受傷者無多俟詳查明確另行造報奏入上命軍機大臣傳諭阿桂李侍堯曰此次官兵攻得賊匪大卡及所佔廟宇相距賊營甚近彼己無險可守且黄河南北岸邊亦俱有官兵接連宻布不致有乘間竄逸之慮至逆賊如此猖獗我領兵大員官兵等為所傷折不少必得生擒首逆及其黨惡要犯盡法處治方足以彰國法而儆兇頑第恐賊匪自知無路可逃竟為自焚自戕之計此雖亦足以完事然究不如生擒之為更快想阿桂自必設法妥協辦理至阿桂李侍堯及出力受傷各員已另降諭㫖賞給荷包陣亡之阿拉山佐領根丕爾前鋒托倫保等亦令查明優䘏其餘受傷之官員兵丁等並著查明照例䘏賞同日上命軍機大臣傳諭阿桂李侍堯曰阿桂等此次派兵攻卡殺賊調度有方阿桂李侍堯著賞給大荷包一對小荷包二對額森特明亮哈當阿進勦受傷仍帶兵轉戰殊為奮勇著各賞大荷包一對小荷包二對海蘭察相地進攻甚屬可嘉另賞給玉韘一枚以示優奬同日上諭内閣曰阿拉山佐領根丕爾𠞰賊陣亡深為可憫著加恩照京城佐領之例賞給雲騎尉並著伊子承襲仍照例賞銀四百兩其托倫保是否即係由京發往之託羅木保著阿桂查明奏到另行加恩欽定蘭州紀畧卷九
