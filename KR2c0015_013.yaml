  text: 欽定四庫全書欽定蘭州紀畧卷十三
  hash: sha256:04f3a8407cbf57b3306987cba35e041f3414cfd0b2616b922e3886a94f76e182
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0015_WYG_013-1a, image: WYG0362/WYG0362-0386c.png}
body:
  text: 壬子阿桂李侍堯奏言本月初五日海蘭察明亮派奮勇官兵及屯練降番在木柵邊照常放砲打石使賊人不備午刻海蘭察明亮率同侍衛提鎮督率弁兵直至壊牆邊先將樹枝草捆隔牆撩入填滿溝壕然後抛擲火彈施放火箭引火焚燒其時賊人尚於牆邊抵死抗拒我兵站立壕邊向内鎗箭齊發𠞰殺甚多火勢益熾賊人不能存住始紛紛退竄華林寺殿屋雖已擊坍尚存一角及圍牆賊人在内藏匿死守我兵一面施放鎗砲一面運送樹枝草捆及木植板片將溝内之火用土填滅直過溝壕用樹枝等物撩積寺基抛擲火彈燒起賊人抵死衝撲數次俱被官兵鎗箭打囘酉刻寺内殘壊屋簷被燒坍倒賊人打死燒斃者甚多始遑遽竄囘華林寺後牆邊及兩廂房牆圏内藏匿放鎗擲石盡力抵禦官兵正欲乗勢將燒殘木植抛入牆圈再用樹枝草捆一併填燒令賊人不能存立其時巳至亥刻黒夜難以用力因暫將官兵撤囘初六日黎明海蘭察明亮率同彰靄泰斐英阿福寧明山阿蘭保多爾濟色布坦海禄哈當阿三徳徳寧武靈阿鄂輝阿爾都並侍衛章京帶領奮勇屯土官兵由華林寺前撲入並預行分飭舒亮仁和馬彪羅江鱗策卜坦等各帶本卡官兵預備賊人分竄即協力擒勦夘刻我兵抛擲火彈鎗箭齊發並短兵砍殺賊人竄入後牆壕内及燒燬房基潛匿官兵緣牆而上站立牆頭向下放鎗擲石打死壕内牆角賊匪甚多衆兵奮勇撲進擒挐𠞰殺其時有賊人百餘從西邊滚下直磡我兵隨後追殺至平坦處又有仁和馬彪等率領本卡官兵將賊人重重圍裹在内擒殺淨盡其華林寺後躱藏餘賊亦殱戮無遺共生擒賊人六十七名割獲首級四百五十顆陣亡由京派來之司鞍果倫察屯練土外委郎卡太受傷副䕶軍㕘領達薩鼐藍翎侍衛萬濟鼐親軍哲克屯練巴圖魯土把總郎思甲軍機處行走户部員外郎舒濓亦帶箭傷其餘陣亡受傷兵丁俟查明造報查逆囘於光天化日之下輒敢肆擾不法實屬神人共憤蘇四十三攻犯蘭州被官兵擊敗後即同衆死守華林山不復散往他處俾我兵得以挐柵環攻盡數𠞰殺皆由聖主洪福上天眷佑而臣等奉命督辦雖遲至三月餘將賊人殱擒淨盡不致一名漏網實仰仗皇上天威得以蕆事同日阿桂李侍堯又奏言安定縣馬明心家屬及其心腹徒弟並伏羌縣為伊斂銀之新教阿渾與各逆黨家屬業經派按察使福寧前往督率地方官按名查挐解省審辦如此間訊出各該處果有從逆囘民即行一併嚴辦至洪濟橋唐家川等處從逆囘民於四月初旬自蘭州竄囘被土兵𠞰殺及淹斃者二百餘名又陸續挐獲正法者百餘名隨賊打仗傷死者三百餘名現在該數處所存新教餘黨諒已無多此外不過查挐各該犯緣坐家屬亦屬易辦臣等已提到該處烟户冊挨查並檄調河州知州謝桓至省面詢情形仍向現挐各逆犯嚴切跟究實力妥辦總之捜捕逆黨務期淨盡根株必不使復留餘孽同日阿桂李侍堯又奏言賊匪肆逆以來所有從賊各犯省城正法二十名河州西寧二處正法五十七名業經具奏在案嗣省城盤獲從賊各犯及由河州循化等處提解至省審明應正法人犯二十六名又循化㕔文武員弁帶領老教土兵陸續搜獲新教逆犯及婦女幼孩共三十四名口俱經分别核辦内韓阿渾即馬六十七一名前據省城挐獲賊匪供稱該犯與蘇四十三帶領賊人分路滋擾一至河州一至循化蘇四十三困守華林山尚望其救援等語嗣據舊教土司挐獲解省臣等嚴切研鞫據該犯供三月間起事時蘇四十三令其糾約各莊来到新教隨後接濟該犯糾約三百餘人尚未齊全即被循化官兵帶同舊教土兵衝殺擒挐該犯藏匿山中㡬及三月始被搜挐等語是賊匪所供分路滋擾事屬有因且聞該犯在撒拉爾地方為新教衆囘所信奉與蘇四十三相同其賊人未到河州以前謀逆起釁各情節可以向其跟究應解送行在辦理其餘各犯業已隨時正法至現在省城及各處監禁之逆賊婦女幼孩三百十五名口除將蘇四十三韓一的巴拉家屬十一名口業經正法外餘俟遵旨分别發遣均奏入上諭内閣曰本日據阿桂等奏殱擒逆囘餘黨淨盡一摺逆匪負嵎固守官兵得以全數𠞰殺竟無一名漏網實堪稱快除海蘭察等已於阿桂等前次奏㨗時交部從優議叙外所有此次打仗陣亡之司鞍果倫察著加恩照藍翎侍衛例給與䘏典屯練土外委即卡太並照土千總例議䘏受傷之屯練巴圖魯土把總郎思甲著加恩以土守備用此外受傷各員并及陣亡被傷官兵著阿桂等查明照例優䘏至軍機處司員户部員外郎舒濓亦帶有箭傷著加恩賞戴花翎其屢次打仗奮勇受傷之頭等侍衛木塔爾前已賞給二品頂帶著再加恩遇有四川管理降番之副將缺出交該督酌量題補臣等謹案賊首蘇四十三及黨惡要犯已就誅戮且糧食燬盡存水無多賊匪已無可倚恃乃狼戾性成於竄入華林寺後魚釡游魂尚敢死力抗拒直至官兵樹柵火攻始將敗殘餘醜殄滅無遺此實賊黨戾氣所鍾自致聚殱竟無一人倖逃法網天道之昭著與王法之森嚴並足垂戒於萬世云同日上命軍機大臣傳諭阿桂李侍堯曰此次𠞰捕逆囘雖因其死守抗拒遲至三月有餘始行殱滅然使賊於一月前衝突而逃𠞰捕正自費力今乃佔聚華林山寺俾官兵得以全數殱擒竟無一名漏網仰賴上天嘉祐朕愉快之餘惟益深䖍畏耳至阿桂等所稱馬明心家屬徒弟并伏羌縣斂銀之新教阿渾與各逆黨家屬已委按察使福寧前往查辦等語所奏甚是此等從逆囘民露有形迹証據者必須全行搜查不可稍存將就了事之見至省城及循化河州等處監禁逆犯之婦女幼孩人數甚多著阿桂等查明將應發烟瘴者即行分别發遣毋令久稽監獄同日阿桂李侍堯又奏言查首逆蘇四十三首級當官兵奮勇追𠞰其如何被殺及為何人所殺緣由無從查詢及至陸續呈騐令韓阿渾等及伊妻女認出時當即飭令官兵務將屍身尋獲而其時所有割獲首級衆賊屍身俱為官兵砍碎實無從辦認是以即將蘇四十三及各頭目首級懸掛蘭州各門號令今奉旨將蘇四十三首級傳示各省囘民居住地方臣等伏思馬明心雖未有助逆實跡然其剏教啟釁寔係禍首罪魁現令刨出屍身剉骨揚灰其首級一併同懸示衆所有蘇四十三首級現已裝盛木桶並奉到告示頒發各省每處懸示數日俾囘民共知儆戒同日阿桂又奏言查辦理賊匪餘黨一事其洪濟橋唐家川等處從逆囘民陸續捜捕𠞰殺已有五百餘名縱有餘孽已屬無多至安定伏羌等處亦無需帶兵搜捕毋庸海蘭察等在此帮辦臣即令明亮先行馳赴行在海蘭察額森特舒亮隨後亦即帶領侍衛官員起程再土司楊宗業番兵一千二百名及保安土兵一百名俱於六月二十三等日飭令分起囘伊畨地訖又西安先撤囘滿兵一千名寧夏先撤囘滿兵五百名亦於七月初一等日分起自蘭州起程其西安副都統薩炳阿即令帶兵囘陜均奏入報聞同日阿桂李侍堯奏言臣等遵旨傳集司道及在省之府㕔州縣各官反覆開導訊究冒賑舞弊實據令其逐欵開出兹據蘭州府知府陸瑋鞏昌府知府宗開煌平涼府同知閔鵷元蘭州府同知善達署肅州知州州同董熙狄道州知州鄭陳善皋蘭縣知縣候補知州楊惪言皋蘭縣知縣蔣重熹古浪縣知縣舒玉龍永昌縣知縣林昻霄山丹縣知縣萬邦英前任古浪縣知縣徐樹梅漳縣知縣夏恒等十三員將浮冒賑糧銀數及被上司勒取交辦物件等項用去銀數逐一開冩前來臣等閲該員等開出各欵勒爾謹雖未向屬員婪索多贜亦曽收受宗開煌銀一千兩且屢次交辦物件致送過往人情所用甚多王亶望任内則無人不向其勒索多金贓欵纍纍尤為貪縱王廷贊尚未收受屬員銀兩亦有交辦物件情事查甘省地瘠民貧官場素稱清苦此衆人所共知勒爾謹等身為甘省上司更應稔悉何以竟令屬員買物賠墊甚且公然勒索是明知各該州縣辦理監糧賑䘏大有侵漁遂爾分肥染指核之前次福寧所供各處報災分數俱由藩司議定或于總督具奏後藩司補取道結或取空白由藩司填定等語其為上下通同一氣冒銷舞弊已無疑義臣等查各該員所供雖尚有不實不盡之處而大局已破百喙莫解謹將陸瑋等親供録呈御覽請勅交留京王大臣刑部堂官行在軍機大臣分别嚴訊奏入上諭内閣曰甘省收捐監糧一事原因邊陲地瘠民貧應令倉儲充裕以備賑䘏之用是以復經允行乃開例之始即公然私收折色甚至通省大小官員聯為一氣冒賑分肥扶同揑結積成弊藪既經敗露自不得不徹底跟究現據阿桂等陸續查奏歴年情弊俱已水落石出是竟以朕惠養黎元之政作為官吏肥蠧之資實屬愍不畏法為天理所不容況辦賑之事有濫必致有遺若官吏多一分侵漁即災民少受一分實惠朕之所以嚴行窮究者正欲剔除官吏積弊使百姓實受賑䘏之益並非因辦賑有弊轉將賑䘏之事靳固不舉也前恐各督撫誤㑹此意或致有災不辦曽經明降諭旨宣示中外但恐督撫等仍未能仰體朕懐且不肖之員或以于已無可分肥即于民視如膜外其所闗于民政者甚大朕如傷在抱偶遇各省偏災不惜多發帑金優䘏不使一夫失所此天下臣民所共知共見者各該督撫務皆以愛民䘏災使得均沾實惠為念遇有地方水旱即詳悉查勘據實奏報加意賑䘏斷不可緣有甘省監糧之案遂爾因噎廢食以致稍有諱飾倘如此申誡再三而督撫等仍有蹈此者經朕察出必重治其罪將此再行通諭中外知之癸丑上命軍機大臣傳諭留京辦事王大臣山西巡撫雅德曰連日令軍機大臣嚴訊王廷贊據供有武威縣知縣朱家慶固原州知州郭昌泰各饋送王亶望銀兩或二千或三千交坐省長隨送進朱家慶係漢軍已告病囘京郭昌泰係山西人已丁憂囘籍等語著將朱家慶郭昌泰二人各行提取嚴訊確供迅速具奏上又命軍機大臣傳諭阿桂李侍堯曰據王廷贊供金縣知縣邱大英西寧縣知縣詹耀璘各饋送王亶望銀兩二三千等語邱大英詹耀璘現任甘肅知縣著傳諭阿桂等就近提訊得有確據即嚴㕘歸案辦理同日上諭内閣曰據吏部查奏王亶望王廷贊甘肅藩司任内曽任本道首府首縣各員除秦雄飛等八員業經革職挐問圖桑阿等三員現已病故外所有前署蘭州道之現任西寧道劉光昱前署蘭州府知府康基淵前署皋蘭縣知縣現任蘭州府知府陸瑋現任皋蘭縣知縣蔣重熹俱著革職挐問交阿桂等併案審辦其揑結舞弊之各道府州縣仍俟吏部查明具奏另降諭旨同日上命軍機大臣傳諭阿桂李侍堯曰昨據户部奏甘肅監糧自開捐以後節據該督造册糧石並以各州縣舊有倉厫不敷存貯共請添建者二十六案估需銀一十六萬一千八百餘兩經户部准令添建即于所收捐監倉費銀内動支造報工部核銷在案今查明此項既無本色糧石則從前該省請添建倉厫何糧可貯顯有揑冒情弊不可不徹底查辦等語所奏甚是本日又據工部將甘省請建厫座現在核議及從前准銷未銷各案請一併敕交阿桂李侍堯徹底查明具奏一摺與户部所奏事屬一例建立厫座原為收貯糧石而設甘省自乾隆三十九年勒爾謹奏准開捐以來即私收折色通省糧石盡屬紙上空文即現有倉厫已為虚設何得又請添建其為揑報蓋造侵蝕公帑已無疑義著傳諭阿桂等將請添建厫座之各州縣派令滿漢軍機章京分路前往查勘有無厫座據實覆奏庚申阿桂李侍堯奏言官兵於本月初六日殱滅撒拉爾逆囘將割獲首級令前此被擒現尚監禁之韓三十九及韓阿渾即馬六十七逐一辨認據認出頭人馬作南馬三十五首級即於蘭州各門懸掛號令至生擒賊人内有馬良海受傷甚重於拏獲後斃命亦即梟取首級懸示訖其唐宗第等六犯傷重垂斃不能取供當即先行正法尚餘賊犯大小六十名臣等詳細研鞫雖無𦂳要頭目在内擇其人稍明白於蘇四十三起事及盤踞華林山始終抗拒官兵情形畧為知悉可備訊問且傷痕尚輕不妨起解者馬達烏特韓四個韓三個三名同韓阿渾即馬六十七蕭得福共五名交侍衛泰斐英阿福寧阿爾都管押於本月十二日自蘭州起程解逆行在審辦此外傷重賊犯二十五名於取供後先行正法傷輕之三十一名於十二日致祭陣亾將士時正法同陸續正法之前次挐獲賊犯韓三十九一名又馬牢沙等六名及閏五月十九官兵挐柵圍攻後節次自賊營投出之老教二十名一併開單進呈同日阿桂李侍堯又奏言明亮已於初八日起程馳赴行在羅江鱗亦於是日起程囘滇初九日海蘭察帶侍衛章京拜唐阿六員名起程初十日乾清門侍衛彰靄明山阿蘭保起程十一日額森特乾清門侍衛那木札帶同侍衛拜唐阿十三員名起程十二日乾清門侍衛泰斐英阿福寧二等侍衛阿爾都押解賊犯起程十三日舒亮帶同侍衛拜唐阿十一員名起程所有阿拉山兵舊教土兵并寧夏涼州莊浪滿兵業經撤囘鄂輝帶領屯練降番亦於日内囘川此外西安滿兵及緑旗官兵亦即分起陸續撤囘俾道路不致擁擠其將軍副都統提鎮等俱隨本管營兵按日起程至副䕶軍㕘領達薩鼐藍翎侍衛萬濟鼐巴圖因受傷稍重暫留蘭州俟調養就痊再令起程赴京均奏入報聞同日上諭内閣曰前據阿桂等奏殱擒逆囘餘黨所有在事出力員弁業經降旨分别加恩䘏賞兹據阿桂復查明前次打仗時漢土弁兵内甘州提標守備馬斌四川千總唐萬年循化營千總蕭福禄延綏鎮標把總孟學易始終在頭敵打仗奮勇殺賊並經受傷馬斌等俱著加恩賞戴藍翎涼州兵張世儒固原兵洪光耀延綏兵孫仲喜王寧義上屋擊打賊匪奮勇出力張世儒等俱著即賞補把總撒拉爾土司韓光祖屯練巴圖魯藍翎土把總阿旺藍翎土千總雍中依沙斯俱帶兵打仗奮勇殺賊韓光祖等俱著加恩賞戴花翎屯練土千總阿朋土外委雍中朋帛噶爾角克土千總阿結别斯滿土千總安爾多節次打仗殺賊並經受傷雍中朋等俱著加恩賞戴藍翎以示優奬壬戌上命軍機大臣傳諭阿桂李侍堯曰甘省監糧一案據阿桂等查奏開例之始全係私收拆色並無實貯在倉而從前袁守侗阿揚阿欽差前往盤查據稱倉糧係屬實貯其言殊難慿信該省監糧既未買補則倉儲焉能足數此必當日地方官一聞查倉之信挪東掩西為一時彌縫之計其簽量人役均係該地方官所管易於通同弊混而袁守侗等受其欺蔽率稱並無虧短亦未可定當日州縣各官現在甘省者無難訊究得實著傳諭阿桂等即行確切訊究令將袁守侗等往查時該員等如何挪移掩飾其人役等如何通同弊混之處訊取確供據實覆奏己巳阿桂李侍堯奏言臣等派委按察使福寧前往安定縣查挐馬明心家屬及心腹徒弟并伏羌縣為伊斂銀之新教阿渾等嗣據該司稟稱于七月初四日行抵安定屬之秤鈎馹距官川一百四十餘里該處山路叢雜若多帶兵役恐致逃竄轉難搜捕即督同安定令黄道煚選帶幹役數名星夜前進於初五日巳刻猝至官川馬明心家擒獲該犯堂弟馬三娃即馬廷美並馬明心之妾張氏幼子二名女孩二口馬三娃之母孫氏又獲逆犯張懐德之妻馬氏並訪得馬明心之長子四十九久匿另莊囘民馬徳裕家隨押令協差飛挐將馬四十九並馬德裕及伊子馬明耀獲解次日又挐獲外來從教之伏羌囘民齊明齊月臨潼囘民拜得明清水縣囘民蕭明正山西蒲州囘民亷梓玉新教教讀馬成祥馬明心表弟馬朝林另莊居住之車滿倉督押至縣又於縣城挐獲逆犯張漢之妻馬氏女二口犯兄張柱妻李氏子女四口飭縣分别解省並查官川地方大小村莊俱係漢囘雜居其馬明心所居官川堡莊内共有囘民三十餘户分上下堡上堡係馬明心等居住下堡則係舊教自馬明心正法從前無知被惑者俱各驚惶失措情形甚屬畏懼至䕶送馬明心之馬成德馬如玉馬成林馬薩滿拉即馬如昌亦經黄道煚選差弋獲該司於初十日行抵伏羌即督同該縣選差幹役將斂銀附從各犯密挐於十一十二等日據挐獲馬得建馬立格馬景元馬伏賔馬廷棟馬尚紀馬廷彩楊鳯鳴馬建業馬正邦楊洪道高兆元馬良貴馬榮貴馬成龍齊有全一十六犯先後挐獲解案並據該司稟稱伏羌囘民衆多當即傳集剴切曉諭驚疑盡釋感悔涕零咸安堵如常等語該司於囘省之後路過隴西又挐獲逆犯張明得張懐徳家屬共十五名口一并分起解省臣等提集各犯逐一嚴加鞫訊各供俱係新教囘民或向從馬明心念經稱大徒弟或不逺數千里前來拜從或與馬明心交密為之經理家務或於馬明心起解時直送至省或於馬明心正法後羣聚誦經或代馬明心收銀或藏匿馬明心之子其伏羌縣所獲馬得建等十六名内馬建業八名俱係新教阿渾有糾約斂資者有出銀餽獻者有攜銀代送者種種情節俱各供認惟僉稱與撒拉爾地方遥逺向不認得蘇四十三實無從逆情事其伏羌縣囘民斂銀一節亦在蘇四十三起事以前並不知馬明心已經正法等語臣等因拜得明等俱係隔省囘民逺至官川拜從馬明心已屬可惡至馬明心業經正法尚敢聚居誦經實屬愍不畏死查馬明心創教起釁致蘇四十三藉端滋事今安定各該犯附從馬明心雖未敢乗機接應公然通賊伏羌各犯為馬明心糾約斂銀亦在蘇四十三未起事之前均與實在從賊有間但既拜從馬明心為師甘心崇奉即與逆黨無異未便僅照邪教為從律定擬應將附從馬明心之馬德裕馬明耀馬成祿馬成祥馬朝林車滿倉馬成得馬如玉馬成林馬如昌齊明齊月拜得明蕭正明亷梓玉馬得建馬立格馬伏賔馬景元馬廷棟馬尚紀馬廷彩楊鳴鳯馬建業馬正邦楊洪道高兆元馬良貴馬榮貴馬成龍齊有全并前所拿獲監候待質之馬而立即馬尚徳三十二名概行正法以示儆戒至馬明心堂弟馬廷美即馬三娃張漢之兄張柱張懐徳之兄張懐雄張明徳之父張士榮姪張二娃五名照緣坐律概予斬决馬明心張漢張懐徳張明得之妻妾子女等共二十六名口分别發遣其婦女發往伊犁給與厄魯特索倫察哈爾兵丁為奴幼男發往雲南之普洱廣西之百色極邊烟瘴充軍並咨查拜得明亷梓玉各原籍有無煽惑為匪情事至唐家川洪濟橋等處從逆餘黨已據布政使福崧等稟稱業經搜獲數十名及各犯家屬數十名口仍飭令再行實力搜挐毋致漏網奏入上諭内閣曰據阿桂等奏按察使福寧督率安定縣知縣黄道煚查挐逆囘餘黨及應行緣坐各犯家屬不動聲色俱就弋獲且傳集囘衆剴切曉諭俾衆心驚疑盡釋感激涕零咸皆安堵辦理頗屬得宜福寧著加恩賞戴花翎並著交部議叙知縣黄道煚著一併交部議叙以示優奬同日阿桂李侍堯又奏言查逆匪滋事以後據循化㕔等處搜獲各該犯屬婦女幼男共五百名口除陸續監斃並首逆家屬正法共一百五十八名口外現在各屬監禁婦女二百五十九口幼男八十三名查各犯俱係新教囘匪其應行緣坐幼孩未便併發新疆致滋煽惑應遵旨將婦女發往伊犁賞給索倫察喀爾厄魯特兵丁為奴幼男發雲南之普洱廣西之百色極邊烟瘴地方充軍所有婦女二百五十九名分作七起幼男八十三名分作兩起俱間日起解檄飭營汛撥兵䕶送其循化續行捜獲犯屬並安定伏羌唐家川等處挐獲各犯家屬俟解到時亦即照例分别發遣奏入報聞同日阿桂李侍堯又奏言臣等前奉諭旨令甘省大小官員據實供吐業將陸瑋等親供錄呈御覽嗣據陸續來省之知府鐘賡起汪臯鶴張金城候補同知邱大英等十五員各將浮冒賑數及餽送上司並代買物件等項銀數開送前來臣等閲各該員供詞雖尚有不盡而上下通同冒賑開銷各情弊業已供認不諱臣等又接奉上諭㨿王廷贊供邱大英詹耀璘等各餽送王亶望銀兩等因臣等復傳集邱大英等二員嚴加詰問邱大英供在金縣任内兩次送過王亶望銀四千兩邱耀璘供在西寜縣任内兩次送過王亶望銀四千兩等語該員等所供饋送情節相符又有代買物件及送過盤費銀尚不止王廷贊所供三千之數應將該二員遵旨歸案辦理現任蘭州道圖薩布係上年十月到任臣等傳訊該員據供我到任時初賑加賑早已辦過今春展賑亦係上年辦定之案至現在甘省造報捐監冊只辦過四十五年夏季其秋季尚未造報我係十月到任各屬所捐糧數並未出結等語臣等恐該員尚有索取屬員供應及銀物等事復訊之前任皋蘭令楊惪言現任皋蘭令蔣重熹僉供圖薩布自到蘭州道任首縣並無供應亦未收受伊等銀物等語可否將圖薩布暫免革職挐問如續有查出通同舞弊實據再行嚴㕘治罪之處伏候欽定奏入報聞欽定蘭州紀畧卷十三
