  text: 欽定四庫全書欽定蘭州紀略卷二
  hash: sha256:f77641ab6a137f7adf96997db49dae418d1b27022cab8fb36e7dcfa88d910128
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0015_WYG_002-1a, image: WYG0362/WYG0362-0257c.png}
body:
  text: 丙午上命軍機大臣傳諭阿桂和珅曰現在逆回占據河州州民畏其殺害勢必脅從伊等本係愚民猝遇賊衆凌逼其罪可寬至生監等從賊草茅微末尚可稍貸若本身在京及在各省出仕者或其家屬從賊情亦稍有可原惟曾經出仕回籍人員如有甘心從賊不顧名義法無可恕必當從重治罪著阿桂和珅於勦滅賊黨後查明分别辧理丁未阿桂奏言本月初一日臣在安陽途次接奉寄到諭旨並閲勒爾謹等各奏摺逆回罪大惡極自應立即勦除現已欽奉諭旨令馬彪帶兵前往并諭伍彌泰莾古賚各選兵預備調用並於火器健鋭兩營兵丁挑選預備仰見睿慮周詳無微不至臣思逆回意在劫殺因河州先已派去兵丁二百名存城兵力單弱居民事出倉皇各顧家室不能盡力守禦以致猝被攻破現在提督仁和及勒爾謹前調各營兵二千名陸續到齊兵力既集無難一鼓擒滅臣於二十八日晚由時和驛起程因瘡疾發動每日僅能行百餘里今接奉諭旨儘力遄行約計初九初十可以到京奏入上命軍機大臣傳諭阿桂和珅伍彌泰畢沅農起尚安曰阿桂奏到遵旨回京一摺計拜發此摺後又接到續降不必來京之諭旨諒即由途次前往但伊因瘡疾發動每日僅行百餘里此時即竭力趲程恐亦未能迅速到甘現在甘省急需重臣督辦刻不能緩和珅年力強壯行走自能便捷計可到在阿桂之先務須星夜兼程前進督辧一切俟阿桂到省後和珅仍遵旨將所辦事宜詳細告知阿桂再行回京至和珅到彼倘亦不能尅期其自西安至甘省一帶現在乏人料理關係綦重伍彌泰帶兵前進計此際已抵甘省所有一切調度應辧軍需糧餉各事宜即著伍彌泰悉心經理並著傳諭尚安就近即速馳赴隨同伍彌泰辦事仍將如何經理之處一面迅速覆奏一面通知阿桂和珅至尚安起程後西安又少大員協理著傳諭農起迅速趕赴西安留同畢沅和𠂻商辦其西安布政使事務另行奏署再由京派往之滿漢司員本係記名以道府擢用人員如畢沅有需人之處即酌留一二員聽候差委同日河南巡撫富勒渾奏言臣接準陜西撫臣畢沅札稱令臣酌派官兵前赴西安調用自應就近撥往以資接應查河南通省各營額設兵九千九十五名內河北南陽二鎮各設兵四千餘名臣已飛札該鎮各挑健兵一千名即令曾經出師金川之河北鎮臣觀成先統兵一千名馳赴西安候調其南陽鎮標兵一千名另派歸德營參將王國士暨遊擊守備等員亦分二起陸續前往臣同藩司李承鄴辧理妥協即馳赴陜豫交界之潼關地方稽查點驗催送出境並分飭接壤各屬嚴密防堵再準畢沅咨會令臣撥解火藥五萬斤赴西安備用臣現於貯藥較多之河北鎮左右二營河南開封二營各撥一萬斤陜州營二千斤臣標左右二營各四千斤共足五萬斤之數分委妥幹辨兵星馳解往奏入上命軍機大臣傳諭阿桂和珅伍彌泰富勒渾畢沅曰據富勒渾奏稱於河北南陽二鎮各挑兵一千名令河北鎮臣觀成等帶領起程等語前經降旨令該省官兵於邊境駐劄備調毋庸前赴甘肅今該撫既預為調集派往俾甘省多得兵力接濟以壯聲勢亦屬可行此項官兵若未入陜西境仍可不必前往若已入境即令前往俟阿桂和珅到彼相機進勦時聽候差委戊申阿桂奏言臣於直𨽻磁州途次接奉寄到諭旨令臣即速來京以備帶兵前往甘肅臣思逆回嘯聚不過二千餘人況河州城內俱係百姓無可脅從不難立即殱除現在勒爾謹等續調各營兵丁諒已到齊又有西安提督馬彪先行馳往並遴選西安緑營兵一千名分起迅赴河州計西安至蘭州十八站蘭州至河州二三站約本月初旬可到自必將逆匪勦滅全完如果賊勢猖獗必需續添兵力所有帶兵之人最為緊要伏乞皇上於海蘭察額森特二人內酌派一人先行馳往並令於侍衛章京內如阿爾都等前在軍營得力伊所深知者㨂派數人奏聞請旨派令前往至奎林勇往能事但由烏嚕木齊帶兵前至河州亦幾及四千里未免行走遲滯將來如果調用奎林竟請特降諭旨令其先行馳往並令於所屬厄魯特內挑選精兵一二百名派員隨後帶赴河州備用更為有益臣接奉諭旨後即帶同軍機司員仍由彰德衛輝一帶前赴甘肅惟有儘力趲行以期早到奏入上命軍機大臣傳諭阿桂和珅曰據阿桂奏在磁州接奉諭旨即由彰德衛輝一帶儘力遄行等語海蘭察額森特二人業經派令同和珅前往其阿爾都等亦隨同和珅赴甘至奎林先已降旨令其帶兵來甘後因烏嚕木齊至甘肅程途太逺恐緩不濟急復經降旨停止此時派赴之人甚多亦無需奎林一人也上又命軍機大臣傳諭阿桂和珅曰逆回傷害職官占據河州一案總係勒爾謹平日不能預為覺察以致飬癰貽患及事發後又不詳查起釁根由確實陳奏事完之日阿桂和珅必須徹底根究實在如何貽誤之處不得稍涉含糊再王廷贊所奏安定縣回民馬明心係新教之主則其人實為此案首犯但究係何時拏獲如何審辦勒爾謹從前並未陳奏殊不可解至此等回匪將來辦理時凡隨同逞凶肆逆搶占河州圍逼省城者均應勦洗不得稍存姑息使鄰近畨人知所畏懼此為綏靖邊方起見不得不如此辦理至賊匪人數據勒爾謹原奏連婦女不過二千人而王廷贊奏稱圍蘭州時有三千人蓋伊身在圍城未免為羣言淆惑其實逆賊既占河州必不肯捨棄自必留人占守甚或分其黨羽侵犯狄道亦不可定焉得復有三千餘賊圍逼省城此或賊人所過地方脅迫良民為之先驅將來執訊時不可不分别辧理此皆阿桂和珅到甘省時應行留心酌辧之事著即先行傳諭令其存記遵照妥辧臣等謹案自古聖王綏靖疆隅式遏寇虐為邊方大吏者理宜申明教誡宣播德威使宵小無由竊發若狃於積習姑息養姦勢將滋蔓而不可制甘省大吏嵗久廢弛致小醜跳梁肆行滋擾自屬責有攸歸皇上厪念邊陲特命重臣從嚴辧理凡隨同肆逆者盡豫翦除以杜亂萌而申國法至圍城賊衆恐有良民放脅先驅諭於執訊時加意區别俾免玉石俱焚所以為義之盡仁之至歟同日雅德奏言臣前準陜西撫臣畢沅札會於太原大同二鎮調撥兵丁五千名派令總兵福敏泰帶領前往䇿應兹四月初二日酉刻接據畢沅札稱探得三月二十七日以內蘭城併力固守該處提鎮及西安滿營并陜甘各路之兵俱陸續可到足資保護令晉省止備兵一千名如有必需應用再行調取等因查現在所調官兵尚未起程臣隨飛咨大同鎮臣概行停止並咨會太原鎮臣福敏泰將所派兵一千五百名內挑選一千名仍為預備如果必須調用俟陜省知會到日再行起程雅德又奏言現在調兵進勦逆回文報來往關係緊要臣飛飭沿途州縣添設腰站多備脿壯馬匹以供馳送並令該管道府親往董率稽查務期加倍迅速至京兵過境一切車馬草料供支等項自須預為妥備以利遄行查山西省甘桃驛至榆次縣之王胡驛俱係﨑嶇山路車馬難行隨與藩司談尚忠等悉心籌議擬於該三處全備騾馬以備官兵乘騎及馱載軍裝之用其餘各跕應付車輛馬匹事宜已密飭地方各官上緊趕辧尅期妥備均奏入上命軍機大臣傳諭阿桂和珅畢沅伍彌泰馬彪曰本日據雅德奏接據畢沅札隨將大同鎮兵停止等語畢沅所辦真屬曉事可嘉但伊何以此時尚未奏到著傳諭畢沅即將現在情形及一切調度事宜隨時速奏至西安滿營並陜甘各路之兵日內計可將次到齊著傳諭伍彌泰馬彪即將官兵曾否到全現在如何籌辧進勦之處迅速馳奏至和珅諒已兼程前進不必帶領晉省兵丁行程更可迅速上又命軍機大臣傳諭雅德曰雅德奏添設腰站多備馬匹以供馳送文報所辦甚好至京兵過境預備騾馬以利遄行等語此則可以不必兵由河南而行惟派出大臣侍衛官員及文報往來仍由山西行走屢經降旨傳諭雅德即遵照辧理一切妥為籌備不必稍涉張皇己酉勒爾謹奏言臣前因逆回占據河州隨檄飭循化文武各員擒蘇四十三等家屬并飭署西寧鎮貢楚克達爾帶兵由循化一帶截其歸路以便兩路夾攻旋聞逆回由小路潛赴省城其存留河州之賊自屬無多即飛飭貢楚克達爾作速收復河州臣將原帶本標兵五百名留二百名駐守狄道率同臬司福嵩帶兵三百名並傳集土兵七百名星夜旋省救援於二十九日抵省現在提督仁和總兵圖欽保德寧城守尉額爾恆額俱先後到蘭所有勦捕事宜臣等惟有公同商酌四路擒拏務期迅速竣事并慮逆回勢窮力促或由洪濟橋沙泥站兩小路逃竄已分派官辨帶領漢土官兵分途前往預備擒拏同日勒爾謹又奏言據西寧鎮標遊擊祥保循化營遊擊呼嵩阿稟報帶領漢土官兵赴河州擒勦匪犯已將守城賊黨十九名盡行殱斃擒獲蘇四十三之姪蘇二個現在嚴行監禁并派千總楊有鳯領兵一百名駐城彈壓又據循化文武各員稟報生擒要犯蘇五個係蘇四十三胞弟并獲馬八十三等十七名又搜獲回婦二十三口俱經監禁等語臣飭將所獲各犯派委員辨嚴加鎖􅀈聽候訊明辧理并嚴飭再行搜拏毋使一名漏網並遍張曉諭招撫河州一帶逃散居民各安生業一面選差妥員速赴河州加意撫恤以期小民得所同日甘肅提督仁和奏言臣于三月二十六日酉刻行至距蘭州四十里之沙井驛地方聞省城鎗炮不絶旋據馬夫報稱撒拉爾回匪約有二三千名已從蔣家灣前來圍困蘭城燒燬西南關廂并將浮橋拆斷道路不通臣聞信急欲往援但止帶官兵十數名正在焦急間適有涼州總兵德寧帶領標兵三百名署副都統城守尉額爾恆額帶領涼州滿兵三百名齊抵沙井驛因橋已拆斷隨差辨赴張家河灣一帶覓辦船隻至二十七日有莊浪土司魯璠帶番兵二百從黃河南岸前來應援臣即令該土司畨兵在南岸劄營以牽賊勢一面傳令船隻在金城關一帶分布臣等是夜帶領官兵直至金城關渡口二十八日黎明臣因金城關係省城咽喉最關緊要即於該處把守船渡並派兵將炮向賊施放使其不能堵遏賊匪一見我兵從燒燬房屋內用鎗石飛打臣即督令德寧額爾恆額乘船直過河南官兵奮力上岸時有關廂內藏匿回匪齊出迎撲臣一面在金城關飛速打炮一面督兵在河沿劄定接仗土司魯璠亦帶領畨兵從南岸賊營之後奮力攻打賊匪雖屬猖狂仰賴聖主天威我兵努力奮擊城上官兵亦施放鎗炮直至申刻將賊匪擊退上山臣因兵力單微未及追趕並因城西逼近黃河難以劄營隨令官兵繞至城東寬濶地方安營嚴加堵禦一面檢查尸身約鎗炮斃賊四五十名我兵內都司王宗龍陳亡是夜固原鎮總兵圖欽保帶兵五百名從省城東路前來亦在城東劄營二十九日早賊匪從嶺下撲圖欽保及德寧額爾恆額等即帶兵迎擊臣是時立即過渡親督官兵奮攻直至山梁臣等公同察看賊人約有二三千名若在山梁劄營恐兵少無益商定帶兵緩撤至山下劄營堵禦此次雖未占據山梁而官兵甚為奮勇斃賊甚多並生擒二名圖欽保親殺賊首四級至督臣勒爾謹於是日晚從狄道抵省臣等現在籌商竭力勦捕以期迅速蕆事均奏入上諭內閣曰此次仁和等會勦逆賊奮勇出力均屬可嘉仁和圖欽保德寧額爾恆額貢楚克達爾均著交部從優議敘並各賞大荷包一對小荷包二對額爾恆額並著賞帶花翎德寧貢楚克達爾如未徑賞戴著一體賞給戴用遊擊祥保呼嵩阿殱擒賊犯亦屬能事均著交部從優議敘土司魯璠亦勇往可嘉著加一等賞給職銜並賞戴花翎以示奬勵至畢沅在陜西境內聞有甘省逆賊滋事即能悉心調度事事妥協並有先辦而與朕旨相合者實屬可嘉之至著賞給一品頂戴仍交部從優議敘並賞給大荷包一對小荷包二對布政使王廷贊於逆賊圍逼省城時能悉心守禦且將新教首犯馬明心先行諭示賊衆復即正法辧理實合機宜業經賞給荷包花翎著加恩賞給一品頂帶仍交部從優議敘至此事係勒爾謹從前經理不善以致飬癰貽害其咎原無可辭但伊現在辦理收復河州及會勦逆回尚屬迅速妥協統俟事畢後再行核其功過另降諭旨其陳亡都司王宗龍甚屬可憫所有應得賞恤該部照例議給其陳亡受傷滿漢官兵及土兵等均俟查明議恤臣等謹案賞功罰罪政治之大經撒拉爾回匪肆逆經仁和等統兵會勦仰藉天威擊退上山勢已日就窮蹙我皇上特降恩綸於奮勇之提鎮以下並土司魯璠均豫優敘至陜甘宣力諸大員俱進階逾格即勒爾謹因循貽誤咎本難辭亦以此次收復河州未忍遽加嚴譴後冒賑折收一案爰書既定仍不曲事姑容仰見大聖人刑賞大公至正一惟其人之自取絶無稍存成見也同日上命軍機大臣傳諭和珅勒爾謹畢沅曰據勒爾謹奏擒獲蘇四十三之姪蘇二個胞姪蘇五個並獲要犯馬八十三等現在嚴加鎖􅀈候訊等語蘇四十三弟姪並馬八十三等俱係案內要犯該督即派委幹員押解並即此外拏獲助惡要犯一並迅速解京沿途小心防範毋稍疏虞至仁和摺內官兵直至山梁察看賊勢又稱此次雖未占據山梁所奏尚未明晰該提督所指山梁係屬何名現在賊人是否占據山梁著即查明覆奏至阿桂現有瘡疾恐未能迅速行走已諭令不必勉強而和珅行走必速仍須馳往甘省督辦一切並將善後事宜會同勒爾謹妥協辧理同日阿桂奏言臣於初三日行至衛輝接奉諭旨及畢沅奏到各摺逆回竟敢進逼蘭州官兵多有傷折賊勢如此猖獗殊堪髮指非厚集兵力大加殱戮淨絶根株不足以抒憤恨臣現在晝夜兼程行走但自恨為瘡疾所纍不能迅速星馳計每日連夜趲行總在二百里以內實深焦急現奉諭旨派尚書和珅等馳驛前往自可先到甘肅調遣辧理然臣亦不敢因派辧有人稍紓已貴惟有儘力兼程以期迅到接辦奏入上諭曰今日接勒爾謹奏到賊勢已敗諸事易辦卿可放心飬瘡而行若再接佳信並不往亦可同日畢沅奏言臣因逆回進逼蘭城飛調各路兵丁前為應援兹據提臣馬彪來札知蘭城尚在固守督臣仍駐狄道互相牽制俾賊人不致蔓延四出現在馬彪等所領西安固原兵一千四百名業已到蘭至伍彌泰薩炳阿帶領滿兵一千六百名約於初五六內亦可先後齊集再臣前恐提臣處領兵將辨不敷派委查潼關協副將馬鎮國久在戎行熟悉形勢都司董秀亦經出兵打仗因續行就近調取兵丁三百名於初一日由西安星速前赴提臣處接濟再延綏鎮兵臣先後飛調共一千五百名令仍從固原平涼一帶迅速前往至督臣現由狄道前拒賊衆腹背受逼而兵力更為單薄亦須速行接應所調興漢鎮兵五百名臣亦飛催總兵三德令從略陽白馬關小路行走約於初六七即可前至狄道以資接應至臣前因蘭州省城形勢甚危迤東州縣守備皆虛而陜省現存兵數又不敷再調是以飛咨四川河南陜西三省酌派官兵速為䇿應今已隔五日而西安及各路官兵陸續前到蘭州司道等守禦甚力似可無意外之虞臣續又知會撫臣富勒渾只於就近陜省各營分挑撥五百名且在各本營預備至山西距陜較近臣亦知會撫臣雅德挑選兵一千名在於蒲州駐劄統俟酌量局勢如必須接濟再行咨調至四川省川北一路界連甘肅尅期可到且狄道迤南一帶山勢險隘東達鞏秦處處均關緊要必得川兵一二千名間道星速遄行直抵狄道非但協同進勦大可得力且秦鞏等處聲勢聨絡回匪聞風震懾自無滋蔓之虞臣現又飛咨四川將軍提臣迅即調援如數日內甘省河西之兵各路並集足資會勦無需鄰省兵丁協濟即行飛咨停止再聞賊匪現在蘭城西關外八蠟廟五泉山等處屯聚今提臣及各路官兵陸續會集自可立即殱除一有捷音臣即飛摺馳奏仰慰聖懷奏入上命軍機大臣傳諭文綬曰據畢沅奏如數日內甘省河西之兵各路並集足資會勦即飛咨四川停止調遣等語本日又據勒爾謹等奏到現已收復河州籌辧勦捕無須復調多兵所有川省官兵著傳諭文綬即行停止上又命軍機大臣傳諭袁守侗雅德富勒渾曰前因甘省逆回占據河州令河南山西兩省選派緑營官兵預備調用並派健鋭火器營兵四千名派員分起帶往本日據勒爾謹等奏稱收復河州賊勢已敗所有籌辧勦捕事宜此時已無需各省兵力除未經起行之京兵二千名停止發往外所有前調之山西河南等省官兵自應一併停止若已經調發出境亦即飭令各歸本營以省逺涉糜費同日畢沅奏言現在各路官兵進勦逆回自西安至蘭州一路自應安臺添站以利差務而速郵傳除陜省境內已飭布政使尚安前往妥為料理外至甘省涇州迤西各屬所有糧餉馬匹草料等項均須及早籌備而蘭城阻絶無項可領臣已飛檄各該廳州縣如本處庫無存項現有必需應用之處各差妥員携帶印領酌定數目赴西安藩司庫內借領以應急需將來另行核算至大路州縣邠乾以西臯蘭以東地方多係瘠薄民間畜飬馬騾本少查緑營出兵向無供支腳力之例此次行程急迫晝夜併站趲發兼以二十八九等日連值隂雨道途泥濘若令步行前進誠恐遲滯有誤軍行臣因飛咨沿途各站不拘車馬騾頭酌量多寡預備令各官兵等接濟腳力到站更换以資迅速而各路赴蘭官兵所須火藥鉛丸弓箭等均係緊要必須每日雇覓車騾倒换前進方足以資接濟臣恐地方官辦理不善致滋小民擾纍甚將車馬隱匿不前以致貽誤復諄切曉諭令各寬給價值將來事竣後酌量應銷之項準其核銷則兵行自必迅速而小民所畜車馬價值寬舒必更踴躍趕赴以供雇覓於軍務較有禆益奏入報聞庚戌上命軍機大臣傳諭和珅曰此時逆匪勢已窮蹙只須痛加搜勦諸事易于辦理所有火器營兵二千昨已降旨停止派往其健鋭營兵二千名內尚有五百未經起程現在亦經停止至於已去之一千五百名和珅于行抵西安時諒已知其大概或告知畢沅令其暫行停住西安聽候調用或約料無須此項京兵即可一面奏聞一面令其回京其海蘭察額森特乾清門侍衛等本為帶兵打仗派往若京兵已停其赴甘和珅或留一二人聽用或令伊等一並回京皆可至所有派往大員亦不必全令馳赴著傳旨令李侍堯回京候旨另降諭旨農起亦著即回京陛辭仍回安徽巡撫之任再前次派往之京察一等記名司員李照等六員到甘後并著和珅勒爾謹畢沅商酌如兩省內有須用道府人員即可著留補用或不必全留或竟可無需俱令和珅與兩省督撫酌量辦理至此案起釁根由勒爾謹並未明晰奏及已諭和珅等到彼查究務將實在情節徹底跟求其應參奏者俟查參到日再定至勒爾謹飬癰貽害咎實難辭但此時斷不宜遽行更換總督以致賊衆易生輕玩著和珅到甘後面傳諭旨令其知朕此意更加黽勉同日上命軍機大臣傳諭和珅勒爾謹曰前據王廷贊奏逆匪圍逼蘭州兼為索取新教主馬明心等語馬明心既據王廷贊摺內稱為新教之主何以勒爾謹又奏蘇四十三為首犯若係同教不應有兩教主若分新舊教則素有嫌隙馬明心羈禁在省蘇四十三等自當恱服何復藉稱索取直犯蘭州其情節殊不可解至河州循化廳等處回衆共有若干種類其中有無當差食糧之人再如土司魯璠又係何項土司何時受封襲職因何肯如此出力並更有似此之土司否著和珅于到甘省時會同勒爾謹詳細查明覆奏欽定蘭州紀略卷二
