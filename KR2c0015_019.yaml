body:
  text: 丙辰李侍堯奏言各省咨解前在甘省捐監冐賑各員叅革西安府同知原任平凉縣知縣趙杭林前任鎮西府知府崧柱原任鎮畨縣知縣王夣麟前署碾伯縣知縣筆帖式景福原任洮州同知顧芝前署環縣知縣捐陞光禄寺署正陳嚴祖原任撫彛通判博敏原任固原州知州郭昌泰原任隴西縣知縣廣福清水縣知縣王璠原任莊浪縣丞閔焜原任安西州州判朱蘭等十二犯到蘭臣率同兩司逐一研訊趙杭林冐賑銀一萬七千九百餘兩又捐監盈餘銀九千兩崧柱冐賑銀一萬四千九百餘兩又捐監盈餘銀六千四百餘兩以上二犯賍在二萬兩以上應照侵蝕錢粮一千兩以上例擬斬請㫖即行正法王夢麟冐賑銀三千五十餘兩又捐監盈銀六千四百餘兩景福冐賑銀六千二百餘兩捐監盈餘䬶四百餘兩顧芝冐賑銀四千二百餘兩又捐監盈餘銀二百兩博敏冐賑銀二千餘兩又捐監盈餘銀二千二百兩郭昌泰收受屬員銀三千五百兩又捐監盈餘銀六百餘兩陳嚴祖冐賑銀二千七百餘兩又捐監盈餘銀一千餘兩廣福冐賑銀二千八百五十餘兩又捐監盈餘銀八百兩王璠冐賑銀二千六百兩又捐監盈餘銀九百兩閔焜冐賑銀一千一百餘兩又捐監盈餘銀一千三百餘兩朱蘭冐賑銀一千二百餘兩又捐監盈餘銀七百五十兩以上十犯應各照侵蝕錢糧一千兩以上例擬斬監候惟查景福顧芝郭昌泰王璠朱蘭在原籍京中狡供及解甘省經臣再三嚴詰方各供認應遵諭㫖不肯供吐實情審出時從重治罪請將該五犯入於秋審情實奏入上勅軍機大臣㑹同該部核擬速奏旋經軍機大臣等議言應如所奏辦理上諭内閣曰趙杭林崧柱侵蝕官項在二萬兩以上著照程棟等之例補行予勾其侵冐一千兩以上之王夢麟博敏陳嚴祖廣福閔焜俱依擬應斬著監侯秋後處决其景福顧芝郭昌泰王璠朱蘭五犯侵冐雖不及一萬兩以上但解審時不即供吐實情尤為狡詐俱依擬應斬著監候歸於秋審情實辦理餘依議壬戌李侍堯奏言江蘓解到叅革原任平畨縣知縣何汝楠原任凉州府知府吳鼎新原任紅水縣縣丞史載衡三犯臣遵即率同兩司研訊據何汝楠供冐賑銀五萬餘兩又捐監盈餘銀一萬五千餘兩呉鼎新供冐賑銀八百餘兩又建倉請銷銀七千九百餘兩捐監盈餘銀四千餘兩又收受永昌縣知縣林昂霄銀一千兩史載衡供冐賑銀八千六百餘兩又捐監盈餘銀四千二百兩應請將何汝楠呉鼎新二犯照侵蝕錢糧一千兩以上例擬斬請㫖即行正法史載衡一犯照侵蝕錢糧一千兩以上例擬斬監候歸於秋審情實再何汝楠贓在四萬兩以上所有該犯之子亦應發往伊犁充當苦差奏入上勅軍機大臣㑹同該部核擬速奏旋經軍機大臣等議覆應如該督所奏辦理上諭内閣曰何汝楠侵蝕銀在二萬以上著照程棟各犯之例補行予勾其侵蝕在一萬以上之史載衡著依擬應斬入於秋審情實仍牢固監候餘依議丙寅湖廣總督舒常湖北巡撫鄭大進奏言甘肅折收冐賑案内原任甘肅靖逺縣知縣麥桓由粤解甘收審於十月十五日入湖北蒲圻縣境兹據黄陂縣知縣陳士鳯禀報麥桓解至該縣灄口地方於二十一日病故等情臣等隨飭代辦臬司事鹽法道張廷化等星赴相騐據禀覆騐明實係病故委無别項情弊並將該員役等帶省臣等覆加訊問無異隨移咨陜甘督臣廣東撫臣查照奏入上諭内閣曰麥桓係解甘審辦要犯中途身死保無畏罪服毒自盡情弊不可不嚴行查究著刑部堂官𣲖委能事司員帶領熟諳仵作馳驛前往詳細檢騐毋得草率行事十二月壬寅上諭内閣曰前據陳輝祖查抄閔鵷元原藉貲財其家衹存銀三兩殊堪駭異毋論閔鵷元在甘肅同知知縣任内侵蝕帑項盈千累萬其運囬家貲必不止此即閔鶚元久任巡撫所得養廉優厚豈忍令其胞弟貧乏至此非陳輝祖查辦時任聽委員欺隱隨意開報即閔鵷元之家屬聞風預為寄頓閔鶚元在江蘓離伊原藉甚近豈無見聞乃任其私自隱藏希圖事後安享實為朦混欺􅎖曾降㫖嚴行申飭令其明白回奏兹據閔鶚元覆奏請將伊名下原籍任所財産一併恭繳入官並請革職交部治罪等語何必為此不衷過甚之辭乎甘肅自王亶望為藩司首先作俑與通省屬員揑災冐賑聨為一氣其案内人犯現已審明侵蝕銀數多寡按律問擬其查抄各犯家産因此事發覺已久隱匿寄藏財産者亦不獨閔鵷元一人且以全案而論有王亶望之喪心侵冐無怪有閔鵷元之事後藏匿陳輝祖閔鶚元之互相欺隱轉不直一噱朕嘗謂不為已甚正謂此也然不得不明掲伊等之私者恐伊等遂謂朕易欺也封疆大臣理宜公忠體國實心任事不得稍存欺飾今閔鶚元於伊弟骩法營私諸事既不能管教於前及發覺查抄又任其隱匿侵欺於後即伊具摺自陳亦難以解免試令清夜捫心其亦知愧知懼否耶所請革職治罪及呈繳家産之處朕究不為已甚均著加恩寛免將此通諭中外知之甲戌工部侍郎德成奏言臣奉命于十一月初七日行抵蘭州㑹同總督李侍堯逐一詳勘查得蘭州大城一座東西南三面俱有外城計長二千六百六十七丈五尺據阿桂等原奏内因山髙於城鎗礟可及擬將西面一帶外城全行折去其正南一帶去山尤近將拱蘭門南北城兩叚亦擬折去仍留東西城二叚中間不接處所築新城一叚並將拱蘭門移建于此至大城西南角與外城不接之處又添築新城一叚又東面外城東西長而南北窄南北展寛添築城二叚將原有東西城二叚折去大城西門外添葢甕城一道臣照例核估得新築城一千一百三十六丈五尺需工料銀十萬一千三百三十二兩零折去舊城二千七十一丈其折卸刨運平墊地基需工價銀一萬九千二百九十兩零磚甕城一道並門樓城臺馬道等項需工料銀二萬八千二百五十五兩零共工料應需銀十四萬八千八百七十八兩零至原奏華林山添建營堡移駐官兵查督標右營兵六百六名需兵房一千二百間官弁十九員需衙署房間一百四十一間共核計工料銀五萬八千三百六十一兩零至城堡一項查甘省土城甚多似無庸修建磚城徒致多費擬建土城一座圍長三百八十一丈四尺底寛一丈六尺頂寛一丈二尺其南面近倚髙崗東西北三面各建門樓一座又設角臺四座共核計工料銀五萬二千七十七兩零又原奏華林山以東於龍尾一帶險要處所設墩四座臣照依原定地盤處所造空心大墩四座估需工料銀三萬三千四百六十兩零以上各工料統共約計銀二十九萬二千七百七十八兩零至華林龍尾二山蜿蜒起伏直逼蘭城西南兩外城門有憑髙瞰下之虞是以原議將兩外城折去展寛今華林山建城立營龍尾一帶接連添設墩座則聲勢聨絡緩急相應環衛可以無虞似不必再事更張若外城門樓等項間有殘缺亦不過畧為修整需費銀一千七百三十三兩零再前此兵民守城時將大城磚塊折卸撃賊多殘缺不完亦應即時修整以壯觀瞻而資守禦共估需工料銀一萬六千四百五十二兩零如此辦理則内外二城俱可完整亦不過用銀一萬八千一百八十五兩零可節省銀十三萬六百九十二兩零臣謹將實在應辦情形核擬具奏伏乞皇上訓示遵行奏入上勅軍機大臣㑹同該部議奏旋經軍機大臣等議言應如所奏止將内外城殘缺毁壞處所繕修完整餘一切仍循其舊至華林山營堡雖據該侍郎勘估止須築土為城自不若磚砌城牆之更為堅實且磚城固較土城多費而統計無需改建各工仍大有節省應交李侍堯將營堡改用砌磚需用銀兩核實勘估具奏奏入得㫖如所議行庚辰李侍堯奏言准四川貴州委員解到捐監冐賑案内叅革原任直𨽻肅州知州王汝地前任河州知州今陞黎平府知府楊賡颺二犯臣即率同兩司逐加研訊據王汝地供認侵冐賑銀四萬四千六百餘兩應照侵盗錢糧一千兩以上例擬斬請㫖即行正法楊賡颺供認侵冐賑銀六千餘兩查該犯在貴州並不實供有心狡飾應請照侵盗錢糧一千兩以上例擬斬監候遵㫖從重入於秋審情實再王汝地贜在四萬以上所有該犯之子應發伊犂充當苦差長子王錫葵捐納鹽大使分發福建次子王錫蕃現在原籍臣已飛咨各該省解甘發遣奏入上勅該部覈擬速奏旋經刑部奏言應如該督所奏辦理得㫖王汝地侵蝕銀在二萬兩以上著照程棟等犯之例補行予勾其侵蝕在一萬兩以上之楊賡颺著依擬應斬入於秋審情實仍牢固監候餘依議壬午李侍堯奏言臣前以吳鼎新一犯捐監揑結冐賑並收受屬員銀兩又復冐請建倉是以從重定擬請㫖即行正法嗣接准部咨覆加詳覈此案定擬究應以冐賑捐監為重呉鼎新除建倉浮冐外所有侵蝕銀數係在一萬兩以内應照侵蝕錢糧一千兩以上擬斬監候又有冐請建倉應遵㫖從重定擬入於明年秋審情實奏入報聞丙戌李侍堯奏言甘省止捐監生並未辦賑各員内有冐請建倉之趙明旭邵維賢郭之屏劉坰田志蒼等五犯除田志蒼郭之屏已准直𨽻江西督撫咨明該犯等業經病故所有捐監建倉銀兩應於查封家産項下賠抵其現在甘省之趙明旭邵維賢二犯建倉銀數俱在一千兩以内臣定擬發遣新疆具奏經部覆准惟劉炯一犯前經順天府奏交刑部候甘省定擬辦理臣查該犯在徽縣任内捐監一百名應賠銀八百兩既經查抄家産賠抵無庸議外其建倉冐銷銀三千八百餘兩應照侵蝕錢糧一千兩以上例擬斬監候秋審時請㫖定奪奏入上勅該部議奏旋經刑部奏言應如該督所奏劉炯擬斬監候秋後處决至劉炯長子劉士鑾於查抄家産時將地畝紅契密帶身邊希圖隱匿計所隱契價銀七百二十兩零應將劉士鑾革去廪生杖一百徒三年又次子劉士鋒以副榜就職州判加捐分發河南試用五子士錕在甘捐監俱值劉炯徽縣任内之時劉士鋒除中式副榜毋庸議外所捐分發州判應咨部斥革并將劉士錕革去監生追照繳銷奏入上諭内閣曰刑部奏審擬甘肅侵冐案内原任河州知州葉中之子捐納通判葉椿業已革職毋庸議又原任徽縣知縣劉坰擬斬監候伊子劉士鑾等分别杖徒斥革二摺實屬非是葉中在知縣任内折收冐賑贓數累累係應擬斬候入於情實之犯因其身故得倖逃顯戮伊子葉椿在館充當謄録乃因伊父事發先行出京迯匿及拏獲到案後以伊母患病回籍探望語託行孝巧詞支飾尤為可惡自應發遣伊犂乃刑部以該犯一面之詞僅將葉椿革去官職不復置議甘省此案上下勾通侵帑剥民盈千累萬為從來未有之异事案内各犯俱屬法無可貸其有酌從寛減者實為朕法外之仁刑部係執法衙門仍應按律問擬果有情節可原即當聲明請朕酌量加恩何得狥情寛縱以沽感譽看來該堂官等因英廉現在出差竟好為姑息以博寛厚之名實大不是所有葉中之子葉椿著發往伊犂充當苦差其劉坰雖止捐監未經辦災但有建倉冐銷銀三千餘兩係擬斬監候之犯伊子劉士鑾於查抄家産時膽敢將地畝契價私行隠匿情殊可惡劉士鑾著一併發往伊犂充當苦差其劉士鋒中式副榜一併革去以示懲儆所有問擬寛縱之刑部堂官俱著交部嚴加議處餘依議同日李侍堯奏言准浙江山東委員解到叅革前任張掖縣知縣陶士麟前任漳縣知縣孫元禮二犯臣即率同兩司研訊據陶士麟供侵冐賑銀一萬二千一十六兩捐監盈餘銀七千兩又據孫元禮供侵冐賑銀九千兩共領實收四百五十張内有未捐捏報已捐即在賑案内開銷侵蝕銀一千七百五兩查陶士麟孫元禮入已贓私俱在一萬兩以上應照侵盗錢糧一千兩以上例擬斬監候入於明年秋審情實奏入上勅該部議奏旋經刑部等議言應如所奏辦理得㫖如所議行丁亥上命軍機大臣傳諭阿桂李侍堯曰蘭州外城西南兩面𦂳接華林龍尾山麓阿桂等議將此兩面外城折去俾城根距山稍逺不致有俯瞰下壓之虞原為保䕶城隍起見但今既添建營堡墩臺移駐重兵則兩山聲勢聨絡可以環衛大城况成功不毁何必復多費帑金將舊有土城折去改繕且西南兩關廂民居稠密若概令遷移撤去房屋小民恐多未便即所議擴建之東城闗廂亦未必能安揷許多烟户自不若一切仍循其舊從前德成勘估查奏時朕已早經諭及至營堡一項軍機大臣等議用磚砌更為堅實永久請交該督另行核實勘估但華林諸山岡阜聨絡其中所産虎皮石料必多若即用此項塊石疊砌鉤抿不特取携較便而工程尤為鞏固但該處採取石料是否便易較之燒磚工價孰為節省著傳諭李侍堯查明據實確核具奏乾隆四十七年正月庚子上諭内閣曰甘省自王亶望為藩司與蔣全迪等通同一氣侵帑婪贓種種不法為從來未有之竒貪異事内外諸大臣俱隱忍不言竟無一人舉發陳奏而陳輝祖閔鶚元之胞弟尤係案内人犯其平日家信往來必有確切音問屢經降㫖詢究乃始終掩飾支吾不肯奏出實情及嚴切究問若再如前巧言搪塞不但將伊等交部審訊朕必親自廷鞫今始據陳輝祖閔鶚元等各奏稱伊弟婪贓舞弊從前亦有所聞并有家信往來祇因一經陳奏恐伊弟必罹重罪是以隱忍瞻狥致涉欺飾實屬罪無可逭請交部嚴加治罪等語是伊二人之知而不舉俱已自行供認如出一口似屬實情至此案未經發覺之先朕已早有風聞因案情重大徘徊遲疑者已閱數年昨嵗因蘓四十三之事遣大學士阿桂等統兵往勦伊等摺内常稱連得雨澤因降㫖詢問該省向來年年報旱何以今嵗得雨獨多其中必有捏飾情弊因而層層致詢顯露端倪阿桂李侍堯亦知事難掩覆遂和盤托出朕思其事不得以人數稍重竟置不問但朕深以不能道德齊禮使伊等格心方引以為愧至齊之以刑尤屬不得已之苦心陳輝祖閔鶚元畢沅俱係讀書之人當明禮義豈不知朕辦理此案之始末乎毋論陳輝祖閔鶚元各有伊弟在甘省其一切通同弊混之事朕早知其必有確切音信來往即畢沅久任陜西巡撫並在甘省兩署督篆於該省各州縣侵冐官帑厯年積弊亦無不知之理乃竟敢巧為支飾欲於朕前嘗試乎五倫莫重於君父子為父隠尚為情理所有古純臣大義滅親父且有不能為子隠者况兄弟乎若以弟婪贓不法恐逕行舉發罪及其弟因而為之隱忍是祗知有手足之私情而不知有君臣之大義顛倒瞀亂莫此為甚且陳輝祖等若於此事未經敗露之先早為陳奏朕必嘉其公正不但不加之罪必特為褒奬以風厲舉朝諸臣之緘黙不言者即末減其弟之罪亦未可知是伊二人之弟蹈於重罪乃伊二人使之然也伊等既甘心隱忍於前及降㫖詢問猶復希圖掩䕶隱躍其詞於後仍冀日久或有憐伊二人為因弟受屈者尚得謂之有天良者乎此時即將陳輝祖閔鶚元革職交刑部治罪伊等亦無可置喙但朕斷不肯因伊弟株連遽置重典且此案内外大臣皆知而不舉又何獨歸罪於陳輝祖閔鶚元二人現在督撫一時乏人陳輝祖閔鶚元尚屬能事著加恩免其治罪仍照畢沅之例降為三品頂帶各留本任所有應得職俸養廉永行停止以示懲創嗣後陳輝祖閔鶚元畢沅俱不許進呈貢物即尋常土貢亦著一例停止陳輝祖等務各返躬思愧洗心滌慮潔已奉公庶幾可以稍贖前罪如或因停亷俸藉詞需索致有簠簋不飭之事王亶望是其前車朕必加倍重治其罪不能再為曲貸也辛酉李侍堯奏言臣前因拏獲逆囘韓阿渾據供蘓四十三往攻河州時令伊在後糾人接應被循化官兵及老教回民截殺衝散等語恐從逆匪徒一經衝散竄匿潛藏以致餘孽漏綱即嚴飭文武員弁派撥幹練兵役於要隘處所偵緝截拿昨據臬司福寧禀稱聞碾伯縣屬東灣鰲頭等處有回匪馬三十九等潛藏在彼傳習念經已密差幹役赴彼跴訪的確即㑹同該處文武添差兵役協拏旋據拏獲馬三十九馬滿㑹馬三十七馬鬍子等四犯解省臣率同司道嚴加審訊馬三十九等各供認附從馬滿㑹傳習新教臣伏查逆匪勦除所有從前被其煽誘者自應咸知畏懼即使原係新教如果改歸舊教悔過安分亦不妨許以自新之路乃該犯馬三十九馬滿㑹猶敢仍稱掌教阿渾復留新教名目而馬三十七馬鬍子從而附和念經實屬怙惡不悛自宜速置典刑以昭國憲臣隨於去年十二月二十四日將該犯等綁赴市曹處斬並將首級傳示西寧碾伯等處俾各回衆觸目警心皆知畏法至各犯家屬現已拏獲俟解到日照例分别發遣奏入報聞同日李侍堯奏言查甘省捏結各道府直𨽻州共五十三員俱已陸續解到臣率同兩司確加研訊除蔣全迪陸瑋宋學淳黎珠崧柱王汝地六犯已經正法魏椿年楊士璣德明汪世琳李承瑞博赫張何衢康基淵八犯已經身故李本楠侯作吳謝桓董熈宗開煌竒明周人傑朱蘭呉鼎新九犯俱於冐賑案内擬斬又郭昌泰一犯係捐監侵蝕并收受屬員銀兩又因狡供支飾從重定擬斬候情實又趙明旭一犯因冐建倉厫另擬發遣新疆外其劉光昱文德奎明王曾翼永齡程國表福明安彭永年彭時清觀亮郭照興德勵學沂等十三員於監糧災賑俱經揑結又秦雄飛觀禄黄元圯姜興周富斌諾明阿等六員係於折收案内捏結以上共十九員訊明並未收受屬員餽送銀兩止係捏結之員業經革職查抄應毋庸議惟查陳之銓熊啟謨潘時選張金城汪臯鶴陳庭學鍾賡起等七員俱係收受屬員餽送銀兩臣復逐一質訊據各員供認不諱查陳之銓收受餽送銀五千三百兩潘時選收受餽送銀四千六百兩張金城收受餽送銀二千五百兩熊啟謨收受餽送銀一千八兩汪臯鶴收受餽送銀一千四十兩俱在一千兩以上雖審明並無與屬員勾通舞弊侵盗分肥情事但其所受銀兩自係監糧冐賑之銀應照侵盗問擬請將陳之銓潘時選張金城熊啟謨汪臯鶴照侵盗錢糧一千兩以上例擬斬監候陳庭學收受餽送銀一千兩鍾賡起收受餽送銀五百兩俱在一千兩以下應照侵盗錢糧一百兩以上至一千兩杖流律從重改發新疆効力贖罪又彦方前署秦州并平番縣任内雖審明並未辦過災賑亦未收受屬員銀兩但捐監一千三百名俱係折捐將銀抵糧移交接任該犯在京供稱買榖歸倉實屬揑飾應照奉制推按問事報上不以實者杖八十徒二年律將彦方杖八十徒二年係旗人解部鞭責發落奏入上勅軍機大臣㑹同該部議奏旋經軍機大臣等議言應如所奏辦理得㫖如所議行同日李侍堯奏言准雲南福建廣東委員將前任永昌縣知縣鄭科㨗前任渭源縣知縣陳起撝現任髙州府知府前任西寧縣知縣周人傑前任漳縣知縣劉治傳前任循化同知陞任知府張春芳等五犯押解來甘臣即率同兩司逐加研訊據鄭科㨗供侵冐賑銀一萬四千餘兩捐監盈餘銀六千六百兩請添建倉厫浮冐銀七千餘兩陳起撝供侵冐賑銀一萬三千五百餘兩捐監盈餘銀四千一百兩周人傑供侵冐賑銀七千兩捐監盈餘銀一千五百兩收受屬員餽送銀五百兩劉治傳供侵冐賑銀七百兩捐監盈餘銀二百五十兩張春芳供侵冐賑銀七百兩查鄭科㨗侵冐銀二萬兩以上又有建倉浮冐銀七千餘兩應照侵盗錢糧一千兩以上例擬斬請㫖即行正法陳起撝侵冐銀一萬兩以上應照侵盗錢糧一千兩以上例擬斬監候歸於本年秋審情實周人傑侵冐銀兩雖在一萬兩以下但該犯前在廣東審訊時不吐實情有心狡飾應照侵盗錢糧一千兩以上例擬斬監候從重歸入本年秋審情實劉治傳張春芳二犯侵冒銀俱在一千兩以下應照侵盗錢糧一千兩以下例杖一百流三千里奏入上勅該部核擬速奏旋經刑部議言應如所奏辦理上諭内閣曰鄭科㨗侵蝕銀兩在二萬兩以上著照程棟等各犯之例補行予勾侵冐一萬兩以上之陳起撝著入於秋審情實仍牢固監候其侵冐不及一萬兩以上之周人傑著依擬應斬監候統俟本年情實官犯勾到時刑部聲明請㫖分别辦理餘依議同日上諭内閣曰甘省折收冒賑案内侵帑揑結各員業據李侍堯審明分别定擬具奏至臬司福寧前在平慶道任内扶同捏結本應革職抄産第念該員於此案舞弊實情首先供出且於搜捕安定等處逆首馬明心家屬黨羽尚屬出力福寧著革職從寛留任俟八年無過方准開復欽定蘭州紀畧卷十九
